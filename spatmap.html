// homeMode — the unscoped landing surface for THIS session ('overview' when a laid-out farm exists,
// else 'work'). Component 2: drilling out of a scoped area (Back / scope chip / popstate) returns here,
// so an overview-home session lands back on the overview, not the old work home.
var homeMode = 'work';

function freshState(){ return { v:1, farms:[], activeFarmId:null }; }

var EVENT_TYPES = ['stocked','worked','growth','pulled','filled','harvested','mortality','note'];
var WORK_METHODS = ['tumbled','washed','desiccated','flipped'];
var SHAPES = ['square','rect','circle'];

// _parseStateBlob — JSON.parse a stored blob into a {farms:[...]} object, or null if missing/garbage.
function _parseStateBlob(raw){
  if (!raw) return null;
  try { var d = JSON.parse(raw); return (d && typeof d === 'object' && Array.isArray(d.farms)) ? d : null; }
  catch (e){ return null; }
}
// loadState() — one defensive additive read; NEVER throws; backfills every field. (§1.12)
function loadState(){
  try {
    var d = _parseStateBlob(localStorage.getItem(STORAGE_KEY));
    if (!d) d = _parseStateBlob(localStorage.getItem(STORAGE_KEY + ':prev'));  // main gone/corrupt → recover the pre-import snapshot (audit review #2)
    if (!d) return freshState();
    d.v = 1;                                   // v stays 1 — every new field is additive
    delete d.photos;                           // never let a photo-inlined backup reach localStorage
    d.farms = d.farms.filter(function(f){ return f && typeof f === 'object'; });  // drop null/garbage entries before migrate (no t.id throw)
    d.farms.forEach(migrateFarm);
    // activeFarmId: fix if dangling
    if (!d.activeFarmId || !d.farms.some(function(f){ return f.id === d.activeFarmId; }))
      d.activeFarmId = d.farms.length ? d.farms[0].id : null;
    return d;
  } catch (e) {
    return freshState();
  }
}

function migrateFarm(f){
  if (!f.id) f.id = uid();                                                  // farm id
  if (typeof f.name !== 'string') f.name = 'My farm';                       // farm name
  if (typeof f.createdAt !== 'number') f.createdAt = Date.now();            // createdAt

  // settings: nest market size + neglect interval; backfill from legacy flat marketSizeMm
  if (!f.settings || typeof f.settings !== 'object') f.settings = {};       // settings object
  if (typeof f.settings.marketSizeMm !== 'number' || !(f.settings.marketSizeMm > 0))
    f.settings.marketSizeMm = (typeof f.marketSizeMm === 'number' && f.marketSizeMm > 0) ? f.marketSizeMm : 76; // marketSizeMm
  if (typeof f.settings.neglectIntervalDays !== 'number' || !(f.settings.neglectIntervalDays > 0))
    f.settings.neglectIntervalDays = (typeof f.alertDays === 'number' && f.alertDays > 0) ? f.alertDays : 56;   // neglectIntervalDays
  // PRICING (DASHBOARD): per-grade $/oyster map + a default for ungraded/unpriced cages. Additive +
  // backfilled — an empty map / null default just means "no prices set yet" (the card shows a CTA).
  if (!f.settings.gradePrices || typeof f.settings.gradePrices !== 'object') f.settings.gradePrices = {}; // gradePrices map
  if (typeof f.settings.defaultPrice !== 'number' || !(f.settings.defaultPrice >= 0)) f.settings.defaultPrice = null; // defaultPrice
  delete f.marketSizeMm; delete f.alertDays;

  // cageTypes: array; each meshMm→null unless >0; shape→'square' if not one of three
  if (!Array.isArray(f.cageTypes)) f.cageTypes = [];                        // cageTypes array
  f.cageTypes.forEach(function(t){
    if (!t.id) t.id = uid();                                                // cageType id
    if (typeof t.name !== 'string') t.name = 'Cage';                        // cageType name
    if (SHAPES.indexOf(t.shape) < 0) t.shape = 'square';                    // cageType shape
    if (typeof t.meshMm !== 'number' || !(t.meshMm > 0)) t.meshMm = null;   // meshMm REAL DATA
  });
  if (!f.cageTypes.length) f.cageTypes.push({ id:uid(), name:'Cage', shape:'square', meshMm:null });
  var firstTypeId = f.cageTypes[0].id;

  // grades: array of strings only
  if (!Array.isArray(f.grades)) f.grades = [];                              // grades array
  f.grades = f.grades.filter(function(g){ return typeof g === 'string'; });

  // batches: the provenance ledger
  if (!Array.isArray(f.batches)) f.batches = [];                            // batches ledger
  f.batches.forEach(function(b){ migrateBatch(b); });

  // harvestLog: array
  if (!Array.isArray(f.harvestLog)) f.harvestLog = [];                      // harvestLog array
  f.harvestLog = f.harvestLog.filter(function(e){ return e && typeof e === 'object'; });

  // barge: single object; fold a legacy unplaced batch into a pile (best-effort)
  if (!f.barge || typeof f.barge !== 'object' || ['empty','pile'].indexOf(f.barge.state) < 0){
    f.barge = freshBarge();                                                 // barge default
  }
  if (!Array.isArray(f.barge.events)) f.barge.events = [];
  if (!('batchId' in f.barge)) f.barge.batchId = null;
  if (!('count' in f.barge)) f.barge.count = null;
  if (!('sizeMm' in f.barge)) f.barge.sizeMm = null;
  if (!('grade' in f.barge)) f.barge.grade = null;
  if (!('ploidy' in f.barge)) f.barge.ploidy = null;                        // B6: ploidy pooled from pulled sources
  if (!('hatchery' in f.barge)) f.barge.hatchery = '';                      // B6: hatchery pooled from pulled sources
  if (!('origin' in f.barge)) f.barge.origin = null;
  // BATCH-SPLIT: additive splits[] (sub-batches carved off the remainder). Coerce defensively.
  if (!Array.isArray(f.barge.splits)) f.barge.splits = [];
  f.barge.splits = f.barge.splits.filter(function(s){ return s && typeof s === 'object'; }).map(function(s){
    if (!s.id) s.id = uid();
    s.count  = (typeof s.count  === 'number' && isFinite(s.count))  ? s.count  : null;
    s.sizeMm = (typeof s.sizeMm === 'number' && isFinite(s.sizeMm)) ? s.sizeMm : null;
    s.grade  = (typeof s.grade  === 'string') ? s.grade  : null;
    s.label  = (typeof s.label  === 'string') ? s.label  : null;
    s.ploidy   = (typeof s.ploidy   === 'string') ? s.ploidy   : null;
    s.hatchery = (typeof s.hatchery === 'string') ? s.hatchery : '';
    s.origin = (s.origin && typeof s.origin === 'object') ? s.origin : null;
    if (!('parentBatchId' in s)) s.parentBatchId = null;
    return s;
  });

  // LINES — flatten legacy areas[].sections[]/lines into flat f.lines; drop section/vert/area
  var flatLines = [];
  if (Array.isArray(f.areas)){
    f.areas.forEach(function(area){
      var src = Array.isArray(area.sections) ? area.sections : (Array.isArray(area.lines) ? [{lines:area.lines}] : []);
      src.forEach(function(sec){
        var lns = Array.isArray(sec.lines) ? sec.lines : [];
        lns.forEach(function(l){ flatLines.push(l); });
      });
    });
  }
  if (Array.isArray(f.lines)) flatLines = flatLines.concat(f.lines);        // keep already-flat lines too
  delete f.areas;
  f.lines = flatLines;
  f.lines.forEach(function(l, li){
    if (!l.id) l.id = uid();                                                // line id
    if (typeof l.name !== 'string') l.name = 'Line ' + (li+1);              // line name
    l.order = li;                                                           // explicit flat order (renumber)
    delete l.section; delete l.vert; delete l.pulled;                       // drop legacy hierarchy bits
    if (!Array.isArray(l.cages)) l.cages = [];                              // cages array
    // drop detached "spots" (treat as no cage) — but first rescue any batch a legacy detached-but-filled
    // cage held, so lineage refs still resolve (H2: no silent batch loss on migration)
    l.cages.forEach(function(c){ if (c && c.detached && c.batch){ migrateBatch(c.batch); if (!f.batches.some(function(b){ return b.id === c.batch.id; })) f.batches.push(c.batch); } });
    l.cages = l.cages.filter(function(c){ return c && !c.detached; });
    l.cages.forEach(function(c, ci){
      if (!c.id) c.id = uid();                                              // cage id
      delete c.detached;                                                    // NO detached field
      if (typeof c.typeId !== 'string' || !f.cageTypes.some(function(t){ return t.id === c.typeId; }))
        c.typeId = firstTypeId;                                             // typeId → first type if dangling
      c.label = (li+1) + '-' + (ci+1);                                      // label (cosmetic, regenerated)
      if (c.batch === undefined) c.batch = null;                           // batch (null = EMPTY)
      if (c.batch) migrateBatch(c.batch);
      if (!Array.isArray(c.events)) c.events = [];                          // events timeline
      c.events = c.events.map(function(ev){ return migrateEvent(ev, c.batch ? c.batch.id : null); }).filter(Boolean);
      if (typeof c.currentGrade === 'undefined') c.currentGrade = null;     // currentGrade
      if (!isValidISO(c.workDue)) c.workDue = null;                         // workDue
    });
  });

  // ensure every batch on a cage and on barge is in the ledger
  var ledgerIds = {};
  f.batches.forEach(function(b){ ledgerIds[b.id] = true; });
  f.lines.forEach(function(l){ l.cages.forEach(function(c){
    if (c.batch && !ledgerIds[c.batch.id]){ f.batches.push(c.batch); ledgerIds[c.batch.id] = true; }
  }); });

  // legacy import fallback (older index-6): if batches had an unplaced one, fold first into barge
  if (f.barge.state === 'empty'){
    var unplaced = f.batches.filter(function(b){ return b && b._legacyOnDeck && !b._placed; });
    // (no-op unless a legacy importer set these flags; keeps loader robust)
  }

  // B1/B2 MIGRATION — backfill a SHARED seedCohortId onto pre-existing fresh-seed cages (demo + any
  // legacy save made before the field existed) so they group as one cohort AND survive future growth
  // logs. Factored into backfillSeedCohorts(f) so fresh demo/new-farm creates can stamp it immediately
  // too (L1) — otherwise a growth log before the next reload would shift the mutable-size fallback key
  // and drop the cage from its cohort highlight until reload.
  backfillSeedCohorts(f);

  // LAYOUT §2 — additive spatial index over the now-flat f.lines. Runs AFTER the legacy
  // f.areas flattener (delete f.areas above) so it can safely own the NEW f.plots namespace.
  ensureSpatialIndex(f);
}

// backfillSeedCohorts(f) — stamp a SHARED seedCohortId onto every fresh-seed cage that lacks one, so a
// cohort groups as one (batchGroupKey 'seed:<cohortId>') AND survives future growth logs. Idempotent:
// cages that already carry a seedCohortId are skipped, so it is safe to call on migrate AND on fresh
// create/load (L1). Grouping uses a STABLE signature — the ORIGINAL stocked size from the cage's
// 'stocked' event (NOT the now-mutable batch.sizeMm, which a growth log may overwrite) combined with
// stockedDate|hatchery|ploidy. Only true fresh seed (no pull lineage) is touched; pulled cohorts keep
// their 'pull:' key.
function backfillSeedCohorts(f){
  if (!f || !Array.isArray(f.lines)) return;
  var groups = {};                                         // signature → cohort id (minted once per signature)
  f.lines.forEach(function(l){ (l.cages || []).forEach(function(c){
    var b = c.batch;
    if (!b) return;                                        // empty cage
    if (b.seedCohortId) return;                            // already stamped (idempotent / new fills)
    if (b.origin && Array.isArray(b.origin.parentBatchIds) && b.origin.parentBatchIds.length) return; // pulled, not fresh seed
    // original stocked size lives on the 'stocked' event; fall back to batch.sizeMm only if absent
    var origSize = null, evs = c.events || [];
    for (var i=0; i<evs.length; i++){
      if (evs[i].type === 'stocked'){ origSize = (typeof evs[i].sizeMm === 'number') ? evs[i].sizeMm : null; break; }
    }
    if (origSize == null) origSize = (typeof b.sizeMm === 'number') ? b.sizeMm : null;
    var sig = (b.stockedDate || '') + '|' + (origSize == null ? '' : origSize) + '|' +
              (b.hatchery || '') + '|' + (b.ploidy || '');
    if (!groups[sig]) groups[sig] = uid();
    b.seedCohortId = groups[sig];
  }); });
}

function freshBarge(){ return { state:'empty', batchId:null, count:null, sizeMm:null, grade:null, ploidy:null, hatchery:'', origin:null, events:[], splits:[] }; }

// BATCH-SPLIT helpers (additive). A SPLIT is a self-contained sub-batch snapshot living on barge.splits[],
// so it survives the remainder pile draining. The legacy single-pile fields (state/count/sizeMm/…) are now
// the UNSORTED REMAINDER pile.
function bargeHasContent(b){
  return !!b && ((b.state === 'pile' && (b.count == null || b.count > 0)) || (Array.isArray(b.splits) && b.splits.length > 0));
}
// total oysters across remainder + all splits; null if ANY relevant count is null (uncounted)
function bargeTotalCount(b){
  if (!b) return null;
  var total = 0;
  if (b.state === 'pile'){
    if (b.count == null) return null;
    total += b.count;
  }
  if (Array.isArray(b.splits)){
    for (var i=0; i<b.splits.length; i++){
      if (b.splits[i].count == null) return null;
      total += b.splits[i].count;
    }
  }
  return total;
}
function bargeSplitById(b, id){
  if (!b || !Array.isArray(b.splits) || !id) return null;
  for (var i=0; i<b.splits.length; i++) if (b.splits[i].id === id) return b.splits[i];
  return null;
}

/* ─────────────────────────────────────────────────────────────────
   LAYOUT EDITOR — DATA FOUNDATION (LAYOUT §2 / §6)
   Additive, idempotent spatial index over the flat f.lines.
   Hierarchy: Farm → plots[] → areas[] → (lines by id). Lines stay flat;
   plots/areas only REFERENCE lines via line.plotId/line.areaId (the only
   writable truth); area.lineIds is derived display order, rebuilt each load.
   Never bumps state.v; never touches the legacy f.areas namespace.
   ───────────────────────────────────────────────────────────────── */

// ensureSpatialIndex(f) — guarantees >=1 plot + >=1 area, adopts orphan lines to
// the default area, rebuilds area.lineIds from lines, and reindexes. Idempotent:
// every guard is "if invalid, set default"; valid data passes through unchanged.
// Called from migrateFarm (after the flattener), createFarmFromModel, loadBrightsideFarm.
function ensureSpatialIndex(f){
  // 1. container
  if (!Array.isArray(f.plots)) f.plots = [];
  if (!Array.isArray(f.lines)) f.lines = [];

  // 2. guarantee >=1 plot. Migrated default plot name = the farm's OWN name (product decision 1).
  if (!f.plots.length){
    f.plots.push({ id:uid(), name:(typeof f.name === 'string' && f.name) ? f.name : 'My farm',
      order:0, x:60, y:60, w:880, h:680, areas:[] });
  }
  // normalize plots
  f.plots.forEach(function(p, pi){
    if (!p.id) p.id = uid();
    if (typeof p.name !== 'string') p.name = 'Plot ' + (pi+1);
    if (typeof p.x !== 'number') p.x = 60;
    if (typeof p.y !== 'number') p.y = 60;
    if (typeof p.w !== 'number' || p.w <= 0) p.w = 880;
    if (typeof p.h !== 'number' || p.h <= 0) p.h = 680;
    if (!Array.isArray(p.areas)) p.areas = [];
    // 3. guarantee >=1 area per plot. Migration = ONE default area holding all current
    // lines (product decision 2 — do NOT pre-split). Orientation vocab = NS/EW (decision 3).
    if (!p.areas.length){
      p.areas.push({ id:uid(), name:'Area 1', order:0,
        x:p.x+40, y:p.y+40, w:Math.max(120, p.w-80), h:Math.max(100, p.h-80), rot:0,
        lineCount:0, cagesPerLine:10, spacing:0.2, axis:'h', lineIds:[] });
    }
    // normalize areas
    p.areas.forEach(function(a, ai){
      if (!a.id) a.id = uid();
      if (typeof a.name !== 'string') a.name = 'Area ' + (ai+1);
      if (typeof a.x !== 'number') a.x = p.x + 40;
      if (typeof a.y !== 'number') a.y = p.y + 40;
      if (typeof a.w !== 'number' || a.w <= 0) a.w = Math.max(120, p.w-80);
      if (typeof a.h !== 'number' || a.h <= 0) a.h = Math.max(100, p.h-80);
      if (typeof a.rot !== 'number') a.rot = 0;
      if (typeof a.lineCount !== 'number' || a.lineCount < 0) a.lineCount = 0;
      if (typeof a.cagesPerLine !== 'number' || a.cagesPerLine <= 0) a.cagesPerLine = 10;
      if (typeof a.spacing !== 'number') a.spacing = 0.2;
      if (a.axis !== 'h' && a.axis !== 'v') a.axis = 'h';
      if (!Array.isArray(a.lineIds)) a.lineIds = [];
    });
  });

  // 4. lookup sets
  var plotById = {}, areaById = {};
  f.plots.forEach(function(p){ plotById[p.id] = p; p.areas.forEach(function(a){ areaById[a.id] = { plot:p, area:a }; }); });
  var dPlot = f.plots[0], dArea = dPlot.areas[0];

  // 5. adopt flat lines: assign or rescue orphans (runs every load = self-healing).
  f.lines.forEach(function(l){
    var ok = l.plotId && l.areaId && plotById[l.plotId] && areaById[l.areaId] &&
             areaById[l.areaId].plot.id === l.plotId;
    if (!ok){ l.plotId = dPlot.id; l.areaId = dArea.id; }
  });

  // 6. rebuild area.lineIds from lines (lines are the source of truth), in global order.
  f.plots.forEach(function(p){ p.areas.forEach(function(a){ a.lineIds = []; }); });
  f.lines.forEach(function(l){ var e = areaById[l.areaId]; if (e) e.area.lineIds.push(l.id); });

  // 7. reindex plots + areas
  reindexPlots(f);
}

// reindexPlots(f) — set plot.order == index, area.order == index. Display-only ordering.
function reindexPlots(f){
  f.plots.forEach(function(p, pi){ p.order = pi; p.areas.forEach(function(a, ai){ a.order = ai; }); });
}

// areaOfLine(farm, line) — { plot, area } via line.plotId/areaId, or null. O(plots).
function areaOfLine(farm, line){
  if (!farm || !line || !line.plotId || !line.areaId) return null;
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    if (p.id !== line.plotId) continue;
    for (var j=0; j<p.areas.length; j++) if (p.areas[j].id === line.areaId) return { plot:p, area:p.areas[j] };
  }
  return null;
}

// linesInArea(farm, areaId) — lines whose areaId matches, in global flat order.
function linesInArea(farm, areaId){
  if (!farm) return [];
  return farm.lines.filter(function(l){ return l.areaId === areaId; });
}

// visibleLines(farm) — the render filter. Scoped → only that area's lines; else the whole
// flat farm (byte-identical to today's behavior when viewScope is null).
function visibleLines(farm){
  if (viewScope && viewScope.areaId)
    return farm.lines.filter(function(l){ return l.areaId === viewScope.areaId; });
  return farm.lines;
}

// flattenAllLines(farm) — the named, correct way to enumerate every line. Lines never live
// under areas, so this is just the flat array; nothing should walk plots→areas→lines ad hoc.
function flattenAllLines(farm){ return farm ? farm.lines : []; }

// defaultArea(farm) — the home area for unassigned lines (first area of any plot that has one).
function defaultArea(farm){
  if (!farm || !farm.plots) return null;
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    if (p.areas && p.areas.length) return p.areas[0];
  }
  return null;
}

// createLinesForArea(farm, area, lineCount, cagesPerLine) — the authoritative bulk-fill path.
// Loops newCage + builds lines IDENTICAL to addLine's shape, stamps plotId/areaId, rebuilds
// area.lineIds, reindexes, and wraps the whole change in ONE commit()+undoable. Reuses a valid
// cageTypes[0].id. (LAYOUT §4 "Set lines / cages".) Returns the created line objects.
function createLinesForArea(farm, area, lineCount, cagesPerLine){
  var created = buildLinesForArea(farm, area, lineCount, cagesPerLine);    // mutate-only core
  if (!created.length) return created;
  commit();
  undoable('Lines added', function(){
    var f = getFarm();
    created.forEach(function(cl){ var idx = f.lines.indexOf(cl); if (idx >= 0) f.lines.splice(idx, 1); });
    reindexLines(f);
    rebuildLineIds(f);
    commit();
  });
  return created;
}

// buildLinesForArea — the mutate-only core of the bulk fill (no commit/undoable). Builds lines
// IDENTICAL to addLine's shape, stamps plotId/areaId, reindexes + rebuilds lineIds. Lets a caller
// (the area-drop flow) batch the area + its fill under ONE commit()+undoable. Returns new lines.
function buildLinesForArea(farm, area, lineCount, cagesPerLine){
  if (!farm || !area) return [];
  var plotId = findPlotIdOfArea(farm, area.id);
  if (!plotId) return [];
  var n = Math.max(0, Math.floor(lineCount));
  var per = Math.max(0, Math.floor(cagesPerLine));
  var typeId = farm.cageTypes[0].id;                                       // valid cageType (always >=1)
  var created = [], baseOrder = farm.lines.length;
  for (var li=0; li<n; li++){
    var globalIdx = baseOrder + li;
    var line = { id:uid(), name:'Line ' + (globalIdx+1), order:globalIdx, cages:[],
      plotId:plotId, areaId:area.id };                                     // EXACT addLine shape + refs
    for (var ci=0; ci<per; ci++) line.cages.push(newCage(typeId, globalIdx, ci));
    farm.lines.push(line);
    created.push(line);
  }
  reindexLines(farm);
  rebuildLineIds(farm);                                                    // derive area.lineIds from lines
  return created;
}

// findPlotIdOfArea(farm, areaId) — locate which plot owns an area id (helper for line stamping).
function findPlotIdOfArea(farm, areaId){
  if (!farm) return null;
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    for (var j=0; j<p.areas.length; j++) if (p.areas[j].id === areaId) return p.id;
  }
  return null;
}

// rebuildLineIds(farm) — re-derive every area.lineIds from the flat lines (lines = truth).
// Cheap, idempotent; call after any structural line add/remove. Mirrors ensureSpatialIndex step 6.
function rebuildLineIds(farm){
  if (!farm || !farm.plots) return;
  var areaById = {};
  farm.plots.forEach(function(p){ p.areas.forEach(function(a){ a.lineIds = []; areaById[a.id] = a; }); });
  farm.lines.forEach(function(l){ var a = areaById[l.areaId]; if (a) a.lineIds.push(l.id); });
}

// lineHasStock(line) — true if any cage carries a batch (i.e. the line holds oysters). The single
// guard the reduce path uses so a stocked line + its batches can never be destroyed by a layout edit.
function lineHasStock(line){
  return !!(line && line.cages && line.cages.some(function(c){ return c && c.batch; }));
}

// setAreaLineCount(farm, area, target) — reconcile an area's ACTUAL line count to `target`.
//   GROW   (target > current): append (target-current) fresh lines via the bulk-fill core, one
//          commit()+undoable that splices them back out on undo.
//   REDUCE (target < current): remove the (current-target) HIGHEST-INDEX-in-area lines that are
//          EMPTY. If a removal would hit a STOCKED line, the whole reduction is BLOCKED (toast,
//          nothing changes) — a stocked line + its batches are never destroyed.
// Always reconciles area.lineCount to the real count (migrated areas carry lineCount 0 but hold
// lines via lineIds, so the actual count = linesInArea(...).length is the truth). (LAYOUT §4)
function setAreaLineCount(farm, area, target){
  if (!farm || !area) return false;
  var per = Math.max(0, Math.floor(area.cagesPerLine || 10));
  var current = linesInArea(farm, area.id).length;       // ACTUAL count (lineIds-backed, truth)
  target = Math.max(0, Math.floor(target));
  if (target === current){ area.lineCount = current; persist(); return false; }

  if (target > current){
    var created = buildLinesForArea(farm, area, target - current, per);
    area.lineCount = linesInArea(farm, area.id).length;  // reconcile to the new real count
    commit();
    undoable('Lines updated', function(){
      var f = getFarm();
      created.forEach(function(cl){ var idx = f.lines.indexOf(cl); if (idx >= 0) f.lines.splice(idx, 1); });
      var fa = findAreaById(f, area.id);
      reindexLines(f);
      rebuildLineIds(f);
      if (fa) fa.area.lineCount = linesInArea(f, fa.area.id).length;
      commit();
      layoutRedraw();
    });
    return true;
  }

  // REDUCE — only the highest-index EMPTY lines, and only if NONE of them hold stock.
  var inArea = linesInArea(farm, area.id);               // global order
  var toRemove = inArea.slice(target);                   // the (current-target) highest-index lines
  if (toRemove.some(lineHasStock)){ toast('Line has stock — empty it first'); return false; }
  var removed = toRemove.map(function(line){
    return { line:line, idx:farm.lines.indexOf(line) };  // remember slot for exact undo
  });
  removed.forEach(function(r){ var i = farm.lines.indexOf(r.line); if (i >= 0) farm.lines.splice(i, 1); });
  reindexLines(farm);
  rebuildLineIds(farm);
  area.lineCount = linesInArea(farm, area.id).length;
  commit();
  undoable('Lines updated', function(){
    var f = getFarm();
    // restore each removed line at its original slot (low→high so indices stay valid)
    removed.slice().sort(function(a,b){ return a.idx - b.idx; }).forEach(function(r){
      var at = Math.min(Math.max(0, r.idx), f.lines.length);
      f.lines.splice(at, 0, r.line);
    });
    var fa = findAreaById(f, area.id);
    reindexLines(f);
    rebuildLineIds(f);
    if (fa) fa.area.lineCount = linesInArea(f, fa.area.id).length;
    commit();
    layoutRedraw();
  });
  return true;
}

// setAreaOrientation(farm, area, mode) — toggle an area's run direction. EW = rot 0, NS = rot 90,
// matching the live rotate chip (drawRotChip) + the rotate gesture (which sets rot only). Reconciles
// area.axis so the long-side row math stays sensible. Undoable. (LAYOUT §4 "Orientation")
function setAreaOrientation(farm, area, mode){
  if (!farm || !area) return false;
  var beforeRot = area.rot || 0, beforeAxis = area.axis;
  var nextRot = (mode === 'NS') ? 90 : 0;
  if (((beforeRot % 180) + 180) % 180 === nextRot && beforeAxis) return false;  // already there
  area.rot = nextRot;
  // axis follows: EW rows run along width ('h'); NS rows run along height ('v').
  area.axis = (mode === 'NS') ? 'v' : 'h';
  commit();
  undoable('Orientation changed', function(){
    var f = getFarm(); var fa = findAreaById(f, area.id);
    if (fa){ fa.area.rot = beforeRot; fa.area.axis = beforeAxis; }
    commit();
    layoutRedraw();
  });
  return true;
}

// commitRename(kind, id, before) — register ONE undoable for an ALREADY-APPLIED + committed rename
// (the field wrote the live name + persist/commit while typing; this just offers Undo back to `before`).
function commitRename(kind, id, before){
  undoable('Renamed', function(){
    var f = getFarm();
    var t = (kind === 'area') ? (function(){ var x = findAreaById(f, id); return x && x.area; })()
                              : (f.plots || []).filter(function(p){ return p.id === id; })[0];
    if (t){ t.name = before; commit(); refreshSheet(); layoutRedraw(); }
  });
}

function migrateBatch(b){
  if (!b || typeof b !== 'object') return;
  if (!b.id) b.id = uid();                                                  // batch (lineage) id
  if (typeof b.count !== 'number') b.count = (b.count == null ? null : parseNum(b.count)); // count
  // size mirror (legacy initialSizeMm)
  if (typeof b.sizeMm !== 'number'){
    var legacy = (typeof b.initialSizeMm === 'number') ? b.initialSizeMm : parseNum(b.sizeMm);
    b.sizeMm = (typeof legacy === 'number') ? legacy : null;               // sizeMm mirror
  }
  delete b.initialSizeMm;
  if (b.ploidy !== 'diploid' && b.ploidy !== 'triploid') b.ploidy = (b.ploidy === 'diploid' || b.ploidy === 'triploid') ? b.ploidy : null; // ploidy
  if (typeof b.hatchery !== 'string') b.hatchery = (typeof b.source === 'string') ? b.source : ''; // hatchery (legacy source)
  delete b.source;
  if (typeof b.grade !== 'string' && b.grade != null) b.grade = null;       // grade
  if (b.grade === undefined) b.grade = null;
  if (typeof b.notes !== 'string') b.notes = '';                            // notes
  if (!isValidISO(b.stockedDate)) b.stockedDate = isValidISO(b.stockDate) ? b.stockDate : todayISO(); // stockedDate (legacy stockDate)
  delete b.stockDate;
  if (!Array.isArray(b.photoIds)) b.photoIds = [];                          // photoIds
  b.photoIds = b.photoIds.filter(function(p){ return typeof p === 'string'; });
  if (b.origin === undefined) b.origin = null;                              // origin (provenance)
  delete b.prep; delete b.placed; delete b._placed; delete b._legacyOnDeck;
  delete b.events;                                                          // single source of truth = Cage.events
}

// migrateEvent — normalize one event; map legacy types
function migrateEvent(ev, fallbackBatchId){
  if (!ev || typeof ev !== 'object') return null;
  if (!ev.id) ev.id = uid();
  // map legacy types
  if (ev.type === 'harvest') ev.type = 'harvested';
  if (ev.type === 'sort') ev.type = 'note';
  if (EVENT_TYPES.indexOf(ev.type) < 0) ev.type = 'note';
  if (!isValidISO(ev.date)) ev.date = todayISO();
  if (typeof ev.batchId !== 'string') ev.batchId = fallbackBatchId || '';
  if (ev.type === 'worked'){ if (WORK_METHODS.indexOf(ev.method) < 0) ev.method = null; }
  else ev.method = (WORK_METHODS.indexOf(ev.method) >= 0) ? ev.method : null;
  if (typeof ev.sizeMm !== 'number') ev.sizeMm = (ev.sizeMm == null ? null : parseNum(ev.sizeMm));
  if (typeof ev.count !== 'number') ev.count = (ev.count == null ? null : parseNum(ev.count));
  if (typeof ev.note !== 'string' && ev.note != null) ev.note = String(ev.note);
  if (ev.note === undefined) ev.note = null;
  if (!Array.isArray(ev.photoIds)) ev.photoIds = [];
  ev.photoIds = ev.photoIds.filter(function(p){ return typeof p === 'string'; });
  return ev;
}

// save() — serialize whole tree; toast on quota
// save() — the ONLY localStorage writer. Returns true on success. On a real write failure
// (quota / private-mode) it raises a STICKY banner instead of a 2-second toast, so the farmer
// can't keep editing while their work silently fails to reach disk. (audit F2)
var saveFailed = false;
function save(){
  var ok = true;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { ok = false; showSaveError(); }
  if (ok && saveFailed) clearSaveError();    // a prior failure has cleared (e.g. user freed space)
  saveFailed = !ok;
  return ok;
}
function persist(){ return save(); }            // save without re-render

// requestPersistence() — ask the browser to keep our localStorage so it isn't first to be evicted.
// Previously this only fired for photos; the actual farm data never asked. Best-effort, once. (audit F1)
var persistenceAsked = false;
function requestPersistence(){
  if (persistenceAsked) return;
  persistenceAsked = true;
  try {
    if (navigator.storage && navigator.storage.persist){
      var p = navigator.storage.persisted ? navigator.storage.persisted() : null;
      if (p && p.then){ p.then(function(already){ if (!already) navigator.storage.persist(); }).catch(function(){}); }
      else navigator.storage.persist();
    }
  } catch (e){}
}

// Sticky "storage full — not saved" banner. Plain DOM + inline styles (no dependency on the big <style>).
function ensureSaveBanner(){
  var el = document.getElementById('saveBanner');
  if (!el){
    el = document.createElement('div');
    el.id = 'saveBanner';
    el.setAttribute('role', 'alert');
    el.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;display:none;'
      + 'align-items:center;gap:10px;padding:10px calc(14px + env(safe-area-inset-right)) '
      + 'calc(10px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));'
      + 'background:#8a1f1f;color:#fff;font:600 13px/1.35 -apple-system,system-ui,sans-serif;'
      + 'box-shadow:0 -2px 14px rgba(0,0,0,.45);';
    document.body.appendChild(el);
  }
  return el;
}
function showSaveError(){
  var el = ensureSaveBanner();
  el.innerHTML = '';
  var msg = document.createElement('span');
  msg.style.flex = '1';
  msg.textContent = '⚠ Storage is full — recent changes are NOT saved. Export a backup now.';
  var btn = document.createElement('button');
  btn.textContent = 'Export';
  btn.style.cssText = 'flex:0 0 auto;padding:7px 14px;border:0;border-radius:8px;background:#fff;color:#8a1f1f;font-weight:700;font-size:13px;';
  btn.onclick = function(){ try { exportData(); } catch (e){} };
  el.appendChild(msg); el.appendChild(btn);
  el.style.display = 'flex';
}
function clearSaveError(){
  var el = document.getElementById('saveBanner');
  if (el) el.style.display = 'none';
}

function getFarm(){
  if (!state || !state.activeFarmId) return null;
  for (var i=0; i<state.farms.length; i++) if (state.farms[i].id === state.activeFarmId) return state.farms[i];
  return state.farms.length ? state.farms[0] : null;
}

// commit() — the mutate→save→render loop; bumps commit.seq for seq-guarded undo
function commit(){ commit.seq = (commit.seq || 0) + 1; save(); render(); }
commit.seq = 0;

/* ─────────────────────────────────────────────────────────────────
   TOAST + seq-guarded UNDO (HARVEST-KIT pattern, re-skinned)
   ───────────────────────────────────────────────────────────────── */
// toast(msg, action)  action = {label, onAction}
function toast(msg, action){
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  if (action && action.label){
    t.appendChild(h('button', { class:'undo', onclick:function(){
      t.classList.remove('show'); clearTimeout(toast._t);
      if (action.onAction) action.onAction();
    }}, action.label));
  }
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ t.classList.remove('show'); }, (action && action.label) ? 6000 : 2400);
}
// undoable(msg, doUndo) — snapshots commit.seq; the undo no-ops if a later commit advanced it.
function undoable(msg, doUndo){
  var seqAt = commit.seq;
  toast(msg, { label:'Undo', onAction:function(){
    if (commit.seq !== seqAt) { toast('Too late to undo'); return; }   // a later commit moved on
    doUndo();
  }});
}

/* ─────────────────────────────────────────────────────────────────
   SHEET SYSTEM (§5.4 object-URL revoke hook included)
   ───────────────────────────────────────────────────────────────── */
var sheetBuildFn = null;          // the active build function
var sheetURLs = [];               // object URLs created for this sheet render
function trackURL(u){ sheetURLs.push(u); return u; }

function openSheet(buildFn){
  clearSelection();               // opening a sheet clears any selection (§2.4)
  // B2: opening a sheet/menu doesn't change viewMode (render's catch-all won't fire), so dismiss any
  // floating overview peek/highlight here too — otherwise a pinned peek card floats over the sheet and
  // survives its close. Idempotent + no-throw when nothing is pinned.
  if (typeof clearCageHighlight === 'function') clearCageHighlight();
  // B7: a lingering "Filled N / Undo" toast would float over the opening sheet's first field (e.g. the
  // seed form's Date). Dismiss any active toast as the sheet opens; clear its auto-dismiss timer so the
  // stale timeout can't re-hide a future toast. A toast with no sheet behind it auto-dismisses as before.
  var _tst = document.getElementById('toast');
  if (_tst){ _tst.classList.remove('show'); clearTimeout(toast._t); }
  sheetBuildFn = buildFn;
  renderSheet();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function refreshSheet(){ if (sheetBuildFn) renderSheet(); }
function closeSheet(){
  var ov = document.getElementById('overlay');
  ov.classList.remove('open');
  sheetBuildFn = null;
  document.body.style.overflow = '';
  // revoke this sheet's URLs after the close transition
  setTimeout(function(){ sheetURLs.forEach(function(u){ URL.revokeObjectURL(u); }); sheetURLs = []; }, 260);
  save();                         // persist any transient edits flushed during the sheet
}
function renderSheet(){
  var sheet = document.getElementById('sheet');
  // CHOKE POINT: clear body + revoke prior URLs BEFORE any early return (§5.4)
  sheet.innerHTML = '';
  sheetURLs.forEach(function(u){ URL.revokeObjectURL(u); });
  sheetURLs = [];
  if (!sheetBuildFn) return;
  sheet.scrollTop = 0;
  sheet.appendChild(h('div', { class:'grab' }));
  var content = sheetBuildFn();
  if (content) appendKids(sheet, Array.isArray(content) ? content : [content]);
}
// sheetHead(title, sub) — title + close X (+ optional subtitle).
// Always returns an ARRAY so every caller can `.push`/`.concat` uniformly
// (renderSheet flattens nested arrays via appendKids).
function sheetHead(title, sub){
  var head = h('div', { class:'sheetHead' },
    h('h2', null, title),
    h('button', { class:'closeX', 'aria-label':'Close', html:icon('close', 22), onclick:closeSheet })
  );
  return sub ? [head, h('div', { class:'sheetSub' }, sub)] : [head];
}
// field(label, inputEl, hint) — a labeled form field
function field(labelText, inputEl, hint){
  var kids = [];
  if (labelText) kids.push(h('label', null, labelText));
  kids.push(inputEl);
  if (hint) kids.push(h('div', { class:'fieldHint' }, hint));
  return h('div', null, kids);
}

      '<line x1="8" y1="2" x2="8" y2="26" stroke="var(--cage-stroke)" stroke-width="0.9" opacity="0.8"/>' +
      '<line x1="2.5" y1="6"  x2="13.5" y2="6"  stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="2.5" y1="10" x2="13.5" y2="10" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="2.5" y1="14" x2="13.5" y2="14" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="2.5" y1="18" x2="13.5" y2="18" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="2.5" y1="22" x2="13.5" y2="22" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<rect x="6" y="0.5" width="4" height="2.5" rx="1" fill="var(--cage-float)" stroke="var(--cage-stroke)" stroke-width="0.6"/>' +
      '<rect x="6" y="25"  width="4" height="2.5" rx="1" fill="var(--cage-float)" stroke="var(--cage-stroke)" stroke-width="0.6"/>';
    workRing = work ? '<rect x="0.6" y="0.6" width="14.8" height="26.8" rx="2" fill="none" stroke="'+NEEDS_WORK_COLOR+'" stroke-width="2" stroke-dasharray="5 3"/>' : '';
  } else {

    vb = '0 0 20 14'; w = Math.round(size); ht = Math.round(size*0.7);
    body =
      (ring ? '<rect x="0" y="0" width="20" height="14" rx="5" fill="none" stroke="'+RING_COLOR+'" stroke-width="2.4" opacity="0.85"/>' : '') +
      '<path d="M3 4 Q3 2.5 5 2.5 L15 2.5 Q17 2.5 17 4.5 L17 9 Q17 12 13.5 12 L6.5 12 Q3 12 3 8.5 Z" fill="'+fill+'" stroke="var(--cage-stroke)" stroke-width="1.2"/>' +
      '<circle cx="7"  cy="5.5" r="0.7" fill="var(--cage-mesh)"/>' +

      '<circle cx="13" cy="5.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="7"  cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="10" cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="13" cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<path d="M9 2.5 Q10 1 11 2.5" fill="none" stroke="var(--cage-stroke)" stroke-width="1"/>';
    workRing = work ? '<path d="M3 4 Q3 2.5 5 2.5 L15 2.5 Q17 2.5 17 4.5 L17 9 Q17 12 13.5 12 L6.5 12 Q3 12 3 8.5 Z" fill="none" stroke="'+NEEDS_WORK_COLOR+'" stroke-width="1.6" stroke-dasharray="4 2.5"/>' : '';
  }
  return '<svg viewBox="'+vb+'" width="'+w+'" height="'+ht+'" preserveAspectRatio="none" aria-hidden="true">'+body+workRing+'</svg>';
}

// pilingSVG(size) — weathered piling, the "line stays" anchor mark. (HARVEST-KIT §2, re-tokenized)
function pilingSVG(size){
  size = size || 26;
  return '<svg viewBox="0 0 14 30" width="14" height="'+size+'" aria-hidden="true">' +
    // fouling band at waterline
    '<rect x="2" y="22" width="10" height="3" rx="1" fill="var(--piling-ring)" opacity="0.85"/>' +
    // cylinder shaft
    '<rect x="3" y="4" width="8" height="22" rx="2" fill="var(--piling)"/>' +
    // left-shadow strip
    '<rect x="3" y="4" width="2.6" height="22" rx="1.3" fill="rgba(0,0,0,.18)"/>' +
    // wood grain
    '<line x1="6"   y1="6" x2="6"   y2="25" stroke="rgba(0,0,0,.20)" stroke-width="0.5"/>' +
    '<line x1="8.5" y1="6" x2="8.5" y2="25" stroke="rgba(0,0,0,.14)" stroke-width="0.5"/>' +
    // top cap ellipse
    '<ellipse cx="7" cy="4" rx="4" ry="1.8" fill="var(--piling-top)" stroke="var(--cage-stroke)" stroke-width="0.5"/>' +
    // mooring ring
    '<circle cx="11" cy="13" r="2" fill="none" stroke="var(--piling-ring)" stroke-width="1"/>' +

// bookendPilingSVG() — WP3: the simplified work-view post. A single bold cylinder
// + rounded cap that fills the full row height (preserveAspectRatio:none stretches

// the line. Used only by renderLine; pilingSVG() stays for the canvas glyph.
function bookendPilingSVG(){
  return '<svg viewBox="0 0 16 100" width="16" height="100" preserveAspectRatio="none" aria-hidden="true">' +
    // cylinder shaft — full height
    '<rect x="3" y="6" width="10" height="92" rx="3" fill="var(--piling)"/>' +
    // left-shadow strip for roundness
    '<rect x="3" y="6" width="3" height="92" rx="1.5" fill="rgba(0,0,0,.20)"/>' +
    // fouling band near the waterline (lower third)

    // rounded top cap
    '<rect x="2" y="2" width="12" height="8" rx="3" fill="var(--piling-top)"/>' +
    '</svg>';
}

/* ─────────────────────────────────────────────────────────────────
   STATUS / NEEDS-WORK / SIZE / LAST-EVENT helpers (§2.6)
   ───────────────────────────────────────────────────────────────── */
// latestSize(cage) — most recent measured size from growth/stocked events, else batch mirror
function latestSize(cage){
  if (!cage || !cage.batch) return null;
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ev = cage.events[i];
    if ((ev.type === 'growth' || ev.type === 'stocked' || ev.type === 'filled') && typeof ev.sizeMm === 'number'){
      var ms = isoToMs(ev.date);
      if (ms >= bestMs){ bestMs = ms; best = ev.sizeMm; }
    }
  }
  if (best != null) return best;
  return (typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : null;
}

// lastEvent(cage) — the most recent event by date (ties → later in array wins)
function lastEvent(cage){
  if (!cage || !cage.events || !cage.events.length) return null;
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ms = isoToMs(cage.events[i].date);
    if (ms >= bestMs){ bestMs = ms; best = cage.events[i]; }
  }
  return best;
}

// eventLabel(ev) — past-tense "last thing that happened" label
function eventLabel(ev){
  if (!ev) return '';
  switch (ev.type){
    case 'worked':    return ev.method ? cap(ev.method) : 'Worked';
    case 'growth':    return (typeof ev.sizeMm === 'number') ? ('Grown to ' + ev.sizeMm + ' mm') : 'Growth check';
    case 'stocked':   return 'Filled';
    case 'filled':    return 'Filled from tub';
    case 'pulled':    return 'Pulled';
    case 'harvested': return 'Harvested';
    case 'mortality':
      if (typeof ev.pct === 'number') return 'Lost ~' + ev.pct + '%' + (typeof ev.count === 'number' ? ' (' + fmtCompact(ev.count) + ')' : '') + (ev.reason ? ' · ' + ev.reason : '');
      return (typeof ev.count === 'number') ? ('Lost ' + fmtCompact(ev.count) + (ev.reason ? ' · ' + ev.reason : '')) : 'Loss logged';
    case 'note':      return 'Note';
  }
  return '';
}
function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// RESETTING event types (any real handling, NOT a bare note) — §1.7
var RESET_TYPES = { stocked:1, worked:1, growth:1, filled:1, mortality:1 };  // logging a loss means you attended the cage
// lastResettingDate(cage) — most recent resetting event's date, or stockedDate fallback
function lastResettingDate(cage){
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ev = cage.events[i];
    if (RESET_TYPES[ev.type]){
      var ms = isoToMs(ev.date);
      if (ms >= bestMs){ bestMs = ms; best = ev.date; }
    }
  }
  if (best) return best;
  return (cage.batch && cage.batch.stockedDate) ? cage.batch.stockedDate : null;
}

// needsWork(cage, farm) — §2.6. workDue honored; else neglectIntervalDays; never on a bare note; empty never.
function needsWork(cage, farm){
  if (!cage || !cage.batch) return false;                        // empty cages never need work
  if (isValidISO(cage.workDue)) return todayISO() > cage.workDue;// past due rings; future = no early ring
  var lr = lastResettingDate(cage);
  if (!isValidISO(lr)) return false;
  var d = daysSince(lr);
  return d != null && d > farm.settings.neglectIntervalDays;
}

// cageStatus memo — status is pure given (cage data, today, farm settings); those change only when
// commit.seq advances, the day rolls over, or the farm switches. A pan/pinch redraw does NOT advance
// commit.seq, so the per-cage event scans (latestSize + needsWork→lastResettingDate, each O(events))
// collapse to cache hits across the many redraws of a single gesture — the headline scale fix on a
// 3000-cage farm. Callers only READ the returned descriptor (verified), so a shared object is safe.
// (audit F11 / C1-perf)
var _statusMemo = { seq:-1, day:'', farm:null, mkt:null, neg:null, map:null };
// cageStatus(cage, farm) — display color/flags; the state bit is cage.batch (§2.6)
function cageStatus(cage, farm){
  if (!cage) return { key:'empty', color:STATUS_COLORS.empty, ink:STATUS_INK.empty, ready:false, needsWork:false }; // L4: null-cage defensive guard
  if (!cage.batch) return { key:'empty', color:STATUS_COLORS.empty, ink:STATUS_INK.empty, ready:false, needsWork:false };
  var seq = commit.seq || 0, day = todayISO();
  // market size + neglect interval also drive ready/needsWork, and the settings sheet edits them via
  // persist() (which does NOT bump commit.seq) — so fold them into the key or the map goes stale. (audit review #1)
  var mkt = farm.settings.marketSizeMm, neg = farm.settings.neglectIntervalDays;
  if (_statusMemo.seq !== seq || _statusMemo.day !== day || _statusMemo.farm !== farm || _statusMemo.mkt !== mkt || _statusMemo.neg !== neg){
    _statusMemo.seq = seq; _statusMemo.day = day; _statusMemo.farm = farm; _statusMemo.mkt = mkt; _statusMemo.neg = neg; _statusMemo.map = {};
  }
  var hit = _statusMemo.map[cage.id];
  if (hit) return hit;
  var m = monthsSince(cage.batch.stockedDate);
  if (m == null) m = 0;
  var key = m < 6 ? 'fresh' : (m <= 12 ? 'mid' : 'old');
  var size = latestSize(cage);
  var ready = typeof size === 'number' && size >= farm.settings.marketSizeMm;
  var res = { key:key, color:STATUS_COLORS[key], ink:STATUS_INK[key], ready:ready, needsWork:needsWork(cage, farm) };
  _statusMemo.map[cage.id] = res;
  return res;
}

// cageType(farm, typeId) — resolve a cage's type object
function cageType(farm, typeId){
  for (var i=0; i<farm.cageTypes.length; i++) if (farm.cageTypes[i].id === typeId) return farm.cageTypes[i];
  return farm.cageTypes[0] || { name:'Cage', shape:'square', meshMm:null };
}
// typeLabel(t) — "FlipFarm · 9 mm mesh"
function typeLabel(t){ return t.name + (typeof t.meshMm === 'number' ? ' · ' + t.meshMm + ' mm mesh' : ''); }

/* ─────────────────────────────────────────────────────────────────
   RENDER LOOP (§3.2 + DESIGN §5)
   ───────────────────────────────────────────────────────────────── */
function render(){
  var app = document.getElementById('app');
  app.innerHTML = '';

  // B2: #oysterPeek is a SIBLING of #app, so wiping #app never touches it. Leaving the overview by ANY
  // path (Work toggle, drill, exit) must reset that floating host — otherwise a pinned peek card leaks
  // over the next surface. Catch-all: whenever we're not rendering the unscoped overview, clear any
  // active overview peek/highlight. Idempotent + no-throw when nothing is pinned.
  if (!(viewMode === 'overview' && !viewScope)) clearCageHighlight();

  // no farms → onboarding (this early return wins FIRST — before any layout branch)
  if (!state || !state.farms.length){
    app.appendChild(buildOnboardingPage());
    hidePopup();
    return;
  }
  var farm = getFarm();

  // LAYOUT mode — the whole-farm SVG editor owns #app (its own topbar inside buildLayoutEditor). (LAYOUT §4)
  if (viewMode === 'layout'){
    hidePopup();
    app.appendChild(buildLayoutEditor(farm, 'edit'));
    return;
  }

  // OVERVIEW mode (Component 2) — the read-only whole-farm home. Owns #app via the shared SVG canvas
  // (buildOverview → buildLayoutEditor 'view'). Only valid UNSCOPED; a scoped drill always lands in 'work'.
  // WP8a: the canvas IS the home now. Mount the pannable SVG world (all plots tiled as ONE world) so a
  // sideways pan crosses straight into the adjacent plot — that seamless cross-plot pan is the point.
  // buildDashboard stays defined below as an unreferenced fallback. The barge is appended as a fixed HUD
  // that floats over the canvas (.barge is position:fixed). renderConditionsBar no-ops when its host is
  // absent (it guards), so it's safe to keep.
  if (viewMode === 'overview' && !viewScope){
    hidePopup();
    app.appendChild(buildOverview(farm));                  // SVG canvas home (was: buildDashboard)
    app.appendChild(renderBarge(farm));                    // barge HUD floats over the canvas (position:fixed)
    if (typeof renderConditionsBar === 'function') renderConditionsBar();    // USGS water conditions bar (no-ops if host absent)
    return;
  }

  // top bar
  app.appendChild(renderTopBar(farm));
  // one summary strip
  app.appendChild(renderStatStrip(farm));

  // map well — the worktable
  var well = h('div', { class:'mapwell', id:'mapwell' });
  visibleLines(farm).forEach(function(line){ well.appendChild(renderLine(line, farm)); });
  // NOTE: no "Add line" button here — adding/removing LINES belongs to the Farm Layout editor only
  // (owner ask). The daily work view edits CAGES (per-line ⋯ menu: bulk add/remove), never line count.
  // tap empty chart → deselect + dismiss popup (DESIGN §6)
  well.addEventListener('click', function(e){
    if (e.target === well) clearSelection();
  });
  app.appendChild(well);

  // the barge (signature object)
  app.appendChild(renderBarge(farm));

  // re-sync the popup against the freshly-rendered DOM (Builder 2 owns syncPopup)
  if (typeof syncPopup === 'function') syncPopup();
}

function renderTopBar(farm){
  // SCOPED work map (drilled into one area) → a back chip replaces the farm name. (LAYOUT §4 "Back")
  var sc = scopeNames(farm);
  if (sc){
    var backBtn = h('button', { class:'fname scopeBack', 'aria-label':'Back to whole farm',
      onclick:function(){
        // The drill owns a {view:'work',scope} history entry — pop it so the stack stays coherent and the
        // device Back afterward isn't a no-op (Bug B1). popstate→restoreFromState rebuilds the home.
        if (history.state && history.state.view === 'work' && history.state.scope){ history.back(); return; }
        viewScope = null; viewMode = homeMode; LAYOUT.mode = (homeMode === 'overview') ? 'view' : 'edit'; clearSelection(); render();
      } },
      h('span', { class:'chev', html:icon('back', 20) }),
      h('span', { style:{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'} }, sc.plot + ' · ' + sc.area));
    var menuBtnS = h('button', { class:'menuBtn', 'aria-label':'Menu', html:icon('menu', 24),
      onclick:function(){ openSheet(buildMenu); } });
    return h('div', { class:'topbar' }, backBtn, menuBtnS);
  }
  var menuBtn = h('button', { class:'menuBtn', 'aria-label':'Menu', html:icon('menu', 24),
    onclick:function(){ openSheet(buildMenu); } });
  // UNSCOPED whole-farm work map, on a laid-out farm (overview available) → show the same
  // [Overview | Work] segmented toggle so the user can always flip back to the overview home. The
  // toggle is the escape hatch out of Work (Bug B1). Scoped/drilled views use their scope-back chip
  // instead (handled above); onboarding farms (no plots) get the plain farm-name topbar. (Bug B1)
  if (overviewAvailable()){
    var ovSeg = h('div', { class:'ovSeg', role:'tablist', 'aria-label':'Map mode' },
      h('button', { class:'ovSegBtn', role:'tab', 'aria-selected':'false',
        onclick:function(){ toggleOverviewWork('overview'); } }, 'Overview'),
      h('button', { class:'ovSegBtn active', role:'tab', 'aria-selected':'true' }, 'Work'));
    var wTitle = h('div', { class:'lp-title ovTitle' }, farm.name);
    return h('div', { class:'topbar ovTop' }, ovSeg, wTitle, menuBtn);
  }
  var multi = state.farms.length > 1;
  var name = h('button', { class:'fname', onclick:function(){ if (multi) openSheet(buildFarmSwitcher); } },
    h('span', { style:{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'} }, farm.name),
    multi ? h('span', { class:'chev', html:icon('chevdown', 18) }) : null
  );
  return h('div', { class:'topbar' }, name, menuBtn);
}

// scopeNames(farm) — { plot, area } display names for the current viewScope, or null when unscoped.
function scopeNames(farm){
  if (!viewScope || !viewScope.areaId || !farm || !farm.plots) return null;
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    for (var j=0; j<p.areas.length; j++){
      if (p.areas[j].id === viewScope.areaId) return { plot:p.name, area:p.areas[j].name };
    }
  }
  return null;
}

function renderStatStrip(farm){
  var filled = 0, empty = 0, ready = 0, work = 0, oysters = 0, counted = false;
  // Bug B2 (round-13): when drilled into a single area (viewScope set), count ONLY that area's lines —
  // not the whole farm. Otherwise the scoped daily-work map shows farm-wide totals beneath the area name
  // (e.g. an empty area reading "42k oysters · 32 filled"). Reuse linesInArea, the same scoping helper the
  // header/cell render uses. viewScope=null (overview / whole-farm Work list) still counts every line.
  var lines = (viewScope && viewScope.areaId && typeof linesInArea === 'function')
    ? (linesInArea(farm, viewScope.areaId) || []) : farm.lines;
  lines.forEach(function(line){
    line.cages.forEach(function(c){
      if (c.batch){
        filled++;
        if (typeof c.batch.count === 'number'){ oysters += c.batch.count; counted = true; }
        var st = cageStatus(c, farm);
        if (st.ready) ready++;
        if (st.needsWork) work++;
      } else empty++;
    });
  });
  // WP5: empty farm (nothing stocked anywhere in scope) → swap the totals run for one
  // quiet CTA line. No counts to read yet, so point the farmer at the first action.
  if (filled === 0){
    return h('div', { class:'statstrip empty' },
      h('span', { class:'cta' }, 'Nothing stocked yet — drag across a line to fill.'));
  }
  var strip = h('div', { class:'statstrip' });
  // WP5: lead with the two numbers that drive action — ready + needs-work, each with a
  // leading status dot in its own color — THEN the quiet totals in one lighter weight.
  function stat(cls, dot, n, label){
    return h('span', { class:'st' + (cls ? ' ' + cls : '') },
      dot ? h('span', { class:'dot' }, dot) : null,
      h('span', { class:'n' }, n), ' ' + label);
  }
  strip.appendChild(stat('ready', '●', ready, 'ready'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('work', '⚑', work, 'work'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('quiet', '', counted ? fmtCompact(oysters) : '—', 'oysters'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('quiet', '', filled, 'filled'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('quiet', '', empty, 'empty'));
  return strip;
}

// ── DASHBOARD METRICS (commercial overview) ─────────────────────────────────────────────────────
// priceForGrade(farm, grade) — $/oyster for a grade: explicit per-grade price, else the default,
// else null (== "no price known", so the cage is excluded from crop value). Pure, null-safe.
function priceForGrade(farm, grade){
  var gp = (farm && farm.settings && farm.settings.gradePrices) || {};
  if (grade != null && typeof gp[grade] === 'number' && gp[grade] >= 0) return gp[grade];
  var dp = farm && farm.settings ? farm.settings.defaultPrice : null;
  return (typeof dp === 'number' && dp >= 0) ? dp : null;
}
// farmDashboard(farm) — pure money + readiness snapshot for the WHOLE farm. No DOM. Guards every null.
//   oysters     Σ known counts (cages with a numeric batch.count)
//   cropValue   Σ count × priceForGrade — only cages with BOTH a known count AND a known price
//   valued      true once any price (per-grade or default) is set on the farm
//   readyCages / readyOysters   market-ready cages and their known oyster count
//   filled / empty
//   recent[]    last 6 events across all cages, newest first: {label, cageLabel, lineName, date}
function farmDashboard(farm){
  var out = { oysters:0, cropValue:0, valued:false, readyCages:0, readyOysters:0,
    filled:0, empty:0, tub:0, recent:[] };
  if (!farm || !Array.isArray(farm.lines)) return out;
  // valued = any price set anywhere (a per-grade entry OR the default)
  var gp = (farm.settings && farm.settings.gradePrices) || {};
  for (var g in gp){ if (gp.hasOwnProperty(g) && typeof gp[g] === 'number' && gp[g] >= 0){ out.valued = true; break; } }
  if (!out.valued && farm.settings && typeof farm.settings.defaultPrice === 'number' && farm.settings.defaultPrice >= 0) out.valued = true;
  var evs = [];   // collected {ev, cageLabel, lineName, ms} for the recent feed
  farm.lines.forEach(function(line){
    if (!line || !Array.isArray(line.cages)) return;
    var lineName = (typeof line.name === 'string') ? line.name : '';
    line.cages.forEach(function(c){
      if (!c) return;
      if (c.batch){
        out.filled++;
        var count = (typeof c.batch.count === 'number') ? c.batch.count : null;
        if (count != null) out.oysters += count;
        var st = cageStatus(c, farm);
        if (st.ready){
          out.readyCages++;
          if (count != null) out.readyOysters += count;
        }
        if (count != null){
          var price = priceForGrade(farm, c.batch.grade);
          if (price != null) out.cropValue += count * price;
        }
      } else out.empty++;
      // recent feed: every dated event on this cage becomes a candidate row
      if (Array.isArray(c.events)){
        for (var i=0; i<c.events.length; i++){
          var ev = c.events[i];
          if (!ev || !isValidISO(ev.date)) continue;
          evs.push({ ev:ev, cageLabel:(c.label || ''), lineName:lineName, ms:isoToMs(ev.date) });
        }
      }
    });
  });
  // tub (barge) stock counts toward oysters-on-the-water too — cages pulled to the tub
  // moved their count to barge.count and would otherwise vanish from the dashboard total.
  var bt = bargeTotalCount(farm.barge); if (bt != null) out.oysters += bt;
  out.tub = (bt != null) ? bt : 0;
  // newest first; ties broken by later push order (mirrors lastEvent's "later in array wins" feel)
  evs.sort(function(a, b){ return b.ms - a.ms; });
  for (var k=0; k<evs.length && out.recent.length < 6; k++){
    var e = evs[k];
    out.recent.push({ label:eventLabel(e.ev), cageLabel:e.cageLabel, lineName:e.lineName, date:e.ev.date });
  }
  return out;
}

// renderDashboardCard(farm) — the OVERVIEW-ONLY money + readiness HUD (unscoped home only). Leads with
// "$X on the water" + "N oysters sale-ready", then the quiet count run, then a compact recent-activity feed.
// Pure-ish: builds DOM only (reads farmDashboard). Tappable "Set oyster prices ›" opens buildSettings.
function renderDashboardCard(farm){
  var d = farmDashboard(farm);
  var card = h('div', { class:'dashcard' });

  // ── headline row: crop value (or price-CTA) · sale-ready oysters ──
  var head = h('div', { class:'dc-head' });
  var moneyKids;
  if (d.valued){
    moneyKids = [ h('span', { class:'dc-big' }, '$' + fmtCompact(d.cropValue)),
                  h('span', { class:'dc-cap' }, 'on the water') ];
  } else {
    // no prices yet → the big number is a tappable affordance into settings (never show "$0")
    moneyKids = [ h('button', { class:'dc-setprice', type:'button',
        onclick:function(){ openSheet(buildSettings); } }, 'Set oyster prices ',
        h('span', { class:'dc-chev' }, '›')) ];
  }
  var money = h('div', { class:'dc-stat dc-money' }, moneyKids);
  var readyVal = h('span', { class:'dc-big' }, fmtCompact(d.readyOysters));
  var readyCap = h('span', { class:'dc-cap' },
    'oysters sale-ready ›', d.readyCages ? h('span', { class:'dc-sub' }, ' · ' + d.readyCages + (d.readyCages === 1 ? ' cage' : ' cages')) : null);
  // tappable → harvest forecast + grade inventory
  var ready = h('button', { class:'dc-stat dc-ready', type:'button', onclick:function(){ openSheet(buildForecast); } }, readyVal, readyCap);
  head.appendChild(money);
  head.appendChild(h('div', { class:'dc-vrule' }));
  head.appendChild(ready);
  card.appendChild(head);

  // ── quiet count run (ready / work — derived, plus oysters / filled / empty) ──
  var counted = (d.filled > 0);
  var strip = h('div', { class:'dc-counts' });
  function ct(cls, n, label){
    return h('span', { class:'dc-ct' + (cls ? ' ' + cls : '') },
      h('span', { class:'dc-n' }, n), ' ' + label);
  }
  function sep(){ return h('span', { class:'dc-sep' }, '·'); }
  strip.appendChild(ct('', counted ? fmtCompact(d.oysters) : '—', 'oysters'));
  if (d.tub > 0){ strip.appendChild(h('span', { class:'dc-tub' }, '+' + fmtCompact(d.tub) + ' in tub')); }
  strip.appendChild(sep());
  strip.appendChild(ct('', d.filled, 'filled'));
  strip.appendChild(sep());
  strip.appendChild(ct('', d.empty, 'empty'));
  card.appendChild(strip);

  // ── tappable "needs work" row → the work queue (only when something is overdue) ──
  var wq = workQueueItems(farm);
  if (wq.length){
    card.appendChild(h('button', { class:'dc-work', type:'button', onclick:function(){ openSheet(buildWorkQueue); } },
      h('span', { class:'dc-wflag' }, '⚑'),
      h('span', { class:'dc-wn' }, '' + wq.length),
      h('span', { class:'dc-wlbl' }, wq.length === 1 ? ' cage needs work' : ' cages need work'),
      h('span', { class:'dc-chev' }, '›')));
  }

  // ── recent-activity feed (up to 6 rows, newest first) ──
  if (d.recent.length){
    var feed = h('div', { class:'dc-feed' });
    d.recent.forEach(function(r){
      var where = r.cageLabel || r.lineName || '';
      var when = monthDay(r.date);
      var row = h('div', { class:'dc-row' },
        h('span', { class:'dc-rlabel' }, r.label || 'Event'),
        where ? h('span', { class:'dc-rsep' }, '·') : null,
        where ? h('span', { class:'dc-rwhere' }, where) : null,
        when ? h('span', { class:'dc-rsep' }, '·') : null,
        when ? h('span', { class:'dc-rdate' }, when) : null);
      feed.appendChild(row);
    });
    card.appendChild(feed);
  }
  return card;
}

// workQueueItems(farm) — every stocked cage that needs work, most-overdue first, with a reason.
// (OceanFarmr's #1 hook is "the app tells you what to do" — this is the offline version.)
function workQueueItems(farm){
  if (!farm) return [];
  var items = [], today = todayISO();
  farm.lines.forEach(function(line){
    line.cages.forEach(function(cage){
      if (!cage.batch || !needsWork(cage, farm)) return;
      var overdue, reason;
      if (isValidISO(cage.workDue) && today > cage.workDue){
        overdue = daysSince(cage.workDue) || 0;
        reason = 'Reminder was ' + monthDay(cage.workDue);
      } else {
        var lr = lastResettingDate(cage);
        var ds = isValidISO(lr) ? (daysSince(lr) || 0) : 9999;
        overdue = ds - (farm.settings.neglectIntervalDays || 56);
        reason = isValidISO(lr) ? ('No work in ' + ds + ' days') : 'Never worked';
      }
      items.push({ cage:cage, line:line, reason:reason, overdueDays:overdue });
    });
  });
  items.sort(function(a, b){ return b.overdueDays - a.overdueDays; });
  return items;
}

// buildWorkQueue() — the "what needs doing" list; each row jumps to the cage's detail (Work is one tap away).
function buildWorkQueue(){
  var farm = getFarm();
  var items = workQueueItems(farm);
  var kids = sheetHead('Needs work', items.length ? (items.length + (items.length === 1 ? ' cage' : ' cages') + ' past due') : null);
  if (!items.length){
    kids.push(h('div', { class:'emptyNote', style:{marginTop:'14px'} }, 'Nothing overdue.\nEvery stocked cage is inside its work window.'));
    return kids;
  }
  var list = h('div', { class:'menuList' });
  items.forEach(function(it){
    var cid = it.cage.id, lname = it.line ? it.line.name : '';
    list.appendChild(h('button', { class:'menuItem', onclick:function(){ var c = cageById(cid); if (c) openSheet(function(){ return buildCageDetail(c); }); } },
      h('span', { class:'mi-ic', html:icon('wrench', 22) }),
      h('span', { class:'mi-t' }, it.cage.label + (lname ? ' · ' + lname : ''), h('div', { class:'mi-sub' }, it.reason)),
      h('span', { class:'mi-chev', html:icon('chevron', 18) })));
  });
  kids.push(list);
  return kids;
}

// buildSearch() — find a cage fast on a big farm: live filter by cage label, line, grade, source, or ploidy.
// Tap a result → its detail sheet (same jump the work queue uses). Keeps the daily loop seamless at 3000 cages.
function buildSearch(){
  var farm = getFarm();
  var kids = sheetHead('Find a cage', 'Search by cage, line, grade, or source.');
  var input = h('input', { type:'search', placeholder:'e.g. 6-3, Jumbo, Line 2…', autocomplete:'off', autocapitalize:'none' });
  var results = h('div', { class:'menuList', style:{marginTop:'10px'} });
  kids.push(input); kids.push(results);

  // flat searchable index over every cage on the farm
  var index = [], total = 0;
  farm.lines.forEach(function(line){
    (line.cages || []).forEach(function(cage){
      total++;
      var b = cage.batch;
      var hay = [cage.label, line.name, b && b.grade, b && b.source, b && b.ploidy].filter(Boolean).join(' ').toLowerCase();
      index.push({ cage:cage, line:line, hay:hay });
    });
  });

  function paint(q){
    results.innerHTML = '';
    q = (q || '').trim().toLowerCase();
    if (!q){ results.appendChild(h('div', { class:'fieldHint', style:{padding:'12px 2px'} }, total + (total === 1 ? ' cage' : ' cages') + ' on this farm. Type to find one.')); return; }
    var matches = [];
    for (var i = 0; i < index.length && matches.length < 60; i++){ if (index[i].hay.indexOf(q) >= 0) matches.push(index[i]); }
    if (!matches.length){ results.appendChild(h('div', { class:'emptyNote', style:{marginTop:'8px'} }, 'No cage matches “' + q + '”.')); return; }
    matches.forEach(function(m){
      var b = m.cage.batch, sub = [];
      if (m.line && m.line.name) sub.push(m.line.name);
      if (b){ if (b.grade) sub.push(b.grade); if (typeof b.sizeMm === 'number') sub.push(b.sizeMm + ' mm'); if (typeof b.count === 'number') sub.push(fmtCompact(b.count) + ' oy'); }
      else sub.push('empty');
      var cid = m.cage.id;
      results.appendChild(h('button', { class:'menuItem', onclick:function(){ var c = cageById(cid); if (c) openSheet(function(){ return buildCageDetail(c); }); } },
        h('span', { class:'mi-ic', html:icon(b ? 'grade' : 'plus', 22) }),
        h('span', { class:'mi-t' }, h('div', null, m.cage.label || 'Cage'), h('div', { class:'mi-sub' }, sub.join(' · '))),
        h('span', { class:'mi-chev', html:icon('chevron', 18) })));
    });
  }
  input.addEventListener('input', function(){ paint(input.value); });
  paint('');
  setTimeout(function(){ try { input.focus(); } catch (e) {} }, 60);
  return kids;
}

// harvestForecast(farm) — aggregate per-cage growthModel().projectedDate into ready-now + month buckets,
// plus a farm-wide inventory by market grade. Answers "how many can I sell, and when". (v3)
function harvestForecast(farm){
  var out = { readyNow:{cages:0, oysters:0}, months:[], later:{cages:0, oysters:0}, grades:[] };
  if (!farm) return out;
  var byMonth = {}, order = [], gradeMap = {};
  var todayMs = isoToMs(todayISO()), horizonMs = todayMs + 366*86400000;
  farm.lines.forEach(function(line){
    line.cages.forEach(function(cage){
      if (!cage.batch) return;
      var cnt = (cage.batch.count != null) ? cage.batch.count : 0;
      var g = cage.batch.grade || 'Ungraded';
      if (!gradeMap[g]) gradeMap[g] = { grade:g, oysters:0, cages:0, readyOysters:0 };
      gradeMap[g].oysters += cnt; gradeMap[g].cages++;
      var ready = cageStatus(cage, farm).ready;
      if (ready){ gradeMap[g].readyOysters += cnt; out.readyNow.cages++; out.readyNow.oysters += cnt; return; }
      var model = growthModel(cage, farm);
      var pd = (model && model.projectedDate) ? isoToMs(model.projectedDate) : NaN;
      if (isNaN(pd) || (model && model.projectionCapped) || pd > horizonMs){ out.later.cages++; out.later.oysters += cnt; return; }
      // Projected-ready (estimated, not measured) is bucketed by month — NOT counted as "Ready now".
      // "Ready now" stays MEASURED-only so this sheet's headline matches the dashboard's sale-ready stat.
      // If the estimate says a cage is already due, clamp it to this month rather than the past.
      var key, kms;
      if (pd <= todayMs){ kms = todayMs; key = monthYear(todayISO()); }
      else { kms = pd; key = monthYear(model.projectedDate); }
      if (!byMonth[key]){ byMonth[key] = { label:key, cages:0, oysters:0, ms:kms }; order.push(key); }
      byMonth[key].cages++; byMonth[key].oysters += cnt;
    });
  });
  out.months = order.map(function(k){ return byMonth[k]; }).sort(function(a, b){ return a.ms - b.ms; });
  out.grades = Object.keys(gradeMap).map(function(k){ return gradeMap[k]; }).sort(function(a, b){ return b.oysters - a.oysters; });
  return out;
}

// buildForecast() — the readiness calendar + grade inventory sheet (off the dashboard's sale-ready stat).
function buildForecast(){
  var farm = getFarm();
  var f = harvestForecast(farm);
  var kids = sheetHead('Harvest forecast', 'When your oysters reach ' + farm.settings.marketSizeMm + ' mm');
  var now = h('div', { class:'card' });
  now.appendChild(h('div', { class:'eyebrow' }, 'Ready now'));
  now.appendChild(h('div', { class:'fc-big' }, fmtCompact(f.readyNow.oysters) + ' oysters',
    h('span', { class:'fc-sub' }, ' · ' + f.readyNow.cages + (f.readyNow.cages === 1 ? ' cage' : ' cages'))));
  kids.push(now);
  if (f.months.length || f.later.cages){
    var mc = h('div', { class:'card' });
    mc.appendChild(h('div', { class:'eyebrow' }, 'Coming up'));
    f.months.forEach(function(m){
      mc.appendChild(h('div', { class:'fc-row' }, h('span', { class:'fc-m' }, m.label),
        h('span', { class:'fc-v' }, fmtCompact(m.oysters) + ' · ' + m.cages + (m.cages === 1 ? ' cage' : ' cages'))));
    });
    if (f.later.cages) mc.appendChild(h('div', { class:'fc-row' }, h('span', { class:'fc-m' }, 'Later / 1+ yr'),
      h('span', { class:'fc-v' }, fmtCompact(f.later.oysters) + ' · ' + f.later.cages + ' cages')));
    kids.push(mc);
  }
  if (f.grades.length){
    var gc = h('div', { class:'card' });
    gc.appendChild(h('div', { class:'eyebrow' }, 'Inventory by grade'));
    f.grades.forEach(function(g){
      gc.appendChild(h('div', { class:'fc-row' }, h('span', { class:'fc-m' }, g.grade),
        h('span', { class:'fc-v' }, fmtCompact(g.oysters) + ' oysters' + (g.readyOysters ? ' · ' + fmtCompact(g.readyOysters) + ' ready' : ''))));
    });
    kids.push(gc);
  }
  return kids;
}

// renderLine(line, farm) — eyebrow + ⋯ menu + pilings each end + CSS rope + the cage strip
function renderLine(line, farm){
  var head = h('div', { class:'lineHead' },
    h('span', { class:'eyebrow' }, line.name),
    h('button', { class:'lineMenu', 'aria-label':'Line options', html:icon('dots', 20),
      onclick:function(){ openSheet(function(){ return buildLineMenu(line); }); } })
  );

  var strip = h('div', { class:'cageStrip', 'data-line-id':line.id });
  // WP4: rope is now a strip background (spans the scroll content), not a child div.
  if (!line.cages.length){
    strip.appendChild(h('div', { class:'emptyLine' }, 'No cages — tap ⋯ to add'));
  } else {
    line.cages.forEach(function(cage, pos){ strip.appendChild(renderCageCell(cage, line, farm, pos)); });
  }

  var body = h('div', { class:'lineBody' },
    h('div', { class:'linePiling left', html:bookendPilingSVG() }),
    strip,
    h('div', { class:'linePiling right', html:bookendPilingSVG() })
  );

  // hand the strip to the drag-select wiring (Builder 2). Stub is a safe no-op.
  if (typeof denseRangeSelect === 'function') denseRangeSelect(strip, line);

  return h('div', { class:'lineRow', 'data-line-id':line.id }, head, body);
}

// renderCageCell — the dense cell DOM EXACTLY per DESIGN §5. Builder 2 attaches pointer handlers
// WITHOUT restructuring: .cage[data-pos][data-cage-id] > .cellfill(.rdy/.work) > svg, + ::after.
function renderCageCell(cage, line, farm, pos){
  var st = cageStatus(cage, farm);
  var glyphFill = cage.batch ? st.color : STATUS_COLORS.empty;
  var t = cageType(farm, cage.typeId);
  // WP4: empty cells carry .empty so CSS gives them the dimmed-fill + hairline
  // outline (D8) — an unstocked rack reads as structure, not gray static.
  var fillCls = 'cellfill' + (cage.batch ? '' : ' empty') + (st.ready ? ' rdy' : '') + (st.needsWork ? ' work' : '');
  // WP4: render the FlipFarm glyph at 22 (was 16) so spine + ribs read at the
  // larger 22–26px cell instead of collapsing to mush.
  var fill = h('div', { class:fillCls, html:shapeSVG(t.shape, glyphFill, st.ready, 22, st.needsWork) });
  if (st.needsWork) fill.appendChild(h('span', { class:'workmark', html:icon('wrench', 9) }));

  // WP1: no ambient .clabel — cage.label stays in the data model (sheets/aria) but is
  // not printed under every cell, killing the repeating "1-1 1-2 / 2 2 2 2" digit band.
  // per-shape cell width: FlipFarm sits narrow (rope through its short side → more fit per line);
  // OyGro runs long-ways; bag stays default. (owner ask)
  var shapeCls = t.shape === 'rect' ? ' cage-flip' : (t.shape === 'circle' ? ' cage-oygro' : '');
  var cell = h('div', {
    'class':'cage' + shapeCls,
    'data-pos':pos,
    'data-cage-id':cage.id
  }, fill);

  // WP2: tens-tick under the rope — one faint tick + number every 10th cage
  // (positions 10, 20, 30…). pos is 0-based, so cage #N is pos N-1; mark when
  // (pos+1) % 10 === 0. This is the only ambient numbering; a <10-cage line shows none.
  if ((pos + 1) % 10 === 0){
    cell.appendChild(h('div', { class:'tensTick', 'aria-hidden':'true' },
      h('i', {}), h('b', {}, String(pos + 1))));
  }

  // selection visual reflects selCages (Builder 2 populates it; default empty)
  if (typeof selCages === 'object' && selCages[cage.id]) cell.classList.add('sel');

  return cell;
}

/* ─────────────────────────────────────────────────────────────────
   ADD / REMOVE LINE helpers (used by render + layout)
   ───────────────────────────────────────────────────────────────── */
// addLine() — defaults to ONE line of the same cage count as the last line (or 10), first cage type. Undoable.
function addLine(){
  var farm = getFarm(); if (!farm) return;
  var seqLines = farm.lines;
  var perLine = seqLines.length ? seqLines[seqLines.length-1].cages.length : 10;
  if (!perLine) perLine = 10;
  var typeId = farm.cageTypes[0].id;
  var line = { id:uid(), name:'Line ' + (seqLines.length+1), order:seqLines.length, cages:[] };
  for (var i=0; i<perLine; i++) line.cages.push(newCage(typeId, seqLines.length, i));
  // LAYOUT §6.7 — stamp the parent area: the scoped area when drilled in, else the default area.
  stampLineArea(farm, line);
  farm.lines.push(line);
  reindexLines(farm);
  rebuildLineIds(farm);
  commit();
  undoable('Line added', function(){
    var idx = getFarm().lines.indexOf(line);
    if (idx >= 0) getFarm().lines.splice(idx, 1);
    reindexLines(getFarm());
    rebuildLineIds(getFarm());
    commit();
  });
}
// stampLineArea(farm, line) — set line.plotId/areaId. Honors viewScope (drilled-in area) when
// it points at a real area in this farm; otherwise falls to the farm's default area. The
// one-rule enforcer for the daily-work "Add line" path. (LAYOUT §2 invariant / §6.7)
function stampLineArea(farm, line){
  if (viewScope && viewScope.areaId && findPlotIdOfArea(farm, viewScope.areaId)){
    line.plotId = viewScope.plotId || findPlotIdOfArea(farm, viewScope.areaId);
    line.areaId = viewScope.areaId;
    return;
  }
  var da = defaultArea(farm);
  if (da){ line.plotId = findPlotIdOfArea(farm, da.id); line.areaId = da.id; }
}
function newCage(typeId, lineIdx, cageIdx){
  return { id:uid(), typeId:typeId, label:(lineIdx+1)+'-'+(cageIdx+1), batch:null, events:[], currentGrade:null, workDue:null };
}
// reindexLines — fix order + recompute every cage label (cosmetic) after a structural change
function reindexLines(farm){
  farm.lines.forEach(function(l, li){
    l.order = li;
    l.cages.forEach(function(c, ci){ c.label = (li+1) + '-' + (ci+1); });
  });
}

   THE BARGE (§3.7 + DESIGN §5 + §10 pin 2)
   Art bodies pasted VERBATIM from _tub-loaded.svg / _tub-empty.svg.
   The oyster-pile shells are wrapped in <g id="oysterPile"> (§3.7) and
   driven by pileLevel(barge.count). Warm hand-drawn palette is kept.

// pileLevel(count) — 0..1 log-scaled; 20k ≈ a full heap (§3.7)
function pileLevel(count){
  if (!count || count <= 0) return 0;
  return Math.min(1, Math.log10(count + 1) / Math.log10(20000));
}
