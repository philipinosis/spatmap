<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A2E38">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SpatMap</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A2E38'/%3E%3Cellipse cx='16' cy='18' rx='9' ry='6.5' fill='%23EAF1F2'/%3E%3Cpath d='M7.5 18 Q16 8 24.5 18' fill='none' stroke='%230E7C8B' stroke-width='2.2'/%3E%3C/svg%3E">
<style>
/* ══════════════════════════════════════════════════════════════════
   SpatMap v7 — DESIGN system (light-first nautical chart).
   :root from DESIGN §2; type §3; surfaces §4; map §5; popup/photo/etc.
   This REPLACES the harvest kit's dark :root on purpose.
   ══════════════════════════════════════════════════════════════════ */
:root{
  /* ── CANVAS / PAPER (the working chart) ───────────────────────────── */
  --paper:        #EAF1F2;
  --paper-2:      #DCE7E9;
  --chart-line:   #B7CBCE;
  --surface:      #FFFFFF;
  --surface-sink: #F3F7F7;
  --hair:         #CBD9DB;
  --hair-strong:  #9DB3B6;

  /* ── INK (text) ───────────────────────────────────────────────────── */
  --ink:          #0C2A30;
  --ink-2:        #3D5A60;
  --ink-3:        #6E878C;

  /* ── BRAND / PRIMARY ACTION ───────────────────────────────────────── */
  --deep:         #0A2E38;
  --teal:         #0E7C8B;
  --teal-press:   #0A616E;
  --teal-tint:    #DDEFF1;

  /* ── CAGE / OYSTER STATUS (the meaningful color) ──────────────────── */
  --c-empty:      #C3D2D4;
  --c-empty-ink:  #5A7176;
  --c-fresh:      #2E9E5B;
  --c-mid:        #C97A1E;
  --c-old:        #B4471F;
  --c-ready:      #0E7C8B;
  --c-work:       #C8341E;
  --c-work-soft:  #F6D9D3;

  --fresh-ink:    #1C6E3D;
  --mid-ink:      #8F560F;
  --old-ink:      #7E2F12;

  /* ── BARGE (its own warmer world) ─────────────────────────────────── */
  --barge-amber:  #C8852A;
  --barge-amber-ink:#9A6312;
  --barge-hull:   #2D5A42;

  /* ── FEEDBACK ─────────────────────────────────────────────────────── */
  --danger:       #C8341E;
  --ok:           #2E9E5B;
  --toast-bg:     #0C2A30;

  /* ── GEAR / WATER tokens (re-tokenized warm-on-pale) ──────────────── */
  --water-ripple: #B7CBCE;
  --rope:         #B98A4E;
  --rope-shadow:  #8A6334;
  --rope-hi:      #D8B988;
  --piling:       #7A5A3A;
  --piling-top:   #9A744A;
  --piling-ring:  #4A3520;

  /* glyph internals — these names match shapeSVG()/pilingSVG() var() calls */
  --cage-stroke:  #0C2A30;
  --cage-mesh:    rgba(12,42,48,.42);
  --cage-float:   rgba(12,42,48,.10);
  --cage-status-dot: var(--c-ready);
  /* aliases pilingSVG uses */
  --piling-color: #7A5A3A;

  /* ── METRICS ──────────────────────────────────────────────────────── */
  --tap:          48px;
  --tap-min:      44px;
  --radius:       16px;
  --radius-sm:    11px;
  --radius-pill:  999px;
  --gap:          16px;
  --shadow-card:  0 1px 3px rgba(12,42,48,.10), 0 4px 16px rgba(12,42,48,.07);
  --shadow-pop:   0 8px 28px rgba(12,42,48,.20);
  --shadow-sheet: 0 -10px 40px rgba(12,42,48,.22);
  --ease:         cubic-bezier(.22,1,.36,1);

  /* ── TYPE ─────────────────────────────────────────────────────────── */
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-num: ui-monospace, "SF Mono", "DM Mono", "JetBrains Mono", Menlo, Consolas, monospace;
}

/* ── RESET + BASE ─────────────────────────────────────────────────── */
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html{ font-size:16px; -webkit-text-size-adjust:100%; }
body{ font-family:var(--font-ui); color:var(--ink); font-weight:450; background:var(--paper);
  -webkit-font-smoothing:antialiased; letter-spacing:-0.005em;
  min-height:100dvh; overscroll-behavior-y:none; }
button{ font-family:inherit; cursor:pointer; background:none; border:none; color:inherit; }
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ transition-duration:.01ms!important; animation-duration:.01ms!important; }
}

/* ── TYPE ROLES ───────────────────────────────────────────────────── */
.eyebrow{ font:700 12px/1 var(--font-ui); letter-spacing:.10em; text-transform:uppercase; color:var(--ink-2); }
.hint{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); }
.num{ font-family:var(--font-num); font-variant-numeric:tabular-nums; }

/* ══════════════════════════════════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════════════════════════════════ */
#app{ min-height:100dvh; display:flex; flex-direction:column; }

/* top bar — the one dark anchor */
.topbar{ position:sticky; top:0; z-index:40; background:var(--deep); color:#fff;
  display:flex; align-items:center; gap:10px;
  padding:max(10px, env(safe-area-inset-top)) 14px 10px 14px;
  box-shadow:0 1px 0 rgba(0,0,0,.15); }
.topbar .fname{ font:800 20px/1.1 var(--font-ui); color:#fff; display:flex; align-items:center; gap:5px;
  flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  min-height:var(--tap); background:none; text-align:left; }
.topbar .fname .chev{ flex:0 0 auto; opacity:.8; }
.topbar .menuBtn{ flex:0 0 auto; width:var(--tap); height:var(--tap); border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center; color:#fff; }
.topbar .menuBtn:active{ background:rgba(255,255,255,.12); }

/* one quiet summary strip */
.statstrip{ background:var(--paper); color:var(--ink-2);
  font:600 13px/1 var(--font-ui); padding:9px 16px;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  border-bottom:1px solid var(--hair); }
.statstrip .st{ display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.statstrip .st .n{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink); }
.statstrip .st.work .n{ color:var(--c-work); }
.statstrip .st.ready .n{ color:var(--teal); }
.statstrip .sep{ color:var(--hair-strong); }

/* the map well */
.mapwell{ flex:1; background:var(--paper-2);
  background-image:
    repeating-linear-gradient(0deg, transparent 0 22px, var(--water-ripple) 22px 23px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(183,203,206,.45) 22px 23px);
  background-blend-mode:normal;
  padding:8px 16px calc(150px + env(safe-area-inset-bottom)) 16px; }
.mapwell.ripplesoft{ } /* hook for reduced texture if needed */

/* ── LINE ROW ─────────────────────────────────────────────────────── */
.lineRow{ padding:10px 0 14px 0; }
.lineHead{ display:flex; align-items:center; gap:8px; margin:0 2px 7px 2px; }
.lineHead .eyebrow{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lineHead .lineMenu{ flex:0 0 auto; width:32px; height:32px; border-radius:8px; color:var(--ink-2);
  display:flex; align-items:center; justify-content:center; font-size:20px; line-height:1; }
.lineHead .lineMenu:active{ background:var(--hair); }
.lineBody{ display:flex; align-items:center; gap:2px; position:relative; }
.linePiling{ flex:0 0 auto; width:14px; height:26px; display:flex; align-items:center; }
.linePiling svg{ width:14px; height:26px; display:block; }
.linePiling.right svg{ transform:scaleX(-1); }
.cageStrip{ flex:1 1 auto; display:flex; align-items:center; gap:3px; position:relative; min-width:0;
  padding:0 4px; }
/* the braided longline under the cages */
.lineRope{ position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:3px; border-radius:2px; z-index:0;
  background:repeating-linear-gradient(115deg,
    var(--rope-hi) 0 4px, var(--rope) 4px 8px, var(--rope-shadow) 8px 10px); opacity:.9; }
.cageStrip .emptyLine{ flex:1; text-align:center; font:500 12px/1.2 var(--font-ui); color:var(--ink-3);
  padding:8px 0; }

/* ── A CAGE CELL (dense) ──────────────────────────────────────────── */
.cage{ position:relative; flex:1 1 0; min-width:0; padding:0; border-radius:3px; z-index:1;
  touch-action:pan-y; }
.cage .cellfill{ position:relative; width:100%; height:30px; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  transition:filter .1s ease, box-shadow .15s ease; }
.cage .cellfill svg{ width:100%; height:100%; display:block; }
/* market-ready: inset teal TOP edge · needs-work: inset red BOTTOM edge */
.cage .cellfill.rdy{ box-shadow:inset 0 3px 0 var(--c-ready); }
.cage .cellfill.work{ box-shadow:inset 0 -3px 0 var(--c-work); }
.cage .cellfill.rdy.work{ box-shadow:inset 0 3px 0 var(--c-ready), inset 0 -3px 0 var(--c-work); }
/* micro-label under/over the cell */
.cage .clabel{ position:absolute; left:0; right:0; bottom:-12px; text-align:center;
  font:700 9px/1 var(--font-ui); letter-spacing:.04em; text-transform:uppercase;
  color:var(--ink-3); pointer-events:none; white-space:nowrap; overflow:hidden; }
/* tiny wrench in the corner when needs-work */
.cage .workmark{ position:absolute; top:1px; right:1px; width:9px; height:9px; color:var(--c-work);
  pointer-events:none; }
.cage .workmark svg{ width:9px; height:9px; display:block; }
/* transparent ::after pads the tap target to 48px tall */
.cage::after{ content:''; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:var(--tap); z-index:-1; }
/* selection highlight — white inner outline + slight brighten */
.cage.sel .cellfill{ outline:2.5px solid #fff; outline-offset:-2.5px;
  filter:brightness(1.06) saturate(1.05); box-shadow:0 0 0 2px var(--teal); }
.cage.sel .cellfill.rdy{ box-shadow:0 0 0 2px var(--teal), inset 0 3px 0 var(--c-ready); }
.cage.sel .cellfill.work{ box-shadow:0 0 0 2px var(--teal), inset 0 -3px 0 var(--c-work); }
.cage.sel .cellfill.rdy.work{ box-shadow:0 0 0 2px var(--teal), inset 0 3px 0 var(--c-ready), inset 0 -3px 0 var(--c-work); }

/* drag band tracking the swept range */
.dragBand{ position:absolute; top:2px; bottom:2px; background:rgba(14,124,139,.16);
  border:1.5px solid var(--teal); border-radius:6px; pointer-events:none; z-index:3; }

/* + Add line — full-width, IN FLOW (no FAB) */
.addLine{ width:100%; min-height:var(--tap); margin-top:8px; border-radius:var(--radius-sm);
  border:1.5px dashed var(--hair-strong); background:var(--surface); color:var(--teal);
  font:750 15px/1 var(--font-ui); display:flex; align-items:center; justify-content:center; gap:8px; }
.addLine:active{ background:var(--teal-tint); }

/* ══════════════════════════════════════════════════════════════════
   THE BARGE (its own warm world)
   ══════════════════════════════════════════════════════════════════ */
.barge{ position:fixed; right:10px; z-index:60; pointer-events:auto;
  bottom:calc(12px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; gap:4px;
  filter:drop-shadow(0 4px 10px rgba(12,42,48,.30));
  transition:width .3s var(--ease); }
.barge svg{ width:100%; height:auto; display:block; animation:bob 3.4s ease-in-out infinite; }
@keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.barge.empty{ width:84px; opacity:.85; }
.barge.loaded{ width:118px; opacity:1; }
#oysterPile{ transition:transform .4s var(--ease); }
.barge .barge-pill{ background:#FFF; border:1.5px solid var(--barge-amber); color:var(--barge-amber-ink);
  border-radius:var(--radius-pill); padding:3px 11px; font:800 13px/1 var(--font-num); white-space:nowrap;
  box-shadow:0 1px 3px rgba(12,42,48,.12); }
.barge .barge-origin{ font:500 11px/1.25 var(--font-ui); color:var(--ink-2); text-align:center; max-width:112px; }
.barge .barge-empty-cap{ font:600 11px/1.2 var(--font-ui); color:var(--ink-3); text-align:center; }
@media(min-width:768px){ .barge{ right:18px; bottom:auto; top:50%; transform:translateY(-50%); }
  .barge.empty{ width:104px; } .barge.loaded{ width:132px; } }

/* ══════════════════════════════════════════════════════════════════
   CARD / KV / ACTION TILES
   ══════════════════════════════════════════════════════════════════ */
.card{ background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
  box-shadow:var(--shadow-card); padding:16px; }
.card + .card{ margin-top:14px; }
.card .eyebrow{ margin-bottom:10px; }
.card .hero{ font:700 34px/1 var(--font-num); letter-spacing:-.02em; color:var(--ink); }
.kv{ display:flex; justify-content:space-between; gap:12px; padding:9px 0; font-size:16px;
  border-top:1px solid var(--hair); }
.kv:first-of-type{ border-top:0; }
.kv .k{ color:var(--ink-2); }
.kv .v{ font:600 16px/1.3 var(--font-num); font-variant-numeric:tabular-nums; text-align:right;
  color:var(--ink); overflow-wrap:anywhere; }
.actGrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.actTile{ min-height:60px; border-radius:var(--radius-sm); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px; font:750 15px/1 var(--font-ui);
  border:1px solid var(--hair); background:var(--surface-sink); color:var(--ink); }
.actTile .ic{ width:22px; height:22px; }
.actTile:active{ background:var(--teal-tint); }

/* ══════════════════════════════════════════════════════════════════
   BOTTOM SHEET / OVERLAY
   ══════════════════════════════════════════════════════════════════ */
.overlay{ position:fixed; inset:0; background:rgba(12,42,48,.34); opacity:0; pointer-events:none;
  transition:opacity .2s ease; z-index:500; }
.overlay.open{ opacity:1; pointer-events:auto; }
.sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--surface);
  border-radius:22px 22px 0 0; max-height:90dvh; overflow-y:auto;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom));
  box-shadow:var(--shadow-sheet); -webkit-overflow-scrolling:touch;
  transform:translateY(100%); transition:transform .26s var(--ease); }
.overlay.open .sheet{ transform:translateY(0); }
.sheet .grab{ width:42px; height:5px; border-radius:3px; background:var(--hair-strong);
  margin:6px auto 10px; }
.sheet h2{ font:800 22px/1.15 var(--font-ui); }
.sheetHead{ display:flex; align-items:flex-start; gap:10px; margin-bottom:6px; }
.sheetHead h2{ flex:1; min-width:0; }
.sheetHead .closeX{ flex:0 0 auto; width:var(--tap); height:var(--tap); margin:-6px -8px 0 0;
  border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; color:var(--ink-2); }
.sheetHead .closeX:active{ background:var(--surface-sink); }
.sheetSub{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); margin:-2px 0 8px; }
.sheet section{ margin-top:14px; }
@media(min-width:768px){
  .sheet{ left:50%; right:auto; bottom:auto; top:50%; width:520px; max-height:86vh;
    border-radius:22px; transform:translate(-50%,-46%); opacity:0;
    transition:transform .24s var(--ease), opacity .18s ease; }
  .overlay.open .sheet{ transform:translate(-50%,-50%); opacity:1; }
  .sheet .grab{ display:none; }
}

/* menu list rows */
.menuList{ display:flex; flex-direction:column; gap:2px; margin-top:6px; }
.menuItem{ display:flex; align-items:center; gap:14px; min-height:56px; padding:0 6px;
  border-radius:var(--radius-sm); text-align:left; width:100%; color:var(--ink);
  border-bottom:1px solid var(--hair); font:600 16px/1.2 var(--font-ui); }
.menuItem:last-child{ border-bottom:0; }
.menuItem:active{ background:var(--surface-sink); }
.menuItem .mi-ic{ flex:0 0 auto; width:24px; height:24px; color:var(--ink-2); }
.menuItem .mi-t{ flex:1; min-width:0; }
.menuItem .mi-sub{ font:500 13px/1.3 var(--font-ui); color:var(--ink-3); margin-top:1px; }
.menuItem .mi-chev{ flex:0 0 auto; color:var(--ink-3); }

/* ══════════════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════════════ */
.btn{ min-height:var(--tap); padding:0 18px; border-radius:var(--radius-sm);
  font:750 16.5px/1 var(--font-ui); display:inline-flex; align-items:center; justify-content:center;
  gap:8px; border:1px solid transparent; }
.btn-primary{ background:var(--teal); color:#fff; }
.btn-primary:active{ background:var(--teal-press); }
.btn-barge{ background:var(--barge-amber); color:#1F1405; }
.btn-quiet{ background:var(--surface); color:var(--ink); border-color:var(--hair-strong); }
.btn-danger{ background:var(--surface); color:var(--danger); border:1.5px solid var(--danger); }
.btn-block{ width:100%; }
.btn[disabled]{ opacity:.45; pointer-events:none; }
.btnRow{ display:flex; gap:10px; margin-top:16px; }
.btnRow .btn{ flex:1; }

/* ══════════════════════════════════════════════════════════════════
   INPUTS / FORMS
   ══════════════════════════════════════════════════════════════════ */
input,select,textarea{ font:450 16px/1.3 var(--font-ui); min-height:var(--tap); width:100%;
  padding:12px 14px; border:1px solid var(--hair-strong); border-radius:var(--radius-sm);
  background:var(--surface); color:var(--ink); }
textarea{ min-height:72px; resize:vertical; }
input[inputmode="numeric"], input[inputmode="decimal"], .num-in{
  font-family:var(--font-num); font-variant-numeric:tabular-nums; }
input:focus,select:focus,textarea:focus{ outline:2px solid var(--teal); outline-offset:1px;
  border-color:var(--teal); }
label{ display:block; font:700 12px/1 var(--font-ui); letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-2); margin:14px 0 6px; }
.fieldHint{ font:500 12px/1.35 var(--font-ui); color:var(--ink-3); margin-top:5px; }

/* chips (ploidy / grades / work-again) */
.chips{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ min-height:var(--tap-min); padding:0 16px; border-radius:var(--radius-pill);
  border:1.5px solid var(--hair-strong); background:var(--surface); color:var(--ink);
  font:650 14px/1 var(--font-ui); display:inline-flex; align-items:center; gap:6px; }
.chip:active{ background:var(--surface-sink); }
.chip.on{ background:var(--teal-tint); border-color:var(--teal); color:var(--teal-press); font-weight:750; }
.chip .x{ font-size:16px; line-height:1; opacity:.6; margin-left:2px; }
.chip.add{ border-style:dashed; color:var(--teal); }

/* cage-type editor rows */
.typeRow{ display:flex; align-items:center; gap:8px; padding:10px 0; border-top:1px solid var(--hair); }
.typeRow:first-of-type{ border-top:0; }
.typeRow .tname{ flex:1 1 auto; min-width:0; }
.typeRow .tmesh{ flex:0 0 86px; }
.typeRow .shapeToggle{ flex:0 0 auto; display:flex; gap:4px; }
.shapeToggle .sbtn{ width:44px; height:40px; border-radius:9px; border:1.5px solid var(--hair-strong);
  background:var(--surface); display:flex; align-items:center; justify-content:center; color:var(--ink-2); }
.shapeToggle .sbtn svg{ width:30px; height:18px; }
.shapeToggle .sbtn.on{ border-color:var(--teal); background:var(--teal-tint); }
.typeRow .trm{ flex:0 0 auto; width:38px; height:38px; border-radius:9px; color:var(--danger);
  display:flex; align-items:center; justify-content:center; font-size:22px; line-height:1; }
.typeRow .trm:active{ background:var(--c-work-soft); }

/* ══════════════════════════════════════════════════════════════════
   TOAST + INLINE UNDO
   ══════════════════════════════════════════════════════════════════ */
#toast{ position:fixed; left:50%; bottom:calc(20px + env(safe-area-inset-bottom));
  transform:translate(-50%,10px); z-index:700; background:var(--toast-bg); color:#fff;
  padding:13px 18px; border-radius:var(--radius-pill); font:600 15px/1.2 var(--font-ui);
  box-shadow:var(--shadow-pop); display:flex; align-items:center; gap:6px; max-width:90vw;
  opacity:0; pointer-events:none; transition:opacity .22s ease, transform .28s var(--ease); }
#toast.show{ opacity:1; transform:translate(-50%,0); pointer-events:auto; }
#toast .undo{ margin-left:6px; min-height:44px; padding:0 12px; border-radius:var(--radius-pill);
  color:#7FE0EC; font-weight:800; background:transparent; }

/* ══════════════════════════════════════════════════════════════════
   CONTEXTUAL POPUP (above the selection)
   ══════════════════════════════════════════════════════════════════ */
.popup{ position:fixed; z-index:600; transform:translateX(-50%); min-width:172px;
  background:var(--surface); border:1px solid var(--hair-strong); border-radius:14px;
  box-shadow:var(--shadow-pop); padding:10px 12px 12px;
  display:flex; flex-direction:column; align-items:center; gap:9px; }
.popup .lbl{ font:600 13px/1.25 var(--font-ui); color:var(--ink-2); text-align:center; }
.popup .openRow{ min-height:40px; padding:0 10px; border-radius:9px; background:var(--surface-sink);

/* flipped caret: when the popup sits BELOW its cages (top-row selections) it points up */
.popup.below::after{ top:-9px; bottom:auto;
  border:9px solid transparent; border-bottom-color:var(--surface); border-top:none;
  filter:drop-shadow(0 -1px 0 var(--hair-strong)); }

/* ══════════════════════════════════════════════════════════════════
   NEEDS-WORK / READY indicators (cards)
   ══════════════════════════════════════════════════════════════════ */
@keyframes sonar{ 0%{box-shadow:0 0 0 0 rgba(200,52,30,.7)} 70%{box-shadow:0 0 0 10px rgba(200,52,30,0)}

  font:800 13px/1 var(--font-ui); }
@media(prefers-reduced-motion:reduce){ .work-dot{ animation:none; box-shadow:0 0 0 3px rgba(200,52,30,.5);} }

/* ══════════════════════════════════════════════════════════════════

  display:flex; align-items:center; justify-content:center; }

.viewer .nav.prev{ left:8px; } .viewer .nav.next{ right:8px; }

   ══════════════════════════════════════════════════════════════════ */
.timeline{ position:relative; padding-left:18px; margin-top:6px; }

.tlRow .dot{ position:absolute; left:-16px; top:12px; width:10px; height:10px; border-radius:50%;

/* ══════════════════════════════════════════════════════════════════
   GROWTH CHART FRAME
   ══════════════════════════════════════════════════════════════════ */
.chartFrame{ background:var(--surface-sink); border:1px solid var(--hair); border-radius:12px;

/* onboarding centered scroll page (no farms yet) */

.fieldGroup{ margin-top:18px; }
.row2{ display:flex; gap:12px; }
.row2 > div{ flex:1; }

<body>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet" role="dialog" aria-modal="true"></div></div>
<div id="toast"></div>
<div id="popupMount"></div>
<div id="photoViewer"></div>
<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════
   SpatMap v7 — single-file vanilla ES5. Builder 1 = foundation + shell.
   ══════════════════════════════════════════════════════════════════ */

/* ─────────────────────────────────────────────────────────────────
   UTILS — hyperscript, icons, ids, dates, numbers
   ───────────────────────────────────────────────────────────────── */

// h(tag, attrs, ...kids) — tiny DOM hyperscript.
//   attrs.html  → innerHTML (for SVG strings)
//   attrs.style → object or string
//   on*         → event listeners
function h(tag, attrs){
  var el = document.createElement(tag);
  var i, kids = [], a;
  if (attrs && (typeof attrs !== 'object' || attrs.nodeType || Array.isArray(attrs))){
    // attrs was actually a child
    kids = Array.prototype.slice.call(arguments, 1);
    attrs = null;
  } else {
    kids = Array.prototype.slice.call(arguments, 2);
  }
  if (attrs){
    for (a in attrs){
      if (!Object.prototype.hasOwnProperty.call(attrs, a)) continue;
      var v = attrs[a];
      if (v == null || v === false) continue;
      if (a === 'html'){ el.innerHTML = v; }
      else if (a === 'class' || a === 'className'){ el.className = v; }
      else if (a === 'style' && typeof v === 'object'){ for (var s in v) el.style[s] = v[s]; }
      else if (a.slice(0,2) === 'on' && typeof v === 'function'){
        el.addEventListener(a.slice(2).toLowerCase(), v);
      }
      else if (a === 'value'){ el.value = v; }
      else if (a === 'checked' || a === 'disabled' || a === 'selected'){ if (v) el.setAttribute(a, ''); }
      else { el.setAttribute(a, v); }
    }
  }
  appendKids(el, kids);
  return el;
}
function appendKids(el, kids){
  for (var i=0; i<kids.length; i++){
    var k = kids[i];
    if (k == null || k === false || k === true) continue;
    if (Array.isArray(k)){ appendKids(el, k); continue; }
    if (k.nodeType) el.appendChild(k);
    else el.appendChild(document.createTextNode(String(k)));
  }
}

// ICON_PATHS — single-path 24×24 line icons (stroke, currentColor).
var ICON_PATHS = {
  menu:    'M3 6h18M3 12h18M3 18h18',
  back:    'M15 18l-6-6 6-6',
  close:   'M6 6l12 12M18 6L6 18',
  plus:    'M12 5v14M5 12h14',
  wrench:  'M14.5 5.5a3.5 3.5 0 0 0-4.6 4.6L4 16l4 4 5.9-5.9a3.5 3.5 0 0 0 4.6-4.6l-2.3 2.3-2.1-.5-.5-2.1z',
  check:   'M4 12l5 5L20 6',
  chevron: 'M9 6l6 6-6 6',
  chevdown:'M6 9l6 6 6-6',
  anchor:  'M12 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM12 7v14M5 14a7 7 0 0 0 14 0M3 14h2M19 14h2',
  camera:  'M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM12 11.5a3 3 0 1 0 0 6 3 3 0 0 0 0-6z',
  layout:  'M4 5h16v14H4zM4 10h16M10 10v9',
  log:     'M5 4h11l3 3v13H5zM9 9h7M9 13h7M9 17h4',
  grade:   'M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z',
  gear:    'M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM4 12l-1.2.7M21.2 11.3 20 12M12 4l.7-1.2M11.3 21.2 12 20M5.6 5.6l-.8-.8M19.2 19.2l-.8-.8M5.6 18.4l-.8.8M19.2 4.8l-.8.8',
  data:    'M5 5h14v4H5zM5 10h14v4H5zM5 15h14v4H5zM8 7h.01M8 12h.01M8 17h.01',
  trash:   'M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13',
  dots:    'M5 12h.01M12 12h.01M19 12h.01'
};
function icon(name, size){
  size = size || 22;
  var d = ICON_PATHS[name] || ICON_PATHS.dots;
  return '<svg viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" '+
    'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" '+
    'aria-hidden="true"><path d="'+d+'"/></svg>';
}
// iconEl — an <span> wrapping an icon svg, for use as an h() child
function iconEl(name, size, cls){ return h('span', {class:cls||'ic', html:icon(name, size)}); }

// uid — short unique id
var _uidc = 0;
function uid(){ _uidc++; return 'x' + Date.now().toString(36) + _uidc.toString(36) + Math.floor(Math.random()*1e6).toString(36); }

// ── DATE UTILS (ISO yyyy-mm-dd, UTC-safe) ──
function pad2(n){ return n < 10 ? '0' + n : '' + n; }
function todayISO(){ var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }
function isValidISO(s){ return typeof s === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(s) && !isNaN(isoToMs(s)); }
function isoToMs(s){ if (typeof s !== 'string') return NaN; var p = s.split('-'); return Date.UTC(+p[0], (+p[1])-1, +p[2]); }
function daysBetween(aMs, bMs){ return Math.floor((bMs - aMs) / 86400000); }
function daysSince(iso){ if (!isValidISO(iso)) return null; return daysBetween(isoToMs(iso), isoToMs(todayISO())); }
function monthsSince(iso){ var d = daysSince(iso); return d == null ? null : d / 30.4375; }
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthYear(iso){ if (!isValidISO(iso)) return ''; var p = iso.split('-'); return MONTHS[(+p[1])-1] + ' ' + p[0]; }
function monthDay(iso){ if (!isValidISO(iso)) return ''; var p = iso.split('-'); return MONTHS[(+p[1])-1] + ' ' + (+p[2]); }
// fmtCompact — 1234 → "1.2k", 20000 → "20k"
function fmtCompact(n){
  if (n == null || isNaN(n)) return '—';
  n = Math.round(n);
  if (Math.abs(n) < 1000) return '' + n;
  if (Math.abs(n) < 10000) return (n/1000).toFixed(1).replace(/\.0$/, '') + 'k';
  if (Math.abs(n) < 1000000) return Math.round(n/1000) + 'k';
  return (n/1000000).toFixed(1).replace(/\.0$/, '') + 'M';
}
// parseNum — '' / bad → null; otherwise a finite number
function parseNum(v){
  if (v == null) return null;
  if (typeof v === 'number') return isFinite(v) ? v : null;
  var s = String(v).trim();
  if (s === '') return null;
  var n = parseFloat(s.replace(/,/g, ''));
  return isFinite(n) ? n : null;
}
// parseCount — whole oysters: parseNum rounded to an integer ≥ 0 (null stays null) (H4)
function parseCount(v){ var n = parseNum(v); return n == null ? null : Math.max(0, Math.round(n)); }

/* ─────────────────────────────────────────────────────────────────
   PERSISTENCE + STATE (BUILD-SPEC §1, §1.12)
   ───────────────────────────────────────────────────────────────── */

var STORAGE_KEY = 'cageTrackerData';   // KEEP this exact key (back-compat with index-3..6)
var state = null;                       // module global root: {v, farms, activeFarmId}

function freshState(){ return { v:1, farms:[], activeFarmId:null }; }

var EVENT_TYPES = ['stocked','worked','growth','pulled','filled','harvested','note'];
var WORK_METHODS = ['tumbled','washed','desiccated','flipped'];
var SHAPES = ['square','rect','circle'];

// loadState() — one defensive additive read; NEVER throws; backfills every field. (§1.12)
function loadState(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return freshState();
    var d = JSON.parse(raw);
    if (!d || typeof d !== 'object' || !Array.isArray(d.farms)) return freshState();
    d.v = 1;                                   // v stays 1 — every new field is additive
    delete d.photos;                           // never let a photo-inlined backup reach localStorage
    d.farms.forEach(migrateFarm);
    // activeFarmId: fix if dangling
    if (!d.activeFarmId || !d.farms.some(function(f){ return f.id === d.activeFarmId; }))
      d.activeFarmId = d.farms.length ? d.farms[0].id : null;
    return d;
  } catch (e) {
    return freshState();
  }
}

function migrateFarm(f){
  if (!f.id) f.id = uid();                                                  // farm id
  if (typeof f.name !== 'string') f.name = 'My farm';                       // farm name
  if (typeof f.createdAt !== 'number') f.createdAt = Date.now();            // createdAt

  // settings: nest market size + neglect interval; backfill from legacy flat marketSizeMm
  if (!f.settings || typeof f.settings !== 'object') f.settings = {};       // settings object
  if (typeof f.settings.marketSizeMm !== 'number' || !(f.settings.marketSizeMm > 0))
    f.settings.marketSizeMm = (typeof f.marketSizeMm === 'number' && f.marketSizeMm > 0) ? f.marketSizeMm : 76; // marketSizeMm
  if (typeof f.settings.neglectIntervalDays !== 'number' || !(f.settings.neglectIntervalDays > 0))
    f.settings.neglectIntervalDays = (typeof f.alertDays === 'number' && f.alertDays > 0) ? f.alertDays : 56;   // neglectIntervalDays
  delete f.marketSizeMm; delete f.alertDays;

  // cageTypes: array; each meshMm→null unless >0; shape→'square' if not one of three
  if (!Array.isArray(f.cageTypes)) f.cageTypes = [];                        // cageTypes array
  f.cageTypes.forEach(function(t){
    if (!t.id) t.id = uid();                                                // cageType id
    if (typeof t.name !== 'string') t.name = 'Cage';                        // cageType name
    if (SHAPES.indexOf(t.shape) < 0) t.shape = 'square';                    // cageType shape
    if (typeof t.meshMm !== 'number' || !(t.meshMm > 0)) t.meshMm = null;   // meshMm REAL DATA
  });
  if (!f.cageTypes.length) f.cageTypes.push({ id:uid(), name:'Cage', shape:'square', meshMm:null });
  var firstTypeId = f.cageTypes[0].id;

  // grades: array of strings only
  if (!Array.isArray(f.grades)) f.grades = [];                              // grades array
  f.grades = f.grades.filter(function(g){ return typeof g === 'string'; });

  // batches: the provenance ledger
  if (!Array.isArray(f.batches)) f.batches = [];                            // batches ledger
  f.batches.forEach(function(b){ migrateBatch(b); });

  // harvestLog: array
  if (!Array.isArray(f.harvestLog)) f.harvestLog = [];                      // harvestLog array
  f.harvestLog = f.harvestLog.filter(function(e){ return e && typeof e === 'object'; });

  // barge: single object; fold a legacy unplaced batch into a pile (best-effort)
  if (!f.barge || typeof f.barge !== 'object' || ['empty','pile'].indexOf(f.barge.state) < 0){
    f.barge = freshBarge();                                                 // barge default
  }
  if (!Array.isArray(f.barge.events)) f.barge.events = [];
  if (!('batchId' in f.barge)) f.barge.batchId = null;
  if (!('count' in f.barge)) f.barge.count = null;
  if (!('sizeMm' in f.barge)) f.barge.sizeMm = null;
  if (!('grade' in f.barge)) f.barge.grade = null;
  if (!('origin' in f.barge)) f.barge.origin = null;

  // LINES — flatten legacy areas[].sections[]/lines into flat f.lines; drop section/vert/area
  var flatLines = [];
  if (Array.isArray(f.areas)){
    f.areas.forEach(function(area){
      var src = Array.isArray(area.sections) ? area.sections : (Array.isArray(area.lines) ? [{lines:area.lines}] : []);
      src.forEach(function(sec){
        var lns = Array.isArray(sec.lines) ? sec.lines : [];
        lns.forEach(function(l){ flatLines.push(l); });
      });
    });
  }
  if (Array.isArray(f.lines)) flatLines = flatLines.concat(f.lines);        // keep already-flat lines too
  delete f.areas;
  f.lines = flatLines;
  f.lines.forEach(function(l, li){
    if (!l.id) l.id = uid();                                                // line id
    if (typeof l.name !== 'string') l.name = 'Line ' + (li+1);              // line name
    l.order = li;                                                           // explicit flat order (renumber)
    delete l.section; delete l.vert; delete l.pulled;                       // drop legacy hierarchy bits
    if (!Array.isArray(l.cages)) l.cages = [];                              // cages array
    // drop detached "spots" (treat as no cage) — but first rescue any batch a legacy detached-but-filled
    // cage held, so lineage refs still resolve (H2: no silent batch loss on migration)
    l.cages.forEach(function(c){ if (c && c.detached && c.batch){ migrateBatch(c.batch); if (!f.batches.some(function(b){ return b.id === c.batch.id; })) f.batches.push(c.batch); } });
    l.cages = l.cages.filter(function(c){ return c && !c.detached; });
    l.cages.forEach(function(c, ci){
      if (!c.id) c.id = uid();                                              // cage id
      delete c.detached;                                                    // NO detached field
      if (typeof c.typeId !== 'string' || !f.cageTypes.some(function(t){ return t.id === c.typeId; }))
        c.typeId = firstTypeId;                                             // typeId → first type if dangling
      c.label = (li+1) + '-' + (ci+1);                                      // label (cosmetic, regenerated)
      if (c.batch === undefined) c.batch = null;                           // batch (null = EMPTY)
      if (c.batch) migrateBatch(c.batch);
      if (!Array.isArray(c.events)) c.events = [];                          // events timeline
      c.events = c.events.map(function(ev){ return migrateEvent(ev, c.batch ? c.batch.id : null); }).filter(Boolean);
      if (typeof c.currentGrade === 'undefined') c.currentGrade = null;     // currentGrade
      if (!isValidISO(c.workDue)) c.workDue = null;                         // workDue
    });
  });

  // ensure every batch on a cage and on barge is in the ledger
  var ledgerIds = {};
  f.batches.forEach(function(b){ ledgerIds[b.id] = true; });
  f.lines.forEach(function(l){ l.cages.forEach(function(c){
    if (c.batch && !ledgerIds[c.batch.id]){ f.batches.push(c.batch); ledgerIds[c.batch.id] = true; }
  }); });

  // legacy import fallback (older index-6): if batches had an unplaced one, fold first into barge
  if (f.barge.state === 'empty'){
    var unplaced = f.batches.filter(function(b){ return b && b._legacyOnDeck && !b._placed; });
    // (no-op unless a legacy importer set these flags; keeps loader robust)
  }
}

function freshBarge(){ return { state:'empty', batchId:null, count:null, sizeMm:null, grade:null, origin:null, events:[] }; }

function migrateBatch(b){
  if (!b || typeof b !== 'object') return;
  if (!b.id) b.id = uid();                                                  // batch (lineage) id
  if (typeof b.count !== 'number') b.count = (b.count == null ? null : parseNum(b.count)); // count
  // size mirror (legacy initialSizeMm)
  if (typeof b.sizeMm !== 'number'){
    var legacy = (typeof b.initialSizeMm === 'number') ? b.initialSizeMm : parseNum(b.sizeMm);
    b.sizeMm = (typeof legacy === 'number') ? legacy : null;               // sizeMm mirror
  }
  delete b.initialSizeMm;
  if (b.ploidy !== 'diploid' && b.ploidy !== 'triploid') b.ploidy = (b.ploidy === 'diploid' || b.ploidy === 'triploid') ? b.ploidy : null; // ploidy
  if (typeof b.hatchery !== 'string') b.hatchery = (typeof b.source === 'string') ? b.source : ''; // hatchery (legacy source)
  delete b.source;
  if (typeof b.grade !== 'string' && b.grade != null) b.grade = null;       // grade
  if (b.grade === undefined) b.grade = null;
  if (typeof b.notes !== 'string') b.notes = '';                            // notes
  if (!isValidISO(b.stockedDate)) b.stockedDate = isValidISO(b.stockDate) ? b.stockDate : todayISO(); // stockedDate (legacy stockDate)
  delete b.stockDate;
  if (!Array.isArray(b.photoIds)) b.photoIds = [];                          // photoIds
  b.photoIds = b.photoIds.filter(function(p){ return typeof p === 'string'; });
  if (b.origin === undefined) b.origin = null;                              // origin (provenance)
  delete b.prep; delete b.placed; delete b._placed; delete b._legacyOnDeck;
  delete b.events;                                                          // single source of truth = Cage.events
}

// migrateEvent — normalize one event; map legacy types
function migrateEvent(ev, fallbackBatchId){
  if (!ev || typeof ev !== 'object') return null;
  if (!ev.id) ev.id = uid();
  // map legacy types
  if (ev.type === 'harvest') ev.type = 'harvested';
  if (ev.type === 'mortality'){ ev.type = 'note'; if (!ev.note) ev.note = 'Loss recorded'; }
  if (ev.type === 'sort') ev.type = 'note';
  if (EVENT_TYPES.indexOf(ev.type) < 0) ev.type = 'note';
  if (!isValidISO(ev.date)) ev.date = todayISO();
  if (typeof ev.batchId !== 'string') ev.batchId = fallbackBatchId || '';
  if (ev.type === 'worked'){ if (WORK_METHODS.indexOf(ev.method) < 0) ev.method = null; }
  else ev.method = (WORK_METHODS.indexOf(ev.method) >= 0) ? ev.method : null;
  if (typeof ev.sizeMm !== 'number') ev.sizeMm = (ev.sizeMm == null ? null : parseNum(ev.sizeMm));
  if (typeof ev.count !== 'number') ev.count = (ev.count == null ? null : parseNum(ev.count));
  if (typeof ev.note !== 'string' && ev.note != null) ev.note = String(ev.note);
  if (ev.note === undefined) ev.note = null;
  if (!Array.isArray(ev.photoIds)) ev.photoIds = [];
  ev.photoIds = ev.photoIds.filter(function(p){ return typeof p === 'string'; });
  return ev;
}

// save() — serialize whole tree; toast on quota
function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast('Could not save — storage may be full'); }
}
function persist(){ save(); }            // save without re-render

function getFarm(){
  if (!state || !state.activeFarmId) return null;
  for (var i=0; i<state.farms.length; i++) if (state.farms[i].id === state.activeFarmId) return state.farms[i];
  return state.farms.length ? state.farms[0] : null;
}

// commit() — the mutate→save→render loop; bumps commit.seq for seq-guarded undo
function commit(){ commit.seq = (commit.seq || 0) + 1; save(); render(); }
commit.seq = 0;

/* ─────────────────────────────────────────────────────────────────
   TOAST + seq-guarded UNDO (HARVEST-KIT pattern, re-skinned)
   ───────────────────────────────────────────────────────────────── */
// toast(msg, action)  action = {label, onAction}
function toast(msg, action){
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  if (action && action.label){
    t.appendChild(h('button', { class:'undo', onclick:function(){
      t.classList.remove('show'); clearTimeout(toast._t);
      if (action.onAction) action.onAction();
    }}, action.label));
  }
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ t.classList.remove('show'); }, (action && action.label) ? 6000 : 2400);
}
// undoable(msg, doUndo) — snapshots commit.seq; the undo no-ops if a later commit advanced it.
function undoable(msg, doUndo){
  var seqAt = commit.seq;
  toast(msg, { label:'Undo', onAction:function(){
    if (commit.seq !== seqAt) { toast('Too late to undo'); return; }   // a later commit moved on
    doUndo();
  }});
}

/* ─────────────────────────────────────────────────────────────────
   SHEET SYSTEM (§5.4 object-URL revoke hook included)
   ───────────────────────────────────────────────────────────────── */
var sheetBuildFn = null;          // the active build function
var sheetURLs = [];               // object URLs created for this sheet render
function trackURL(u){ sheetURLs.push(u); return u; }

function openSheet(buildFn){
  clearSelection();               // opening a sheet clears any selection (§2.4)
  sheetBuildFn = buildFn;
  renderSheet();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function refreshSheet(){ if (sheetBuildFn) renderSheet(); }
function closeSheet(){
  var ov = document.getElementById('overlay');
  ov.classList.remove('open');
  sheetBuildFn = null;
  document.body.style.overflow = '';
  // revoke this sheet's URLs after the close transition
  setTimeout(function(){ sheetURLs.forEach(function(u){ URL.revokeObjectURL(u); }); sheetURLs = []; }, 260);
  save();                         // persist any transient edits flushed during the sheet
}
function renderSheet(){
  var sheet = document.getElementById('sheet');
  // CHOKE POINT: clear body + revoke prior URLs BEFORE any early return (§5.4)
  sheet.innerHTML = '';
  sheetURLs.forEach(function(u){ URL.revokeObjectURL(u); });
  sheetURLs = [];
  if (!sheetBuildFn) return;
  sheet.scrollTop = 0;
  sheet.appendChild(h('div', { class:'grab' }));
  var content = sheetBuildFn();
  if (content) appendKids(sheet, Array.isArray(content) ? content : [content]);
}
// sheetHead(title, sub) — title + close X (+ optional subtitle).
// Always returns an ARRAY so every caller can `.push`/`.concat` uniformly
// (renderSheet flattens nested arrays via appendKids).
function sheetHead(title, sub){
  var head = h('div', { class:'sheetHead' },
    h('h2', null, title),
    h('button', { class:'closeX', 'aria-label':'Close', html:icon('close', 22), onclick:closeSheet })
  );
  return sub ? [head, h('div', { class:'sheetSub' }, sub)] : [head];
}
// field(label, inputEl, hint) — a labeled form field
function field(labelText, inputEl, hint){
  var kids = [];
  if (labelText) kids.push(h('label', null, labelText));
  kids.push(inputEl);
  if (hint) kids.push(h('div', { class:'fieldHint' }, hint));
  return h('div', null, kids);
}

/* ─────────────────────────────────────────────────────────────────
   STATUS COLORS + glyph generators (re-tokenized to DESIGN §2)
   ───────────────────────────────────────────────────────────────── */
var STATUS_COLORS = { empty:'#C3D2D4', fresh:'#2E9E5B', mid:'#C97A1E', old:'#B4471F' };
var STATUS_INK    = { empty:'#5A7176', fresh:'#1C6E3D', mid:'#8F560F', old:'#7E2F12' };
var RING_COLOR = '#0E7C8B';        // market-ready (teal)
var NEEDS_WORK_COLOR = '#C8341E';  // needs-work (vermilion)

// shapeSVG(shape, fill, ring, size, work) — gear-accurate glyphs, ink-edged. (HARVEST-KIT §2, re-tokenized)
function shapeSVG(shape, fill, ring, size, work){
  size = size || 16;
  var vb, w, ht, body, workRing;
  if (shape === 'circle'){
    // OyGrow cage, top-down — pontoon strip + rounded body + mesh bars + status dot
    vb = '0 0 28 16'; w = Math.round(size*1.3); ht = Math.round(size*0.7);
    body =
      (ring ? '<rect x="0" y="0" width="28" height="16" rx="2.5" fill="none" stroke="'+RING_COLOR+'" stroke-width="3" opacity="0.85"/>' : '') +
      '<rect x="3" y="0.5" width="22" height="3" rx="1.5" fill="var(--cage-float)" stroke="var(--cage-stroke)" stroke-width="0.8"/>' +
      '<rect x="1" y="3.5" width="26" height="12" rx="1.5" fill="'+fill+'" stroke="var(--cage-stroke)" stroke-width="1.2"/>' +
      '<line x1="7.5" y1="4.5" x2="7.5" y2="15" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="14"  y1="4.5" x2="14"  y2="15" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="20.5" y1="4.5" x2="20.5" y2="15" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="2" y1="8"    x2="26" y2="8"    stroke="var(--cage-mesh)" stroke-width="0.5" opacity="0.5"/>' +
      '<line x1="2" y1="11.5" x2="26" y2="11.5" stroke="var(--cage-mesh)" stroke-width="0.5" opacity="0.5"/>' +
      '<circle cx="24" cy="6" r="2" fill="'+fill+'" stroke="var(--cage-stroke)" stroke-width="0.5"/>';
    workRing = work ? '<rect x="0.5" y="0.5" width="27" height="15" rx="2.5" fill="none" stroke="'+NEEDS_WORK_COLOR+'" stroke-width="2" stroke-dasharray="5 3"/>' : '';
  } else if (shape === 'rect'){
    // FlipFarm basket, landscape — center spine + ribs + flip-hinges
    vb = '0 0 28 16'; w = Math.round(size*1.2); ht = Math.round(size*0.6);
    body =
      (ring ? '<rect x="0" y="0" width="28" height="16" rx="2" fill="none" stroke="'+RING_COLOR+'" stroke-width="3" opacity="0.85"/>' : '') +
      '<rect x="2" y="2" width="24" height="12" rx="1.5" fill="'+fill+'" stroke="var(--cage-stroke)" stroke-width="1.2"/>' +
      '<line x1="2" y1="8" x2="26" y2="8" stroke="var(--cage-stroke)" stroke-width="0.9" opacity="0.8"/>' +
      '<line x1="6"  y1="2.5" x2="6"  y2="13.5" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="10" y1="2.5" x2="10" y2="13.5" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="14" y1="2.5" x2="14" y2="13.5" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="18" y1="2.5" x2="18" y2="13.5" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<line x1="22" y1="2.5" x2="22" y2="13.5" stroke="var(--cage-mesh)" stroke-width="0.7" opacity="0.7"/>' +
      '<rect x="0.5" y="6" width="2.5" height="4" rx="1" fill="var(--cage-float)" stroke="var(--cage-stroke)" stroke-width="0.6"/>' +
      '<rect x="25" y="6" width="2.5" height="4" rx="1" fill="var(--cage-float)" stroke="var(--cage-stroke)" stroke-width="0.6"/>';
    workRing = work ? '<rect x="0.6" y="0.6" width="26.8" height="14.8" rx="2" fill="none" stroke="'+NEEDS_WORK_COLOR+'" stroke-width="2" stroke-dasharray="5 3"/>' : '';
  } else {
    // Vexar mesh bag — soft rounded body + mesh dots + tie-off knot
    vb = '0 0 20 14'; w = Math.round(size); ht = Math.round(size*0.7);
    body =
      (ring ? '<rect x="0" y="0" width="20" height="14" rx="5" fill="none" stroke="'+RING_COLOR+'" stroke-width="2.4" opacity="0.85"/>' : '') +
      '<path d="M3 4 Q3 2.5 5 2.5 L15 2.5 Q17 2.5 17 4.5 L17 9 Q17 12 13.5 12 L6.5 12 Q3 12 3 8.5 Z" fill="'+fill+'" stroke="var(--cage-stroke)" stroke-width="1.2"/>' +
      '<circle cx="7"  cy="5.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="10" cy="5.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="13" cy="5.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="7"  cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="10" cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<circle cx="13" cy="8.5" r="0.7" fill="var(--cage-mesh)"/>' +
      '<path d="M9 2.5 Q10 1 11 2.5" fill="none" stroke="var(--cage-stroke)" stroke-width="1"/>';
    workRing = work ? '<path d="M3 4 Q3 2.5 5 2.5 L15 2.5 Q17 2.5 17 4.5 L17 9 Q17 12 13.5 12 L6.5 12 Q3 12 3 8.5 Z" fill="none" stroke="'+NEEDS_WORK_COLOR+'" stroke-width="1.6" stroke-dasharray="4 2.5"/>' : '';
  }
  return '<svg viewBox="'+vb+'" width="'+w+'" height="'+ht+'" preserveAspectRatio="none" aria-hidden="true">'+body+workRing+'</svg>';
}

// pilingSVG(size) — weathered piling, the "line stays" anchor mark. (HARVEST-KIT §2, re-tokenized)
function pilingSVG(size){
  size = size || 26;
  return '<svg viewBox="0 0 14 30" width="14" height="'+size+'" aria-hidden="true">' +
    // fouling band at waterline
    '<rect x="2" y="22" width="10" height="3" rx="1" fill="var(--piling-ring)" opacity="0.85"/>' +
    // cylinder shaft
    '<rect x="3" y="4" width="8" height="22" rx="2" fill="var(--piling)"/>' +
    // left-shadow strip
    '<rect x="3" y="4" width="2.6" height="22" rx="1.3" fill="rgba(0,0,0,.18)"/>' +
    // wood grain
    '<line x1="6"   y1="6" x2="6"   y2="25" stroke="rgba(0,0,0,.20)" stroke-width="0.5"/>' +
    '<line x1="8.5" y1="6" x2="8.5" y2="25" stroke="rgba(0,0,0,.14)" stroke-width="0.5"/>' +
    // top cap ellipse
    '<ellipse cx="7" cy="4" rx="4" ry="1.8" fill="var(--piling-top)" stroke="var(--cage-stroke)" stroke-width="0.5"/>' +
    // mooring ring
    '<circle cx="11" cy="13" r="2" fill="none" stroke="var(--piling-ring)" stroke-width="1"/>' +
    '</svg>';
}

/* ─────────────────────────────────────────────────────────────────
   STATUS / NEEDS-WORK / SIZE / LAST-EVENT helpers (§2.6)
   ───────────────────────────────────────────────────────────────── */
// latestSize(cage) — most recent measured size from growth/stocked events, else batch mirror
function latestSize(cage){
  if (!cage || !cage.batch) return null;
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ev = cage.events[i];
    if ((ev.type === 'growth' || ev.type === 'stocked') && typeof ev.sizeMm === 'number'){
      var ms = isoToMs(ev.date);
      if (ms >= bestMs){ bestMs = ms; best = ev.sizeMm; }
    }
  }
  if (best != null) return best;
  return (typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : null;
}

// lastEvent(cage) — the most recent event by date (ties → later in array wins)
function lastEvent(cage){
  if (!cage || !cage.events || !cage.events.length) return null;
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ms = isoToMs(cage.events[i].date);
    if (ms >= bestMs){ bestMs = ms; best = cage.events[i]; }
  }
  return best;
}

// eventLabel(ev) — past-tense "last thing that happened" label
function eventLabel(ev){
  if (!ev) return '';
  switch (ev.type){
    case 'worked':    return ev.method ? cap(ev.method) : 'Worked';
    case 'growth':    return (typeof ev.sizeMm === 'number') ? ('Grown to ' + ev.sizeMm + ' mm') : 'Growth check';
    case 'stocked':   return 'Filled';
    case 'filled':    return 'Filled from barge';
    case 'pulled':    return 'Pulled';
    case 'harvested': return 'Harvested';
    case 'note':      return 'Note';
  }
  return '';
}
function cap(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// RESETTING event types (any real handling, NOT a bare note) — §1.7
var RESET_TYPES = { stocked:1, worked:1, growth:1, filled:1 };
// lastResettingDate(cage) — most recent resetting event's date, or stockedDate fallback
function lastResettingDate(cage){
  var best = null, bestMs = -Infinity;
  for (var i=0; i<cage.events.length; i++){
    var ev = cage.events[i];
    if (RESET_TYPES[ev.type]){
      var ms = isoToMs(ev.date);
      if (ms >= bestMs){ bestMs = ms; best = ev.date; }
    }
  }
  if (best) return best;
  return (cage.batch && cage.batch.stockedDate) ? cage.batch.stockedDate : null;
}

// needsWork(cage, farm) — §2.6. workDue honored; else neglectIntervalDays; never on a bare note; empty never.
function needsWork(cage, farm){
  if (!cage || !cage.batch) return false;                        // empty cages never need work
  if (isValidISO(cage.workDue)) return todayISO() > cage.workDue;// past due rings; future = no early ring
  var lr = lastResettingDate(cage);
  if (!isValidISO(lr)) return false;
  var d = daysSince(lr);
  return d != null && d > farm.settings.neglectIntervalDays;
}

// cageStatus(cage, farm) — display color/flags; the state bit is cage.batch (§2.6)
function cageStatus(cage, farm){
  if (!cage.batch) return { key:'empty', color:STATUS_COLORS.empty, ink:STATUS_INK.empty, ready:false, needsWork:false };
  var m = monthsSince(cage.batch.stockedDate);
  if (m == null) m = 0;
  var key = m < 6 ? 'fresh' : (m <= 12 ? 'mid' : 'old');
  var size = latestSize(cage);
  var ready = typeof size === 'number' && size >= farm.settings.marketSizeMm;
  return { key:key, color:STATUS_COLORS[key], ink:STATUS_INK[key], ready:ready, needsWork:needsWork(cage, farm) };
}

// cageType(farm, typeId) — resolve a cage's type object
function cageType(farm, typeId){
  for (var i=0; i<farm.cageTypes.length; i++) if (farm.cageTypes[i].id === typeId) return farm.cageTypes[i];
  return farm.cageTypes[0] || { name:'Cage', shape:'square', meshMm:null };
}
// typeLabel(t) — "FlipFarm · 9 mm mesh"
function typeLabel(t){ return t.name + (typeof t.meshMm === 'number' ? ' · ' + t.meshMm + ' mm mesh' : ''); }

/* ─────────────────────────────────────────────────────────────────
   RENDER LOOP (§3.2 + DESIGN §5)
   ───────────────────────────────────────────────────────────────── */
function render(){
  var app = document.getElementById('app');
  app.innerHTML = '';

  // no farms → onboarding
  if (!state || !state.farms.length){
    app.appendChild(buildOnboardingPage());
    hidePopup();
    return;
  }
  var farm = getFarm();

  // top bar
  app.appendChild(renderTopBar(farm));
  // one summary strip
  app.appendChild(renderStatStrip(farm));

  // map well — the worktable
  var well = h('div', { class:'mapwell', id:'mapwell' });
  farm.lines.forEach(function(line){ well.appendChild(renderLine(line, farm)); });
  // + Add line (in flow, no FAB)
  well.appendChild(h('button', { class:'addLine', onclick:function(){ addLine(); } },
    h('span', { html:icon('plus', 18) }), 'Add line'));
  // tap empty chart → deselect + dismiss popup (DESIGN §6)
  well.addEventListener('click', function(e){
    if (e.target === well) clearSelection();
  });
  app.appendChild(well);

  // the barge (signature object)
  app.appendChild(renderBarge(farm));

  // re-sync the popup against the freshly-rendered DOM (Builder 2 owns syncPopup)
  if (typeof syncPopup === 'function') syncPopup();
}

function renderTopBar(farm){
  var multi = state.farms.length > 1;
  var name = h('button', { class:'fname', onclick:function(){ if (multi) openSheet(buildFarmSwitcher); } },
    h('span', { style:{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'} }, farm.name),
    multi ? h('span', { class:'chev', html:icon('chevdown', 18) }) : null
  );
  var menuBtn = h('button', { class:'menuBtn', 'aria-label':'Menu', html:icon('menu', 24),
    onclick:function(){ openSheet(buildMenu); } });
  return h('div', { class:'topbar' }, name, menuBtn);
}

function renderStatStrip(farm){
  var filled = 0, empty = 0, ready = 0, work = 0, oysters = 0, counted = false;
  farm.lines.forEach(function(line){
    line.cages.forEach(function(c){
      if (c.batch){
        filled++;
        if (typeof c.batch.count === 'number'){ oysters += c.batch.count; counted = true; }
        var st = cageStatus(c, farm);
        if (st.ready) ready++;
        if (st.needsWork) work++;
      } else empty++;
    });
  });
  var strip = h('div', { class:'statstrip' });
  function stat(cls, n, label){ return h('span', { class:'st' + (cls ? ' ' + cls : '') },
    h('span', { class:'n' }, n), ' ' + label); }
  strip.appendChild(stat('', counted ? fmtCompact(oysters) : '—', 'oysters'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('', filled, 'filled'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('', empty, 'empty'));
  strip.appendChild(h('span', { class:'sep' }, '·'));
  strip.appendChild(stat('ready', ready, 'ready'));
  if (work > 0){
    strip.appendChild(h('span', { class:'sep' }, '·'));
    strip.appendChild(stat('work', work, 'needs work'));
  }
  return strip;
}

// renderLine(line, farm) — eyebrow + ⋯ menu + pilings each end + CSS rope + the cage strip
function renderLine(line, farm){
  var head = h('div', { class:'lineHead' },
    h('span', { class:'eyebrow' }, line.name),
    h('button', { class:'lineMenu', 'aria-label':'Line options', html:icon('dots', 20),
      onclick:function(){ openSheet(function(){ return buildLineMenu(line); }); } })
  );

  var strip = h('div', { class:'cageStrip', 'data-line-id':line.id });
  strip.appendChild(h('div', { class:'lineRope' }));   // braided rope under the cells
  if (!line.cages.length){
    strip.appendChild(h('div', { class:'emptyLine' }, 'No cages — tap ⋯ to add'));
  } else {
    line.cages.forEach(function(cage, pos){ strip.appendChild(renderCageCell(cage, line, farm, pos)); });
  }

  var body = h('div', { class:'lineBody' },
    h('div', { class:'linePiling left', html:pilingSVG(26) }),
    strip,
    h('div', { class:'linePiling right', html:pilingSVG(26) })
  );

  // hand the strip to the drag-select wiring (Builder 2). Stub is a safe no-op.
  if (typeof denseRangeSelect === 'function') denseRangeSelect(strip, line);

  return h('div', { class:'lineRow', 'data-line-id':line.id }, head, body);
}

// renderCageCell — the dense cell DOM EXACTLY per DESIGN §5. Builder 2 attaches pointer handlers
// WITHOUT restructuring: .cage[data-pos][data-cage-id] > .cellfill(.rdy/.work) > svg, + .clabel, + ::after.
function renderCageCell(cage, line, farm, pos){
  var st = cageStatus(cage, farm);
  var glyphFill = cage.batch ? st.color : STATUS_COLORS.empty;
  var t = cageType(farm, cage.typeId);
  var fillCls = 'cellfill' + (st.ready ? ' rdy' : '') + (st.needsWork ? ' work' : '');
  var fill = h('div', { class:fillCls, html:shapeSVG(t.shape, glyphFill, st.ready, 16, st.needsWork) });
  if (st.needsWork) fill.appendChild(h('span', { class:'workmark', html:icon('wrench', 9) }));

  var cell = h('div', {
    'class':'cage',
    'data-pos':pos,
    'data-cage-id':cage.id
  }, fill, h('span', { class:'clabel' }, cage.label));

  // selection visual reflects selCages (Builder 2 populates it; default empty)
  if (typeof selCages === 'object' && selCages[cage.id]) cell.classList.add('sel');

  return cell;
}

/* ─────────────────────────────────────────────────────────────────
   ADD / REMOVE LINE helpers (used by render + layout)
   ───────────────────────────────────────────────────────────────── */
// addLine() — defaults to ONE line of the same cage count as the last line (or 10), first cage type. Undoable.
function addLine(){
  var farm = getFarm(); if (!farm) return;
  var seqLines = farm.lines;
  var perLine = seqLines.length ? seqLines[seqLines.length-1].cages.length : 10;
  if (!perLine) perLine = 10;
  var typeId = farm.cageTypes[0].id;
  var line = { id:uid(), name:'Line ' + (seqLines.length+1), order:seqLines.length, cages:[] };
  for (var i=0; i<perLine; i++) line.cages.push(newCage(typeId, seqLines.length, i));
  farm.lines.push(line);
  reindexLines(farm);
  commit();
  undoable('Line added', function(){
    var idx = getFarm().lines.indexOf(line);
    if (idx >= 0) getFarm().lines.splice(idx, 1);
    reindexLines(getFarm());
    commit();
  });
}
function newCage(typeId, lineIdx, cageIdx){
  return { id:uid(), typeId:typeId, label:(lineIdx+1)+'-'+(cageIdx+1), batch:null, events:[], currentGrade:null, workDue:null };
}
// reindexLines — fix order + recompute every cage label (cosmetic) after a structural change
function reindexLines(farm){
  farm.lines.forEach(function(l, li){
    l.order = li;
    l.cages.forEach(function(c, ci){ c.label = (li+1) + '-' + (ci+1); });
  });
}

function pileLevel(count){
  if (!count || count <= 0) return 0;
  return Math.min(1, Math.log10(count + 1) / Math.log10(20000));

// bargeOriginText(barge) — short "from Line 1 · 1-2, 1-3" caption
function bargeOriginText(barge){
  var o = barge.origin;
  if (!o) return '';
  var lines = (o.lineNames || []).slice(0, 2);
  var cages = (o.cageLabels || []).slice(0, 4);
  var parts = [];
  if (lines.length) parts.push('from ' + lines.join(', ') + (o.lineNames.length > 2 ? '…' : ''));
  if (cages.length) parts.push(cages.join(', ') + (o.cageLabels.length > 4 ? '…' : ''));
  return parts.join(' · ');
}

// renderBarge(farm) — art + dynamic pile + count pill + origin caption; tap → Harvest sheet
function renderBarge(farm){
  var barge = farm.barge;
  var loaded = barge.state === 'pile';
  var wrap = h('div', { class:'barge ' + (loaded ? 'loaded' : 'empty'),
    'aria-label':'Barge — tap to harvest', role:'button', tabindex:'0',
    html: loaded ? BARGE_LOADED_SVG : BARGE_EMPTY_SVG });

  // count pill / caption
  if (loaded){
    var pillTxt = (barge.count == null) ? 'uncounted' : ('~' + fmtCompact(barge.count));
    wrap.appendChild(h('div', { class:'barge-pill num' }, pillTxt));
    var origin = bargeOriginText(barge);
    if (origin) wrap.appendChild(h('div', { class:'barge-origin' }, origin));
  } else {
    wrap.appendChild(h('div', { class:'barge-empty-cap' }, 'Barge empty'));
  }

  // drive the pile after it mounts (next frame so the SVG <g> exists in DOM)
  if (loaded){
    var lvl = pileLevel(barge.count);
    // apply from the LIVE DOM next frame — a rapid re-render can detach the captured `wrap` (M1)
    requestAnimationFrame(function(){ applyPileLevel(document.querySelector('.barge'), lvl); });
  }

  // tap anywhere on the barge → Harvest sheet (§3.8)
  wrap.addEventListener('click', function(){ openSheet(function(){ return buildHarvestSheet(getFarm()); }); });
  wrap.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openSheet(function(){ return buildHarvestSheet(getFarm()); }); } });
  return wrap;
}

// applyPileLevel — scale the #oysterPile group up from the deck line + gate the depth bands
function applyPileLevel(wrap, lvl){
  if (!wrap) return;
  var pile = wrap.querySelector('#oysterPile');
  if (!pile) return;
  // grow UP from the deck (y≈64), centered at cx=60
  pile.setAttribute('transform', 'translate(60 64) scale(' + (0.55 + 0.6*lvl).toFixed(3) + ') translate(-60 -64)');
  // gate the rows: front always (lvl>0); mid >0.45; back >0.75
  var mid = pile.querySelector('.pileMid'), back = pile.querySelector('.pileBack');
  if (mid)  mid.style.display  = lvl > 0.45 ? '' : 'none';
  if (back) back.style.display = lvl > 0.75 ? '' : 'none';
}

// A transient working model the form edits, then commits.
function blankCageTypes(){ return [{ id:uid(), name:'Cage', shape:'square', meshMm:null }]; }

// buildFarmForm(mode, farm) — mode 'create' (onboarding) or 'edit' (layout). Returns a DOM fragment array.
//   In create mode the form holds its own working state; in edit mode it mutates the active farm directly.
function buildFarmForm(mode, farm){
  var isCreate = mode === 'create';
  // working model
  var model;
  if (isCreate){
    model = { name:'', linesCount:1, cagesPerLine:10, cageTypes:blankCageTypes(),
              grades:[], marketSizeMm:76, neglectIntervalDays:56 };
  } else {
    model = farm;  // edit in place
  }

  var frag = [];

  // ── Farm name ──
  var nameIn = h('input', { type:'text', value:isCreate ? model.name : farm.name, placeholder:'e.g. Brightside Oyster Co.',
    oninput:function(){ if (isCreate) model.name = this.value; else { farm.name = this.value; persist(); } } });
  frag.push(field('Farm name', nameIn));

  // ── Lines / cages (CREATE only — edit mode manages lines via the list below) ──
  if (isCreate){
    var linesIn = h('input', { type:'number', inputmode:'numeric', min:'1', value:model.linesCount,
      oninput:function(){ model.linesCount = Math.max(1, parseNum(this.value) || 1); } });
    var cagesIn = h('input', { type:'number', inputmode:'numeric', min:'1', value:model.cagesPerLine,
      oninput:function(){ model.cagesPerLine = Math.max(1, parseNum(this.value) || 1); } });
    var row = h('div', { class:'row2' }, field('How many lines?', linesIn), field('Cages per line', cagesIn));
    var grp = h('div', null, row, h('div', { class:'fieldHint' }, 'You can add or change these later.'));
    frag.push(grp);
  } else {
    // edit mode: per-line list with rename + remove + per-line cage count
    frag.push(buildLinesEditor(farm));
  }

  // ── Cage types editor ──
  frag.push(buildCageTypesEditor(isCreate ? model : farm, isCreate));

  // ── Grades chip editor ──
  frag.push(buildGradesEditor(isCreate ? model : farm, isCreate));

  // ── Market size ──
  var marketIn = h('input', { type:'number', inputmode:'decimal', min:'1',
    value:isCreate ? model.marketSizeMm : farm.settings.marketSizeMm,
    oninput:function(){ var v = Math.max(1, parseNum(this.value) || 76);
      if (isCreate) model.marketSizeMm = v; else { farm.settings.marketSizeMm = v; persist(); } } });
  frag.push(field('Market size (mm)', marketIn, 'The size you sell at — used to project harvest dates.'));

  // ── Needs-work alert ──
  var alertIn = h('input', { type:'number', inputmode:'numeric', min:'1',
    value:isCreate ? model.neglectIntervalDays : farm.settings.neglectIntervalDays,
    oninput:function(){ var v = Math.max(1, parseNum(this.value) || 56);
      if (isCreate) model.neglectIntervalDays = v; else { farm.settings.neglectIntervalDays = v; persist(); } } });
  frag.push(field('Alert if a cage goes unworked for ___ days', alertIn,
    'We’ll flag a cage that hasn’t been worked in this long.'));

  // ── Actions ──
  if (isCreate){
    frag.push(h('button', { class:'btn btn-primary btn-block', style:{marginTop:'22px'},
      onclick:function(){ createFarmFromModel(model, nameIn); } }, 'Create farm'));
    frag.push(h('div', { style:{textAlign:'center', marginTop:'8px'} },
      h('button', { class:'linkBtn', onclick:function(){ loadBrightsideFarm(); } }, 'Load Brightside demo')));
  } else {
    frag.push(h('button', { class:'btn btn-primary btn-block', style:{marginTop:'22px'},
      onclick:closeSheet }, 'Done'));
  }
  return frag;
}

// createFarmFromModel — build the Farm from the working model, set active, render the map.
function createFarmFromModel(model, nameIn){
  var name = (model.name || (nameIn && nameIn.value) || '').trim() || 'My farm';
  if (!model.cageTypes.length){ toast('Add at least one cage type'); return; }
  var farm = {
    id:uid(), name:name, createdAt:Date.now(),
    cageTypes:model.cageTypes.map(function(t){ return { id:t.id || uid(), name:t.name || 'Cage',
      shape:SHAPES.indexOf(t.shape) < 0 ? 'square' : t.shape,
      meshMm:(typeof t.meshMm === 'number' && t.meshMm > 0) ? t.meshMm : null }; }),
    grades:model.grades.slice(),
    lines:[], barge:freshBarge(), harvestLog:[], batches:[],
    settings:{ marketSizeMm:model.marketSizeMm > 0 ? model.marketSizeMm : 76,
               neglectIntervalDays:model.neglectIntervalDays > 0 ? model.neglectIntervalDays : 56 }
  };
  var typeId = farm.cageTypes[0].id;
  for (var li=0; li<model.linesCount; li++){
    var line = { id:uid(), name:'Line ' + (li+1), order:li, cages:[] };
    for (var ci=0; ci<model.cagesPerLine; ci++) line.cages.push(newCage(typeId, li, ci));
    farm.lines.push(line);
  }
  state.farms.push(farm);
  state.activeFarmId = farm.id;
  closeSheet();
  commit();
  toast('Farm created');
}

// buildCageTypesEditor — rows: name · 3-way shape toggle (glyph preview) · mesh mm; + Add type.
function buildCageTypesEditor(target, isCreate){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Cage types'));
  var list = h('div', { class:'typeList' });

  function renderRows(){
    list.innerHTML = '';
    target.cageTypes.forEach(function(t){
      var nameIn = h('input', { class:'tname', type:'text', value:t.name, placeholder:'e.g. FlipFarm',
        oninput:function(){ t.name = this.value; if (!isCreate) persist(); } });
      var meshIn = h('input', { class:'tmesh num-in', type:'number', inputmode:'decimal', min:'0', placeholder:'mm',
        value:(t.meshMm != null ? t.meshMm : ''),
        oninput:function(){ var v = parseNum(this.value); t.meshMm = (v != null && v > 0) ? v : null; if (!isCreate) persist(); } });
      var toggle = h('div', { class:'shapeToggle' });
      SHAPES.forEach(function(sh){
        var btn = h('button', { class:'sbtn' + (t.shape === sh ? ' on' : ''),
          html:shapeSVG(sh, '#C3D2D4', false, 16, false), 'aria-label':sh,
          onclick:function(){ t.shape = sh; renderRows(); if (!isCreate) persist(); } });
        toggle.appendChild(btn);
      });
      var rm = h('button', { class:'trm', 'aria-label':'Remove type', html:'×',
        onclick:function(){ removeCageType(target, t, isCreate, renderRows); } });
      list.appendChild(h('div', { class:'typeRow' }, nameIn, toggle, meshIn, rm));
    });
  }
  renderRows();
  wrap.appendChild(list);
  wrap.appendChild(h('button', { class:'chip add', style:{marginTop:'10px'},
    onclick:function(){ target.cageTypes.push({ id:uid(), name:'', shape:'square', meshMm:null });
      renderRows(); if (!isCreate) persist(); } }, h('span', { html:icon('plus', 16) }), 'Add type'));
  return wrap;
}

// removeCageType — blocked with a toast if the type is in use (edit mode); always keep ≥1.
function removeCageType(target, t, isCreate, redraw){
  if (target.cageTypes.length <= 1){ toast('Keep at least one cage type'); return; }
  if (!isCreate){
    var inUse = false;
    target.lines.forEach(function(l){ l.cages.forEach(function(c){ if (c.typeId === t.id) inUse = true; }); });
    if (inUse){ toast('That cage type is in use — change those cages first'); return; }
  }
  var idx = target.cageTypes.indexOf(t);
  if (idx >= 0) target.cageTypes.splice(idx, 1);
  redraw();
  if (!isCreate) persist();
}

// buildGradesEditor — chip add/remove for the custom grade vocabulary.
function buildGradesEditor(target, isCreate){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Grades'));
  var chips = h('div', { class:'chips' });
  function renderChips(){
    chips.innerHTML = '';
    target.grades.forEach(function(g, i){
      chips.appendChild(h('span', { class:'chip on' }, g,
        h('button', { class:'x', 'aria-label':'Remove ' + g, html:'×',
          onclick:function(){ target.grades.splice(i, 1); renderChips(); if (!isCreate) persist(); } })));
    });
    var addInput = h('input', { type:'text', placeholder:'Add grade + Enter', style:{flex:'1 1 130px', minWidth:'130px'},
      onkeydown:function(e){ if (e.key === 'Enter'){ e.preventDefault(); var v = this.value.trim();
        if (v && target.grades.indexOf(v) < 0){ target.grades.push(v); renderChips(); if (!isCreate) persist(); } this.value = ''; } } });
    chips.appendChild(addInput);
  }
  renderChips();
  wrap.appendChild(chips);
  return wrap;
}

// buildLinesEditor (edit mode) — list each line with rename + remove; add-line button.
function buildLinesEditor(farm){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Lines'));
  var list = h('div', null);
  function renderLines(){
    list.innerHTML = '';
    farm.lines.forEach(function(l){

      list.appendChild(h('div', { class:'typeRow' }, nameIn, count, rm));
    });
  }
  renderLines();
  wrap.appendChild(list);
  wrap.appendChild(h('button', { class:'chip add', style:{marginTop:'10px'},

// removeLineFromFarm — explicit line delete + renumber (edit mode).
function removeLineFromFarm(farm, line, redraw){
  var idx = farm.lines.indexOf(line);
  if (idx < 0) return;
  farm.lines.splice(idx, 1);
  reindexLines(farm);
  save();
  if (redraw) redraw();
  render();
}

/* ─────────────────────────────────────────────────────────────────
   BRIGHTSIDE DEMO FIXTURE — a realistic farm that visibly exercises
   the map colors, needs-work, projection, and the loaded barge.
   ───────────────────────────────────────────────────────────────── */
function isoDaysAgo(days){
  var ms = isoToMs(todayISO()) - days * 86400000;
  var d = new Date(ms);
  return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate());
}
function loadBrightsideFarm(){
  var flip = { id:uid(), name:'FlipFarm', shape:'rect', meshMm:6 };
  var oygro = { id:uid(), name:'OyGro', shape:'circle', meshMm:9 };
  var vexar = { id:uid(), name:'Vexar bag', shape:'square', meshMm:4 };
  var farm = {
    id:uid(), name:'Brightside Oyster Co.', createdAt:Date.now(),
    cageTypes:[flip, oygro, vexar],
    grades:['Standard','Petite','Jumbo'],
    lines:[], barge:freshBarge(), harvestLog:[], batches:[],
    settings:{ marketSizeMm:76, neglectIntervalDays:56 }
  };

  // batch ages drive the fresh/mid/old color bands; sizes drive ready + projection.
  // recipe: [typeObj, ageDays(stocked), sizeMm, count, ploidy, hatchery, grade, neglectedDays?, growthChecks?]
  var FILL = 1, EMPTY = 0;
  function makeBatch(typeId, ageDays, sizeMm, count, ploidy, hatchery, grade){
    return { id:uid(), count:count, sizeMm:sizeMm, ploidy:ploidy, hatchery:hatchery, grade:grade || null,
      notes:'', stockedDate:isoDaysAgo(ageDays), photoIds:[], origin:null };
  }
  // build a line of `n` cages from a plan function planFn(i) → cage spec or null(empty)
  function buildLine(name, type, n, planFn){
    var li = farm.lines.length;
    var line = { id:uid(), name:name, order:li, cages:[] };
    for (var i=0; i<n; i++){
      var cage = newCage(type.id, li, i);
      var spec = planFn(i);
      if (spec){
        var b = makeBatch(type.id, spec.age, spec.size, spec.count, spec.ploidy || 'triploid', spec.hatch || 'Grand Isle Hatchery', spec.grade);
        cage.batch = b;
        farm.batches.push(b);
        // stocked event
        cage.events.push({ id:uid(), type:'stocked', date:b.stockedDate, batchId:b.id, method:null,
          sizeMm:spec.startSize || 15, count:b.count, note:null, photoIds:[] });
        // a growth check partway (so a couple cages have observed rate + recent measurement)
        if (spec.checkAge != null){
          cage.events.push({ id:uid(), type:'growth', date:isoDaysAgo(spec.checkAge), batchId:b.id, method:null,
            sizeMm:spec.size, count:null, note:null, photoIds:[] });
        }
        // a work event so the neglect timer is sensible unless we WANT it overdue
        if (spec.workedAge != null){
          cage.events.push({ id:uid(), type:'worked', date:isoDaysAgo(spec.workedAge), batchId:b.id,
            method:spec.method || 'tumbled', sizeMm:null, count:null, note:null, photoIds:[] });
        }
        if (spec.workDue) cage.workDue = spec.workDue;
      }
      line.cages.push(cage);
    }
    farm.lines.push(line);
    return line;
  }

  // Line 1 — young FlipFarm seed, mostly filled, fresh green, recently worked
  buildLine('Line 1', flip, 10, function(i){
    if (i >= 8) return null;                       // last two empty
    return { age:70, startSize:14, size:28, count:1800, checkAge:5, workedAge:6, method:'tumbled' };
  });
  // Line 2 — mid-age OyGro, copper band; one cage overdue for work (needs-work ring)
  buildLine('Line 2', oygro, 9, function(i){
    if (i === 4) return null;
    var s = { age:240, startSize:15, size:58, count:1400, checkAge:20, workedAge:30, method:'washed' };
    if (i === 1){ s.workedAge = 80; s.checkAge = 80; }   // overdue → needs work
    return s;
  });
  // Line 3 — old, market-ready Jumbos (teal ready edge), counted
  buildLine('Line 3', oygro, 8, function(i){
    if (i >= 6) return null;
    return { age:400, startSize:16, size:82, count:900, ploidy:'diploid', grade:'Jumbo', checkAge:8, workedAge:10, method:'flipped' };
  });
  // Line 4 — mixed: some filled Vexar bags, some empty (for fill/pull demos)
  buildLine('Line 4', vexar, 10, function(i){
    if (i % 2 === 0) return null;                  // every other empty
    return { age:150, startSize:15, size:46, count:2200, checkAge:14, workedAge:18, method:'desiccated' };
  });
  // Line 5 — all empty (a clean line to fill from the barge)
  buildLine('Line 5', flip, 8, function(){ return null; });
  // Line 6 — young triploid, uncounted batch (tests "uncounted" + null-size projection copy)
  buildLine('Line 6', vexar, 7, function(i){
    if (i >= 5) return null;
    return { age:55, startSize:14, size:null, count:null, workedAge:4, method:'tumbled' };
  });

  // Put a pile on the barge so the loaded art + count pill show immediately.
  var pileBatch = makeBatch(oygro.id, 30, 60, 3200, 'triploid', 'Grand Isle Hatchery', 'Standard');
  pileBatch.origin = { parentBatchIds:[], cageLabels:['2-3','2-5'], lineNames:['Line 2'], pulledDate:isoDaysAgo(1) };
  farm.batches.push(pileBatch);
  farm.barge = { state:'pile', batchId:pileBatch.id, count:3200, sizeMm:60, grade:'Standard',
    origin:{ parentBatchIds:[pileBatch.id], cageLabels:['2-3','2-5'], lineNames:['Line 2'], pulledDate:isoDaysAgo(1) },
    events:[{ id:uid(), type:'pulled', date:isoDaysAgo(1), batchId:pileBatch.id, method:null, sizeMm:60, count:3200, note:null, photoIds:[] }] };

  // a couple of prior harvests for the log
  farm.harvestLog.push({ id:uid(), date:isoDaysAgo(12), count:2400, grade:'Jumbo', sizeMm:80,
    origin:{ parentBatchIds:[], cageLabels:['3-1','3-2'], lineNames:['Line 3'], pulledDate:isoDaysAgo(13) }, note:'Restaurant order' });
  farm.harvestLog.push({ id:uid(), date:isoDaysAgo(34), count:1800, grade:'Standard', sizeMm:78,
    origin:{ parentBatchIds:[], cageLabels:['3-3'], lineNames:['Line 3'], pulledDate:isoDaysAgo(35) }, note:null });

  state.farms.push(farm);
  state.activeFarmId = farm.id;
  closeSheet();
  commit();
  toast('Loaded Brightside demo');
}

function removeLineWithUndo(farm, line){
  var idx = farm.lines.indexOf(line);
  if (idx < 0) return;
  var snapshot = line;
  farm.lines.splice(idx, 1);
  reindexLines(farm);
  closeSheet();

  undoable('Line removed', function(){
    var f = getFarm();
    f.lines.splice(Math.min(idx, f.lines.length), 0, snapshot);

    commit();

function exportData(){

  var blob = new Blob([json], { type:'application/json' });

  var d = new Date();
  var dateStr = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
  var a = h('a', { href:url, download:'spatmap-backup-' + dateStr + '.json' });
