/* ── CSV EXPORTS (v3) — records a farmer can hand a buyer or an inspector. ── */
function csvCell(v){
  if (v == null) return '';
  var s = String(v);
  // Neutralize spreadsheet formula injection: a value starting with = + - @ (or tab/CR) is treated
  // as a formula by Excel/Sheets/Numbers. These records go to buyers/inspectors — prefix a quote.
  if (/^[=+\-@\t\r]/.test(s)) s = "'" + s;
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function csvText(rows){ return rows.map(function(r){ return r.map(csvCell).join(','); }).join('\r\n'); }
function downloadText(filename, text, mime){
  var blob = new Blob([text], { type:(mime || 'text/plain') + ';charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = h('a', { href:url, download:filename });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}
function exportDateStamp(){ var d = new Date(); return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()); }

// Stock-on-hand: one row per stocked cage, with est. value where a price is set.
function exportStockCSV(){
  var farm = getFarm(); if (!farm){ toast('No farm'); return; }
  var rows = [['Line','Cage','Type','Mesh (mm)','Count','Grade','Size (mm)','Stocked','Months in water','Market ready','Est $']];
  var any = false;
  farm.lines.forEach(function(line){
    line.cages.forEach(function(cage){
      if (!cage.batch) return;
      any = true;
      var t = cageType(farm, cage.typeId);
      var sz = latestSize(cage);
      var months = monthsSince(cage.batch.stockedDate);
      var price = (typeof priceForGrade === 'function') ? priceForGrade(farm, cage.batch.grade) : null;
      var est = (price != null && cage.batch.count != null) ? (price * cage.batch.count).toFixed(2) : '';
      rows.push([ line.name || '', cage.label || '', (t ? t.name : ''),
        (t && typeof t.meshMm === 'number' ? t.meshMm : ''),
        (cage.batch.count != null ? cage.batch.count : ''), cage.batch.grade || '',
        (typeof sz === 'number' ? sz : ''), cage.batch.stockedDate || '',
        (months != null ? Math.round(months) : ''), (cageStatus(cage, farm).ready ? 'yes' : 'no'), est ]);
    });
  });
  if (!any){ toast('Nothing stocked to export'); return; }
  downloadText('spatmap-stock-' + exportDateStamp() + '.csv', csvText(rows), 'text/csv');
  toast('Stock-on-hand exported');
}

// Harvest log: one row per harvest entry off the barge.
function exportHarvestCSV(){
  var farm = getFarm(); if (!farm){ toast('No farm'); return; }
  var log = farm.harvestLog || [];
  if (!log.length){ toast('No harvests to export yet'); return; }
  var rows = [['Date','Count','Grade','Size (mm)','From lines','Note']];
  log.slice().sort(function(a,b){ return (isoToMs(a.date)||0) - (isoToMs(b.date)||0); }).forEach(function(e){
    var lines = (e.origin && e.origin.lineNames && e.origin.lineNames.length) ? e.origin.lineNames.join('; ') : '';
    rows.push([ e.date || '', (e.count != null ? e.count : ''), e.grade || '',
      (typeof e.sizeMm === 'number' ? e.sizeMm : ''), lines, e.note || '' ]);
  });
  downloadText('spatmap-harvests-' + exportDateStamp() + '.csv', csvText(rows), 'text/csv');
  toast('Harvest log exported');
}

// triggerImport — hidden file input + scary confirm; strips photos before localStorage; reloads state.
function triggerImport(){
  var input = h('input', { type:'file', accept:'application/json,.json', style:{display:'none'} });
  input.addEventListener('change', function(){
    var file = input.files && input.files[0];
    if (!file){ document.body.removeChild(input); return; }
    var reader = new FileReader();
    reader.onload = function(){
      var data;
      try { data = JSON.parse(reader.result); } catch (e){ toast('That file is not valid JSON'); cleanup(); return; }
      if (!data || typeof data !== 'object' || !Array.isArray(data.farms)){ toast('That file is not a SpatMap backup'); cleanup(); return; }
      if (!window.confirm('Import REPLACES all current data on this device. This cannot be undone. Continue?')){ cleanup(); return; }
      var photos = Array.isArray(data.photos) ? data.photos : null;   // hold photos aside
      delete data.photos;                                             // CRITICAL: never to localStorage
      // Dry-run migrate a deep clone FIRST: a shaped-but-corrupt backup throws here, before we
      // overwrite the good data on disk. (audit F4 / C2 — import could silently destroy all data)
      try { JSON.parse(JSON.stringify(data)).farms.filter(Boolean).forEach(migrateFarm); }
      catch (err){ toast('That backup looks corrupted — nothing was changed'); cleanup(); return; }
      // Snapshot the current data to a recovery key. loadState() falls back to it on boot if the main
      // blob ever goes missing/corrupt, so a bad import (or a later corruption) isn't an empty-farm dead end.
      var prevBlob = null;
      try { prevBlob = localStorage.getItem(STORAGE_KEY); } catch (e){}
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e){ toast('Could not save imported data — too large?'); cleanup(); return; }
      if (prevBlob != null){ try { localStorage.setItem(STORAGE_KEY + ':prev', prevBlob); } catch (e){} }
      state = loadState();
      closeSheet();
      commit();
      if (photos && photos.length && typeof restoreImportedPhotos === 'function'){
        restoreImportedPhotos(photos);   // Builder 3 restores blobs + sweeps
      } else {
        toast('Backup imported');
      }
      cleanup();
    };
    reader.onerror = function(){ toast('Could not read that file'); cleanup(); };
    reader.readAsText(file);
    function cleanup(){ if (input.parentNode) document.body.removeChild(input); }
  });
  document.body.appendChild(input);
  input.click();
}

/* ═══════════════════════════════════════════════════════════════════
   STUBS — Builder 2 (selection/popup/actions/detail/projection) and
   Builder 3 (IndexedDB photos) implement these. Defined here so every
   call resolves; safe no-ops until replaced.
   ═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   BUILDER 2 — selection · popup · action flows · cage detail · growth
   ═══════════════════════════════════════════════════════════════════ */

/* ── selection store + clear (clearSelection/removeDragBands/hidePopup
      are foundation helpers other code calls; keep them exact) ──────── */
var selCages = {};                                   // selection store, keyed by cage id
// BATCH-SPLIT: which tub sub-batch the next Fill should draw from (null = remainder pool / new-seed path).
// NOT persisted in farm state — a transient UI selection only.
var activeFillSplitId = null;
function setActiveFillSplit(id){ activeFillSplitId = id || null; }
function clearSelection(){
  selCages = {};
  // BATCH-SPLIT: do NOT drop the armed tub batch here. A fresh DRAG to select the fill targets calls
  // clearSelection() on its first cross-cell move (denseRangeSelect), so clearing the arm here would
  // disarm the batch mid-drag and break "tap a batch → drag-select empty cages → Fill". The arm is a
  // standing intent; it's cleared only when the split is consumed (fillFromBarge), the tub is cleared
  // (clearBarge), or the farmer arms a different batch. A stale arm is harmless — every Fill path
  // re-checks bargeSplitById() and falls through to the pool / new-seed when the split is gone.
  hidePopup();
  // de-select any rendered cells without a full re-render
  var sel = document.querySelectorAll('.cage.sel');
  for (var i=0; i<sel.length; i++) sel[i].classList.remove('sel');
  removeDragBands();
}
function removeDragBands(){ var b = document.querySelectorAll('.dragBand'); for (var i=0;i<b.length;i++) b[i].parentNode && b[i].parentNode.removeChild(b[i]); }
function hidePopup(){ var m = document.getElementById('popupMount'); if (m) m.innerHTML = ''; }

/* ── cage / line lookup helpers (no foundation equivalent) ─────────── */
function cageById(id){
  var farm = getFarm(); if (!farm) return null;
  for (var i=0; i<farm.lines.length; i++){
    var cs = farm.lines[i].cages;
    for (var j=0; j<cs.length; j++) if (cs[j].id === id) return cs[j];
  }
  return null;
}
function lineOfCage(id){
  var farm = getFarm(); if (!farm) return null;
  for (var i=0; i<farm.lines.length; i++){
    var cs = farm.lines[i].cages;
    for (var j=0; j<cs.length; j++) if (cs[j].id === id) return farm.lines[i];
  }
  return null;
}
// selectedCages() — resolve selCages keys to live cage objects (skips any gone after re-render)
function selectedCages(){
  var out = [];
  for (var id in selCages){ if (selCages[id]){ var c = cageById(id); if (c) out.push(c); } }
  return out;
}
function selectedIds(){ var a = []; for (var id in selCages){ if (selCages[id]) a.push(id); } return a; }

/* ── toggle one cage's selection (used by tap + drag) ──────────────── */
function toggleCage(id, on){
  if (on) selCages[id] = true; else delete selCages[id];
  var el = document.querySelector('.cage[data-cage-id="' + id + '"]');
  if (el) el.classList.toggle('sel', !!on);
}

/* ── denseRangeSelect(strip, line) — pointerdown→move→up drag-select.
      §2.4 + HARVEST-KIT §4. Cells carry data-pos + data-cage-id;
      touch-action:pan-y is on .cage so vertical scroll still works. ── */
function denseRangeSelect(strip, line){
  if (!strip) return;
  var cells = strip.querySelectorAll('.cage');
  if (!cells.length) return;

  var dragging = false, moved = false, startPos = -1, cleared = false, band = null, activeId = null;

  function cellAt(clientX, clientY){
    var el = document.elementFromPoint(clientX, clientY);
    while (el && el !== document.body){
      if (el.classList && el.classList.contains('cage') && el.parentNode === strip) return el;
      el = el.parentNode;
    }
    return null;
  }
  function posOf(cell){ return cell ? (parseInt(cell.getAttribute('data-pos'), 10) || 0) : -1; }

  // A drag draws a fresh contiguous range on THIS line: select [lo..hi], deselect every other cell on
  // the strip. Authoritative per-strip (so dragging out then back in shrinks correctly, not just grows).
  // The cross-line wipe happens once at gesture start (onMove → clearSelection), so this only owns its strip.
  function paintRange(lo, hi){
    if (lo > hi){ var t = lo; lo = hi; hi = t; }
    for (var i=0; i<cells.length; i++){
      var p = posOf(cells[i]);
      var id = cells[i].getAttribute('data-cage-id');
      var on = (p >= lo && p <= hi);
      if (on) selCages[id] = true; else delete selCages[id];
      cells[i].classList.toggle('sel', on);
    }
    drawBand(lo, hi);
  }
  function drawBand(lo, hi){
    if (band && band.parentNode) band.parentNode.removeChild(band);
    var first = null, last = null;
    for (var i=0; i<cells.length; i++){ var p = posOf(cells[i]); if (p === lo) first = cells[i]; if (p === hi) last = cells[i]; }
    if (!first || !last) return;
    var sr = strip.getBoundingClientRect();
    var fr = first.getBoundingClientRect(), lr = last.getBoundingClientRect();
    band = h('div', { class:'dragBand' });
    band.style.left  = (Math.min(fr.left, lr.left) - sr.left) + 'px';
    band.style.width = (Math.max(fr.right, lr.right) - Math.min(fr.left, lr.left)) + 'px';
    strip.appendChild(band);
  }
  function removeBand(){ if (band && band.parentNode) band.parentNode.removeChild(band); band = null; }

  function onDown(e){
    if (e.button != null && e.button !== 0) return;        // primary button / touch only
    var cell = cellAt(e.clientX, e.clientY);
    if (!cell) return;
    dragging = true; moved = false; cleared = false;
    startPos = posOf(cell);
    activeId = cell.getAttribute('data-cage-id');
    if (e.pointerId != null && strip.setPointerCapture){ try { strip.setPointerCapture(e.pointerId); } catch (err){} }
  }
  function onMove(e){
    if (!dragging) return;
    var cell = cellAt(e.clientX, e.clientY);
    var p = cell ? posOf(cell) : startPos;
    if (p !== startPos) moved = true;
    if (!moved){ return; }                                 // not a drag yet — leave it to the click handler
    e.preventDefault();                                    // we own the horizontal gesture now
    // A fresh drag REPLACES the whole selection: wipe every cage (this line and all others) once, then
    // paint this drag's range. Stops selections silently piling up across lines (Philip's "doesn't work" ask).
    if (!cleared){ clearSelection(); cleared = true; }
    paintRange(startPos, p);
    // rAF-coalesce the reposition: pointermove can outrun paint, and syncPopup() reads getBoundingClientRect
    // per selected cell — on a long line that's layout thrash every frame. (audit F12/H2-perf)
    if (typeof syncPopupThrottled === 'function') syncPopupThrottled();
  }
  function onUp(e){
    if (!dragging) return;
    dragging = false;
    if (e.pointerId != null && strip.releasePointerCapture){ try { strip.releasePointerCapture(e.pointerId); } catch (err){} }
    removeBand();
    if (moved){
      // a real drag happened → suppress the synthetic click so it can't open a sheet (§2.4)
      suppressNextClick();
      renderPopup(getFarm());
      if (typeof syncPopup === 'function') syncPopup();
    }
    // a non-moved pointer is a tap → handled by the click listener below
  }

  strip.addEventListener('pointerdown', onDown);
  strip.addEventListener('pointermove', onMove);
  strip.addEventListener('pointerup', onUp);
  strip.addEventListener('pointercancel', function(){ if (moved) suppressNextClick(); dragging = false; removeBand(); });

  // TAP a cage → toggle it; rebuild + position the popup (§2.4)
  strip.addEventListener('click', function(e){
    if (clickSuppressed) return;
    var cell = cellAt(e.clientX, e.clientY);
    if (!cell) return;
    var id = cell.getAttribute('data-cage-id');
    toggleCage(id, !selCages[id]);
    renderPopup(getFarm());
    if (typeof syncPopup === 'function') syncPopup();
  });
}

// one-shot capture-phase click suppressor (400ms fallback) so a drag's click can't open a sheet
var clickSuppressed = false;
function suppressNextClick(){
  clickSuppressed = true;
  var done = false;
  function release(e){
    if (done) return; done = true;
    if (e){ e.stopPropagation(); e.preventDefault(); }
    document.removeEventListener('click', cap, true);
    clearTimeout(tid);
    setTimeout(function(){ clickSuppressed = false; }, 0);
  }
  function cap(e){ if (e && e.target && e.target.closest && !e.target.closest('.cage')){ return; } release(e); } // only suppress a click landing on a cage (M2)
  document.addEventListener('click', cap, true);
  var tid = setTimeout(function(){ done = true; document.removeEventListener('click', cap, true); clickSuppressed = false; }, 400);
}

// Tap off the selected cages (anywhere that isn't a cage or the popup) → clear the selection (Philip's ask).
// The clickable cells are laid out inside a .cageStrip flex container whose transparent gaps/rope (and the
// .cage::after tap pad) mean a single click that lands ON a cell often reports e.target === the .cageStrip
// div, not the .cage. Treating that as "off" cleared the just-made selection before the popup could open
// (Bug B2). So an interior click anywhere on a line's strip (.cageStrip) — or the popup — is NOT "off".
// A genuine empty-water click (the .mapwell background, outside any strip) still falls through and clears.
document.addEventListener('click', function(e){
  if (clickSuppressed) return;                                          // ignore a drag's synthetic click
  if (!selectedIds().length) return;                                    // nothing selected → nothing to clear
  if (e.target && e.target.closest && e.target.closest('.cage, .cellfill, .cageStrip, .popup')) return; // inside a line/popup isn't "off"
  clearSelection();
});

/* ── renderPopup(farm) — the contextual action popup (§2.5 matrix +
      §10 pin 1 "Open ›"). Built into #popupMount; positioned by
      syncPopup() out-of-band so dragging stays smooth. ─────────────── */
// popupCageFacts(farm, cage) — the at-a-glance facts for a single selected filled cage:
// number of oysters, cage type (+ mesh), oyster size, and the date it was put in. (owner ask)
function popupCageFacts(farm, cage){
  var b = cage.batch;
  var t = cageType(farm, cage.typeId);
  var sz = latestSize(cage);
  var cnt = (b && b.count != null) ? fmtCompact(b.count) : '—';
  // last action done to this cage (owner ask): newest event, past-tense label + date
  var le = lastEvent(cage);
  var leLbl = le ? eventLabel(le) : '';   // '' for an unknown/imported type → fall through to '—' (no orphan "· date")
  var lastTxt = (le && leLbl && isValidISO(le.date)) ? (leLbl + ' · ' + monthDay(le.date)) : '—';
  var rows = [
    ['Oysters', cnt],
    ['Cage',    t ? typeLabel(t) : 'Cage'],
    ['Size',    (typeof sz === 'number') ? (sz + ' mm') : '—'],
    ['Put in',  (b && isValidISO(b.stockedDate)) ? monthDay(b.stockedDate) : '—'],
    ['Last',    lastTxt]
  ];
  var wrap = h('div', { class:'popFacts' });
  rows.forEach(function(r){
    wrap.appendChild(h('div', { class:'pf' },
      h('span', { class:'pf-k' }, r[0]),
      h('span', { class:'pf-v' + (r[1] === '—' ? ' muted' : '') }, r[1])));
  });
  return wrap;
}

function renderPopup(farm){
  var mount = document.getElementById('popupMount');
  if (!mount) return;
  mount.innerHTML = '';
  farm = farm || getFarm();
  if (!farm) return;
  var sel = selectedCages();
  if (!sel.length) return;

  var allFilled = true, allEmpty = true, i;
  for (i=0; i<sel.length; i++){ if (sel[i].batch) allEmpty = false; else allFilled = false; }
  var bargeHasPile = bargeHasContent(farm.barge);
  var n = sel.length;

  var pop = h('div', { class:'popup' });

  // §10 pin 1 — exactly one cage selected → tappable "Open 1-3 ›" row above the buttons
  if (n === 1){
    var only = sel[0];
    pop.appendChild(h('button', { class:'openRow', onclick:function(){
      openSheet(function(){ return buildCageDetail(only); });
    } }, 'Open ' + only.label, h('span', { html:icon('chevron', 16) })));
  }

  if (!allFilled && !allEmpty){
    // mixed → label only, no buttons (§2.5)
    pop.appendChild(h('div', { class:'lbl' }, 'Mixed selection — pick all-filled or all-empty'));
    mount.appendChild(pop);
    syncPopup();
    return;
  }

  var row = h('div', { class:'row' });
  if (allFilled){
    // single filled cage → show its facts (oysters / cage type / size / date put in); many → just a count
    if (n === 1 && sel[0].batch) pop.appendChild(popupCageFacts(farm, sel[0]));
    else pop.appendChild(h('div', { class:'lbl' }, n + (n === 1 ? ' filled cage' : ' filled cages')));
    row.appendChild(h('button', { class:'pbtn pull', onclick:function(){ pullSelectedCages(selectedIds()); } }, 'Pull'));
    row.appendChild(h('button', { class:'pbtn work', onclick:function(){
      var ids = selectedIds(); openSheet(function(){ return buildWorkSheet(ids); });
    } }, 'Work'));
  } else { // allEmpty
    // BATCH-SPLIT: the Fill source is (1) the active tub batch if one is chosen, else (2) the remainder
    // pool, else (3) the harvest sheet (so the farmer can pick a batch) if splits exist but none chosen,
    // else (4) new seed.
    var bg = getFarm().barge;
    var activeSplit = activeFillSplitId ? bargeSplitById(bg, activeFillSplitId) : null;
    var fillHint;
    if (activeSplit) fillHint = ' · ' + (activeSplit.label || ((activeSplit.sizeMm ? activeSplit.sizeMm + 'mm ' : '') + 'batch'));
    else if (bg.state === 'pile') fillHint = ' · distribute';
    else if (bg.splits.length) fillHint = ' · pick a batch';
    else fillHint = ' · new seed';
    pop.appendChild(h('div', { class:'lbl' }, n + (n === 1 ? ' empty cage' : ' empty cages') + fillHint));
    row.appendChild(h('button', { class:'pbtn fill', onclick:function(){
      var ids = selectedIds();
      var b = getFarm().barge;
      if (activeFillSplitId && bargeSplitById(b, activeFillSplitId)) fillFromBarge(ids, activeFillSplitId);
      else if (activeFillSplitId){ setActiveFillSplit(null); toast('That batch is gone — pick again'); openSheet(function(){ return buildHarvestSheet(getFarm()); }); }   // armed split vanished (undo/clear) — don't silently fill remainder
      else if (b.state === 'pile') fillFromBarge(ids);
      else if (b.splits.length){ toast('Pick a batch in the tub first'); openSheet(function(){ return buildHarvestSheet(getFarm()); }); }
      else openSheet(function(){ return buildFillSeedForm(ids); });
    } }, 'Fill'));
    // Remove only when exactly one empty cage is selected (§2.5)
    if (n === 1){
      row.appendChild(h('button', { class:'pbtn remove', onclick:function(){ removeCages(selectedIds()); } }, 'Remove'));
    }
  }
  pop.appendChild(row);
  mount.appendChild(pop);
  syncPopup();
}

/* ── syncPopup() — position the popup above the topmost selected cell,
      caret down, clamped to the viewport (HARVEST-KIT §4). No re-render. */
function syncPopup(){
  var mount = document.getElementById('popupMount');
  if (!mount) return;
  var pop = mount.firstChild;
  if (!pop){ return; }
  var picks = document.querySelectorAll('.cage.sel');
  if (!picks.length){ mount.innerHTML = ''; return; }
  var minTop = Infinity, maxBottom = -Infinity, sumLeft = 0, cnt = 0;
  for (var i=0; i<picks.length; i++){
    var r = picks[i].getBoundingClientRect();
    if (r.top < minTop) minTop = r.top;
    if (r.bottom > maxBottom) maxBottom = r.bottom;
    sumLeft += r.left + r.width/2; cnt++;
  }
  var popH = pop.offsetHeight || 80, popW = pop.offsetWidth || 200, avgLeft = sumLeft / cnt;
  // park above the selection; if that would collide with the sticky top bar (top-row cages),
  // flip BELOW the selection and point the caret up (§ polish — dogfood: popup ate the top bar)
  var tb = document.querySelector('.topbar');
  var topGuard = (tb ? tb.getBoundingClientRect().bottom : 0) + 6;
  var aboveTop = minTop - popH - 14;
  if (aboveTop < topGuard){
    pop.classList.add('below');
    pop.style.top = Math.min(window.innerHeight - popH - 8, maxBottom + 14) + 'px';
  } else {
    pop.classList.remove('below');
    pop.style.top = aboveTop + 'px';
  }
  pop.style.left = Math.max(8 + popW/2, Math.min(avgLeft, window.innerWidth - popW/2 - 8)) + 'px';
}

// keep the popup glued to its cells on scroll/resize while a selection exists (rAF-throttled — M2)
var _syncRAF = 0;
function syncPopupThrottled(){ if (_syncRAF) return; _syncRAF = requestAnimationFrame(function(){ _syncRAF = 0; if (selectedIds().length) syncPopup(); }); }
window.addEventListener('resize', syncPopupThrottled);
window.addEventListener('scroll', syncPopupThrottled, true);

/* ═══════════════════════════════════════════════════════════════════
   ACTION FLOWS — every mutation goes through commit() + offers Undo.
   One source of truth = Cage.events[]; every batch is added to farm.batches.
   ═══════════════════════════════════════════════════════════════════ */

// newBatch — a fresh Batch object (lineage id). origin null = fresh seed.
function newBatch(fields){
  return {
    id: uid(),
    count:      (fields.count != null ? fields.count : null),
    sizeMm:     (fields.sizeMm != null ? fields.sizeMm : null),
    ploidy:     fields.ploidy || null,
    hatchery:   fields.hatchery || '',
    grade:      (fields.grade != null ? fields.grade : null),
    notes:      fields.notes || '',
    stockedDate: fields.stockedDate || todayISO(),
    photoIds:   Array.isArray(fields.photoIds) ? fields.photoIds.slice() : [],
    origin:     fields.origin || null
  };
}
// newEvent — a timeline Event tagged by batchId
function newEvent(type, batchId, fields){
  fields = fields || {};
  return {
    id: uid(), type:type, date: fields.date || todayISO(), batchId: batchId || '',
    method: (fields.method != null ? fields.method : null),
    sizeMm: (fields.sizeMm != null ? fields.sizeMm : null),
    count:  (fields.count  != null ? fields.count  : null),
    pct:    (fields.pct    != null ? fields.pct    : null),
    reason: (fields.reason != null ? fields.reason : null),
    note:   (fields.note   != null ? fields.note   : null),
    photoIds: Array.isArray(fields.photoIds) ? fields.photoIds.slice() : []
  };
}

/* ── §3.4 — Fill new seed. Each selected cage gets its OWN Batch
      (own lineage id) with the SAME form values; a `stocked` event. ── */
function fillNewSeed(cageIds, values){
  var farm = getFarm(); if (!farm) return;
  var date = isValidISO(values.date) ? values.date : todayISO();
  // B1/B2: one STABLE cohort id per fill ACTION — every cage filled in this call shares it, so a later
  // growth log (which mutates batch.sizeMm) can't re-key a bag, and a SEPARATE fill (its own id) never
  // merges with this one even when the form values are identical. Additive field; does NOT bump state.v.
  var cohortId = uid();
  var made = [];
  cageIds.forEach(function(id){
    var cage = cageById(id); if (!cage || cage.batch) return;     // only fill empties
    var batch = newBatch({
      count: values.count, sizeMm: values.sizeMm, ploidy: values.ploidy,
      hatchery: values.hatchery, grade: cage.currentGrade || null,
      notes: values.notes, stockedDate: date,
      photoIds: values.photoIds, origin: null
    });
    batch.seedCohortId = cohortId;                                // stable per-seed-event identity
    cage.batch = batch;
    farm.batches.push(batch);
    cage.events.push(newEvent('stocked', batch.id, {
      date: date, sizeMm: values.sizeMm, count: values.count, note: values.notes || null,
      photoIds: values.photoIds
    }));
    cage.workDue = null;                                          // a fresh stock resets any reminder
    made.push({ cage:cage, batch:batch });
  });
  if (!made.length){ toast('Nothing to fill'); return; }
  closeSheet();
  clearSelection();
  commit();
  undoable('Filled ' + made.length + (made.length === 1 ? ' cage' : ' cages'), function(){
    var f = getFarm();
    made.forEach(function(m){
      var c = cageById(m.cage.id); if (c){ c.batch = null; c.events = c.events.filter(function(ev){ return ev.batchId !== m.batch.id; }); }
      var bi = f.batches.indexOf(m.batch); if (bi >= 0) f.batches.splice(bi, 1);
    });
    commit();
  });
}

// buildFillSeedForm(cageIds) — §3.4 fields IN ORDER. Photo slot left for Builder 3.
function buildFillSeedForm(cageIds){
  var farm = getFarm();
  var n = cageIds.length;
  var kids = sheetHead('Fill — new seed', n + (n === 1 ? ' cage' : ' cages') + ' get the same new batch.');

  var countIn = h('input', { type:'number', inputmode:'numeric', min:'0', placeholder:'e.g. 600' });
  kids.push(field('How many', countIn, 'Optional — leave blank if uncounted.'));

  var sizeIn = h('input', { type:'number', inputmode:'decimal', min:'0', step:'0.1', placeholder:'e.g. 22' });
  kids.push(field('Size (mm)', sizeIn, 'Initial measured size — used to project harvest.'));

  // ploidy chips
  var ploidy = null;
  var pDip = h('button', { class:'chip', type:'button' }, 'Diploid');
  var pTri = h('button', { class:'chip', type:'button' }, 'Triploid');
  function setPloidy(v){ ploidy = (ploidy === v) ? null : v;
    pDip.classList.toggle('on', ploidy === 'diploid'); pTri.classList.toggle('on', ploidy === 'triploid'); }
  pDip.addEventListener('click', function(){ setPloidy('diploid'); });
  pTri.addEventListener('click', function(){ setPloidy('triploid'); });
  kids.push(field('Ploidy', h('div', { class:'chips' }, pDip, pTri)));

  var hatchIn = h('input', { type:'text', placeholder:'Where the seed came from' });
  kids.push(field('Hatchery', hatchIn));

  var notesIn = h('textarea', { placeholder:'Anything worth remembering' });
  kids.push(field('Notes', notesIn));

  // Builder 3: photoField mounts in the slot Builder 2 left
  var photoSlot = h('div', { id:'fillPhotoSlot' });
  var photos = photoField([]);
  photoSlot.appendChild(photos.el);
  kids.push(photoSlot);

  var dateIn = h('input', { type:'date', value:todayISO(), style:{maxWidth:'200px'} });
  kids.push(field('Date', dateIn));

  kids.push(h('div', { class:'btnRow' },
    h('button', { class:'btn btn-quiet', onclick:closeSheet }, 'Cancel'),
    h('button', { class:'btn btn-primary', onclick:function(){
      if (photos.busy()){ toast('Photo still saving…'); return; }
      fillNewSeed(cageIds, {
        count:  parseCount(countIn.value),
        sizeMm: parseNum(sizeIn.value),
        ploidy: ploidy,
        hatchery: hatchIn.value.trim(),
        notes:  notesIn.value.trim(),
        date:   dateIn.value || todayISO(),
        photoIds: photos.ids()          // real captured ids → batch + stocked event
      });
    } }, 'Fill ' + n + (n === 1 ? ' cage' : ' cages'))));
  return kids;
}

/* ── §3.5 — Pull selected filled cages into the barge pile. ────────── */
function pullSelectedCages(cageIds){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  var sources = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) sources.push(c); });
  if (!sources.length){ toast('Nothing to pull'); return; }

  // snapshot for undo
  var snapBarge = JSON.parse(JSON.stringify(barge));
  var snapSources = sources.map(function(c){ return { id:c.id, batch:JSON.parse(JSON.stringify(c.batch)), evLen:c.events.length }; }); // clone, don't alias (C1)

  // pool: counts add (null-aware), size = max, grade = common-or-null, origin = union
  var startCount = (barge.state === 'pile') ? barge.count : 0;
  var anyUncounted = (barge.state === 'pile' && barge.count == null);
  var total = startCount || 0;
  var maxSize = (barge.state === 'pile' && typeof barge.sizeMm === 'number') ? barge.sizeMm : null;
  var grades = {}; if (barge.state === 'pile' && barge.grade) grades[barge.grade] = 1;
  // B6: pool ploidy + hatchery the same common-or-null way grade pools, so a barge-filled child
  // can carry them forward when every source agrees. Seed from the existing pile (if any).
  var ploidies = {}; if (barge.state === 'pile' && barge.ploidy) ploidies[barge.ploidy] = 1;
  var hatcheries = {}; if (barge.state === 'pile' && barge.hatchery) hatcheries[barge.hatchery] = 1;
  var cageLabels = (barge.origin && barge.origin.cageLabels) ? barge.origin.cageLabels.slice() : [];
  var lineNames  = (barge.origin && barge.origin.lineNames)  ? barge.origin.lineNames.slice()  : [];
  var parentIds  = (barge.origin && barge.origin.parentBatchIds) ? barge.origin.parentBatchIds.slice() : [];
  if (barge.state === 'pile' && barge.batchId && parentIds.indexOf(barge.batchId) < 0) parentIds.push(barge.batchId);

  sources.forEach(function(cage, i){
    var b = cage.batch;
    if (b.count == null) anyUncounted = true; else total += b.count;
    var sz = latestSize(cage);
    if (typeof sz === 'number' && (maxSize == null || sz > maxSize)) maxSize = sz;
    if (b.grade) grades[b.grade] = 1;
    if (b.ploidy) ploidies[b.ploidy] = 1;                                   // B6: track distinct ploidies
    if (b.hatchery) hatcheries[b.hatchery] = 1;                             // B6: track distinct hatcheries
    var ln = lineOfCage(cage.id);
    if (cage.label && cageLabels.indexOf(cage.label) < 0) cageLabels.push(cage.label);
    if (ln && ln.name && lineNames.indexOf(ln.name) < 0) lineNames.push(ln.name);
    if (parentIds.indexOf(b.id) < 0) parentIds.push(b.id);
    // per-source: pulled event (count), then empty the cage.
    // Carry the batch's stock photos onto the summary event so they survive in the permanent timeline.
    var pulledEv = newEvent('pulled', b.id, { count: (b.count != null ? b.count : null) });
    if (b.photoIds && b.photoIds.length) pulledEv.photoIds = b.photoIds.slice();
    cage.events.push(pulledEv);
    snapSources[i].pulledEv = pulledEv;   // remember the exact event so undo removes it by identity, not by length (audit F10/H1)
    cage.batch = null;
  });

  var gradeKeys = Object.keys(grades);
  var ploidyKeys = Object.keys(ploidies);
  var hatchKeys = Object.keys(hatcheries);
  // keep ONE pile batchId; create one if the barge was empty
  if (barge.state !== 'pile' || !barge.batchId) barge.batchId = uid();
  barge.state = 'pile';
  barge.count = anyUncounted ? null : total;
  barge.sizeMm = maxSize;
  barge.grade = (gradeKeys.length === 1) ? gradeKeys[0] : null;
  // B6: carry the common ploidy/hatchery forward; mixed sources → leave blank (don't invent a value)
  barge.ploidy = (ploidyKeys.length === 1) ? ploidyKeys[0] : null;
  barge.hatchery = (hatchKeys.length === 1) ? hatchKeys[0] : '';
  barge.origin = { parentBatchIds: parentIds, cageLabels: cageLabels, lineNames: lineNames, pulledDate: todayISO() };
  if (!Array.isArray(barge.events)) barge.events = [];
  // barge-local pull record — the qty added by THIS pull (sum of just-pulled cages only)
  var pulledNow = 0, pulledUncounted = false;
  snapSources.forEach(function(s){ if (s.batch.count == null) pulledUncounted = true; else pulledNow += s.batch.count; });
  barge.events.push(newEvent('pulled', barge.batchId, { count: pulledUncounted ? null : pulledNow }));

  clearSelection();
  commit();
  undoable('Pulled ' + sources.length + (sources.length === 1 ? ' cage to the tub' : ' cages to the tub'), function(){
    var f = getFarm();
    f.barge = snapBarge;
    snapSources.forEach(function(s){
      var c = cageById(s.id);
      if (c){
        c.batch = s.batch;
        if (s.pulledEv){ var ix = c.events.indexOf(s.pulledEv); if (ix >= 0) c.events.splice(ix, 1); }   // remove our event only
      }
    });
    commit();
  });
}

/* ── BATCH-SPLIT — carve the unsorted remainder pile into named sub-batches.
      rows = [{count, sizeMm, grade, label}]. Each becomes a self-contained
      split snapshot on barge.splits[] (provenance copied from the remainder so
      a later remainder-drain can't strand it). Decrements the remainder; if it
      reaches 0 the remainder goes empty but the splits + events are kept. ── */
function splitBarge(rows){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  if (barge.state !== 'pile'){ toast('Tub is empty'); return; }   // need a remainder to carve from
  rows = Array.isArray(rows) ? rows : [];
  if (!rows.length){ toast('Add a batch first'); return; }
  // CR-#2: an uncounted pile has no denominator to divide. Splitting "an amount I decide" needs a known
  // total — otherwise the split rows either mint hard counts or double-represent the same undrained pile.
  // The farmer fills the whole uncounted pool as before; this never lets uncounted oysters be miscounted.
  if (barge.count == null){ toast('Count the tub before sorting it into batches.'); return; }

  var counted = (barge.count != null);
  var sum = 0, i;
  for (i=0; i<rows.length; i++){
    var c = rows[i].count;
    if (counted){
      if (typeof c !== 'number' || !isFinite(c) || c < 1 || c !== Math.floor(c)){
        toast('Each batch needs a whole number of oysters'); return;
      }
      sum += c;
    }
  }
  if (counted){
    if (sum < 1){ toast('Split must move at least 1 oyster'); return; }
    if (sum > barge.count){ toast('Only ' + fmtCompact(barge.count) + ' in the tub'); return; }
  }

  var snapBarge = JSON.parse(JSON.stringify(barge));
  rows.forEach(function(r){
    var lbl = (r.label != null && typeof r.label === 'string') ? r.label.trim() : '';
    barge.splits.push({
      id: uid(),
      count:  (typeof r.count === 'number' && isFinite(r.count)) ? r.count : null,
      sizeMm: (typeof r.sizeMm === 'number' && isFinite(r.sizeMm)) ? r.sizeMm : null,
      grade:  (r.grade || null),
      label:  (lbl || null),
      ploidy: (barge.ploidy || null),
      hatchery: (barge.hatchery || ''),
      origin: barge.origin ? JSON.parse(JSON.stringify(barge.origin)) : null,
      parentBatchId: (barge.batchId || null)
    });
  });

  // decrement the remainder; if drained, empty it but KEEP splits + events (splits are self-contained)
  if (counted){
    barge.count -= sum;
    if (barge.count <= 0){
      barge.state = 'empty'; barge.batchId = null; barge.count = null;
      barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.ploidy = null; barge.hatchery = '';
    }
  }

  commit();
  undoable('Split into ' + rows.length + (rows.length === 1 ? ' batch' : ' batches'), function(){
    getFarm().barge = snapBarge; commit();
  });
}

/* ── §3.6 — Fill selected empty cages from the barge (even split, lose no
      oysters). Source = a chosen split (splitId) OR the remainder pool. Each
      cage gets a CHILD batch with provenance + a `filled` event carrying the
      source size, so the per-cage growth chart gets an anchor dot. ── */
function fillFromBarge(cageIds, splitId){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;

  // resolve the SOURCE — a split snapshot, or the remainder pool
  var source = null, fromSplit = false;
  if (splitId){
    source = bargeSplitById(barge, splitId);
    if (!source){ toast('Batch not found'); return; }
    fromSplit = true;
  } else {
    if (barge.state !== 'pile'){ toast('Tub is empty'); return; }
  }

  var targets = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && !c.batch) targets.push(c); });
  if (!targets.length){ toast('Nothing to fill'); return; }

  // read the source fields (split snapshot or remainder pool)
  var srcCount    = fromSplit ? source.count    : barge.count;
  var srcSize     = fromSplit ? source.sizeMm   : barge.sizeMm;
  var srcGrade    = fromSplit ? source.grade    : barge.grade;
  var srcPloidy   = fromSplit ? source.ploidy   : barge.ploidy;
  var srcHatchery = fromSplit ? source.hatchery : barge.hatchery;
  var prov        = (fromSplit ? source.origin : barge.origin) || {};
  var srcParentId = fromSplit ? source.parentBatchId : barge.batchId;

  var snapBarge = JSON.parse(JSON.stringify(barge));
  var n = targets.length;
  var total = srcCount;                           // number | null
  var shares = [];                                // per-target count (number | null)
  var used = targets.slice();                     // which cages actually get filled
  var shortfall = false;

  if (total == null){
    for (var i=0; i<n; i++) shares.push(null);     // uncounted source → even share, no number
  } else if (total <= 0){
    toast('Tub is empty'); return;
  } else if (total < n){
    // fewer oysters than cages → fill the first `total` cages with 1 each, leave the rest empty (§3.6 decision)
    used = targets.slice(0, total);
    for (var j=0; j<used.length; j++) shares.push(1);
    shortfall = true;
  } else {
    var base = Math.floor(total / n), rem = total - base * n;
    for (var k=0; k<n; k++) shares.push(base + (k < rem ? 1 : 0));   // spread remainder; sum === total exactly
  }

  var made = [];
  used.forEach(function(cage, idx){
    var share = shares[idx];
    var child = newBatch({
      count: share, sizeMm: srcSize, ploidy: (srcPloidy || null), hatchery: (srcHatchery || ''),
      grade: srcGrade, notes: '', stockedDate: todayISO(), photoIds: [],
      origin: {
        // chain to BOTH the parent id and the real source batch ids so lineageEvents
        // (and the photo strips it drives) can walk back to the originating cages.
        parentBatchIds: (function(){
          var pp = (prov.parentBatchIds || []).slice();
          if (srcParentId && pp.indexOf(srcParentId) < 0) pp.unshift(srcParentId);
          return pp;
        })(),
        cageLabels: (prov.cageLabels || []).slice(),
        lineNames:  (prov.lineNames || []).slice(),
        pulledDate: prov.pulledDate || todayISO()
      }
    });
    cage.batch = child;
    farm.batches.push(child);
    // CHART ANCHOR: a `filled` event that CARRIES the size, so this size lands a dot on the per-cage
    // growth chart AND a timeline row reading "Filled from tub" (not "Filled"/fresh-seed). growthPoints
    // + latestSize now count `filled` events with a numeric sizeMm; old count-only filled events (no
    // sizeMm) stay ignored, so this is back-compatible. srcSize null → sizeMm null (ignored as a point).
    cage.events.push(newEvent('filled', child.id, {
      date: todayISO(), sizeMm: (typeof srcSize === 'number' ? srcSize : null), count: share, note: null
    }));
    cage.workDue = null;
    made.push({ cageId:cage.id, batch:child });
  });

  // decrement the source
  var distributed = 0;
  if (total != null){ shares.forEach(function(s){ if (typeof s === 'number') distributed += s; }); }

  if (fromSplit){
    var depleted = false;
    if (total == null){
      depleted = true;                             // uncounted split → one fill empties it
    } else {
      source.count = total - distributed;
      if (source.count <= 0) depleted = true;
    }
    if (depleted){
      var si = barge.splits.indexOf(source);
      if (si >= 0) barge.splits.splice(si, 1);
      if (activeFillSplitId === splitId) activeFillSplitId = null;
    }
  } else {
    if (total == null){
      // uncounted pool → the whole working pile was just distributed, so it's gone (H1)
      barge.state = 'empty'; barge.batchId = null; barge.count = null;
      barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.ploidy = null; barge.hatchery = ''; barge.events = [];
    } else {
      barge.count = total - distributed;
      if (barge.count <= 0){
        barge.state = 'empty'; barge.batchId = null; barge.count = null;
        barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.ploidy = null; barge.hatchery = ''; barge.events = [];
      }
    }
  }

  // tub fully empty (remainder gone AND no splits left) → reset to a clean fresh barge
  if (!bargeHasContent(barge)) farm.barge = freshBarge();

  clearSelection();
  commit();
  var msg = 'Filled ' + made.length + (made.length === 1 ? ' cage from the tub' : ' cages from the tub');
  if (shortfall && typeof total === 'number') msg = 'Only ' + total + ' oysters — filled ' + made.length + (made.length === 1 ? ' cage' : ' cages');
  undoable(msg, function(){
    var f = getFarm();
    f.barge = snapBarge;
    made.forEach(function(m){
      var c = cageById(m.cageId);
      if (c){ c.batch = null; c.events = c.events.filter(function(ev){ return ev.batchId !== m.batch.id; }); }
      var bi = f.batches.indexOf(m.batch); if (bi >= 0) f.batches.splice(bi, 1);
    });
    commit();
  });
}

/* ── §3.9 — Work selected filled cages. Writes ONE event to EACH. ──── */
// Bug B1 (round-13): re-entry lock. The Work sheet stays live for ~260ms while it closes, so a rapid
// double-tap on a handling chip could fire workCages twice and append DUPLICATE worked events to the same
// cages. The lock drops every call for a short window after a commit starts.
var _workCommitLock = false;
function workCages(cageIds, opts){
  if (_workCommitLock) return;
  var farm = getFarm(); if (!farm) return;
  opts = opts || {};
  var targets = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) targets.push(c); });
  if (!targets.length){ toast('Nothing to work'); return; }
  _workCommitLock = true;
  setTimeout(function(){ _workCommitLock = false; }, 350);   // release after the sheet's close transition

  var date = isValidISO(opts.date) ? opts.date : todayISO();
  // snapshot batch IDENTITY (not just length) so undo can't write a stale size onto a swapped-in batch (audit F7/H2)
  var snap = targets.map(function(c){ return { id:c.id, batchId:c.batch.id, sizeMm:c.batch.sizeMm, count:c.batch.count, workDue:c.workDue, ev:null }; });
  var verb;
  targets.forEach(function(cage, i){
    var ev = null;
    if (typeof opts.lossPct === 'number' && opts.lossPct > 0){
      // MORTALITY by ESTIMATE — farmers don't headcount the dead, they eyeball a % of the batch.
      // Apply the % to THIS cage's living count (per-cage, so a selection works), decrement, log it.
      var pctL = Math.min(100, opts.lossPct);
      var hadP = (typeof cage.batch.count === 'number') ? cage.batch.count : null;
      var lostP = (hadP != null) ? Math.min(Math.round(hadP * pctL / 100), hadP) : null;   // null count → record the %, can't decrement
      ev = newEvent('mortality', cage.batch.id, { count:lostP, pct:pctL, reason:opts.lossReason || null, date:date, note:opts.note || null, photoIds:opts.photoIds });
      cage.events.push(ev);
      if (hadP != null && lostP != null) cage.batch.count = Math.max(0, hadP - lostP);
    } else if (typeof opts.lossCount === 'number' && opts.lossCount > 0){
      // MORTALITY by exact count (kept for the rare case a farmer does count)
      var had = (typeof cage.batch.count === 'number') ? cage.batch.count : null;
      var lost = (had != null) ? Math.min(Math.floor(opts.lossCount), had) : Math.floor(opts.lossCount);
      ev = newEvent('mortality', cage.batch.id, { count:lost, reason:opts.lossReason || null, date:date, note:opts.note || null, photoIds:opts.photoIds });
      cage.events.push(ev);
      if (had != null) cage.batch.count = Math.max(0, had - lost);
    } else if (opts.method){
      ev = newEvent('worked', cage.batch.id, { method:opts.method, date:date, note:opts.note || null, photoIds:opts.photoIds });
      cage.events.push(ev);
    } else if (typeof opts.sizeMm === 'number'){
      ev = newEvent('growth', cage.batch.id, { sizeMm:opts.sizeMm, date:date, note:opts.note || null, photoIds:opts.photoIds });
      cage.events.push(ev);
      cage.batch.sizeMm = opts.sizeMm;               // mirror
    } else if (opts.note){
      ev = newEvent('note', cage.batch.id, { note:opts.note, date:date, photoIds:opts.photoIds });
      cage.events.push(ev);
    }
    snap[i].ev = ev;                                 // exact event for identity-based undo
    // work-again reminder (sets/clears the needs-work date)
    if ('workDue' in opts) cage.workDue = opts.workDue || null;
    else if (opts.method || typeof opts.sizeMm === 'number') cage.workDue = null;  // a real work clears an old reminder
  });
  var isLoss = (typeof opts.lossPct === 'number' && opts.lossPct > 0) || (typeof opts.lossCount === 'number' && opts.lossCount > 0);
  verb = isLoss ? 'Logged loss on' : opts.method ? cap(opts.method) : (typeof opts.sizeMm === 'number' ? 'Logged growth on' : 'Noted');

  var nC = targets.length + (targets.length === 1 ? ' cage' : ' cages');
  var label = isLoss ? ('Logged loss · ' + nC)
            : opts.method ? ('Worked ' + nC)
            : (typeof opts.sizeMm === 'number' ? ('Logged growth · ' + nC)
            : ('Noted ' + nC));
  commit();
  // Bug B1 (round-13): CLOSE the sheet on a successful commit instead of keeping it open. The old behavior
  // (refreshSheet → sheet stays open) left an un-pressed-looking chip that invited a re-tap, appending
  // duplicate events with no clear feedback. Dismissing updates the work map + cage status behind it and
  // surfaces the "Worked N / Undo" toast over the map — also fixing Bug B6 (the toast previously overlapped
  // the still-open sheet's date/reminder controls on iPhone).
  closeSheet();
  undoable(label, function(){
    snap.forEach(function(s){
      var c = cageById(s.id);
      if (!c) return;
      if (s.ev){ var ix = c.events.indexOf(s.ev); if (ix >= 0) c.events.splice(ix, 1); }   // remove exactly our event
      if (c.batch && c.batch.id === s.batchId){ c.batch.sizeMm = s.sizeMm; c.batch.count = s.count; }  // restore size + living count (same batch only)
      c.workDue = s.workDue;
    });
    commit(); refreshSheet();
  });
}

// buildWorkSheet(cageIds) — §3.9. Last-action banner · history · method chips · Log growth · reminder.
function buildWorkSheet(cageIds){
  var farm = getFarm();
  var cages = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) cages.push(c); });
  if (!cages.length) return sheetHead('Work').concat(h('div', { class:'emptyNote' }, 'These cages are empty.'));
  var bulk = cages.length > 1;
  var primary = cages[0];
  var kids = sheetHead(bulk ? ('Work ' + cages.length + ' cages') : ('Work ' + primary.label),
    bulk ? 'One entry is written to each selected cage.' : null);

  // one shared photoField for this Work submit (bulk → one capture, N event references)
  var photos = photoField([]);

  // Last action banner (single-cage only — bulk has many)
  if (!bulk){
    var le = lastEvent(primary);
    kids.push(h('div', { class:'work-banner' },
      h('span', { html:icon('wrench', 18) }),
      le ? ('Last: ' + eventLabel(le) + ' · ' + monthDay(le.date)) : 'No work logged yet'));
  }

  // method chips → append a worked event on tap
  var methodChips = h('div', { class:'chips' });
  ['tumbled','washed','desiccated','flipped'].forEach(function(m){
    methodChips.appendChild(h('button', { class:'chip', type:'button', onclick:function(){
      if (photos.busy()){ toast('Photo still saving…'); return; }
      workCages(cageIds, { method:m, note:(noteIn.value || '').trim(), workDue:reminderDue, photoIds:photos.ids() });
    } }, cap(m)));
  });
  kids.push(h('section', null, h('label', null, 'Log a handling'), methodChips));

  // Log growth — size field
  var growthIn = h('input', { type:'number', inputmode:'decimal', min:'0', step:'0.1', placeholder:'e.g. 48' });
  var growthBtn = h('button', { class:'btn btn-quiet', onclick:function(){
    var v = parseNum(growthIn.value);
    if (v == null || v <= 0){ toast('Enter a size in mm'); return; }
    if (photos.busy()){ toast('Photo still saving…'); return; }
    workCages(cageIds, { sizeMm:v, note:(noteIn.value || '').trim(), workDue:reminderDue, photoIds:photos.ids() });
  } }, 'Log growth');
  kids.push(h('section', null, h('label', null, 'Log growth'),
    h('div', { style:{display:'flex', gap:'10px'} },
      h('div', { style:{flex:'1'} }, growthIn), growthBtn)));

  // Log loss / mortality — farmers ESTIMATE a % dead, they don't headcount (owner: "i get a general
  // estimate, maybe % dead"). Pick a % of the batch → it nets the living count so $ + sale-ready stay honest.
  var lossReason = null, lossPct = null;
  var pctChips = h('div', { class:'chips' });
  var pctIn = h('input', { type:'number', inputmode:'numeric', min:'1', max:'100', step:'1', placeholder:'or type %' });
  [5,10,25,50].forEach(function(p){
    var chip = h('button', { class:'chip', type:'button', onclick:function(){
      lossPct = (lossPct === p) ? null : p;
      var all = pctChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on');
      if (lossPct != null){ chip.classList.add('on'); pctIn.value = ''; }
    } }, p + '%');
    pctChips.appendChild(chip);
  });
  pctIn.addEventListener('input', function(){ lossPct = null; var all = pctChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on'); });
  var reasonChips = h('div', { class:'chips', style:{marginTop:'8px'} });
  ['Heat','Predation','Storm','Handling','Disease','Other'].forEach(function(r){
    var chip = h('button', { class:'chip', type:'button', onclick:function(){
      lossReason = (lossReason === r) ? null : r;
      var all = reasonChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on');
      if (lossReason) chip.classList.add('on');
    } }, r);
    reasonChips.appendChild(chip);
  });
  var lossBtn = h('button', { class:'btn btn-quiet', onclick:function(){
    var p = (lossPct != null) ? lossPct : parseNum(pctIn.value);
    if (p == null || p <= 0 || p > 100){ toast('Pick or type an estimated % dead (1–100)'); return; }
    if (photos.busy()){ toast('Photo still saving…'); return; }
    workCages(cageIds, { lossPct:p, lossReason:lossReason, note:(noteIn.value || '').trim(), workDue:reminderDue, photoIds:photos.ids() });
  } }, 'Log loss');
  kids.push(h('section', null, h('label', null, bulk ? 'Log loss — est. % dead (each cage)' : 'Log loss — est. % dead'),
    pctChips,
    h('div', { style:{display:'flex', gap:'10px', marginTop:'8px'} }, h('div', { style:{flex:'1'} }, pctIn), lossBtn),
    reasonChips));

  // optional note (read by the buttons above)
  var noteIn = h('textarea', { placeholder:'Optional note' });
  kids.push(field('Note', noteIn));

  // Builder 3: photoField mounts in the slot Builder 2 left
  var workPhotoSlot = h('div', { id:'workPhotoSlot' });
  workPhotoSlot.appendChild(photos.el);
  kids.push(workPhotoSlot);

  // optional "work again" reminder
  var reminderDue = null;
  var remChips = h('div', { class:'chips' });
  function setReminder(days, chip){
    var iso = days == null ? null : isoDaysAhead(days);
    reminderDue = (reminderDue === iso && iso != null) ? null : iso;
    var all = remChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on');
    if (reminderDue != null && chip) chip.classList.add('on');
  }
  [['1w',7],['2w',14],['4w',28],['8w',56]].forEach(function(p){
    var chip = h('button', { class:'chip', type:'button' }, p[0]);
    chip.addEventListener('click', function(){ setReminder(p[1], chip); });
    remChips.appendChild(chip);
  });
  var pickWrap = h('input', { type:'date', style:{maxWidth:'180px', marginTop:'8px'},
    onchange:function(){ reminderDue = isValidISO(this.value) ? this.value : null;
      var all = remChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on'); } });
  kids.push(h('section', null, h('label', null, 'Work again reminder'),
    h('div', { class:'fieldHint', style:{marginBottom:'6px'} }, 'Optional — flag this cage on a date.'),
    remChips, pickWrap));

  // history timeline (single-cage), newest first
  if (!bulk){
    var evs = primary.events.slice().sort(function(a,b){ return isoToMs(b.date) - isoToMs(a.date); });
    if (evs.length){
      var tl = h('div', { class:'timeline' });
      evs.forEach(function(ev){
        var row = h('div', { class:'tlRow' }, h('span', { class:'dot' }),
          h('div', { class:'tlTop' }, h('span', { class:'tlLabel' }, eventLabel(ev)), h('span', { class:'tlDate num' }, monthDay(ev.date))));
        var det = eventDetail(ev);
        if (det) row.appendChild(h('div', { class:'tlDetail' }, det));
        if (ev.photoIds && ev.photoIds.length) row.appendChild(photoStrip(ev.photoIds, eventLabel(ev)));
        tl.appendChild(row);
      });
      kids.push(h('section', null, h('label', null, 'History'), tl));
    }
  }
  return kids;
}
function isoDaysAhead(days){ var d = new Date(); d.setUTCDate(d.getUTCDate() + days);
  return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate()); }
// eventDetail — the secondary line for a timeline row
function eventDetail(ev){
  var bits = [];
  if (typeof ev.count === 'number') bits.push(fmtCompact(ev.count) + (ev.type === 'harvested' ? ' harvested' : (ev.type === 'pulled' ? ' pulled' : (ev.type === 'filled' ? ' placed' : (ev.type === 'mortality' ? ' lost' : ' oysters')))));
  if (typeof ev.sizeMm === 'number' && ev.type !== 'growth') bits.push(ev.sizeMm + ' mm');
  if (ev.note) bits.push(ev.note);
  return bits.join(' · ');
}

/* ── §3.10 — Remove selected EMPTY cages (splice; line stays). ─────── */
function removeCages(cageIds){
  var farm = getFarm(); if (!farm) return;
  var removed = [];
  cageIds.forEach(function(id){
    var line = lineOfCage(id); if (!line) return;
    var idx = -1;
    for (var i=0; i<line.cages.length; i++) if (line.cages[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    if (line.cages[idx].batch) return;                  // only empties (popup already guards this)
    removed.push({ lineId:line.id, index:idx, cage:line.cages[idx] });
  });
  if (!removed.length){ toast('Only empty cages can be removed'); return; }
  // splice in descending index order so earlier indices stay valid
  removed.sort(function(a,b){ return b.index - a.index; });
  removed.forEach(function(r){
    var line = null; for (var i=0;i<farm.lines.length;i++) if (farm.lines[i].id === r.lineId) line = farm.lines[i];
    if (line) line.cages.splice(r.index, 1);
  });
  reindexLines(farm);
  clearSelection();
  commit();
  undoable('Removed cage — the line keeps its place', function(){
    var f = getFarm();
    // re-insert in ascending index order so positions land back correctly
    removed.slice().sort(function(a,b){ return a.index - b.index; }).forEach(function(r){
      var line = null; for (var i=0;i<f.lines.length;i++) if (f.lines[i].id === r.lineId) line = f.lines[i];
      if (line) line.cages.splice(Math.min(r.index, line.cages.length), 0, r.cage);
    });
    reindexLines(f);
    commit();
  });
}

/* ── §3.8 — Harvest from the barge pile. ───────────────────────────── */
function harvestFromBarge(count, note, photoIds){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  if (barge.state !== 'pile'){ toast('Tub is empty'); return; }
  var take = parseCount(count);   // whole oysters, integer (H4)
  if (take == null || take <= 0){ toast('Enter how many you harvested'); return; }
  if (barge.count != null && take > barge.count) take = barge.count;     // cap at the pile

  var snapBarge = JSON.parse(JSON.stringify(barge));
  var origin = barge.origin ? JSON.parse(JSON.stringify(barge.origin)) : null;
  var entry = {
    id: uid(), date: todayISO(), count: take, grade: barge.grade,
    sizeMm: (typeof barge.sizeMm === 'number' ? barge.sizeMm : null),
    origin: origin, note: (note && note.trim()) ? note.trim() : null,
    photoIds: Array.isArray(photoIds) ? photoIds.slice() : []
  };
  farm.harvestLog.push(entry);

  // NOTE (audit F9/H4): we deliberately do NOT stamp 'harvested' events on cages that still hold a
  // parent batch. This harvest comes OFF THE BARGE PILE; any still-stocked source cages are still in the
  // water. Stamping them double-counted the same oysters (present in the cage AND logged as harvested).
  // Lineage is preserved by the harvest entry's origin.parentBatchIds.

  // barge-local record + decrement
  if (!Array.isArray(barge.events)) barge.events = [];
  barge.events.push(newEvent('harvested', barge.batchId || '', { count: take }));
  if (barge.count != null){
    barge.count -= take;
    if (barge.count <= 0){ barge.state = 'empty'; barge.batchId = null; barge.count = null; barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.events = []; }
  }
  // uncounted pile: KEEP the pile after a partial harvest — we can't know what remains, so emptying it
  // would be silent data loss (C2). The farmer empties it explicitly via "Clear the barge".

  closeSheet();
  commit();
  undoable('Harvest logged · ' + fmtCompact(take), function(){
    var f = getFarm();
    var ei = f.harvestLog.indexOf(entry); if (ei >= 0) f.harvestLog.splice(ei, 1);
    f.barge = snapBarge;
    commit();
  });
}

// clearBarge() — explicitly empty the working pile (an uncounted pile worked off, or any leftover the
// farmer discards). Undoable. (C2: uncounted piles get a non-destructive-by-default empty path.)
function clearBarge(){
  var farm = getFarm(); if (!farm) return;
  // BATCH-SPLIT: a tub with no remainder pile but sorted batches still has content — clear those too.
  if (!bargeHasContent(farm.barge)){ toast('Tub is already empty'); return; }
  var snapBarge = JSON.parse(JSON.stringify(farm.barge));
  farm.barge = freshBarge();              // wipes the remainder, splits, AND events
  activeFillSplitId = null;               // any chosen batch is gone now
  closeSheet();
  commit();
  undoable('Tub cleared', function(){ getFarm().barge = snapBarge; commit(); });
}

// splitChipName(split, index) — a sensible display name for a sorted batch chip: explicit label, else its
// size ("≈55 mm"), else a positional "Batch N". Used by the chip face AND the fill toast so they agree.
function splitChipName(s, index){
  if (s.label) return s.label;
  if (typeof s.sizeMm === 'number' && isFinite(s.sizeMm)) return '≈' + s.sizeMm + ' mm';
  return 'Batch ' + (index + 1);
}
function buildHarvestSheet(farm){
  farm = farm || getFarm();
  var kids = sheetHead('Harvest');
  kids.push(h('div', { class:'harvestHero', html: HARVEST_HERO_SVG }));
  var b = farm.barge;
  var hasRemainder = (b.state === 'pile');
  var hasSplits = (Array.isArray(b.splits) && b.splits.length > 0);

  // BATCH-SPLIT: truly empty tub → the only dead-end note. Otherwise fall through and render whatever the
  // tub holds (remainder card, sorted-batch chips, and the split editor when a remainder exists).
  if (!bargeHasContent(b)){
    kids.push(h('div', { class:'emptyNote' }, 'Nothing in the tub yet —\nPull some cages first.'));
    return kids;
  }

  // 2. Remainder pool card — only when an unsorted remainder still sits in the tub.
  if (hasRemainder){
    var pill = (b.count == null) ? 'uncounted' : ('~' + fmtCompact(b.count) + ' oysters');
    var card = h('div', { class:'card' },
      h('div', { class:'eyebrow' }, 'In the tub'),
      h('div', { class:'hero num' }, pill),
      b.sizeMm != null ? h('div', { class:'kv' }, h('span', { class:'k' }, 'Last size'), h('span', { class:'v' }, b.sizeMm + ' mm')) : null,
      b.grade ? h('div', { class:'kv' }, h('span', { class:'k' }, 'Grade'), h('span', { class:'v' }, b.grade)) : null,
      bargeOriginText(b) ? h('div', { class:'kv' }, h('span', { class:'k' }, 'From'), h('span', { class:'v' }, bargeOriginText(b))) : null);
    kids.push(card);

    // history of the oysters on the barge (barge.events + origin)
    var hist = bargeHistoryRows(b);
    if (hist.length){
      var tl = h('div', { class:'timeline' });
      hist.forEach(function(r){ tl.appendChild(r); });
      kids.push(h('section', null, h('label', null, 'Tub history'), tl));
    }
  }

  // 3. Sorted batches — tappable chips; tapping arms a batch then closes so the farmer picks empty cages.
  if (hasSplits){
    var chips = h('div', { class:'chips' });
    b.splits.forEach(function(s, ix){
      var name = splitChipName(s, ix);
      var sub = [];
      if (s.count != null) sub.push(fmtCompact(s.count));
      if (s.grade) sub.push(s.grade);
      var on = (s.id === activeFillSplitId);
      var chip = h('button', { class:'chip batchChip' + (on ? ' on' : ''), type:'button',
        onclick:(function(id, nm){ return function(){
          setActiveFillSplit(id);
          closeSheet();
          toast('Pick the empty cages to fill with ' + nm);
        }; })(s.id, name) },
        h('span', { class:'bc-name' }, name),
        sub.length ? h('span', { class:'bc-sub' }, sub.join(' · ')) : null);
      chips.appendChild(chip);
    });
    kids.push(h('section', null, h('label', null, 'Sorted batches'),
      h('div', { class:'fieldHint', style:{ marginBottom:'8px' } }, 'Tap a batch, then select empty cages to fill it.'),
      chips));
  }

  // 4. Split into batches — only when a COUNTED remainder exists to carve (an uncounted pile has no
  //    denominator to divide; splitBarge rejects it, so don't offer the editor). Collapsed behind a pill.
  if (hasRemainder && b.count != null){
    var editorSlot = h('div', { id:'splitEditorSlot' });
    var openBtn = h('button', { class:'chip add batchAdd', type:'button' }, '＋ Split into batches');
    openBtn.addEventListener('click', function(){
      openBtn.style.display = 'none';
      editorSlot.appendChild(buildSplitEditor(b));
    });
    kids.push(h('section', null, h('label', null, 'Split the tub'),
      h('div', { class:'fieldHint', style:{ marginBottom:'8px' } }, 'Sort the unsorted pile into named batches.'),
      openBtn, editorSlot));
  }

  // 5. Harvest count field + Cancel/Harvest — remainder pool only.
  if (hasRemainder){
    var countIn = h('input', { type:'number', inputmode:'numeric', min:'1',
      value: (b.count != null ? b.count : ''),
      max: (b.count != null ? b.count : null), placeholder:'How many' });
    kids.push(field('How many harvested', countIn, b.count != null ? ('Up to ' + fmtCompact(b.count) + ' in the tub.') : 'The pile is uncounted.'));

    var noteIn = h('textarea', { placeholder:'Optional note' });
    kids.push(field('Note', noteIn));

    // optional photoField → ids ride onto the HarvestEntry
    var harvestPhotoSlot = h('div', { id:'harvestPhotoSlot' });
    var photos = photoField([]);
    harvestPhotoSlot.appendChild(photos.el);
    kids.push(harvestPhotoSlot);

    kids.push(h('div', { class:'btnRow' },
      h('button', { class:'btn btn-quiet', onclick:closeSheet }, 'Cancel'),
      h('button', { class:'btn btn-barge', onclick:function(){
        if (photos.busy()){ toast('Photo still saving…'); return; }
        harvestFromBarge(countIn.value, noteIn.value, photos.ids());
      } }, 'Harvest')));
  }

  // 6. Clear the tub — always available while the tub holds anything (explicit empty path; C2).
  kids.push(h('button', { class:'btn btn-block', style:{ marginTop:'10px', color:'var(--danger)', background:'var(--surface)', border:'1.5px solid var(--hair-strong)' }, onclick:clearBarge }, 'Clear the tub'));
  return kids;
}
// buildSplitEditor(barge) — the dynamic row editor that gathers rows and hands them to splitBarge().
// Returns ONE DOM node (mounted into the collapsed editor slot). Live "Remaining" readout off b.count.
function buildSplitEditor(b){
  var farm = getFarm();
  var wrap = h('div', { class:'splitEditor' });
  var rowsWrap = h('div', { id:'splitRows' });
  var counted = (b.count != null);
  var remainEl = h('div', { class:'splitRemain' });
  var saveBtn = h('button', { class:'btn btn-barge', style:{ marginTop:'12px', width:'100%' } }, 'Save batches');

  // each row keeps its own input refs so we can read them on Save and tally on input
  var rows = [];
  function recompute(){
    if (!counted){ remainEl.textContent = 'Pile is uncounted — splits won’t carry a number.'; remainEl.classList.remove('over'); saveBtn.removeAttribute('disabled'); return; }
    var sum = 0, i;
    for (i=0; i<rows.length; i++){ var v = parseInt(rows[i].count.value, 10); if (!isNaN(v)) sum += v; }
    var left = b.count - sum;
    remainEl.textContent = 'Remaining: ' + fmtCompact(left);
    if (left < 0){ remainEl.classList.add('over'); saveBtn.setAttribute('disabled', ''); }
    else { remainEl.classList.remove('over'); saveBtn.removeAttribute('disabled'); }
  }
  function cell(cap, input){ return h('div', { class:'sr-cell' }, h('span', { class:'sr-cap' }, cap), input); }
  function addRow(){
    var countIn = h('input', { class:'sr-count', type:'number', inputmode:'numeric', min:'1', placeholder:'count' });
    countIn.addEventListener('input', recompute);
    var sizeIn = h('input', { class:'sr-size', type:'number', inputmode:'decimal', min:'0', step:'0.1', placeholder:'mm' });
    var gradeSel = h('select', { class:'sr-grade' }, h('option', { value:'' }, '—'));
    (farm.grades || []).forEach(function(g){ gradeSel.appendChild(h('option', { value:g }, g)); });
    var labelIn = h('input', { class:'sr-label', type:'text', placeholder:'Label (optional)' });
    var rec = { count:countIn, size:sizeIn, grade:gradeSel, label:labelIn };
    var rmBtn = h('button', { class:'sr-x', type:'button', 'aria-label':'Remove batch' }, '✕');
    var row = h('div', { class:'splitRow' },
      cell('Count', countIn), cell('Size', sizeIn), cell('Grade', gradeSel), rmBtn,
      labelIn);
    rmBtn.addEventListener('click', function(){
      var ix = rows.indexOf(rec); if (ix >= 0) rows.splice(ix, 1);
      rowsWrap.removeChild(row);
      if (!rows.length) addRow();   // never leave the editor with zero rows
      recompute();
    });
    rows.push(rec);
    rowsWrap.appendChild(row);
    recompute();
  }
  addRow();   // seed one empty row

  var addBtn = h('button', { class:'chip add batchAdd', type:'button', style:{ marginTop:'10px' } }, '＋ Add batch');
  addBtn.addEventListener('click', addRow);

  saveBtn.addEventListener('click', function(){
    var out = [];
    rows.forEach(function(r){
      var cRaw = r.count.value, sRaw = r.size.value, gRaw = r.grade.value, lRaw = r.label.value;
      var cTrim = (cRaw == null ? '' : String(cRaw)).replace(/\s/g, '');
      var sTrim = (sRaw == null ? '' : String(sRaw)).replace(/\s/g, '');
      var lTrim = (lRaw == null ? '' : String(lRaw)).replace(/^\s+|\s+$/g, '');
      // drop fully-empty rows
      if (!cTrim && !sTrim && !gRaw && !lTrim) return;
      var cNum = cTrim === '' ? null : Number(cTrim);
      var sNum = sTrim === '' ? null : Number(sTrim);
      out.push({
        count:  (cNum != null && isFinite(cNum)) ? cNum : null,
        sizeMm: (sNum != null && isFinite(sNum)) ? sNum : null,
        grade:  (gRaw || null),
        label:  (lTrim || null)
      });
    });
    splitBarge(out);     // splitBarge validates + toasts; refresh so new chips + remainder appear
    refreshSheet();
  });

  wrap.appendChild(rowsWrap);
  wrap.appendChild(addBtn);
  wrap.appendChild(remainEl);
  wrap.appendChild(saveBtn);
  return wrap;
}
// bargeHistoryRows — timeline rows describing what's piled (origin summary + barge events)
function bargeHistoryRows(b){

// cageActionBar(cage) — act on THIS cage from where its data is shown. The detail sheet used to be a
// dead-end (only "Change type"); now Work/Pull/Photo for a filled cage, Fill/Remove for an empty one. (v3 UX)
function cageActionBar(cage){
  function btn(label, ic, cls, fn){
    return h('button', { class:'caBtn' + (cls ? ' ' + cls : ''), onclick:fn },
      h('span', { class:'caIc', html:icon(ic, 22) }), h('span', { class:'caLbl' }, label));
  }
  var bar = h('div', { class:'cageActBar' });
  var id = cage.id;
  if (cage.batch){
    bar.appendChild(btn('Work',  'wrench', '',        function(){ openSheet(function(){ return buildWorkSheet([id]); }); }));
    bar.appendChild(btn('Pull',  'anchor', 'ca-pull', function(){ closeSheet(); pullSelectedCages([id]); }));
    bar.appendChild(btn('Photo', 'camera', '',        function(){ var c = cageById(id); if (c) openSheet(function(){ return buildCagePhotoSheet(c); }); }));
  } else {
    bar.appendChild(btn('Fill', 'plus', 'ca-fill', function(){
      var b = getFarm().barge;
      // BATCH-SPLIT: active tub batch → (armed-but-gone guard) → remainder pool → pick-a-batch → new seed
      if (activeFillSplitId && bargeSplitById(b, activeFillSplitId)){ closeSheet(); fillFromBarge([id], activeFillSplitId); }
      else if (activeFillSplitId){ setActiveFillSplit(null); toast('That batch is gone — pick again'); openSheet(function(){ return buildHarvestSheet(getFarm()); }); }  // armed split vanished — don't silently fill remainder
      else if (b.state === 'pile'){ closeSheet(); fillFromBarge([id]); }                 // distribute the pile
      else if (b.splits.length){ toast('Pick a batch in the tub first'); openSheet(function(){ return buildHarvestSheet(getFarm()); }); }
      else openSheet(function(){ return buildFillSeedForm([id]); });                      // new seed
    }));

// cageSurvival(cage) — for the CURRENT batch: alive count, total lost to mortality, % survival, by cause.
function cageSurvival(cage){
  if (!cage || !cage.batch) return null;
  var bid = cage.batch.id, alive = (typeof cage.batch.count === 'number') ? cage.batch.count : null;
  var lost = 0, hasLoss = false, causes = {};
  (cage.events || []).forEach(function(ev){
    if (ev.type === 'mortality' && ev.batchId === bid && typeof ev.count === 'number' && ev.count > 0){
      lost += ev.count; hasLoss = true;
      var r = ev.reason || 'Other'; causes[r] = (causes[r] || 0) + ev.count;
    }
  });
  var stocked = (alive != null) ? alive + lost : null;
  var pct = (stocked && stocked > 0) ? Math.round(alive / stocked * 100) : null;
  return { hasLoss:hasLoss, lost:lost, alive:alive, stocked:stocked, pct:pct, causes:causes };
}

// farmLossStats(farm) — every recorded loss across the farm: total, by cause, standing survival proxy.
function farmLossStats(farm){
  var totalLost = 0, alive = 0, cagesWithLoss = 0, causes = {};
  (farm.lines || []).forEach(function(l){ (l.cages || []).forEach(function(c){
    if (c.batch && typeof c.batch.count === 'number') alive += c.batch.count;
    var bid = c.batch && c.batch.id;
    var hadLoss = false;
    (c.events || []).forEach(function(ev){
      if (ev.type === 'mortality' && ev.batchId === bid && typeof ev.count === 'number' && ev.count > 0){
        totalLost += ev.count; hadLoss = true;
        var r = ev.reason || 'Other'; causes[r] = (causes[r] || 0) + ev.count;
      }
    });
    if (hadLoss) cagesWithLoss++;
  }); });
  var pct = (alive + totalLost > 0) ? Math.round(alive / (alive + totalLost) * 100) : null;
  return { totalLost:totalLost, alive:alive, survivalPct:pct, causes:causes, cagesWithLoss:cagesWithLoss };
}

// buildStockHealth() — farm-wide inventory health: survival, total lost, losses by cause. (menu → Stock health)
function buildStockHealth(){
  var farm = getFarm();
  var s = farmLossStats(farm);
  var kids = sheetHead('Stock health', 'Survival + where you are losing oysters.');
  if (!s.totalLost){
    kids.push(h('div', { class:'emptyNote', style:{marginTop:'14px'} }, 'No losses logged yet.\nLog a loss from a cage’s Work sheet (heat, predation, storm…) and it shows up here, and nets your $ on the water.'));
    return kids;
  }
  function row(label, val, hot){
    return h('div', { class:'kv', style:{fontSize:'14px'} },
      h('span', { class:'k' }, label),
      h('span', { class:'v', style: hot ? {color:'var(--c-work)'} : null }, val));
  }
  var card = h('div', { class:'card' });
  card.appendChild(h('div', { class:'hero num' }, (s.survivalPct != null ? s.survivalPct + '%' : '—')));
  card.appendChild(h('div', { style:{textAlign:'center', color:'var(--ink-2)', fontSize:'12px', marginBottom:'8px'} }, 'standing survival'));
  card.appendChild(row('Alive now', fmtCompact(s.alive) + ' oysters'));
  card.appendChild(row('Total lost', fmtCompact(s.totalLost) + ' oysters', true));
  card.appendChild(row('Cages with losses', '' + s.cagesWithLoss));
  kids.push(card);
  // by cause, biggest first
  var causeKeys = Object.keys(s.causes).sort(function(a,b){ return s.causes[b] - s.causes[a]; });
  if (causeKeys.length){
    var cc = h('div', { class:'card' });
    cc.appendChild(h('div', { class:'eyebrow' }, 'Where they went'));
    causeKeys.forEach(function(k){
      var pctOfLoss = Math.round(s.causes[k] / s.totalLost * 100);
      cc.appendChild(row(k, fmtCompact(s.causes[k]) + ' · ' + pctOfLoss + '%'));
    });
    kids.push(cc);
  }
  return kids;
}
