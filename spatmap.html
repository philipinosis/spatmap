/* ═══════════════════════════════════════════════════════════════════
   OYSTER PEEK (Component 1) — sibling grouping + read-only hover/tap card
   All runtime/read-only; touches no persisted schema (state.v stays 1).
   ═══════════════════════════════════════════════════════════════════ */

/* ── batchGroupKey(cage) — string key for "the same oysters", or null for
      an empty cage. Two cages are siblings iff this is equal AND non-null.
      A pull mints ONE barge.batchId (pullSelectedCages ~§3.5) which
      fillFromBarge unshifts to the FRONT of every destination cage's
      batch.origin.parentBatchIds (~§3.6, line ~4422). So the first parent
      id IS the shared pull cohort. Fresh seed (origin null, fillNewSeed
      ~§3.4) has no pull → group by the stocking event's identity. ─────── */
function batchGroupKey(cage){
  if (!cage || !cage.batch) return null;
  var b = cage.batch, o = b.origin;
  if (o && Array.isArray(o.parentBatchIds) && o.parentBatchIds.length){
    return 'pull:' + o.parentBatchIds[0];            // shared pull cohort id (front of chain)
  }
  // fresh seed → key on the STABLE per-seed-event id (B1/B2). The legacy value hash is mutable
  // (workCages rewrites batch.sizeMm on a growth log, which orphaned a measured bag) AND ambiguous
  // (two separate seedings with identical values collided). seedCohortId is stamped at fill time and
  // backfilled for demo/legacy farms in migrateFarm. Fall back to the value hash only when absent.
  if (b.seedCohortId) return 'seed:' + b.seedCohortId;
  return 'seed:' + (b.stockedDate || '') + '|' +
         (b.sizeMm == null ? '' : b.sizeMm) + '|' +
         (b.hatchery || '') + '|' + (b.ploidy || '');
}

/* ── B3: build the tappable "Open ›" hint. #oysterPeek is pointer-events:none so it never blocks a cage
      tap; the hint alone is pointer-events:auto (CSS) and opens the FULL cage sheet for the cage the peek
      describes. Works on tap (touch) and click (desktop, e.g. a keyboard-pinned peek). We prefer the
      currently-PINNED cage (LAYOUT.hlCage) since that is what the visible peek represents, falling back to
      the cage passed to buildOysterPeek. stopPropagation so the tap can't also bubble to a cage/water
      handler; the peek is cleared first, mirroring how cells open the sheet elsewhere. ──────────────── */
function openPeekHint(cage){
  function fire(e){
    e.preventDefault(); e.stopPropagation();
    var id = LAYOUT.hlCage || (cage && cage.id);
    var cg = id ? cageById(id) : cage;
    if (!cg) return;
    clearCageHighlight();                   // drop the peek + un-dim (matches the cell→sheet open paths)
    if (typeof swallowNextClick === 'function') swallowNextClick();  // eat a touch's trailing synthetic click
    openSheet(function(){ return buildCageDetail(cg); });
  }
  return h('div', { class:'op-hint', role:'button', tabindex:'0', 'aria-label':'Open cage details',
    onClick:fire,
    onKeydown:function(e){ if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') fire(e); } },
    'Open ›');
}

/* ── buildOysterPeek(cage, farm) — a COMPACT read-only glance card (NOT
      the full cage sheet). h()-built (text via createTextNode, never
      innerHTML for user data). The host sets pointer-events:none; only the
      "Open ›" hint re-enables pointer events to open the full sheet (B3). ─ */
function buildOysterPeek(cage, farm){
  farm = farm || getFarm();
  var line = cage ? lineOfCage(cage.id) : null;
  var lineName = (line && line.name) ? line.name : '';
  var label = (cage && cage.label) ? cage.label : '';
  var wrap = h('div', { class:'opeek-card' });

  // B5: accumulate clean, separator-joined field strings for a screen-reader aria-label so the peek's
  // linearized textContent (adjacent .op-row run together) isn't announced as ambiguous run-on values.
  // Built from JS variables (no innerHTML); the VISIBLE card is unchanged.
  var aria = [];

  // EMPTY cage → "Empty · <type name>" + last event summary if any
  if (!cage || !cage.batch){
    var t = cage ? cageType(farm, cage.typeId) : null;
    var head = h('div', { class:'op-head' },
      h('span', { class:'op-dot', style:{ background:STATUS_COLORS.empty } }),
      (label ? (label + (lineName ? ' · ' + lineName : '')) : 'Cage'));
    wrap.appendChild(head);
    aria.push(label ? (label + (lineName ? ', ' + lineName : '')) : 'Cage');
    aria.push('Empty' + (t ? ', ' + t.name : ''));
    wrap.appendChild(h('div', { class:'op-row op-muted' }, 'Empty · ' + (t ? t.name : 'cage')));
    // B7: an EMPTY cage must read clearly empty. The last event is often a 'growth' measurement, whose
    // label ("Grown to 28 mm") reads like a CURRENT reading on a cage that no longer holds oysters. So
    // surface PROVENANCE — the most recent NON-measurement event (Filled / Pulled / Harvested / Worked /
    // Note), which is already past-tense — and drop a trailing measurement entirely.
    if (cage && cage.events && cage.events.length){
      var prov = null, provMs = -Infinity;
      for (var ei = 0; ei < cage.events.length; ei++){
        var pev = cage.events[ei];
        if (pev.type === 'growth') continue;                 // a measurement is not provenance for an empty cage
        var pms = isoToMs(pev.date);
        if (pms >= provMs){ provMs = pms; prov = pev; }
      }
      if (prov){
        var plab = eventLabel(prov);
        if (plab){
          wrap.appendChild(h('div', { class:'op-row op-muted' }, 'Last: ' + plab + ' · ' + monthDay(prov.date)));
          aria.push('Last: ' + plab + ', ' + monthDay(prov.date));
        }
      }
    }
    wrap.appendChild(openPeekHint(cage));
    wrap.setAttribute('role', 'status');
    wrap.setAttribute('aria-label', aria.join('. ') + '.');
    return wrap;
  }

  var st = cageStatus(cage, farm);

  // LINE 1 — status dot + "<label> · <line>"
  wrap.appendChild(h('div', { class:'op-head' },
    h('span', { class:'op-dot', style:{ background:st.color } }),
    (label || 'Cage') + (lineName ? ' · ' + lineName : '')));
  aria.push((label || 'Cage') + (lineName ? ', ' + lineName : ''));

  // LINE 2 — size (measured, else ~estimate, else "no size yet") + ready / needs-work chip
  var sizeMm = latestSize(cage);
  var sizeNode, sizeAria;
  if (typeof sizeMm === 'number'){
    sizeNode = h('span', { class:'op-num' }, sizeMm + ' mm');
    sizeAria = sizeMm + ' mm';
  } else {
    var gm = growthModel(cage, farm);
    if (gm && gm.ok && typeof gm.estTodayMm === 'number'){
      sizeNode = h('span', { class:'op-num' }, '~' + Math.round(gm.estTodayMm) + ' mm');
      sizeAria = 'about ' + Math.round(gm.estTodayMm) + ' mm';
    } else {
      sizeNode = h('span', { class:'op-muted' }, 'no size yet');
      sizeAria = 'no size yet';
    }
  }
  var sizeRow = h('div', { class:'op-row' }, sizeNode);
  if (st.ready){ sizeRow.appendChild(h('span', { class:'op-chip op-ready' }, 'Market-ready')); sizeAria += ', Market-ready'; }
  else if (st.needsWork){ sizeRow.appendChild(h('span', { class:'op-chip op-work' }, 'Needs work')); sizeAria += ', Needs work'; }
  wrap.appendChild(sizeRow);
  aria.push(sizeAria);

  // LINE 3 — "In water <duration>" + count
  var d = daysSince(cage.batch.stockedDate);
  var inWater;                                                          // B6: same-day reads "today", not "0 days"
  if (d == null) inWater = 'In water —';
  else if (d <= 0) inWater = 'In water today';
  else if (d < 14) inWater = 'In water ' + d + (d === 1 ? ' day' : ' days');
  else if (d < 60) inWater = 'In water ' + Math.round(d / 7) + ' wk';
  else { var mo = monthsSince(cage.batch.stockedDate); inWater = 'In water ' + Math.round(mo) + ' mo'; }
  var cnt = (cage.batch.count == null) ? 'uncounted' : (fmtCompact(cage.batch.count) + ' oysters');
  wrap.appendChild(h('div', { class:'op-row op-muted' }, inWater + ' · ' + cnt));
  aria.push(inWater);
  aria.push(cnt);

  // LINE 4 — ploidy · hatchery · grade (omit blanks)
  var bits = [];
  if (cage.batch.ploidy === 'triploid') bits.push('Trips');
  else if (cage.batch.ploidy === 'diploid') bits.push('Dips');
  if (cage.batch.hatchery) bits.push(cage.batch.hatchery);
  if (cage.batch.grade) bits.push(cage.batch.grade);
  if (bits.length){ wrap.appendChild(h('div', { class:'op-row op-muted' }, bits.join(' · '))); aria.push(bits.join(', ')); }

  // footer affordance (visual only — no handler)
  wrap.appendChild(openPeekHint(cage));
  wrap.setAttribute('role', 'status');                  // B5: separator-joined accessible summary (visible card unchanged)
  wrap.setAttribute('aria-label', aria.join('. ') + '.');
  return wrap;
}

/* ── #oysterPeek host + positioner. Mirrors syncPopup()'s clamp/flip math
      (~§ syncPopup). The host is pointer-events:none so it never blocks a
      cage click or the action popup. ─────────────────────────────────── */
function oysterPeekHost(){ return document.getElementById('oysterPeek'); }

// peekAnchorOnScreen(rect) — B5: is a pinned cell's on-screen rect actually within the viewport
// (clamped below the sticky topbar, small margin)? A pinned cell can pan/pinch fully off-screen while
// its #oysterPeek card (position:fixed) stays parked, describing a cage you can't see.
function peekAnchorOnScreen(rect){
  if (!rect) return false;
  var tbEl = document.querySelector('.topbar');
  var topGuard = (tbEl ? tbEl.getBoundingClientRect().bottom : 0);
  var MARGIN = 4;
  return rect.right > MARGIN && rect.left < window.innerWidth - MARGIN &&
         rect.bottom > topGuard + MARGIN && rect.top < window.innerHeight - MARGIN;
}
// syncPinnedPeek(cell) — B5: re-anchor a PINNED peek to its cell's fresh rect, but HIDE the card while
// the cell is off-screen (keeping pin/highlight state so it re-appears when the cell scrolls back).
// Shared by scheduleApplyView's same-tier rAF and reapplyCageHighlight's tier-change redraw path.
function syncPinnedPeek(cell){
  if (!cell) return;
  var pr = cell.getBoundingClientRect();
  if (peekAnchorOnScreen(pr)){
    var pHost = oysterPeekHost();
    if (pHost && !pHost.classList.contains('show')){
      var pCage = cageById(LAYOUT.hlCage);                  // re-show (rebuild + .show) after an off-screen hide
      if (pCage) showPeek(pCage, pr); else positionPeek(pr);
    } else {
      positionPeek(pr);
    }
  } else {
    hidePeek();                                             // off-screen → hide card, keep pin/highlight state
  }
}

function positionPeek(anchorRect){
  var host = oysterPeekHost();
  if (!host || !anchorRect) return;
  var pw = host.offsetWidth || 220, ph = host.offsetHeight || 90;
  var M = 8;
  var aw = anchorRect.width || 0;
  var cx = anchorRect.left + aw / 2;
  // vertical: park ABOVE the anchor; if that collides with the sticky topbar, flip BELOW.
  var tb = document.querySelector('.topbar');
  var topGuard = (tb ? tb.getBoundingClientRect().bottom : 0) + M;
  var aboveTop = anchorRect.top - ph - 10;
  var top, flippedBelow = false;
  if (aboveTop < topGuard){
    top = Math.min(window.innerHeight - ph - M, anchorRect.bottom + 10);   // flip below, clamp to viewport bottom
    if (top < topGuard) top = topGuard;                                    // B1: never under the sticky topbar
    flippedBelow = true;
  } else {
    top = aboveTop;
  }
  if (top < topGuard) top = topGuard;                                      // B1/B2: clamp BOTH branches below the topbar
  // horizontal: normally center on the anchor, clamp both edges to an M margin.
  var left = cx - pw / 2;
  // B4: a centered card blankets the anchor's own column — when flipped BELOW it covers the anchor row +
  // the lit siblings beneath it; when parked ABOVE (the default, incl. a mid-canvas anchor) the card's
  // body covers the lit cohort cells stacked above the anchor in the SAME column. Either way the card
  // shares the anchor's column, so slide it to the side of the anchor with more room (same logic for
  // both placements) — keeping the anchor cell and most lit siblings visible. Fall back to hugging the
  // side with more room, or the clamped center, if neither side fully fits on-screen.
  var roomRight = window.innerWidth - M - anchorRect.right;              // space right of the anchor
  var roomLeft = anchorRect.left - M;                                   // space left of the anchor
  if (roomRight >= roomLeft && roomRight >= pw){
    left = anchorRect.right + 8;                                        // park to the RIGHT of the anchor
  } else if (roomLeft >= pw){
    left = anchorRect.left - 8 - pw;                                    // park to the LEFT of the anchor
  } else if (roomRight >= roomLeft){
    left = window.innerWidth - pw - M;                                  // can't fully clear → hug the side with more room
  } else {
    left = M;
  }
  if (left < M) left = M;
  if (left > window.innerWidth - pw - M) left = window.innerWidth - pw - M;
  if (left < M) left = M;                                                   // tiny-viewport safety
  host.style.left = left + 'px';
  host.style.top = top + 'px';
}

function showPeek(cage, anchorRect){
  var host = oysterPeekHost();
  if (!host) return;
  host.textContent = '';                                                    // clear (no innerHTML)
  host.appendChild(buildOysterPeek(cage, getFarm()));
  host.classList.add('show');                                               // make measurable before positioning
  host.classList.remove('hoverbridge');                                     // B2: default = inert card; onHover re-adds for hover
  positionPeek(anchorRect);
}

function hidePeek(){
  var host = oysterPeekHost();
  if (!host) return;
  host.classList.remove('show');
  host.classList.remove('hoverbridge');                                     // B2: drop the hover-bridge pointer-events
  host.textContent = '';
}

/* ── lineageEvents(batch, farm) — every Event whose batchId is in this
      batch's lineage chain (this id + origin.parentBatchIds upward),
      across ALL cages + the barge, sorted newest first (§3.12). ─────── */
function lineageEvents(batch, farm){
  if (!batch) return [];
  // walk the provenance chain upward to collect every ancestor batch id
  var chain = {};
  var byId = {};
  (farm.batches || []).forEach(function(b){ byId[b.id] = b; });
  var stack = [batch.id]; chain[batch.id] = 1;
  while (stack.length){
    var id = stack.pop();
    var b = byId[id] || (batch.id === id ? batch : null);
    if (b && b.origin && b.origin.parentBatchIds){
      b.origin.parentBatchIds.forEach(function(pid){ if (!chain[pid]){ chain[pid] = 1; stack.push(pid); } });
    }
  }
  var out = [];
  farm.lines.forEach(function(line){ line.cages.forEach(function(c){
    c.events.forEach(function(ev){ if (ev.batchId && chain[ev.batchId]) out.push(ev); });
  }); });
  // include barge events tied to any chain batch id
  if (farm.barge && Array.isArray(farm.barge.events)){
    farm.barge.events.forEach(function(ev){ if (ev.batchId && chain[ev.batchId]) out.push(ev); });
  }
  out.sort(function(a,b){ return isoToMs(b.date) - isoToMs(a.date); });
  return out;
}

/* ═══════════════════════════════════════════════════════════════════
   GROWTH + SEASONAL PROJECTION (§4 — exact constants + honest copy)
   ═══════════════════════════════════════════════════════════════════ */
var DEFAULT_GROWTH_MM_DAY = 0.18;   // Gulf triploid JUVENILE prior (fast phase). With the seasonal curve +
                                    // the near-market slowdown below, a spring seed nets ~13–14 mo to market.
var MIN_GROWTH_MM_DAY = 0.02;       // below this, projected date is "unknown", not 50yr out
var STALE_DAYS = 30;
var MAX_PROJECTION_DAYS = 730;
// Jan..Dec Gulf seasonality. Winter (Dec–Feb) is a near-stall: below ~12 °C oyster SHELL LENGTH growth
// almost halts even though the animal lives. Hardened from the old soft 0.35/0.45 winters.
var SEASON_MULT = [0.20,0.25,0.65,1.15,1.35,1.35,1.10,1.05,1.20,1.25,0.55,0.22];
// Sigmoid finish: oyster length growth is NOT linear — it flattens hard near market as energy shifts to
// cup depth/meat/shell. Model it von-Bertalanffy style: the daily increment is damped toward an asymptote.
var GROWTH_ASYMPTOTE_MULT = 1.35;   // L∞ ≈ 1.35 × market (length keeps creeping past market, very slowly)
var GROWTH_DAMP_START     = 0.60;   // full juvenile rate below 0.6 × market; ramps down above it
var GROWTH_DAMP_FLOOR     = 0.15;   // never fully stall (keeps a projection from running to infinity)
// growthDamp(size, market) → 1 in the juvenile phase, → GROWTH_DAMP_FLOOR as size approaches L∞.
function growthDamp(size, market){
  if (!(market > 0)) return 1;
  var lmax = market * GROWTH_ASYMPTOTE_MULT, start = market * GROWTH_DAMP_START;
  if (size <= start) return 1;
  var f = (lmax - size) / (lmax - start);
  return f < GROWTH_DAMP_FLOOR ? GROWTH_DAMP_FLOOR : (f > 1 ? 1 : f);
}
// growthDayDelta — ONE source of truth for a single day's mm gain (season × near-market damping).
// Both integrateGrowth and the growth chart's projection curve use this, so they can never disagree.
function growthDayDelta(size, ms, ratePerDay, market){
  return ratePerDay * SEASON_MULT[new Date(ms).getUTCMonth()] * growthDamp(size, market);
}

// growthPoints(cage) — growth/stocked events with a sizeMm, sorted by date
function growthPoints(cage){
  if (!cage || !cage.events) return [];
  var pts = [];
  cage.events.forEach(function(ev){
    if ((ev.type === 'growth' || ev.type === 'stocked' || ev.type === 'filled') && typeof ev.sizeMm === 'number'){
      pts.push({ ms:isoToMs(ev.date), date:ev.date, size:ev.sizeMm });
    }
  });
  pts.sort(function(a,b){ return a.ms - b.ms; });
  return pts;
}

// integrateGrowth — seasonal forward-integration with the near-market slowdown (§4.3).
// `market` anchors the sigmoid damping; pass it so the finish-line flatten is applied.
function integrateGrowth(fromMs, size, ratePerDay, targetSize, maxDays, market){
  var ms = fromMs, days = 0;
  while (size < targetSize && days < maxDays){
    ms += 86400000; days++;
    size += growthDayDelta(size, ms, ratePerDay, market);
  }
  return { ms:ms, size:size, days:days, reached: size >= targetSize };
}

// growthModel(cage, farm) — rate selection + estimate today + projection + confidence (§4.2–4.4)
function growthModel(cage, farm){
  var market = farm.settings.marketSizeMm;
  var pts = growthPoints(cage);
  var model = {
    ok:false, points:pts, rateMmPerDay:DEFAULT_GROWTH_MM_DAY, rateMmPerMonth:DEFAULT_GROWTH_MM_DAY*30.4375,
    rateSource:'prior', noisy:false, estTodayMm:null, readyNow:false, daysToMarket:null,
    projectedDate:null, projectionCapped:false, confidence:'low',
    lastMeasuredSizeMm:null, lastMeasuredDate:null, isStale:false
  };
  if (!cage || !cage.batch) return model;

  var rate = DEFAULT_GROWTH_MM_DAY, source = 'prior', noisy = false;
  if (pts.length >= 2){
    var first = pts[0], last = pts[pts.length-1];
    if (pts.length === 2){
      var dd = (last.ms - first.ms) / 86400000;
      rate = dd > 0 ? (last.size - first.size) / dd : DEFAULT_GROWTH_MM_DAY;
      source = 'observed';
    } else {
      // ordinary least-squares slope over (dayOffset, size)
      var n = pts.length, sx = 0, sy = 0, sxx = 0, sxy = 0;
      for (var i=0; i<n; i++){
        var x = (pts[i].ms - first.ms) / 86400000, y = pts[i].size;
        sx += x; sy += y; sxx += x*x; sxy += x*y;
      }
      var denom = (n*sxx - sx*sx);
      rate = denom !== 0 ? (n*sxy - sx*sy) / denom : DEFAULT_GROWTH_MM_DAY;
      source = 'observed';
    }
    if (!(rate > 0)){ rate = DEFAULT_GROWTH_MM_DAY; source = 'prior'; noisy = true; }   // oysters don't shrink
  }
  if (rate < MIN_GROWTH_MM_DAY) rate = MIN_GROWTH_MM_DAY;

  model.rateMmPerDay = rate; model.rateMmPerMonth = rate * 30.4375; model.rateSource = source; model.noisy = noisy;

  // estimate today: integrate from the last measurement forward to today
  var todayMs = isoToMs(todayISO());
  var lastPt = pts.length ? pts[pts.length-1] : null;
  if (lastPt){
    model.lastMeasuredSizeMm = lastPt.size; model.lastMeasuredDate = lastPt.date;
    var ds = daysSince(lastPt.date); model.isStale = (ds != null && ds > 90);
    if (lastPt.ms < todayMs){
      var est = integrateGrowth(lastPt.ms, lastPt.size, rate, Infinity, Math.min(MAX_PROJECTION_DAYS, Math.max(0, Math.round((todayMs-lastPt.ms)/86400000))), market); // clamp (H3)
      model.estTodayMm = est.size;
    } else model.estTodayMm = lastPt.size;
  } else {
    // no points → estimate from stockedDate using the prior
    var sd = cage.batch.stockedDate, base = (typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : 15;
    if (isValidISO(sd) && isoToMs(sd) < todayMs){
      var est0 = integrateGrowth(isoToMs(sd), base, rate, Infinity, Math.min(MAX_PROJECTION_DAYS, Math.round((todayMs-isoToMs(sd))/86400000)), market); // clamp (H3)
      model.estTodayMm = est0.size;
    } else model.estTodayMm = base;
  }
  model.ok = true;

  // ready now?
  model.readyNow = (model.estTodayMm != null && model.estTodayMm >= market);

  // projection: integrate today → market, capped
  if (!model.readyNow){
    var proj = integrateGrowth(todayMs, model.estTodayMm != null ? model.estTodayMm : 15, rate, market, MAX_PROJECTION_DAYS, market);
    model.daysToMarket = proj.days;
    if (proj.reached && rate >= MIN_GROWTH_MM_DAY){
      var pd = new Date(proj.ms);
      model.projectedDate = pd.getUTCFullYear() + '-' + pad2(pd.getUTCMonth()+1) + '-' + pad2(pd.getUTCDate());
    }
    if (!proj.reached) model.projectionCapped = true;
  }

  // confidence (§4.4)
  var spanDays = pts.length ? (pts[pts.length-1].ms - pts[0].ms) / 86400000 : 0;
  var freshEnough = (model.lastMeasuredDate != null && daysSince(model.lastMeasuredDate) != null && daysSince(model.lastMeasuredDate) >= 0 && daysSince(model.lastMeasuredDate) <= STALE_DAYS);
  if (source === 'prior' || noisy || model.isStale) model.confidence = 'low';
  else if (pts.length >= 3 && spanDays >= 45 && freshEnough) model.confidence = 'high';
  else model.confidence = 'medium';

  return model;
}

// projectionLabel(model, farm) — honest copy (§4.5)
function projectionLabel(model, farm){
  if (!model || !model.ok) return '—';
  farm = farm || getFarm();
  var market = farm.settings.marketSizeMm;
  if (model.readyNow){
    var measuredReady = typeof model.lastMeasuredSizeMm === 'number' && model.lastMeasuredSizeMm >= market;
    return measuredReady ? 'Market-ready now' : 'Likely market-ready (est.) — log a growth check to confirm';
  }
  if (model.projectionCapped) return '1+ years out';
  if (model.projectedDate) return '~' + monthYear(model.projectedDate) + ' (' + market + ' mm)';
  return '—';
}

// confidenceHint(model) — the one-line "why" (§4.5)
function confidenceHint(model){
  if (!model || model.confidence === 'high') return null;
  var why;
  if (model.rateSource !== 'observed') why = 'based on a typical Gulf growth rate — log growth checks to use this cage’s own pace';
  else if (model.noisy)   why = 'recent checks disagree — re-measure to sharpen it';
  else if (model.isStale) why = 'last check was ' + daysSince(model.lastMeasuredDate) + ' days ago — log a fresh growth check to sharpen it';
  else                    why = 'log another growth check to sharpen it';
  return (model.confidence === 'low' ? 'Low' : 'Medium') + ' confidence projection: ' + why + '.';
}

/* ── growthChartSVG(cage, marketMm, model) — inline SVG (§4.6).
      Solid teal polyline through measurements; dashed projection to the
      market line; dashed market threshold labeled "market N mm". ─────── */
// projectionCurve — sample the forward growth trajectory (last point → endMs) into ~24 points so the
// chart can draw a flattening curve. Uses growthDayDelta, the same per-day math as integrateGrowth.
function projectionCurve(fromMs, size, rate, market, endMs){
  var out = [{ ms:fromMs, size:size }];
  if (!(endMs > fromMs)) return out;
  var totalDays = Math.round((endMs - fromMs) / 86400000);
  if (totalDays < 1) return out;
  var stepDays = Math.max(1, Math.round(totalDays / 24)), ms = fromMs, sz = size, day = 0;
  while (ms < endMs && day < MAX_PROJECTION_DAYS){
    var nextMs = Math.min(endMs, ms + stepDays * 86400000);
    while (ms < nextMs && day < MAX_PROJECTION_DAYS){ ms += 86400000; day++; sz += growthDayDelta(sz, ms, rate, market); }
    out.push({ ms:ms, size:sz });
  }
  return out;
}
function growthChartSVG(cage, marketMm, model){
  var pts = (model && model.points) ? model.points : growthPoints(cage);
  var W = 320, H = 150, padL = 8, padR = 10, padT = 12, padB = 18;
  var todayMs = isoToMs(todayISO());

  // x-domain: first point (or stockedDate) → projectedDate/today; y-domain: 0 → max(market, sizes)+pad
  var startMs = pts.length ? pts[0].ms : (isValidISO(cage.batch && cage.batch.stockedDate) ? isoToMs(cage.batch.stockedDate) : todayMs);
  var endMs = todayMs;
  if (model && model.projectedDate) endMs = Math.max(endMs, isoToMs(model.projectedDate));
  if (endMs <= startMs) endMs = startMs + 86400000 * 30;
  var maxSize = marketMm;
  pts.forEach(function(p){ if (p.size > maxSize) maxSize = p.size; });
  if (model && typeof model.estTodayMm === 'number' && model.estTodayMm > maxSize) maxSize = model.estTodayMm;
  maxSize = maxSize * 1.12;

  function X(ms){ return padL + (ms - startMs) / (endMs - startMs) * (W - padL - padR); }
  function Y(s){ return H - padB - (s / maxSize) * (H - padT - padB); }

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMidYMid meet" aria-hidden="true">';
  // axes (hairline)
  svg += '<line x1="' + padL + '" y1="' + (H-padB) + '" x2="' + (W-padR) + '" y2="' + (H-padB) + '" stroke="#CBD9DB" stroke-width="1"/>';
  // market threshold (dashed teal) + label
  var my = Y(marketMm);
  svg += '<line x1="' + padL + '" y1="' + my.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + my.toFixed(1) + '" stroke="#0E7C8B" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>';
  svg += '<text x="' + (W-padR) + '" y="' + (my - 4).toFixed(1) + '" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#0E7C8B">market ' + marketMm + ' mm</text>';

  // measured polyline (solid teal) + nodes
  if (pts.length){
    var d = '';
    pts.forEach(function(p, i){ d += (i ? ' L' : 'M') + X(p.ms).toFixed(1) + ' ' + Y(p.size).toFixed(1); });
    svg += '<polyline points="' + pts.map(function(p){ return X(p.ms).toFixed(1) + ',' + Y(p.size).toFixed(1); }).join(' ') + '" fill="none" stroke="#0E7C8B" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    // projection CURVE: integrate last measured point forward with the SAME season+sigmoid model,
    // so the dashed line FLATTENS toward market instead of shooting straight through it.
    var lp = pts[pts.length-1];
    var rate = (model && model.rateMmPerDay) || DEFAULT_GROWTH_MM_DAY;
    var endProjMs = (model && model.projectedDate) ? isoToMs(model.projectedDate) : todayMs;
    var curve = projectionCurve(lp.ms, lp.size, rate, marketMm, endProjMs);
    if (curve.length > 1){
      svg += '<polyline points="' + curve.map(function(q){ return X(q.ms).toFixed(1) + ',' + Y(q.size).toFixed(1); }).join(' ') + '" fill="none" stroke="#0E7C8B" stroke-width="2" stroke-dasharray="5 4" stroke-linejoin="round" stroke-linecap="round" opacity="0.55"/>';
    }
    pts.forEach(function(p){ svg += '<circle cx="' + X(p.ms).toFixed(1) + '" cy="' + Y(p.size).toFixed(1) + '" r="3.2" fill="#0E7C8B"/>'; });
  } else {
    // no measurements → just a dashed prior line from start to projected/today
    var sy = Y((cage.batch && typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : 15);
    var ex, ey;
    if (model && model.projectedDate){ ex = X(isoToMs(model.projectedDate)); ey = Y(marketMm); }
    else { ex = X(todayMs); ey = Y(model && typeof model.estTodayMm === 'number' ? model.estTodayMm : marketMm); }
    svg += '<line x1="' + X(startMs).toFixed(1) + '" y1="' + sy.toFixed(1) + '" x2="' + ex.toFixed(1) + '" y2="' + ey.toFixed(1) + '" stroke="#0E7C8B" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>';
  }
  // axis labels (start date left, projected/today right)
  svg += '<text x="' + padL + '" y="' + (H-5) + '" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#6E878C">' + (isValidISO(toISOfromMs(startMs)) ? monthYear(toISOfromMs(startMs)) : '') + '</text>';
  var rightIso = (model && model.projectedDate) ? model.projectedDate : todayISO();
  svg += '<text x="' + (W-padR) + '" y="' + (H-5) + '" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#6E878C">' + monthYear(rightIso) + '</text>';
  svg += '</svg>';
  return svg;
}
// toISOfromMs — UTC ms → ISO yyyy-mm-dd (chart axis labels)
function toISOfromMs(ms){ var d = new Date(ms); return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate()); }

/* ══════════════════════════════════════════════════════════════════
   PHOTOS — IndexedDB blobs + capture/compress + widgets + viewer + sweep
   (§5 / PHOTOS-IMPLEMENTATION-PLAN). ES5 .then() style, no async/await.
   Binary lives ONLY in IDB 'spatmapPhotos'; never base64 in localStorage.
   ══════════════════════════════════════════════════════════════════ */
var PHOTO_DB = 'spatmapPhotos', PHOTO_STORE = 'photos', PHOTO_DB_VER = 1;
var photosUnavailable = false;          // true once we know IDB can't be used (private mode / Lockdown)
var photoDBP = null;                    // cached OPEN promise (never cache a rejection)
var photoPersistAsked = false;          // fire navigator.storage.persist() once
var PHOTO_CAP = 6;                      // soft cap of photos per event/batch

// photoDB() → Promise<IDBDatabase|null>. Creates the store on upgrade.
//   Missing IDB / open error / private mode → resolve null + set photosUnavailable.
//   Wrapped in a ~3s timeout that resolves null and retries next call (Safari first-open hang);
//   a rejected/null result is never cached, so the next call re-tries cleanly.
function photoDB(){
  if (photoDBP) return photoDBP;
  if (typeof indexedDB === 'undefined' || !indexedDB){ photosUnavailable = true; return Promise.resolve(null); }
  photoDBP = new Promise(function(resolve){
    var settled = false;
    function done(db){ if (settled) return; settled = true; if (!db){ photoDBP = null; } resolve(db); }
    var timer = setTimeout(function(){ done(null); }, 3000);   // first-open hang guard
    var req;
    try { req = indexedDB.open(PHOTO_DB, PHOTO_DB_VER); }
    catch (e){ clearTimeout(timer); photosUnavailable = true; done(null); return; }
    req.onupgradeneeded = function(){
      try { var db = req.result; if (!db.objectStoreNames.contains(PHOTO_STORE)) db.createObjectStore(PHOTO_STORE, { keyPath:'id' }); }
      catch (e){}
    };
    req.onsuccess = function(){ clearTimeout(timer);
      var db = req.result;
      // guard against a half-created DB (store missing) → unusable
      if (!db.objectStoreNames.contains(PHOTO_STORE)){ photosUnavailable = true; done(null); return; }
      db.onclose = function(){ photoDBP = null; };               // let a future call reopen
      done(db);
    };
    req.onerror = function(){ clearTimeout(timer); photosUnavailable = true; done(null); };
    req.onblocked = function(){ clearTimeout(timer); done(null); };
  });
  return photoDBP;
}
// photoTxStore(mode) → Promise<IDBObjectStore|null>
function photoTxStore(mode){
  return photoDB().then(function(db){
    if (!db) return null;
    try { return db.transaction(PHOTO_STORE, mode).objectStore(PHOTO_STORE); }
    catch (e){ return null; }
  });
}
// photoPut(rec) → Promise<id>. Rejects on quota / failure. First success asks for persistence.
function photoPut(rec){
  return photoTxStore('readwrite').then(function(store){
    if (!store) return Promise.reject(new Error('Photos need browser storage that isn\'t available here.'));
    return new Promise(function(resolve, reject){
      var req;
      try { req = store.put(rec); }
      catch (e){ reject(e); return; }
      req.onsuccess = function(){
        if (!photoPersistAsked){ photoPersistAsked = true;
          try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch (e){} }
        resolve(rec.id);
      };
      req.onerror = function(){ reject(req.error || new Error('Could not save photo — device storage may be full.')); };
    });
  });
}
// photoGet(id) → Promise<rec|null>
function photoGet(id){
  if (!id) return Promise.resolve(null);
  return photoTxStore('readonly').then(function(store){
    if (!store) return null;
    return new Promise(function(resolve){
      var req; try { req = store.get(id); } catch (e){ resolve(null); return; }
      req.onsuccess = function(){ resolve(req.result || null); };
      req.onerror = function(){ resolve(null); };
    });
  });
}
// photoGetMany(ids) → Promise<rec[]> (nulls filtered, order follows ids)
function photoGetMany(ids){
  ids = ids || [];
  return Promise.all(ids.map(function(id){ return photoGet(id); }))
    .then(function(recs){ return recs.filter(function(r){ return !!r; }); });
}
// photoDeleteMany(ids) → Promise
function photoDeleteMany(ids){
  ids = ids || [];
  if (!ids.length) return Promise.resolve();
  return photoTxStore('readwrite').then(function(store){
    if (!store) return;
    return new Promise(function(resolve){
      var pending = ids.length;
      function step(){ if (--pending <= 0) resolve(); }
      ids.forEach(function(id){
        var req; try { req = store.delete(id); } catch (e){ step(); return; }
        req.onsuccess = step; req.onerror = step;
      });
    });
  });
}
// photoAllIds() → Promise<string[]>
function photoAllIds(){
  return photoTxStore('readonly').then(function(store){
    if (!store) return [];
    return new Promise(function(resolve){
      var req;
      try { req = store.getAllKeys(); }
      catch (e){ resolve([]); return; }
      req.onsuccess = function(){ resolve(req.result || []); };
      req.onerror = function(){ resolve([]); };
    });
  });
}

/* ── Capture + compression (§5.2) ─────────────────────────────────── */
// compressPhoto(file) → Promise<{blob,w,h}>. Re-encodes to ≤1280px JPEG q0.72
//   (transparently converts HEIC, strips EXIF/GPS). Prefers createImageBitmap with
//   from-image orientation; falls back to new Image()+objectURL for older Safari.
function compressPhoto(file){
  return new Promise(function(resolve, reject){
    if (!file){ reject(new Error('No photo selected.')); return; }
    function fromCanvas(srcW, srcH, draw){
      var longest = Math.max(srcW, srcH) || 1;
      var scale = Math.min(1, 1280 / longest);
      var w = Math.max(1, Math.round(srcW * scale)), hh = Math.max(1, Math.round(srcH * scale));
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = hh;
      var ctx = canvas.getContext('2d');
      try { draw(ctx, w, hh); } catch (e){ reject(new Error('Could not read that photo.')); return; }
      canvas.toBlob(function(blob){
        if (!blob){ reject(new Error('Photo too large to save on this device.')); return; }   // low-memory / corrupt
        resolve({ blob:blob, w:w, h:hh });
      }, 'image/jpeg', 0.72);
    }
    // Path A: createImageBitmap with EXIF-orientation applied
    if (typeof createImageBitmap === 'function'){
      var opts = null;
      try { opts = { imageOrientation:'from-image' }; } catch (e){ opts = null; }
      createImageBitmap(file, opts || undefined).then(function(bmp){
        fromCanvas(bmp.width, bmp.height, function(ctx, w, hh){ ctx.drawImage(bmp, 0, 0, w, hh); if (bmp.close) bmp.close(); });
      }).catch(function(){ pathB(); });
      return;
    }
    pathB();
    // Path B: <img> + object URL fallback
    function pathB(){
      var url, img = new Image();
      try { url = URL.createObjectURL(file); } catch (e){ reject(new Error('Could not read that photo.')); return; }
      img.onload = function(){
        var sw = img.naturalWidth || img.width, sh = img.naturalHeight || img.height;
        fromCanvas(sw, sh, function(ctx, w, hh){ ctx.drawImage(img, 0, 0, w, hh); });
        URL.revokeObjectURL(url);
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error('Could not read that photo.')); };
      img.src = url;
    }
  });
}
// addPhotoFromFile(file) → Promise<id>. Compress → store a PhotoRecord, resolve its id.
function addPhotoFromFile(file){
  return compressPhoto(file).then(function(out){
    var rec = { id:uid(), blob:out.blob, w:out.w, h:out.h, createdAt:Date.now() };
    return photoPut(rec);
  });
}

/* ── Widgets (§5.3) ───────────────────────────────────────────────── */
// photoField(existingIds) → { el, ids(), busy() }. Editable capture widget.
//   Thumbs (each with a ✕ that drops the id from the LOCAL list only — the sweep
//   reclaims the blob), then a dashed "Add photo" tile wired to a hidden file input.
function photoField(existingIds){
  var ids = (existingIds || []).slice();
  var pending = 0;                                   // compressions in flight
  var el = h('div', null);
  el.appendChild(h('label', null, 'Photos'));
  if (photosUnavailable){
    el.appendChild(h('div', { class:'fieldHint' }, 'Photos need browser storage that isn\'t available here (private browsing?).'));
    return { el:el, ids:function(){ return ids.slice(); }, busy:function(){ return false; } };
  }
  var row = h('div', { class:'photoRow' });
  el.appendChild(row);
  // hidden file input MUST live in the DOM when .click()ed (iOS) — keep it inside el
  var input = h('input', { type:'file', accept:'image/*', multiple:true, style:{display:'none'} });
  el.appendChild(input);

  function thumbFor(id){
    var wrap = h('div', { class:'photoThumbWrap' });
    var img = h('img', { alt:'photo' });
    wrap.appendChild(img);
    photoGet(id).then(function(rec){
      if (rec && rec.blob){ img.src = trackURL(URL.createObjectURL(rec.blob)); }
      else { img.style.opacity = '.4'; }             // blob not (yet) present
    });
    wrap.appendChild(h('button', { type:'button', class:'rmph', 'aria-label':'Remove photo', onclick:function(){
      var i = ids.indexOf(id); if (i >= 0) ids.splice(i, 1);   // local only; never deletes the blob
      if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
    } }, '×'));
    return wrap;
  }
  function addTile(){
    return h('button', { type:'button', class:'photoAdd', 'aria-label':'Add photo',
      html:icon('camera', 24), onclick:function(){ input.click(); } });
  }
  var tile = addTile();
  ids.forEach(function(id){ row.appendChild(thumbFor(id)); });
  row.appendChild(tile);

  input.addEventListener('change', function(){
    var files = input.files ? Array.prototype.slice.call(input.files) : [];
    input.value = '';                                // allow re-picking the same file
    files.forEach(function(file){
      if (ids.length + pending >= PHOTO_CAP){ toast('Up to ' + PHOTO_CAP + ' photos'); return; }
      pending++;
      addPhotoFromFile(file).then(function(id){
        pending--;
        ids.push(id);
        row.insertBefore(thumbFor(id), tile);        // keep the Add tile last
      }).catch(function(err){
        pending--;
        toast((err && err.message) ? err.message : 'Could not save photo');
      });
    });
  });

  return {
    el: el,
    ids: function(){ return ids.slice(); },
    busy: function(){ return pending > 0; }
  };
}

// photoStrip(photoIds, caption) → read-only horizontal thumb row. Tap → openPhotoViewer.
//   `caption` (optional) is passed to the viewer so the caption strip can name the event.
function photoStrip(photoIds, caption){
  var strip = h('div', { class:'photoStrip' });
  var list = (photoIds || []).filter(function(p){ return typeof p === 'string'; });
  list.forEach(function(id, idx){
    var img = h('img', { class:'thumb', alt:'photo' });
    img.addEventListener('click', function(){ openPhotoViewer(list, idx, caption); });
    photoGet(id).then(function(rec){
      if (rec && rec.blob){ img.src = trackURL(URL.createObjectURL(rec.blob)); }
      else { img.style.opacity = '.35'; img.style.background = 'var(--surface-sink)'; }   // muted placeholder
    });
    strip.appendChild(img);
  });
  return strip;
}

// openPhotoViewer(photoIds, start, caption) → singleton #photoViewer over the sheet.
//   Fit-to-screen img, ✕ close, swipe/Arrow prev-next, "2 / 5" counter, caption strip
//   (photo date + the event it's attached to). Escape closes the viewer first (the global
//   keydown handler defers when #photoViewer has a child). Revokes its own URL on nav/close.
var _pvURL = null;
var _pvSeq = 0;               // sequence token so a fast nav/close can't strand an in-flight blob URL (audit F13/H3)
var _pvTeardown = null;       // teardown of the live viewer, so re-opening can't leak its URL + capture-phase keydown handler
function openPhotoViewer(photoIds, start, caption){
  var list = (photoIds || []).filter(function(p){ return typeof p === 'string'; });
  if (!list.length) return;
  var idx = Math.max(0, Math.min(start || 0, list.length - 1));
  var host = document.getElementById('photoViewer');
  if (!host){ host = h('div', { id:'photoViewer' }); document.body.appendChild(host); }
  if (_pvTeardown){ try { _pvTeardown(); } catch (e) {} }   // re-entry: kill the previous viewer first (revoke URL + unbind keydown/touch)
  host.className = 'viewer';                           // apply the full-screen overlay styling while open
  host.innerHTML = '';

  function revoke(){ if (_pvURL){ URL.revokeObjectURL(_pvURL); _pvURL = null; } }
  function close(){
    _pvSeq++;                                         // invalidate any in-flight show() so it can't create a dangling URL
    revoke();
    document.removeEventListener('keydown', onKey, true);
    host.removeEventListener('touchstart', onTouchStart);
    host.removeEventListener('touchend', onTouchEnd);
    host.innerHTML = '';                              // empties firstChild → Escape returns to the sheet
    host.className = '';                              // drop .viewer so the empty div stops covering the screen
    _pvTeardown = null;
  }

  var img = h('img', { alt:'photo' });
  var cap = h('div', { class:'cap' });
  var counter = h('div', { class:'cap', style:{paddingTop:'2px', opacity:'.85'} });
  var closeBtn = h('button', { class:'x', 'aria-label':'Close', html:icon('close', 22), onclick:close });
  var prev = h('button', { class:'nav prev', 'aria-label':'Previous', html:icon('back', 22),
    onclick:function(){ show(idx - 1); } });
  var next = h('button', { class:'nav next', 'aria-label':'Next', html:icon('chevron', 22),
    onclick:function(){ show(idx + 1); } });

  function show(i){
    if (!list.length) return;
    idx = (i + list.length) % list.length;            // wrap
    revoke();
    var myReq = ++_pvSeq;                              // this navigation's token
    img.removeAttribute('src');
    photoGet(list[idx]).then(function(rec){
      if (myReq !== _pvSeq) return;                    // superseded by a newer show()/close() — don't strand a decoded JPEG (audit F13/H3)
      if (rec && rec.blob){ _pvURL = URL.createObjectURL(rec.blob); img.src = _pvURL; }
      var bits = [];
      if (typeof caption === 'string' && caption) bits.push(caption);
      else if (typeof caption === 'function'){ var c = caption(idx, rec); if (c) bits.push(c); }
      if (rec && rec.createdAt) bits.push(monthDay(toISOfromMs(rec.createdAt)));
      cap.textContent = bits.join(' · ');
      counter.textContent = (idx + 1) + ' / ' + list.length;
    });
    prev.style.display = next.style.display = (list.length > 1) ? '' : 'none';
  }

  host.appendChild(img);
  host.appendChild(closeBtn);
  host.appendChild(prev);
  host.appendChild(next);
  var capWrap = h('div', { style:{position:'absolute', left:'0', right:'0', bottom:'0'} }, cap, counter);
  host.appendChild(capWrap);

  function onKey(e){
    if (e.key === 'Escape'){ e.stopPropagation(); e.preventDefault(); close(); }
    else if (e.key === 'ArrowLeft'){ show(idx - 1); }
    else if (e.key === 'ArrowRight'){ show(idx + 1); }
  }
  document.addEventListener('keydown', onKey, true);   // capture phase → runs before the sheet's Escape

  var tx = 0, ty = 0;
  function onTouchStart(e){ if (e.touches && e.touches[0]){ tx = e.touches[0].clientX; ty = e.touches[0].clientY; } }
  function onTouchEnd(e){
    var t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
    if (!t) return;
    var dx = t.clientX - tx, dy = t.clientY - ty;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){ show(idx + (dx < 0 ? 1 : -1)); }
  }
  host.addEventListener('touchstart', onTouchStart, { passive:true });
  host.addEventListener('touchend', onTouchEnd, { passive:true });
  _pvTeardown = close;                                 // mark this viewer live so a re-open tears it down first

  show(idx);
}

/* ── Reference scan + orphan sweep (§5.7) ─────────────────────────── */
// referencedPhotoIds() → map { id:true } of every photoId referenced anywhere in state.
function referencedPhotoIds(){
  var set = {};
  function add(arr){ if (Array.isArray(arr)) arr.forEach(function(p){ if (typeof p === 'string') set[p] = true; }); }
  (state && state.farms ? state.farms : []).forEach(function(farm){
    (farm.batches || []).forEach(function(b){ add(b.photoIds); });
    (farm.lines || []).forEach(function(line){
      (line.cages || []).forEach(function(cage){
        if (cage.batch) add(cage.batch.photoIds);
        (cage.events || []).forEach(function(ev){ add(ev.photoIds); });
      });
    });
    if (farm.barge && Array.isArray(farm.barge.events)) farm.barge.events.forEach(function(ev){ add(ev.photoIds); });
    (farm.harvestLog || []).forEach(function(hentry){ add(hentry.photoIds); });
  });
  return set;
}
// sweepPhotos() → delete IDB blobs not referenced anywhere AND older than 10 min (grace window).
function sweepPhotos(){
  if (photosUnavailable) return Promise.resolve();
  var refs = referencedPhotoIds();
  var cutoff = Date.now() - 10 * 60 * 1000;
  return photoAllIds().then(function(allIds){
    if (!allIds.length) return;
    var unref = allIds.filter(function(id){ return !refs[id]; });
    if (!unref.length) return;
    // only delete those past the grace window (protects an in-progress, unsubmitted form)
    return photoGetMany(unref).then(function(recs){
      var byId = {}; recs.forEach(function(r){ byId[r.id] = r; });
      var toDelete = unref.filter(function(id){
        var r = byId[id];
        if (!r) return true;                          // record vanished mid-scan → safe to drop key
        return (typeof r.createdAt === 'number') ? (r.createdAt < cutoff) : true;
      });
      if (toDelete.length) return photoDeleteMany(toDelete);
    });
  }).catch(function(){});
}

/* ── Export / import with photos (§5.6) ───────────────────────────── */
// exportDataWithPhotos() → full backup JSON inlining referenced blobs as data URLs.
function exportDataWithPhotos(){
  var refs = referencedPhotoIds();
  var ids = Object.keys(refs);
  if (ids.length > 20) toast('Packing ' + ids.length + ' photos…');
  photoGetMany(ids).then(function(recs){
    return Promise.all(recs.map(function(rec){
      return new Promise(function(resolve){
        var reader = new FileReader();
        reader.onload = function(){ resolve({ id:rec.id, w:rec.w, h:rec.h, createdAt:rec.createdAt, dataUrl:reader.result }); };
        reader.onerror = function(){ resolve(null); };
        reader.readAsDataURL(rec.blob);
      });
    }));
  }).then(function(photos){
    photos = photos.filter(function(p){ return !!p; });
    var data = { v:1, farms:state.farms, activeFarmId:state.activeFarmId, photos:photos };
    var json = JSON.stringify(data);
    var blob = new Blob([json], { type:'application/json' });
    var url = URL.createObjectURL(blob);
    var d = new Date();
    var dateStr = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
    var a = h('a', { href:url, download:'spatmap-backup-with-photos-' + dateStr + '.json' });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    toast('Backup downloaded · ' + photos.length + (photos.length === 1 ? ' photo' : ' photos'));
  }).catch(function(){ toast('Could not pack photos for export'); });
}
// restoreImportedPhotos(photos) → write each data URL back into IDB, then sweep.
function restoreImportedPhotos(photos){
  if (!photos || !photos.length){ toast('Backup imported'); return; }
  Promise.all(photos.map(function(p){
    if (!p || !p.dataUrl || !p.id) return Promise.resolve(false);
    return fetch(p.dataUrl).then(function(r){ return r.blob(); }).then(function(blob){
      return photoPut({ id:p.id, blob:blob, w:p.w || 0, h:p.h || 0, createdAt:p.createdAt || Date.now() }).then(function(){ return true; });
    }).catch(function(){ return false; });
  })).then(function(results){
    var n = results.filter(function(ok){ return ok; }).length;
    var total = photos.length;
    sweepPhotos();
    // Tell the truth on a partial restore — quota/IDB-unavailable drops photos while the metadata still
    // references them. Claiming full success here is how a farmer ends up with silently-broken thumbnails.
    if (n === total) toast('Backup imported · ' + n + (n === 1 ? ' photo restored' : ' photos restored'));
    else toast('Backup imported · restored ' + n + ' of ' + total + ' photos — the rest could not be saved (storage full or unavailable)');
  });
}

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL KEY HANDLING + BOOT
   ═══════════════════════════════════════════════════════════════════ */
// Escape closes: photo viewer first (Builder 3 may pre-empt), then sheet, then a Component 4 cage
// highlight (only when nothing modal is open, so it never competes with the sheet's own Escape).
document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  var viewer = document.getElementById('photoViewer');
  if (viewer && viewer.firstChild) return;   // viewer handles its own Escape (Builder 3)
  if (document.getElementById('overlay').classList.contains('open')){ closeSheet(); return; }
  // Component 4: no modal open → Escape dismisses an active cage peek/highlight pin.
  if (layoutIsView() && (LAYOUT.hlCage || LAYOUT.hlGroup)){
    if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
    LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
    clearCageHighlight();
  }
});
// Tap the overlay backdrop (not the sheet) → close.
document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target === this) closeSheet();
});
// ── History / view model (Bug B1) ───────────────────────────────────────────
// Every non-home in-app view (scoped-work drill, Overview→Work toggle, Farm Layout editor) OWNS exactly
// one history entry, pushed via pushView() and carrying enough info ({view, scope}) to reconstruct it.
// The HOME is the overview (or the work list on an un-laid-out farm) and is the history root — it owns
// NO extra entry. popstate is therefore deterministic: a Back pops one entry and restoreFromState()
// rebuilds whatever the now-current top entry describes (or the home when we're back at the root). This
// guarantees no Back is ever swallowed and no Back from a non-root view can reach about:blank: the only
// state with no entry above it is the home, and Back from the bare home leaves the page (standard SPA).
function pushView(st){ try { history.pushState(st, ''); } catch (e){} }

// restoreFromState(st) — drive viewMode/viewScope/LAYOUT to match a pushed state object (or the home when
// st is null/unknown). The single source of truth for "what view does this history entry mean".
function restoreFromState(st){
  closeSheet(); clearSelection();
  if (st && st.view === 'layout'){
    // Re-enter the layout editor. (We don't restore its prior scope; the editor is whole-farm.)
    viewScope = null; viewMode = 'layout'; LAYOUT.mode = 'edit'; LAYOUT.entered = false; render(); return;
  }
  if (st && st.view === 'work' && st.scope){
    // A drilled, scoped daily-work map.
    viewScope = { plotId: st.scope.plotId, areaId: st.scope.areaId }; viewMode = 'work';
    LAYOUT.mode = 'edit'; LAYOUT.entered = false; render(); return;
  }
  if (st && st.view === 'work'){
    // The unscoped whole-farm work list (Overview→Work toggle).
    viewScope = null; viewMode = 'work'; LAYOUT.mode = 'edit'; LAYOUT.entered = false; render(); return;
  }
  // No (recognized) state → we're at the history root: the session HOME (overview for a laid-out farm,
  // else the work list). homeMode is untouched.
  viewScope = null; viewMode = homeMode; LAYOUT.mode = (homeMode === 'overview') ? 'view' : 'edit';
  LAYOUT.entered = false; render();
}

// enterLayoutView() — the single path into the Farm Layout editor as a real, Back-able view. Owns a
// {view:'layout'} history entry so device/browser Back exits the editor instead of desyncing the stack
// (Bug B1). Used by the menu's "Farm Layout" item, exitLayout's inverse, and SpatMapDebug.enterLayout.
function enterLayoutView(){
  closeSheet(); clearSelection();
  viewScope = null; viewMode = 'layout'; LAYOUT.mode = 'edit'; LAYOUT.entered = false;
  pushView({ view:'layout' });
  render();
}

// leaveLayoutView() — the editor's "Map" / exit path. Our layout entry is on top of the stack, so pop it
// (history.back) and let popstate→restoreFromState rebuild the logical parent (the scoped work map if we
// drilled before opening the editor, else the home). Keeps the stack coherent and the URL clean.
function leaveLayoutView(){
  if (history.state && history.state.view === 'layout'){ history.back(); return; }
  // Defensive: no owned entry on top (shouldn't happen) → fall back to the home directly.
  viewScope = null; viewMode = homeMode; LAYOUT.mode = (homeMode === 'overview') ? 'view' : 'edit';
  LAYOUT.entered = false; clearSelection(); render();
}

// Phone/browser Back → pop one owned entry and restore whatever the now-current top entry describes
// (scoped-work / unscoped-work / layout / home). Deterministic for ALL in-app states; sheets close via
// Escape/backdrop so there is no conflict. (LAYOUT §4 "Back" + Component 2 overview-home coherence)
window.addEventListener('popstate', function(ev){
  restoreFromState((ev && ev.state) || history.state || null);
});

// Window resize → keep the canvas views (overview + layout editor) framed/on-screen (Bug B4). Debounced
// inside onLayoutViewportResize; no-ops in the work map / onboarding (which don't own LAYOUT.svg).
window.addEventListener('resize', onLayoutViewportResize);

// defaultHomeMode() — 'overview' when a farm exists AND has ≥1 plot (a laid-out farm gets the
// zoomed-out read-only home); otherwise 'work' so empty/onboarding farms and farms with no layout
// behave exactly as before. Does NOT auto-load the demo. (Component 2)
function defaultHomeMode(){
  return overviewAvailable() ? 'overview' : 'work';
}

// overviewAvailable() — true when the current farm is laid out (≥1 plot), so the read-only overview
// home exists and the [Overview | Work] toggle should be offered. (Bug B1)
function overviewAvailable(){
  var f = getFarm();
  return !!(f && Array.isArray(f.plots) && f.plots.length >= 1);
}

function init(){
  try {
    state = loadState();
    homeMode = defaultHomeMode();
    viewMode = homeMode;                  // land on the overview for a laid-out farm; else the work map
    viewScope = null;
    render();
  } catch (err){
    bootFallback(err);                    // never leave a blank page if first paint throws (audit F5)
    return;
  }
  requestPersistence();                   // ask the browser to keep the farm data (audit F1)
  wireFlushOnExit();                      // last-chance save when the tab is backgrounded/closed (audit F6)
  // orphan-photo sweep ~3s after first render (Builder 3 implements sweepPhotos)
  setTimeout(function(){ if (typeof sweepPhotos === 'function') sweepPhotos(); }, 3000);
}

// bootFallback — if the first render throws, show a recovery screen instead of a white page.
// The farmer's raw data is still in localStorage; offer to export it and reload. (audit F5)
function bootFallback(err){
  try { if (window.console) console.error('SpatMap boot failed:', err); } catch (e){}
  var app = document.getElementById('app');
  if (!app) return;
  var raw = '';
  try { raw = localStorage.getItem(STORAGE_KEY) || ''; } catch (e){}
  app.innerHTML = '';
  var box = document.createElement('div');
  box.style.cssText = 'max-width:460px;margin:13vh auto 0;padding:0 22px;font:15px/1.5 -apple-system,system-ui,sans-serif;color:#e8eef0;';
  var h2 = document.createElement('h2'); h2.textContent = 'SpatMap hit a snag'; h2.style.margin = '0 0 8px';
  var p = document.createElement('p'); p.style.cssText = 'margin:0 0 18px;opacity:.85';
  p.textContent = 'Your data is still on this device. Export a backup first, then reload.';
  var bExport = document.createElement('button');
  bExport.textContent = 'Export my data';
  bExport.style.cssText = 'display:block;width:100%;margin:0 0 10px;padding:13px;border-radius:10px;border:0;background:#0E7C8B;color:#fff;font-weight:700;font-size:15px;';
  bExport.onclick = function(){
    try {
      var blob = new Blob([raw || JSON.stringify(state || {})], { type:'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = 'spatmap-backup.json'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    } catch (e){ try { window.alert('Could not export: ' + e); } catch (e2){} }
  };
  var bReload = document.createElement('button');
  bReload.textContent = 'Reload';
  bReload.style.cssText = 'display:block;width:100%;padding:13px;border-radius:10px;border:1px solid #2a4750;background:transparent;color:#cfe0e4;font-weight:600;font-size:15px;';
  bReload.onclick = function(){ try { location.reload(); } catch (e){} };
  box.appendChild(h2); box.appendChild(p); box.appendChild(bExport); box.appendChild(bReload);
  app.appendChild(box);
}

// wireFlushOnExit — phones suspend/kill backgrounded tabs; flush once on hide/close as insurance. (audit F6)
var flushWired = false;
function wireFlushOnExit(){
  if (flushWired) return;
  flushWired = true;
  window.addEventListener('pagehide', function(){ try { save(); } catch (e){} });
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'hidden'){ try { save(); } catch (e){} }
  });
}

// Debug handle for console + Playwright (extend in later builders).
window.SpatMapDebug = {
  get state(){ return state; },
  getFarm: getFarm,
  save: save,
  render: render,
  commit: commit,
  loadBrightside: loadBrightsideFarm,
  pileLevel: pileLevel,
  // photo layer (Builder 3) — console + Playwright testing
  addPhotoFromFile: addPhotoFromFile,
  photoGet: photoGet,
  photoAllIds: photoAllIds,
  referencedPhotoIds: referencedPhotoIds,
  sweepPhotos: sweepPhotos,
  // layout editor (Builder 2) — console + Playwright testing
  enterLayout: function(){ enterLayoutView(); },
  exitLayout: function(){ leaveLayoutView(); },
  // overview home (Component 2) — console + Playwright testing
  enterOverview: function(){ closeSheet(); clearSelection(); homeMode = 'overview'; viewScope = null; viewMode = 'overview'; LAYOUT.mode = 'view'; LAYOUT.entered = false; render(); },
  showWorkList: function(){ closeSheet(); clearSelection(); homeMode = 'work'; viewScope = null; viewMode = 'work'; LAYOUT.mode = 'edit'; render(); },
  defaultHomeMode: defaultHomeMode,
  getHomeMode: function(){ return homeMode; },
  buildOverview: buildOverview,
  drillFirstAreaOverview: function(){ var f = getFarm(); var a = (typeof defaultArea === 'function') ? defaultArea(f) : null;
    if (!a && f && f.plots){ for (var i=0;i<f.plots.length && !a;i++){ if (f.plots[i].areas && f.plots[i].areas.length) a = f.plots[i].areas[0]; } }
    if (a){ if (!a.plotId) a.plotId = (findPlotIdOfArea ? findPlotIdOfArea(f, a.id) : null); drillIntoArea(a); } return a; },
  layoutState: function(){ return { viewMode:viewMode, viewScope:viewScope, view:LAYOUT.view,
    tier:layoutTier(), sel:LAYOUT.sel }; },
  layoutZoomBy: zoomBy,
  layoutFit: function(t){ LAYOUT.sel = null; fitToContent(getFarm(), t); },
  layoutSelectArea: function(areaId){ var f = getFarm(); var fa = findAreaById(f, areaId);
    LAYOUT.sel = fa ? { kind:'area', plotId:fa.plot.id, areaId:areaId } : null; layoutRedraw(); },
  layoutDrillFirstArea: function(){ var f = getFarm(); var a = defaultArea(f); if (a) drillIntoArea(a); },
  // remove + safety (Builder 3) — console + Playwright testing
  removeAreaFromPlot: removeAreaFromPlot,
  removePlotFromFarm: removePlotFromFarm,
  removeAreaWithMove: removeAreaWithMove,
  removePlotWithMove: removePlotWithMove,
  pickTargetArea: pickTargetArea,
  linesInArea: linesInArea,
  lineHasStock: lineHasStock,
  findAreaById: findAreaById,
  visibleLines: visibleLines,
  fitToContent: fitToContent,
  // polish pass (Item 1-5) — console + Playwright testing
  addPlot: function(){ return addPlotToFarm(); },
  addArea: function(plotId){ var f = getFarm(); var p = (f.plots||[]).filter(function(q){ return q.id===plotId; })[0]; if (p) addAreaToPlot(p); },
  selectPlot: function(plotId){ LAYOUT.sel = { kind:'plot', plotId:plotId }; layoutRedraw(); },
  selectArea: function(areaId){ var f = getFarm(); var fa = findAreaById(f, areaId);
    LAYOUT.sel = fa ? { kind:'area', plotId:fa.plot.id, areaId:areaId } : null; layoutRedraw(); },
  setAreaLines: function(areaId, n){ var f = getFarm(); var fa = findAreaById(f, areaId); if (fa) setAreaLineCount(f, fa.area, n); },
  removeArea: function(plotId, areaId){ var f = getFarm(); var p = (f.plots||[]).filter(function(q){ return q.id===plotId; })[0];
    var fa = findAreaById(f, areaId); if (p && fa) removeAreaFromPlot(p, fa.area); },
  renameArea: function(areaId, name){ var f = getFarm(); var fa = findAreaById(f, areaId); if (fa){ var b = fa.area.name; fa.area.name = name; commit(); commitRename('area', areaId, b); } },
  drill: function(areaId){ var f = getFarm(); var fa = findAreaById(f, areaId); if (fa) drillIntoArea(fa.area); },
  getView: function(){ return { k:LAYOUT.view.k, tx:LAYOUT.view.tx, ty:LAYOUT.view.ty }; },
  setView: function(v){ LAYOUT.view = { k:v.k, tx:v.tx, ty:v.ty }; applyView(); },
  getViewMode: function(){ return viewMode; },
  getScope: function(){ return viewScope; },
  // oyster peek (Component 1) — console + Playwright testing
  batchGroupKey: batchGroupKey,
  buildOysterPeek: buildOysterPeek,
  positionPeek: positionPeek,
  showPeek: showPeek,
  hidePeek: hidePeek,
  LAYOUT: LAYOUT
};

init();
</script>
</body>
