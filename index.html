   Farm layout editor — areas (acres) and their sections (quarters)
================================================================ */
var layoutRenaming = null; /* {kind:'area'|'sec', id} */
var MAX_AREAS = 6, MAX_SECTIONS = 4;
/* a section is removable when none of its lines hold a stocked cage —
   empty lines get swept away with the plot */
function sectionStockedCount(farm, secId){
  return farm.lines.reduce(function(n, l){
    if (l.section !== secId) return n;
    return n + l.cages.filter(function(c){ return c.batch; }).length;
  }, 0);
}
/* every new plot starts with one empty line — add more with + Lines */
function seedStarterLine(farm, secId){
  var line = {id: uid(), name: 'Line 1', section: secId, cages: []};
  for (var i = 0; i < 6; i++) line.cages.push(makeCage(farm.cageTypes[0].id));
  relabelLine(line);
  farm.lines.push(line);
}
function buildLayout(){
  var farm = getFarm();
  var wrap = h('div', null, sheetHead('Farm layout', {onBack: function(){ openSheet(buildSettings); }}));
  wrap.appendChild(h('div', {class: 'hint', style: 'margin:0 0 6px'},
    'Areas are separate patches of water, like acres. Subdivide an area into up to ' + MAX_SECTIONS + ' plots — boat lanes are drawn between them — and set which way each plot\u2019s lines run. Use + Lines to fill a plot in bulk.'));

  var totalSections = flatSections(farm).length;

  farm.areas.forEach(function(area){
    /* ---- area header ---- */
    if (layoutRenaming && layoutRenaming.kind === 'area' && layoutRenaming.id === area.id){
      var ain = h('input', {type: 'text', value: area.name, maxlength: '30'});
      wrap.appendChild(h('div', {class: 'typeRow'},
        ain,
        h('button', {class: 'btn secondary sm', onclick: function(){
          var v = ain.value.trim();
          if (!v){ toast('Name cannot be empty'); return; }
          area.name = v; layoutRenaming = null;
          commit(); refreshSheet();
        }}, 'Save')
      ));
    } else {
      var areaLines = area.sections.reduce(function(n, sc){ return n + sectionLineCount(farm, sc.id); }, 0);
      var areaStocked = area.sections.reduce(function(n, sc){ return n + sectionStockedCount(farm, sc.id); }, 0);
      var canDelArea = farm.areas.length > 1 && areaStocked === 0;
      wrap.appendChild(h('div', {class: 'sectionTitle', style: 'display:flex;align-items:center;gap:2px;margin:14px 0 2px'},
        h('span', {style: 'flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'}, area.name),
        h('button', {style: 'min-width:40px;min-height:40px', 'aria-label': 'Rename area', onclick: function(){
          layoutRenaming = {kind: 'area', id: area.id}; refreshSheet();
        }, html: icon('pencil', 16)}),
        h('button', {style: 'min-width:40px;min-height:40px;opacity:' + (canDelArea ? '1' : '.3'), 'aria-label': 'Delete area', onclick: function(){
          if (farm.areas.length <= 1){ toast('Keep at least one area'); return; }
          if (areaStocked){ toast('Move or harvest the stocked cages in ' + area.name + ' first'); return; }
          var aMsg = areaLines
            ? 'Delete area \u201C' + area.name + '\u201D and its ' + areaLines + ' empty ' + (areaLines === 1 ? 'line' : 'lines') + '?'
            : 'Delete area \u201C' + area.name + '\u201D?';
          if (!confirm(aMsg)) return;
          var secIds = area.sections.map(function(sc){ return sc.id; });
          farm.lines = farm.lines.filter(function(l){ return secIds.indexOf(l.section) === -1; });
          farm.areas = farm.areas.filter(function(a){ return a.id !== area.id; });
          commit(); refreshSheet();
          toast('Area deleted');
        }, html: icon('trash', 16)})
      ));
    }

    /* ---- its sections ---- */
    area.sections.forEach(function(sec){
      if (layoutRenaming && layoutRenaming.kind === 'sec' && layoutRenaming.id === sec.id){
        var sin = h('input', {type: 'text', value: sec.name, maxlength: '30'});
        wrap.appendChild(h('div', {class: 'typeRow'},
          sin,
          h('button', {class: 'btn secondary sm', onclick: function(){
            var v = sin.value.trim();
            if (!v){ toast('Name cannot be empty'); return; }
            sec.name = v; layoutRenaming = null;
            commit(); refreshSheet();
          }}, 'Save')
        ));
        return;
      }
      var nLines = sectionLineCount(farm, sec.id);
      var nStocked = sectionStockedCount(farm, sec.id);
      var canDelSec = nStocked === 0 && totalSections > 1 && area.sections.length > 1;
      wrap.appendChild(h('div', {class: 'typeRow'},
        h('span', {class: 'tname'}, sec.name,
          h('span', {style: 'display:block;font-size:.76rem;color:var(--muted);font-weight:400'}, nLines + (nLines === 1 ? ' line' : ' lines'))),
        h('button', {class: 'btn secondary sm', style: 'min-width:72px', 'aria-label': 'Add lines to ' + sec.name, onclick: function(){
          openSheet(function(){ return buildAddLine(sec.id); });
        }}, '+ Lines'),
        h('button', {class: 'btn secondary sm', style: 'min-width:90px', 'aria-label': 'Line direction', onclick: function(){
          sec.vert = !sec.vert;
          commit(); refreshSheet();
          toast(sec.name + ': lines run ' + (sec.vert ? 'down' : 'across'));
        }}, sec.vert ? '\u2193 down' : '\u2192 across'),
        h('button', {style: 'min-width:40px;min-height:40px', 'aria-label': 'Rename plot', onclick: function(){
          layoutRenaming = {kind: 'sec', id: sec.id}; refreshSheet();
        }, html: icon('pencil', 16)}),
        h('button', {style: 'min-width:40px;min-height:40px;opacity:' + (canDelSec ? '1' : '.3'), 'aria-label': 'Delete plot', onclick: function(){
          if (nStocked){ toast('Move or harvest its stocked cages first'); return; }
          if (area.sections.length <= 1){ toast('An area needs at least one plot — delete the whole area instead'); return; }
          var sMsg = nLines
            ? 'Delete plot \u201C' + sec.name + '\u201D and its ' + nLines + ' empty ' + (nLines === 1 ? 'line' : 'lines') + ' from ' + area.name + '?'
            : 'Delete plot \u201C' + sec.name + '\u201D from ' + area.name + '?';
          if (!confirm(sMsg)) return;
          farm.lines = farm.lines.filter(function(l){ return l.section !== sec.id; });
          area.sections = area.sections.filter(function(x){ return x.id !== sec.id; });
          commit(); refreshSheet();
          toast('Plot deleted');
        }, html: icon('trash', 16)})
      ));
    });

    if (area.sections.length < MAX_SECTIONS){
      wrap.appendChild(h('button', {class: 'btn secondary sm', style: 'margin:6px 0 2px', onclick: function(){
        var sec = {id: uid(), name: 'Plot ' + (area.sections.length + 1), vert: false};
        area.sections.push(sec);
        seedStarterLine(farm, sec.id);
        commit(); refreshSheet();
        toast('Plot added to ' + area.name + ' with one line — use + Lines for more');
      }}, '+ Add plot'));
    }
  });

  if (farm.areas.length < MAX_AREAS){
    wrap.appendChild(h('button', {class: 'btn secondary', style: 'margin-top:16px', onclick: function(){
      var sec = {id: uid(), name: 'Plot 1', vert: false};
      farm.areas.push({id: uid(), name: 'Area ' + (farm.areas.length + 1), sections: [sec]});
      seedStarterLine(farm, sec.id);
      commit(); refreshSheet();
      toast('Area added with one line — use + Lines for more');
    }}, '+ Add area'));
  }
  return wrap;
}

/* ================================================================
   Manage cage types
================================================================ */
var typeRenaming = null;
function shapePicker(name){
  var radios = [];
  var wrap = h('div', {class: 'shapePick'});
  SHAPES.forEach(function(s, i){
    var r = h('input', {type: 'radio', name: name, value: s, checked: i === 0});
    radios.push(r);
    wrap.appendChild(h('label', {class: 'shapeOpt'},
      r,
      h('span', null, h('span', {html: shapeSVG(s, '#9fc4cf', false, 36)}), SHAPE_LABELS[s])
    ));
  });
  return {el: wrap, value: function(){
    var r = radios.find(function(x){ return x.checked; });
    return r ? r.value : 'square';
  }};
}
function typeInUse(farm, typeId){
  return farm.lines.some(function(l){ return l.cages.some(function(c){ return c.typeId === typeId; }); });
}
function buildCageTypes(){
  var farm = getFarm();
  var wrap = h('div', null, sheetHead('Cage types', {onBack: function(){ openSheet(buildSettings); }}));

  farm.cageTypes.forEach(function(t){
    if (typeRenaming === t.id){
      var inp = h('input', {type: 'text', value: t.name, maxlength: '30'});
      wrap.appendChild(h('div', {class: 'typeRow'},
        h('div', {html: shapeSVG(t.shape, '#9fc4cf', false, 34), style: 'flex:none'}),
        inp,
        h('button', {class: 'btn secondary sm', onclick: function(){
          var v = inp.value.trim();
          if (!v){ toast('Name cannot be empty'); return; }
          t.name = v; typeRenaming = null;
          commit(); refreshSheet();
        }}, 'Save')
      ));
      return;
    }
    var inUse = typeInUse(farm, t.id);
    wrap.appendChild(h('div', {class: 'typeRow'},
      h('div', {html: shapeSVG(t.shape, '#9fc4cf', false, 34), style: 'flex:none'}),
      h('span', {class: 'tname'}, t.name, h('span', {class: 'sub', style: 'display:block;font-size:.76rem;color:var(--muted);font-weight:400'}, SHAPE_LABELS[t.shape] + (inUse ? ' · in use' : ''))),
      h('button', {style: 'min-width:44px;min-height:44px', 'aria-label': 'Rename type', onclick: function(){
        typeRenaming = t.id; refreshSheet();
      }, html: icon('pencil', 18)}),
      h('button', {style: 'min-width:44px;min-height:44px;opacity:' + (inUse || farm.cageTypes.length <= 1 ? '.3' : '1'), 'aria-label': 'Delete type', onclick: function(){
        if (farm.cageTypes.length <= 1){ toast('Keep at least one cage type'); return; }
        if (typeInUse(farm, t.id)){ toast('“' + t.name + '” is used by cages and can’t be deleted'); return; }
        if (!confirm('Delete cage type “' + t.name + '”?')) return;
        farm.cageTypes = farm.cageTypes.filter(function(x){ return x.id !== t.id; });
        commit(); refreshSheet();
      }, html: icon('trash', 18)})
    ));
  });

  if (farm.cageTypes.length < MAX_TYPES){
    var nameIn = h('input', {type: 'text', placeholder: 'e.g. Floating bag', maxlength: '30'});
    var picker = shapePicker('newTypeShape');
    wrap.appendChild(h('div', {class: 'sectionTitle'}, 'Add a type'));
    wrap.appendChild(field('Name', nameIn));
    wrap.appendChild(field('Shape', picker.el));
    wrap.appendChild(h('button', {class: 'btn', onclick: function(){
      var v = nameIn.value.trim();
      if (!v){ toast('Give the type a name'); nameIn.focus(); return; }
      farm.cageTypes.push({id: uid(), name: v, shape: picker.value()});
      commit(); refreshSheet();
      toast('Type added');
    }}, 'Add cage type'));
  } else {
    wrap.appendChild(h('div', {class: 'hint', style: 'margin-top:12px'}, 'Maximum of ' + MAX_TYPES + ' cage types reached.'));
  }
  return wrap;
}

/* ================================================================
   Export / import
================================================================ */
function exportData(){
  try{
    var blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'spatmap-backup-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    toast('Backup downloaded');
  }catch(e){
    toast('Export failed');
  }
}
document.getElementById('importFile').addEventListener('change', function(){
  var file = this.files && this.files[0];
  this.value = '';
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    var data;
    try{ data = JSON.parse(reader.result); }
    catch(e){ toast('That file is not valid JSON'); return; }
    if (!data || typeof data !== 'object' || typeof data.v !== 'number' || !Array.isArray(data.farms)){
      toast('Not a SpatMap backup ({v, farms} missing)');
      return;
    }
    if (!confirm('Import "' + file.name + '"? This REPLACES all current data (' + state.farms.length + ' farm' + (state.farms.length === 1 ? '' : 's') + '). Export a backup first if unsure.')) return;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    state = loadState(); /* defensive re-validation */
    save();
    closeSheet();
    render();
    toast('Data imported — ' + state.farms.length + ' farm' + (state.farms.length === 1 ? '' : 's') + ' loaded');
  };
  reader.onerror = function(){ toast('Could not read that file'); };
  reader.readAsText(file);
});

/* ================================================================
   Sample data
================================================================ */
function isoDaysAgo(n){
  var d = new Date(Date.now() - n * 86400000);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function loadSampleFarm(){
  var existing = state.farms.find(function(f){ return f.sample; });
  if (existing){ state.activeFarmId = existing.id; commit(); return; }
  var farm = newFarm('Brightside Bay (Sample)');
  farm.sample = true;
  var tBag = farm.cageTypes[0].id, tFlip = farm.cageTypes[1].id, tOy = farm.cageTypes[2].id;
  var secs = flatSections(farm);

  function mkLine(name, typeId, n, section){
    var line = {id: uid(), name: name, section: secs[(section || 1) - 1].id, cages: []};
    for (var i = 0; i < n; i++) line.cages.push(makeCage(typeId));
    relabelLine(line);
    farm.lines.push(line);
    return line;
  }
  function stock(cage, daysAgo, count, sizeMm, source, prep, notes){
    cage.batch = {id: uid(), stockDate: isoDaysAgo(daysAgo), source: source, initialSizeMm: sizeMm, count: count, prep: prep, notes: notes || ''};
    return cage.batch;
  }
  function ev(cage, batch, type, daysAgo, extra){
    var e = {id: uid(), type: type, date: isoDaysAgo(daysAgo), batchId: batch.id, note: (extra && extra.note) || ''};
    if (extra && typeof extra.sizeMm === 'number') e.sizeMm = extra.sizeMm;
    if (extra && typeof extra.count === 'number') e.count = extra.count;
    cage.events.push(e);
  }

  /* Line A — young seed in bags (Acre 1, Quarter 1) */
  var A = mkLine('Line A', tBag, 8, 1);
  A.cages.forEach(function(c, i){
    if (i >= 6) return; /* last two left empty */
    var b = stock(c, 95, 600, 14, 'Mook Sea Farm', ['Graded','Cleaned'], i === 0 ? 'First seed of the season' : '');
    ev(c, b, 'growth', 60, {sizeMm: 24 + i});
    ev(c, b, 'growth', 25, {sizeMm: 38 + i, note: 'Growing well'});
    if (i === 2) ev(c, b, 'mortality', 40, {count: 25, note: 'Crab got in'});
  });

  /* Line B — mid-cycle flips (Acre 1, Quarter 2) */
  var B = mkLine('Line B', tFlip, 10, 2);
  B.cages.forEach(function(c, i){
    var b = stock(c, 250, 450, 30, 'Muscongus Bay Hatchery', ['Tumbled','Desiccated'], '');
    ev(c, b, 'growth', 180, {sizeMm: 45});
    ev(c, b, 'growth', 90, {sizeMm: 60 + (i % 3) * 3});
    ev(c, b, 'growth', 14, {sizeMm: 70 + (i % 4) * 3, note: i % 4 === 3 ? 'Nice deep cups' : ''});
    if (i === 5) ev(c, b, 'mortality', 100, {count: 30, note: 'Heat stress after low tide'});
  });

  /* Line D — fresh seed in flips (Acre 1, Quarter 3) */
  var D = mkLine('Line D', tFlip, 7, 3);
  D.cages.forEach(function(c, i){
    if (i >= 5) return;
    var b = stock(c, 30, 500, 16, 'Mook Sea Farm', ['Graded','Shaken'], '');
    ev(c, b, 'growth', 7, {sizeMm: 22 + i});
  });

  /* Line E — empty bags waiting for seed (Acre 1, Quarter 4) */
  mkLine('Line E', tBag, 6, 4);

  /* Line C — older OyGrows, some at market size (Acre 2, vertical) */
  var C = mkLine('Line C', tOy, 6, 5);
  C.cages.forEach(function(c, i){
    if (i >= 4) return;
    var b = stock(c, 430, 300, 35, 'Split from Line B', ['Split','Graded'], 'Overwintered');
    ev(c, b, 'growth', 300, {sizeMm: 55});
    ev(c, b, 'growth', 150, {sizeMm: 70});
    ev(c, b, 'growth', 20, {sizeMm: 80 + i * 2});
    if (i === 0) ev(c, b, 'harvest', 7, {count: 100, note: 'Farmers market order'});
  });

  state.farms.push(farm);
  state.activeFarmId = farm.id;
  commit();
  toast('Sample farm loaded — tap any cage to explore');
}
/* ================================================================
   Brightside farm — seeded from the working spreadsheet (June 12, 2026).
   The whole spreadsheet is Acre 1. Spreadsheet rows 1–9 are the top
   half (Quarter 1 left, Quarter 2 right): rows 1–2 are OyGrow circle
   lines, rows 3–9 are bag lines. Each row spans both quarters, so it
   seeds as Line N in Q1 and Line N in Q2 — numbering restarts at 1 in
   every quarter, top row first. The blank spreadsheet rows 10–13 are
   the boat-lane break between the top (Q1/Q2) and bottom (Q3/Q4).
   Spreadsheet rows 14–21 are the bottom half: four vertical FlipFarm
   lines, columns A & B = Quarter 3, columns C & D = Quarter 4
   (Line 1 / Line 2 in each), positions reading top to bottom.
   Acre 2 is not on the spreadsheet and seeds empty.
   Counts and seed sizes were not in the spreadsheet — edit each batch
   to fill them in. Dates marked "placeholder" need the real stock date.
================================================================ */
var BRIGHTSIDE_SEED_V = 6;
function loadBrightsideFarm(){
  var existing = state.farms.find(function(f){ return f.brightside; });
  if (existing && existing.brightsideV === BRIGHTSIDE_SEED_V) return;
  /* layout corrected — rebuild the seeded farm from scratch */
  if (existing) state.farms = state.farms.filter(function(f){ return f.id !== existing.id; });
  var farm = newFarm('Brightside');
  farm.brightside = true;
  farm.brightsideV = BRIGHTSIDE_SEED_V;
  var tBag = farm.cageTypes[0].id, tFlip = farm.cageTypes[1].id, tOy = farm.cageTypes[2].id;
  var secs = flatSections(farm);
  /* Quarters 3–4 run as vertical columns, like the spreadsheet */
  secs[2].vert = true;
  secs[3].vert = true;
  var TBD = ' · stock date unknown — placeholder, edit me';

  function mkLine(name, section, typeId, cells){
    var line = {id: uid(), name: name, section: secs[section - 1].id, cages: []};
    cells.forEach(function(cell){
      var c = makeCage(typeId);
      if (cell && cell.date){
        c.batch = {id: uid(), stockDate: cell.date, ploidy: cell.ploidy || '', source: '',
                   initialSizeMm: null, count: null,
                   prep: cell.prep ? cell.prep.slice() : [], notes: cell.notes || ''};
      }
      line.cages.push(c);
    });
    relabelLine(line);
    farm.lines.push(line);
  }
  function fill(n, cell){ var a = []; for (var i = 0; i < n; i++) a.push(cell); return a; }

  /* ---- Quarters 1–2 · spreadsheet rows 1–9, top to bottom.
     Each spreadsheet row spans both quarters: left half = Q1, right half = Q2.
     Rows 1–2 are OyGrows; rows 3–9 are bags. ---- */
  var r1 = {date: '2026-01-28', ploidy: 'Trips', prep: ['Graded'], notes: 'Smaller trips — sorted end of Jan (sort date used as stock date)'};
  var r2 = {date: '2026-01-25', ploidy: 'Dips', prep: ['Graded'], notes: 'Sorted mid/end Jan — sort date used as stock date'};
  var r4 = {date: '2025-12-05', ploidy: 'Dips', prep: ['Graded'], notes: 'Sorted early December — sort date used as stock date'};
  var jumbos  = {date: '2026-01-01', notes: 'Jumbos' + TBD};
  var brights = {date: '2026-01-01', notes: 'Brightsides' + TBD};
  var smalls  = {date: '2026-01-01', notes: 'Smalls — out of 3s into 4mm gros, then flats' + TBD};
  var doubles = {date: '2026-01-01', notes: 'Doubles' + TBD};

  /* row 1 — OyGrows */ mkLine('Line 1', 1, tOy,  fill(6, r1));     mkLine('Line 1', 2, tOy,  fill(6, r1));
  /* row 2 — OyGrows */ mkLine('Line 2', 1, tOy,  fill(6, r2));     mkLine('Line 2', 2, tOy,  fill(6, r2));
  /* row 3 — bags    */ mkLine('Line 3', 1, tBag, fill(6, r2));     mkLine('Line 3', 2, tBag, fill(6, r2));
  /* row 4 — bags    */ mkLine('Line 4', 1, tBag, fill(6, r4));     mkLine('Line 4', 2, tBag, fill(6, r4));
  /* row 5 — bags    */ mkLine('Line 5', 1, tBag, fill(6, null));   mkLine('Line 5', 2, tBag, fill(6, null));
  /* row 6 — bags    */ mkLine('Line 6', 1, tBag, fill(6, jumbos)); mkLine('Line 6', 2, tBag, fill(6, brights));
  /* row 7 — bags    */ mkLine('Line 7', 1, tBag, fill(6, smalls)); mkLine('Line 7', 2, tBag, fill(6, doubles));
  /* row 8 — bags    */ mkLine('Line 8', 1, tBag, fill(6, jumbos)); mkLine('Line 8', 2, tBag, fill(6, null));
  /* row 9 — bags    */ mkLine('Line 9', 1, tBag, fill(6, jumbos)); mkLine('Line 9', 2, tBag, fill(6, jumbos));

  /* ---- Quarters 3–4 · spreadsheet rows 14–21, all FlipFarms, as four
     vertical lines. Columns A & B = Q3 (Lines 1–2), columns C & D = Q4
     (Lines 1–2), positions top to bottom. Acre 2 stays open. ---- */
  var stHeron = {date: '2026-06-08', ploidy: 'Trips', notes: 'Small trips — fell through blue heron 6/8'};
  var stFlips = {date: '2026-06-04', ploidy: 'Trips', notes: 'Small trips — straight from 6s into flips, 2 scoops per cage (6/4)'};
  mkLine('Line 1', 3, tFlip, [stHeron, null, stHeron, null, stFlips, stFlips, stFlips, null]);

  var b430  = {date: '2026-04-30', notes: 'Brightsides — stocked 4/30ish'};
  var j513  = {date: '2026-05-13', notes: 'Jumbos, 5/13'};
  var b513  = {date: '2026-05-13', notes: 'Brightsides, 5/13'};
  var b513s = {date: '2026-05-13', notes: 'Brightsides — started 5/13'};
  mkLine('Line 2', 3, tFlip, [b430, j513, b513, null, b513s, null, null, null]);

  var trip429 = {date: '2026-04-29', ploidy: 'Trips', notes: 'Triploid seed 4/29'};
  var b527    = {date: '2026-05-27', notes: 'Brightsides — smallish, 5/27'};
  /* position 5 was marked "Empty or jumbo?" on the spreadsheet — left empty, verify on the water.
     The spreadsheet marks "No line" at the 8th position, so this line is 7 long. */
  mkLine('Line 1', 4, tFlip, [trip429, trip429, null, null, null, b527, b527]);

  mkLine('Line 2', 4, tFlip, fill(8, null));

  state.farms.push(farm);
  state.activeFarmId = farm.id;
}

function clearSampleFarm(){
  var farm = getFarm();
  if (!farm || !farm.sample) return;
  if (!confirm('Remove the sample farm and all its sample data?')) return;
  state.farms = state.farms.filter(function(f){ return f.id !== farm.id; });
  state.activeFarmId = state.farms.length ? state.farms[0].id : null;
  commit();
  toast('Sample data cleared');
}

/* ================================================================
   Boot
================================================================ */
state = loadState();
loadBrightsideFarm();
save();
render();

})();
</script>
