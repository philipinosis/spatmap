  // center via areaCorners, take min/max). For an UNROTATED area areaCorners returns its axis-aligned
  // corners — already inside the plot — so cardX/Y/W/H stay exactly plot.x/y/w/h and rot==0 plots are
  // pixel-identical (no layout shift). Shared by the layout editor + the overview. The grown rect is
  // PURELY cosmetic (containment); selection/handles/areas still use plot.x/y/w/h.
  var cardX = plot.x, cardY = plot.y, cardR = plot.x + plot.w, cardB = plot.y + plot.h;
  (plot.areas || []).forEach(function(a){
    if (!a.rot) return;                                  // unrotated: nothing extends past the plot
    var cn = areaCorners(a);
    [cn.nw, cn.ne, cn.se, cn.sw].forEach(function(pt){
      if (pt.x < cardX) cardX = pt.x; if (pt.x > cardR) cardR = pt.x;
      if (pt.y < cardY) cardY = pt.y; if (pt.y > cardB) cardB = pt.y;
    });
  });
  var cardW = cardR - cardX, cardH = cardB - cardY;
  // WP9: a plot reads as a CARD LIFTED OFF WATER. The card body is the opaque --surface fill; the
  // channel between cards shows the --paper-2 water + ripple grid (water reads as water). A CSS
  // drop-shadow (.lp-plotcard) + a bright top hairline rim + a fully-opaque fill give the lift so at
  // the all-plots zoom you instantly read "separate plots," not one continuous field. (§3.2 / WP9 #2)
  // card — bumped to full opacity (was .96) so the slate body never bleeds into the water behind it.
  var card = s('rect', { x:cardX, y:cardY, width:cardW, height:cardH, rx:14, ry:14,
    fill:'#152C35', 'fill-opacity':1,
    stroke: selected ? '#34B3C4' : '#345462', 'stroke-width': selected ? 2.5 : 2,
    'data-plot-id':plot.id, class:'lp-plotcard' });
  g.appendChild(card);
  // top rim hairline — a thin bright stroke just inside the top/side edges so the card catches "light"
  // and visibly sits proud of the water. Counter-scaled so the rim stays ~1px on screen at any zoom.
  if (!selected){
    var rimW = 1.1 / Math.max(0.0001, LAYOUT.view.k);
    g.appendChild(s('path', { d:'M '+(cardX+14)+' '+(cardY+rimW)+' L '+(cardR-14)+' '+(cardY+rimW),
      fill:'none', stroke:'#3D5E6C', 'stroke-width':rimW, 'stroke-linecap':'round',
      'stroke-opacity':0.85, 'pointer-events':'none' }));
  }
  if (selected){
    g.appendChild(s('rect', { x:plot.x+2, y:plot.y+2, width:Math.max(1,plot.w-4), height:Math.max(1,plot.h-4),
      rx:12, ry:12, fill:'#14323A', 'fill-opacity':0.55, 'pointer-events':'none' }));
  }
  // corner label tab
  var lineCount = plot.areas.reduce(function(n,a){ return n + (a.lineIds ? a.lineIds.length : 0); }, 0);
  var labelTab = s('g', null);
  // Caption block sits in the plot's reserved header band ABOVE the first area body. Areas default to
  // area.y = plot.y+40, so the two-line caption is lifted (name @+19, subtitle @+33) to leave a ~7px gap
  // before the area's top edge / its "Area N" label — otherwise the subtitle's second line is clipped by
  // the area rectangle. (Bug B5) Shared by the layout editor + the overview; both keep the same band.
  // WP9 #3: COUNTER-SCALE the plot name so it stays legible at EVERY zoom (the map-UI trick the handle
  // code already uses, grep /LAYOUT.view.k). World font-size = desiredScreenPx / k, clamped so the name
  // never collapses to sub-pixel at the all-plots zoom nor balloons past the header band when zoomed in.
  // At the all-plots zoom the name reads; zoomed into one plot, a neighbor's name in the margin reads too.
  var k = Math.max(0.0001, LAYOUT.view.k);
  var nameFs = Math.max(11, Math.min(17, 15 / k));         // ~15px on screen, clamped 11–17px screen
  var subFs  = Math.max(9,  Math.min(12, 11 / k));         // subtitle tracks the name, a touch smaller
  // Baselines follow the scaled name so the two-line block never overruns the +40 header band: name sits
  // ~nameFs+3 below the card top, subtitle ~nameFs+3+subFs+2 below it (counter-scaled offsets).
  var nameY = plot.y + nameFs + 4;
  var subY  = nameY + subFs + 3;
  labelTab.appendChild(s('text', { x:plot.x+14, y:nameY, fill:'#E8F1F2',
    'font-size':nameFs, 'font-weight':700, 'font-family':'inherit', class:'lp-plotlabel',
    'data-plot-label':plot.id, 'data-plot-id':plot.id, style:'cursor:text' }, plot.name));
  labelTab.appendChild(s('text', { x:plot.x+14, y:subY, fill:'#9FB6BC',
    'font-size':subFs, 'font-family':'inherit', 'pointer-events':'none' }, plot.areas.length + (plot.areas.length===1?' area · ':' areas · ') + lineCount + (lineCount===1?' line':' lines')));
  g.appendChild(labelTab);
  // status roll-up bar along the bottom edge
  g.appendChild(drawPlotRollup(farm, plot));
  // EMPTY-PLOT state (Item 2b): a plot with zero areas → a centered dashed "+ Add area" CTA inside
  // the card (mirrors the .addLine affordance). Reachable after removing a plot's last area. Tapping
  // it routes through handleLayoutTap → addAreaToPlot. (LAYOUT §5 "Empty states")
  if (!plot.areas.length){
    g.appendChild(drawEmptyAreaCTA(plot));
  }
  // areas
  plot.areas.forEach(function(a){ g.appendChild(drawArea(farm, plot, a, tier)); });
  // selection handles (drawn last → on top; track live geometry during a drag)
  if (selected) drawHandles(g, 'plot', plot);
  return g;
}

// drawPlotRollup — proportional status segments (cageStatus) along the plot's bottom inset edge.
function drawPlotRollup(farm, plot){
  var counts = { empty:0, fresh:0, mid:0, old:0 }, total = 0, work = false, ready = false;
  (plot.areas || []).forEach(function(a){
    linesInArea(farm, a.id).forEach(function(l){
      l.cages.forEach(function(c){
        var st = cageStatus(c, farm);
        counts[st.key] = (counts[st.key]||0) + 1; total++;
        if (st.needsWork) work = true;
        if (st.ready) ready = true;
      });
    });
  });
  var g = s('g', { 'pointer-events':'none' });
  if (!total) return g;
  var barX = plot.x + 12, barW = plot.w - 24, barY = plot.y + plot.h - 14, barH = 5;
  // B3: the rollup is a PLOT-level summary appended in plot coords, OUTSIDE the per-area rotate() group,
  // so a rotated area doesn't transform it — at e.g. rot=90 the full-width bar pokes past the now-narrower
  // rotated area box on both sides (and under the zoom controls). For a SINGLE-area plot whose one area is
  // rotated, clamp the bar's x-range to that area's rotated bounding box (the same ~12px inset), so the bar
  // (and its ±~8px endpoint dots) never overhang the area. Unrotated / multi-area plots take neither branch
  // → barX/barW stay exactly plot.x+12 / plot.w-24 (pixel-identical, no visual change). (Bug B3)
  var soleArea = (plot.areas && plot.areas.length === 1) ? plot.areas[0] : null;
  if (soleArea && soleArea.rot){
    var cn = areaCorners(soleArea);
    var axMin = Math.min(cn.nw.x, cn.ne.x, cn.se.x, cn.sw.x);
    var axMax = Math.max(cn.nw.x, cn.ne.x, cn.se.x, cn.sw.x);
    var DOT = 8;                                   // endpoint dot offset (4) + radius (3.5), rounded up
    var lo = Math.max(barX, axMin + 12 + DOT), hi = Math.min(barX + barW, axMax - 12 - DOT);
    if (hi > lo){ barX = lo; barW = hi - lo; }     // skip the clamp if the area box is too thin to hold the bar
  }
  var order = ['fresh','mid','old','empty'];
  var colors = { fresh:'#2E9E5B', mid:'#C97A1E', old:'#B4471F', empty:'#C3D2D4' };
  var cx = barX;
  order.forEach(function(k){
    var w = (counts[k]/total) * barW;
    if (w <= 0) return;
    g.appendChild(s('rect', { x:cx, y:barY, width:w, height:barH, rx:2.5, ry:2.5, fill:colors[k] }));
    cx += w;
  });
  if (work) g.appendChild(s('circle', { cx:barX-4, cy:barY+barH/2, r:3.5, fill:'#C8341E' }));
  if (ready) g.appendChild(s('circle', { cx:barX+barW+4, cy:barY+barH/2, r:3.5, fill:'#0E7C8B' }));
  return g;
}

// drawEmptyAreaCTA(plot) — the empty-plot affordance (Item 2b): a centered dashed ghost rect + a
// "+ Add area" label inside a plot that has no areas. Tappable (carries data-addarea-plot); the tap
// router calls addAreaToPlot. Styled like .addLine: 1.5px dashed --hair-strong, --teal text.
function drawEmptyAreaCTA(plot){
  var W = Math.min(220, plot.w - 40), H = Math.min(96, plot.h - 56);
  if (W < 40 || H < 30) return s('g', null);
  var x = plot.x + (plot.w - W)/2, y = plot.y + (plot.h - H)/2 + 6;
  var g = s('g', { 'data-addarea-plot':plot.id, class:'lp-emptycta', style:'cursor:pointer' });
  g.appendChild(s('rect', { x:x, y:y, width:W, height:H, rx:10, ry:10,
    fill:'#14323A', 'fill-opacity':0.5, stroke:'#345462', 'stroke-width':1.5,
    'stroke-dasharray':'7 5', 'data-addarea-plot':plot.id }));
  g.appendChild(s('text', { x:x + W/2, y:y + H/2 + 5, fill:'#34B3C4', 'font-size':14, 'font-weight':700,
    'font-family':'inherit', 'text-anchor':'middle', 'data-addarea-plot':plot.id }, '+ Add an area'));
  return g;
}

/* ── Component 3: per-cage cells on the overview canvas ──────────────────
   We subdivide each line's ROW SPAN into one rect per cage so a zoomed-out
   farm shows every real cage (Component 4 will make them hoverable). Cells
   are visual + tagged only here (pointer-events:none) so Component 2's
   tap-area-to-drill keeps working untouched. View mode only; never in the
   layout editor. ──────────────────────────────────────────────────────── */
var CELL_MAX = 300;                 // farm-wide cage cap: above this, only synth cells at AREA tier (perf)

// farmIsSmall(farm) — at/under the perf cap. Small farms render their line rows AND per-cage cells at
// EVERY tier (incl. the zoomed-out 'farm' tier) so every cage is visible at the fitted overview on any
// viewport — the product promise "draw every cage at the zoomed-out overview". Narrow phones fit the
// farm below LOD_PLOT (k≈0.36 → 'farm' tier), so without this a small demo showed bare cards. (Bug B3)
// Large farms keep the LOD fallback (cells only at 'area' tier) + an on-screen "zoom in" hint. (Bug B5)
function farmIsSmall(farm){ return farmTotalCageCount(farm) <= CELL_MAX; }

// farmTotalCageCount(farm) — total cages across every line, memoized per layoutRedraw (cheap LOD gate).
function farmTotalCageCount(farm){
  if (LAYOUT._cellSeq === LAYOUT.redrawSeq) return LAYOUT._cellTotal;
  var n = 0;
  (farm && farm.lines ? farm.lines : []).forEach(function(l){ n += (l.cages ? l.cages.length : 0); });
  LAYOUT._cellSeq = LAYOUT.redrawSeq; LAYOUT._cellTotal = n;
  return n;
}

// shapeViewBox(shape) — the intrinsic viewBox dims shapeSVG() authors per shape, so a glyph can be
// scaled into a world-unit cell rect. (rect/circle: 28×16; square mesh bag: 20×14.) (WP7)
function shapeViewBox(shape){
  if (shape === 'square') return { w:20, h:14 };   // Vexar bag
  if (shape === 'rect')   return { w:16, h:28 };    // FlipFarm — PORTRAIT, rope through the narrow side (owner ask)
  return { w:28, h:16 };                            // circle = OyGro, landscape (long-ways)
}

// drawCageGlyph(g, shape, fill, ready, work, x, y, w, hgt) — WP7 GLYPH detail. Embeds the FlipFarm
// (or OyGro / Vexar) cage glyph from shapeSVG() into the canvas at the cell's WORLD rect, matching the
// Phase-1 DOM look. shapeSVG returns a self-contained <svg viewBox=… preserveAspectRatio="none">, and a
// nested <svg> with explicit x/y/width/height tiles cleanly inside the area's rotate(<g>) — the
// viewBox→box mapping (none) stretches the glyph to fill the cell. Status EDGE bars (teal top / red
// bottom) are added on top, thickened to read at this size. Caller passes ready=false so the dashed
// ready RING is suppressed (the edge bar carries "ready" instead, mirroring Phase-1 WP4).
function drawCageGlyph(g, shape, fill, ready, work, x, y, w, hgt){
  var vb = shapeViewBox(shape);
  // Wrapper <g> holds the glyph svg + edge bars so they share the cell's footprint.
  var wrap = s('g', { 'pointer-events':'none' });
  // The cage glyph (no ready-ring; the edge bar does that job at this size). innerHTML carries the
  // shapeSVG markup; we then size/place the nested <svg> in world units.
  var glyph = s('svg', { x:x, y:y, width:Math.max(0.5, w), height:Math.max(0.5, hgt),
    viewBox:'0 0 ' + vb.w + ' ' + vb.h, preserveAspectRatio:'none', 'pointer-events':'none' });
  glyph.innerHTML = shapeSVG(shape, fill, false, 22, work)
    .replace(/^<svg[^>]*>/, '').replace(/<\/svg>\s*$/, '');   // unwrap shapeSVG's outer <svg>, keep its body
  wrap.appendChild(glyph);
  // Status edge bars, inset from the cell border, thickened to read large. Top = market-ready (teal),
  // bottom = needs-work (red) — same vocabulary as Phase-1 .cellfill.rdy / .work inset shadows.
  var edge = Math.max(1.2, Math.min(hgt * 0.16, 3.2));
  if (ready){
    wrap.appendChild(s('rect', { x:x, y:y, width:w, height:edge, fill:'var(--c-ready)', 'pointer-events':'none' }));
  }
  if (work){
    wrap.appendChild(s('rect', { x:x, y:y + hgt - edge, width:w, height:edge, fill:'var(--c-work)', 'pointer-events':'none' }));
  }
  g.appendChild(wrap);
}

// drawCageCells(farm, plot, area, tier, g) — append one colored rect per cage INTO the area's
// rotate(<g>) `g` (so cells ride area.rot), subdividing each line row into line.cages.length cells.
// Z-order: called after the line strokes, before label/chip/handles → above strokes, below edit chrome.
function drawCageCells(farm, plot, area, tier, g){
  if (!layoutIsView()) return;                          // EDIT mode: draw NO cells (editor stays uncluttered)
  // SMALL farms: draw cells at EVERY tier including 'farm' (Bug B3 — narrow phones fit at 'farm' tier and
  // were showing bare cards). LARGE farms keep the perf cap: cells only at the zoomed-in 'area' tier;
  // farm/plot tier shows a "zoom in" hint instead (drawn by drawZoomHint, gated identically). (Bug B5)
  if (!farmIsSmall(farm) && tier !== 'area' && tier !== 'work') return;  // WP7: 'work' is the zoomed-in band → still draw cells

  // Component 4: cells are interactive in VIEW/overview only (we're already gated to view above).
  // Keyboard focusability is capped — only wire tabindex/role when the farm is small (≤120 cages)
  // so we never build a 500-deep tab order.
  var cellInteractive = layoutIsView();
  var a11yCells = cellInteractive && farmTotalCageCount(farm) <= 120;

  var lines = linesInArea(farm, area.id);
  if (!lines.length) return;
  var n = lines.length;
  var horiz = area.axis !== 'v';                        // 'h' rows run along X; 'v' rows run along Y
  var cross = horiz ? area.h : area.w;                  // rows are spaced ACROSS this axis (mirror drawArea)
  var _band = rowBand(area, n);                         // pitch-capped row geometry (shared w/ drawArea)
  var usable = _band.usable, pad = _band.pad;
  // Row span along the line's long axis (mirror the line-stroke endpoints in drawArea).
  var spanStart = horiz ? (area.x + area.w*0.06) : (area.y + area.h*0.06);
  var spanEnd   = horiz ? (area.x + area.w*0.94) : (area.y + area.h*0.94);
  var spanLen = spanEnd - spanStart;
  if (spanLen <= 0) return;
  // Cell thickness across the row: a fraction of the per-row cross slot, capped so cells stay legible.
  var rowSlot = usable / n;
  var thick = Math.max(2, Math.min(rowSlot * 0.62, 14));
  var ringC = (typeof RING_COLOR === 'string') ? RING_COLOR : '#0E7C8B';

  for (var i=0; i<n; i++){
    var ln = lines[i];
    var cages = ln.cages || [];
    var cn = cages.length;
    if (!cn) continue;
    var frac = (n === 1) ? 0.5 : (i + 0.5) / n;         // same cross-axis placement drawArea uses for the stroke
    var off = pad + frac * usable;                      // distance across the cross axis
    var rowCenter = horiz ? (area.y + off) : (area.x + off);

    var cellLen = spanLen / cn;
    var gap = Math.max(0.5, Math.min(cellLen * 0.16, 3));   // tiny gap so cells read as discrete cages
    var drawLen = Math.max(0.5, cellLen - gap);

    for (var c=0; c<cn; c++){
      var cage = cages[c];
      if (!cage) continue;
      var along = spanStart + c*cellLen + gap/2;        // leading edge of this cell along the row
      var st = cageStatus(cage, farm);
      var empty = !cage.batch;
      var detached = !!cage.detached;                   // gap "spots" (migrated out today; defensive)

      var x, y, w, hgt;
      if (horiz){ x = along; w = drawLen; y = rowCenter - thick/2; hgt = thick; }
      else      { y = along; hgt = drawLen; x = rowCenter - thick/2; w = thick; }

      var grp = batchGroupKey(cage);

      // Bug B3: the visible cell is only ~thick px in its cross-axis (≈5px on a phone), making accurate
      // taps (and the two-tap open) painful. Add an INVISIBLE, larger HIT-RECT beneath it, expanded in
      // the CROSS-AXIS toward the inter-line gap (up to most of the per-row slot, never into the neighbor
      // row) and along the row to cover the inter-cell gap too. It carries the SAME data-cage-id /
      // data-batch-group and is .lp-cell-live so hover/tap/highlight resolve through cageIdFromTarget /
      // ancestorAttr exactly like the visible cell. It is NOT .lp-cagecell, so the highlight sweep
      // (.hl-active dim + .lp-cell-match) and cellElById (peek positioning) still target the VISIBLE cell
      // only — the hit-rect never paints or dims. View/overview only (cells are inert in edit).
      if (cellInteractive){
        // Cross-axis hit thickness (WORLD units): fill most of the per-row slot toward the inter-line
        // gap, leaving a gutter so a tap never lands on the neighbor row's cage. The slot (rowSlot =
        // usable/n) IS the on-screen line-to-line pitch. Bug B1 (round-9): pulled back from 0.9 → 0.72
        // so the inter-row gutters widen into hit-rect-FREE drill lanes (a tap between rows drills the
        // area instead of always peeking a cage), while a tap on/right-beside a cage still peeks.
        var hitThick = Math.max(thick, rowSlot * 0.72);                // never smaller than the visible cell
        // Along-axis (Bug B5): interior cells span the FULL cell pitch so adjacent hit-rects tile
        // edge-to-edge with no inter-cage dead space. The FIRST/LAST cells extend a SHORT lead-in/
        // lead-out past the rope's end so a tap just off the end still lands on the nearest cage —
        // BUT only by a fraction of the cell pitch (Bug B1: round-9). The round-5 change reached all
        // the way to the area edge (areaLo/areaHi), which blanketed the whole area footprint and
        // STARVED the area-body drill (a tap almost anywhere opened a cage peek instead of drilling).
        // Pulling the extension back to ~half a cell pitch leaves a hit-rect-FREE margin around the
        // line rows + the header/label band, so a tap THERE still drills via handleLayoutTap's
        // area-body branch, while a tap on (or right beside) a cage still peeks. Cross-axis unchanged.
        var lead = Math.min(cellLen * 0.5, rowSlot * 0.5);             // lead-in/out cap — never to the area edge
        var hitFrom = spanStart + c*cellLen;                           // default: this cell's pitch start
        var hitLen = cellLen;
        var areaLo = horiz ? area.x : area.y;                          // line's host edge (clamp target)
        var areaHi = horiz ? (area.x + area.w) : (area.y + area.h);    // line's far edge (clamp target)
        if (c === 0){ var lo = Math.max(areaLo, hitFrom - lead); hitLen += hitFrom - lo; hitFrom = lo; } // first cell → short lead-in
        if (c === cn - 1){ var hi = Math.min(areaHi, hitFrom + hitLen + lead); hitLen = hi - hitFrom; }  // last cell → short lead-out
        var hx, hy, hw, hh;
        if (horiz){ hx = hitFrom; hw = hitLen; hy = rowCenter - hitThick/2; hh = hitThick; }
        else      { hy = hitFrom; hh = hitLen; hx = rowCenter - hitThick/2; hw = hitThick; }
        // Bug B1 (round-9): reserve a hit-rect-FREE band along the CROSS axis at the area's leading edge
        // (the header/label band where the area name + the VIEW "Open ›" chip live) plus a small trailing
        // margin, so a tap on the header or just inside the area border DRILLS (handleLayoutTap area-body
        // branch) instead of being swallowed by the first/last row's hit-rect. The middle rows keep their
        // full gutter-to-gutter reach. Clamp the cross-axis extent into [crossLo, crossHi].
        var crossLo = (horiz ? area.y : area.x) + Math.min(18, (horiz ? area.h : area.w) * 0.16); // header reserve
        var crossHi = (horiz ? (area.y + area.h) : (area.x + area.w)) - Math.min(6, (horiz ? area.h : area.w) * 0.06);
        if (horiz){
          if (hy < crossLo){ hh -= (crossLo - hy); hy = crossLo; }
          if (hy + hh > crossHi){ hh = crossHi - hy; }
        } else {
          if (hx < crossLo){ hw -= (crossLo - hx); hx = crossLo; }
          if (hx + hw > crossHi){ hw = crossHi - hx; }
        }
        // Bug B7 (round-10): GUARANTEE a tappable hit-rect for EVERY visible cell. The header/footer
        // cross-axis clamp above can collapse an edge-of-row cell's hit-rect to degenerate (esp. when
        // rowCenter sits near the reserved header band); the old code then SKIPPED it. At overview scale
        // the area-background covers the orphaned cell's centroid, so cageIdFromTarget returns null and
        // the tap drills the area instead of peeking the (often EMPTY) cell. Fix: instead of dropping a
        // degenerate hit-rect, restore it to cover the VISIBLE cell's OWN footprint (rowCenter±thick/2
        // cross, the cell's drawn span along) with a small floor, so its centroid is always hittable.
        // This stays inside the cell's own footprint → never bleeds into the neighbor row or re-blankets
        // the header/area body (the inter-row gutter + header band drill-margin remain hit-rect-FREE).
        var crossFloor = Math.max(2, Math.min(thick, 5));            // cover at least the visible cell, capped small
        if (horiz){
          if (hh <= 0.5 || hw <= 0.5){                               // collapsed → rebuild to the cell's own footprint
            hh = Math.max(crossFloor, thick); hy = rowCenter - hh/2; // centred on the visible cell's centroid
            hx = x; hw = Math.max(2, w);                             // along-axis: the drawn cell span (a sane floor)
          }
        } else {
          if (hh <= 0.5 || hw <= 0.5){
            hw = Math.max(crossFloor, thick); hx = rowCenter - hw/2;
            hy = y; hh = Math.max(2, hgt);
          }
        }
        // Every visible cell now yields a non-degenerate hit-rect over its centroid.
        if (hh > 0.5 && hw > 0.5){
          var hitAttrs = {
            x:hx, y:hy, width:hw, height:hh,
            fill:'transparent', 'data-cage-id': cage.id, class:'lp-cellhit lp-cell-live'
          };
          if (grp) hitAttrs['data-batch-group'] = grp;
          g.appendChild(s('rect', hitAttrs));             // appended FIRST → visible cell paints on top
        }
      }

      // ── Common cell attrs (class / a11y / data-cage-id) ──────────────────────────────────────────
      // These MUST land on whichever element is the cell's PRIMARY visible mark at the current detail
      // level (the pip dot / the thin rect / the glyph footprint), because the highlight sweep
      // (.lp-cagecell → .hl-active dim + .lp-cell-match) and the peek positioner (cellElById) target
      // .lp-cagecell — not the hit-rect. So every detail level emits exactly one .lp-cagecell carrying
      // data-cage-id over the cell's centroid.
      var baseCls = 'lp-cagecell';
      var a11yAttrs = null;
      if (cellInteractive){
        baseCls = 'lp-cagecell lp-cell-live';
        LAYOUT.cellCount++;
        if (a11yCells){
          var stTxt = empty ? 'empty'
            : ((st.ready ? 'market-ready ' : '') + (st.needsWork ? 'needs work ' : '') + (st.key || 'stocked')).trim();
          a11yAttrs = { tabindex:'0', role:'button',
            'aria-label': (cage.label || 'Cage') + ' · ' + stTxt };
        }
      }
      // Build the {class,data,a11y,pointer-events} bundle shared by the primary element.
      function cellIdAttrs(extra){
        var o = { 'data-cage-id': cage.id, class: baseCls };
        if (grp) o['data-batch-group'] = grp;
        if (a11yAttrs){ o.tabindex = a11yAttrs.tabindex; o.role = a11yAttrs.role; o['aria-label'] = a11yAttrs['aria-label']; }
        if (!cellInteractive) o['pointer-events'] = 'none';
        if (extra){ for (var kk in extra){ if (Object.prototype.hasOwnProperty.call(extra, kk)) o[kk] = extra[kk]; } }
        return o;
      }

      // ── Detail level by ON-SCREEN cell size (NOT a fixed k tier — see LOD_WORK note). ────────────
      var k = LAYOUT.view.k;
      var cellPxAlong = drawLen * k;                    // the visible cell's on-screen length (px)
      var cellPxThick = thick * k;                      // …and on-screen thickness (px)
      var cx0 = x + w/2, cy0 = y + hgt/2;               // cell centroid (world)
      var isPip   = (cellPxThick < 6) || (cellPxAlong < 4);
      var isGlyph = !isPip && (cellPxThick >= 16);
      // isRect    = everything in between (the original thin-rect rendering, unchanged).

      if (isPip){
        // PIP — a single status dot at a FIXED screen radius (~2.6px → 2.6/k world units). Empty cages
        // = faint hollow dot. Keeps a zoomed-out plot a readable dot-field, not sub-pixel specks. Capped at
        // half the cell so a small farm fitting at very low k (ZOOM_MIN 0.1) can't bleed dots over neighbors.
        var pr = Math.min(2.6 / Math.max(0.0001, k), Math.min(w, hgt) * 0.5);
        if (detached){
          g.appendChild(s('circle', cellIdAttrs({ cx:cx0, cy:cy0, r:pr,
            fill:'none', stroke:'#9DB3B6', 'stroke-width':1/Math.max(0.0001,k), 'stroke-opacity':0.7 })));
        } else if (empty){
          g.appendChild(s('circle', cellIdAttrs({ cx:cx0, cy:cy0, r:pr,
            fill:'none', stroke:STATUS_COLORS.empty, 'stroke-width':1/Math.max(0.0001,k), 'stroke-opacity':0.7 })));
        } else {
          g.appendChild(s('circle', cellIdAttrs({ cx:cx0, cy:cy0, r:pr,
            fill:st.color, stroke:(STATUS_INK && STATUS_INK[st.key]) || st.color,
            'stroke-width':0.5/Math.max(0.0001,k), 'stroke-opacity':0.6 })));
        }

      } else if (isGlyph){
        // GLYPH — the FlipFarm cage glyph + status edge bars, matching the Phase-1 DOM look. The glyph
        // wrapper is a non-interactive <g>; the .lp-cagecell hit/highlight target is a transparent rect
        // over the cell footprint (so highlight dim + peek positioning still resolve to the cell).
        if (detached){
          g.appendChild(s('rect', cellIdAttrs({ x:x, y:y, width:w, height:hgt, rx:2, ry:2,
            fill:'none', stroke:'#9DB3B6', 'stroke-width':1, 'stroke-dasharray':'3 2', 'stroke-opacity':0.7 })));
        } else if (empty){
          // Empty = an open "rack slot" — a faint cradle, clearly lighter than a filled gear. At glyph
          // zoom the cell is wide, so a solid --c-empty fill reads as a heavy capsule (inverts the
          // weight vs the detailed filled gears beside it). Use a very translucent fill + a --hair-strong
          // hairline so the slot reads as empty structure, not an object. (QA fix on Phase-1 WP4 intent.)
          var eInset = Math.min(hgt * 0.16, w * 0.06);
          g.appendChild(s('rect', cellIdAttrs({ x:x+eInset, y:y+eInset,
            width:Math.max(1, w-2*eInset), height:Math.max(1, hgt-2*eInset), rx:2, ry:2,
            fill:'var(--c-empty)', 'fill-opacity':0.22, stroke:'var(--hair-strong)',
            'stroke-width':Math.max(0.8, hgt*0.045) })));
        } else {
          // Stocked → transparent .lp-cagecell over the footprint, then the FlipFarm glyph on top.
          g.appendChild(s('rect', cellIdAttrs({ x:x, y:y, width:w, height:hgt, rx:2, ry:2, fill:'transparent' })));
          var t = cageType(farm, cage.typeId);
          drawCageGlyph(g, t.shape, st.color, st.ready, st.needsWork, x, y, w, hgt);
        }

      } else {
        // RECT — the ORIGINAL thin-rect rendering (status fill, ready ring, needs-work dot). Unchanged.
        var attrs = cellIdAttrs({ x:x, y:y, width:w, height:hgt, rx:1.5, ry:1.5 });
        if (detached){                                  // gap/detached spot → hollow dashed (not "stocked")
          attrs.fill = 'none';
          attrs.stroke = '#9DB3B6'; attrs['stroke-width'] = 1; attrs['stroke-dasharray'] = '3 2';
          attrs['stroke-opacity'] = 0.7;
        } else if (empty){                              // empty cage → muted hollow cell, clearly "empty"
          attrs.fill = '#FFFFFF'; attrs['fill-opacity'] = 0.55;
          attrs.stroke = STATUS_COLORS.empty; attrs['stroke-width'] = 1;
        } else {                                        // stocked → fill = status color (rollup palette)
          attrs.fill = st.color;
          attrs.stroke = (STATUS_INK && STATUS_INK[st.key]) || st.color; attrs['stroke-width'] = 0.6;
          attrs['stroke-opacity'] = 0.5;
        }
        g.appendChild(s('rect', attrs));

        if (!empty && !detached && st.ready){           // market-ready → teal inset ring (mirrors rollup's ready dot)
          var inset = Math.min(1.2, Math.min(w, hgt)/4);
          g.appendChild(s('rect', { x:x+inset, y:y+inset,
            width:Math.max(0.5, w-2*inset), height:Math.max(0.5, hgt-2*inset),
            rx:1, ry:1, fill:'none', stroke:ringC, 'stroke-width':1.4, 'pointer-events':'none' }));
        }
        if (!empty && !detached && st.needsWork){       // needs-work → small red corner dot (cheap marker)
          g.appendChild(s('circle', { cx:x + Math.min(2.5, w/2), cy:y + Math.min(2.5, hgt/2),
            r:Math.min(1.4, Math.min(w, hgt)/3), fill:'#C8341E', 'pointer-events':'none' }));
        }
      }

      // ── Tens-ticks (GLYPH detail only): every 10th cage (index 9,19,29…) gets a faint tick + number
      // (10,20,30) under the rope, counter-scaled to stay ~9px on screen. Matches Phase-1 WP2. ───────
      if (isGlyph && ((c + 1) % 10 === 0)){
        var fs = 9 / Math.max(0.0001, k);               // constant 9px on screen
        var tickW = 1 / Math.max(0.0001, k);            // 1px-equiv hairline
        var tickLen = fs * 0.9;
        // Tick drops from the cell's far cross-edge (toward the inter-line gutter / "below the rope").
        var tickX0, tickY0, tickX1, tickY1, numX, numY;
        if (horiz){
          tickX0 = cx0; tickY0 = y + hgt; tickX1 = cx0; tickY1 = y + hgt + tickLen;
          numX = cx0; numY = tickY1 + fs;
        } else {
          tickX0 = x + w; tickY0 = cy0; tickX1 = x + w + tickLen; tickY1 = cy0;
          numX = tickX1 + fs*0.7; numY = cy0 + fs*0.34;
        }
        g.appendChild(s('line', { x1:tickX0, y1:tickY0, x2:tickX1, y2:tickY1,
          stroke:'var(--hair-strong)', 'stroke-width':tickW, 'pointer-events':'none' }));
        g.appendChild(s('text', { x:numX, y:numY, fill:'var(--ink-3)', 'font-size':fs, 'font-weight':700,
          'font-family':'inherit', 'text-anchor':'middle', 'pointer-events':'none' }, String(c + 1)));
      }
    }
  }
}

// LINE_PITCH_MAX — cap (world units) on the centre-to-centre distance between adjacent oyster line-rows
// drawn on the canvas. Without a cap, n rows spread to fill the whole area cross-axis, so a tall/sparse
// area drew its ropes far apart. Capping the pitch packs the rows into a tight, legible raft centred in
// the area (owner ask: "lines of the plots closer together"). Dense areas already sit below the cap, so
// they are unaffected. Shared by drawArea (strokes) + drawCageCells (cells/hit-rects) via rowBand().
var LINE_PITCH_MAX = 22;

// rowBand(area, n) — the centred cross-axis span (usable) and its edge inset (pad) that the n line-rows
// occupy, in world units. usable starts from area.spacing (tight/normal/wide), then the pitch (usable/n)
// is capped at LINE_PITCH_MAX so rows never spread edge-to-edge. drawArea + drawCageCells MUST share this
// so the rope strokes and the per-cage cells/hit-rects stay pixel-aligned (they used to inline the
// identical formula in two places — see the old usable/pad pair at each site).
function rowBand(area, n){
  var horiz = area.axis !== 'v';
  var cross = horiz ? area.h : area.w;
  var usable = cross * (1 - Math.max(0, Math.min(0.9, area.spacing || 0)) * 0.4);
  if (n > 0) usable = Math.min(usable, LINE_PITCH_MAX * n);   // cap the row pitch (usable/n)
  return { usable:usable, pad:(cross - usable) / 2 };
}

// drawArea — an area rect inside its plot, drawn with the area's rotate() transform. Rows of lines
// appear at PLOT/AREA tiers (never per-cage glyphs). A focused/selected area gets an "Open ›" chip.
function drawArea(farm, plot, area, tier){
  var selected = LAYOUT.sel && LAYOUT.sel.kind === 'area' && LAYOUT.sel.areaId === area.id;
  var cx = area.x + area.w/2, cy = area.y + area.h/2;
  var g = s('g', { 'data-area-id':area.id, 'data-plot-id':plot.id,
    transform: area.rot ? ('rotate(' + area.rot + ' ' + cx + ' ' + cy + ')') : null });
  g.appendChild(s('rect', { x:area.x, y:area.y, width:area.w, height:area.h, rx:8, ry:8,
    fill:'#0F2229', 'fill-opacity':0.96,
    stroke: selected ? '#34B3C4' : '#243E48', 'stroke-width': selected ? 2 : 1.5,
    'data-area-id':area.id, class:'lp-areabody' }));

  var lines = linesInArea(farm, area.id);
  // rows: at PLOT tier thin strokes; at AREA tier thicker + per-line tally. FARM tier is normally a ghost
  // (no rows) — but for SMALL farms we draw rows at the farm tier too, so the per-cage cells (drawCageCells)
  // have their host strokes and every cage is visible at the fitted overview on a narrow phone. (Bug B3)
  var showRows = (tier !== 'farm') || farmIsSmall(farm);
  if (showRows && lines.length){
    var n = lines.length;
    var horiz = area.axis !== 'v';                       // 'h' rows run horizontally (along width)
    var cross = horiz ? area.h : area.w;                 // axis rows are spaced ACROSS
    var _band = rowBand(area, n);                        // pitch-capped row geometry (shared w/ drawCageCells)
    var usable = _band.usable, pad = _band.pad;
    var stroke = (tier === 'area') ? 3 : (tier === 'plot' ? 2 : 1.4);   // farm tier = thinnest rope
    for (var i=0; i<n; i++){
      var frac = (n === 1) ? 0.5 : (i + 0.5) / n;        // even spacing across the cross axis
      var off = pad + frac * usable;
      var x1, y1, x2, y2;
      if (horiz){                                         // horizontal rows: vary Y, span X
        y1 = y2 = area.y + off;
        x1 = area.x + area.w*0.06; x2 = area.x + area.w*0.94;
      } else {                                            // vertical rows: vary X, span Y
        x1 = x2 = area.x + off;
        y1 = area.y + area.h*0.06; y2 = area.y + area.h*0.94;
      }
      g.appendChild(s('line', { x1:x1, y1:y1, x2:x2, y2:y2, stroke:'#8A6A40', 'stroke-width':stroke,
        'stroke-linecap':'round', 'pointer-events':'none' }));
      g.appendChild(s('line', { x1:x1, y1:y1-0.6, x2:x2, y2:y2-0.6, stroke:'#B18B53', 'stroke-width':1,
        'stroke-linecap':'round', 'pointer-events':'none' }));
      if (tier === 'area'){
        var ln = lines[i];
        var filled = ln.cages.filter(function(c){ return c.batch; }).length;
        var tx = horiz ? x2 : x1, ty = horiz ? y1 : y2;
        g.appendChild(s('text', { x:tx + 3, y:ty - 3, fill:'#9FB6BC', 'font-size':8,
          'font-family':'inherit', 'pointer-events':'none', 'text-anchor':'end' },
          filled + '/' + ln.cages.length));
      }
    }
  } else if (tier !== 'farm' && !lines.length){
    // EMPTY-AREA state (Item 2c): no lines yet → faint dashed row hints + a "Set lines" chip that
    // opens the Edit-area sheet (carries data-setlines-area; routed in handleLayoutTap). Reachable
    // after reducing an area's line count to 0. (LAYOUT §5 "Empty states")
    var hN = 3, hHoriz = area.axis !== 'v';
    for (var hi=0; hi<hN; hi++){
      var hf = (hi + 0.5) / hN;
      if (hHoriz){
        var hy0 = area.y + 0.12*area.h + hf*0.76*area.h;
        g.appendChild(s('line', { x1:area.x + area.w*0.1, y1:hy0, x2:area.x + area.w*0.9, y2:hy0,
          stroke:'#9DB3B6', 'stroke-width':1.2, 'stroke-dasharray':'5 5', 'stroke-opacity':0.55,
          'pointer-events':'none' }));
      } else {
        var hx0 = area.x + 0.12*area.w + hf*0.76*area.w;
        g.appendChild(s('line', { x1:hx0, y1:area.y + area.h*0.1, x2:hx0, y2:area.y + area.h*0.9,
          stroke:'#9DB3B6', 'stroke-width':1.2, 'stroke-dasharray':'5 5', 'stroke-opacity':0.55,
          'pointer-events':'none' }));
      }
    }
    var slW = Math.min(86, area.w - 16), slH = 24;
    if (slW >= 50){
      var slx = area.x + (area.w - slW)/2, sly = area.y + (area.h - slH)/2;
      var slg = s('g', { 'data-setlines-area':area.id, class:'lp-setlines', style:'cursor:pointer' });
      slg.appendChild(s('rect', { x:slx, y:sly, width:slW, height:slH, rx:12, ry:12,
        fill:'#14323A', stroke:'#34B3C4', 'stroke-width':1.2, 'data-setlines-area':area.id }));
      slg.appendChild(s('text', { x:slx + slW/2, y:sly + slH/2 + 4, fill:'#34B3C4', 'font-size':11,
        'font-weight':700, 'font-family':'inherit', 'text-anchor':'middle', 'data-setlines-area':area.id },
        'Set lines'));
      g.appendChild(slg);
    }
  }
  // Component 3: per-cage cells, appended INTO `g` (rides area.rot), above the line strokes drawn
  // above and below the label/chip/handles added below. No-op in edit mode / over the LOD cap.
  drawCageCells(farm, plot, area, tier, g);
  // area label pill — tappable (a tap on a SELECTED area's label opens the quick rename, LAYOUT §4)
  g.appendChild(s('text', { x:area.x + 8, y:area.y + 15, fill:'#3D5A60', 'font-size':11, 'font-weight':700,
    'font-family':'inherit', 'data-area-label':area.id, 'data-area-id':area.id, style:'cursor:text' }, area.name));

  // Bug B1 (round-9): VIEW-mode drill affordance. In overview/plot-zoom the per-cage hit-rects blanket
  // most of the area, so the area-body drill is hard to hit and there's no visible "how do I drill?" cue.
  // Render a small "Open ›" chip at the TOP-RIGHT corner — clear of the cage cells (which sit in the body
  // along the rope rows) — sized in WORLD units so it lands at ~40px on screen at the current zoom (a
  // reliable touch target on iPhone). It carries data-open-area-id; handleLayoutTap's view branch routes
  // a tap straight to drillIntoArea. Appended LAST inside `g` so it paints ABOVE the hit-rects, and given
  // pointer-events:auto so a cell hit-rect can't swallow its tap. Skipped only for areas too small to host
  // it without covering the footprint (then the area-body / margin drill + pinch-in cover the case). NOT
  // shown in edit mode (the selected-area edit chip below owns that), so the two never duplicate.
  if (layoutIsView()){
    var k = (LAYOUT.view && LAYOUT.view.k) ? LAYOUT.view.k : 1;
    var vChipW = Math.max(44, 64) / k;                            // ~64px wide on screen (≥44px touch)
    var vChipH = 38 / k;                                          // ~38px tall on screen
    var pad = 4 / k;                                              // small inset from the area edge
    // only render if it fits the card without blanketing it (leave room for the label + cells)
    if (vChipW <= area.w - 2*pad && vChipH <= area.h * 0.55){
      var vcx = area.x + area.w - vChipW - pad, vcy = area.y + pad;
      var fs = Math.max(8, 13 / k);
      var vchip = s('g', { 'data-open-area-id':area.id, class:'lp-openchip lp-openchip-view',
        style:'cursor:pointer; pointer-events:auto;' });
      vchip.appendChild(s('rect', { x:vcx, y:vcy, width:vChipW, height:vChipH,
        rx: Math.min(vChipH/2, 13/k), ry: Math.min(vChipH/2, 13/k),
        fill:'#0E7C8B', 'fill-opacity':0.95, stroke:'#FFFFFF', 'stroke-width':1.2/k,
        'data-open-area-id':area.id }));
      vchip.appendChild(s('text', { x:vcx + vChipW/2, y:vcy + vChipH/2 + fs*0.34,
        fill:'#FFFFFF', 'font-size':fs, 'font-weight':700, 'font-family':'inherit',
        'text-anchor':'middle', 'pointer-events':'none' }, 'Open ›'));
      g.appendChild(vchip);
    }
  }

  // Open › chip on the selected area (the explicit drill-in handoff) (LAYOUT §4)
  if (selected){
    var chipW = 78, chipH = 26, chx = area.x + area.w - chipW - 6, chy = area.y + area.h - chipH - 6;
    var chip = s('g', { 'data-open-area-id':area.id, class:'lp-openchip', style:'cursor:pointer' });
    chip.appendChild(s('rect', { x:chx, y:chy, width:chipW, height:chipH, rx:13, ry:13,
      fill:'#0E7C8B', 'data-open-area-id':area.id }));
    chip.appendChild(s('text', { x:chx + chipW/2, y:chy + chipH/2 + 4, fill:'#FFFFFF', 'font-size':12,
      'font-weight':700, 'font-family':'inherit', 'text-anchor':'middle', 'pointer-events':'none' }, 'Open ›'));
    g.appendChild(chip);
    // resize + rotate handles, drawn INSIDE the rotate() group so they ride the area's rotation.
    drawHandles(g, 'area', area);
  }
  return g;
}

// renderLayoutActionBar — bottom-docked action bar for the current selection (read-only Builder 2:
// shows Open › for an area; editing verbs arrive in Builder 3).
function renderLayoutActionBar(farm){
  var bar = document.getElementById('lpActionBar');
  if (!bar) return;
  bar.innerHTML = '';
  if (!LAYOUT.sel){ bar.classList.remove('show'); return; }
  bar.classList.add('show');
  if (LAYOUT.sel.kind === 'area'){
    var found = findAreaById(farm, LAYOUT.sel.areaId);
    if (!found){ LAYOUT.sel = null; bar.classList.remove('show'); return; }
    bar.appendChild(h('span', { class:'lp-abtitle' }, found.plot.name + ' · ' + found.area.name));
    bar.appendChild(h('button', { class:'btn btn-danger', onclick:function(){ removeAreaFromPlot(found.plot, found.area); } },
      'Remove'));
    bar.appendChild(h('button', { class:'btn btn-quiet', onclick:function(){ openSheet(function(){ return buildEditAreaSheet(found.area); }); } },
      'Edit area'));
    bar.appendChild(h('button', { class:'btn btn-primary', onclick:function(){ drillIntoArea(found.area); } },
      'Open ›'));
  } else if (LAYOUT.sel.kind === 'plot'){
    var p = (farm.plots || []).filter(function(pp){ return pp.id === LAYOUT.sel.plotId; })[0];
    if (!p){ LAYOUT.sel = null; bar.classList.remove('show'); return; }
    bar.appendChild(h('span', { class:'lp-abtitle' }, p.name));
    bar.appendChild(h('button', { class:'btn btn-danger', onclick:function(){ removePlotFromFarm(p); } },
      'Remove'));
    bar.appendChild(h('button', { class:'btn btn-quiet', onclick:function(){
      if (layoutHasEditing()){ addAreaToPlot(p); } else { toast('Add-area lands in the next build'); }
    } }, '+ Add area'));
  }
}

// findAreaById(farm, areaId) — { plot, area } | null.
function findAreaById(farm, areaId){
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    for (var j=0; j<p.areas.length; j++) if (p.areas[j].id === areaId) return { plot:p, area:p.areas[j] };
  }
  return null;
}

// drillIntoArea(area) — layout → scoped daily-work map. (LAYOUT §4 "Drill in") A brief ~220ms
// zoom/cross-fade from the area's on-canvas rect into the scoped work map; INSTANT under
// prefers-reduced-motion. Pure CSS transform/opacity (GPU-friendly), no library. (Item 1 + §5)
function drillIntoArea(area){
  // Bug B3 (round-13): re-entry guard. The animated path defers doDrillSwap()→pushView() by ~220ms; a
  // SECOND tap on the area background during that window fired a 2nd drillIntoArea on the still-live
  // overview, stacking a 2nd .lp-drillOv overlay AND pushing a 2nd history entry (so it then took two
  // Backs to leave). Drop any re-entrant call; doDrillSwap clears the flag once the swap lands.
  if (LAYOUT.drilling) return;
  if (prefersReducedMotion() || !LAYOUT.svg || !area){ doDrillSwap(area); return; }
  closeSheet();                                             // animate over the canvas, not behind a sheet
  var rect = layoutAreaScreenRect(area);                    // viewport-space rect of the area (or null)
  if (!rect){ doDrillSwap(area); return; }
  LAYOUT.drilling = true;                                   // lock for the duration of the zoom animation
  var ov = document.createElement('div');
  ov.className = 'lp-drillOv';
  var focus = document.createElement('div');
  focus.className = 'lp-drillFocus';
  focus.style.left = rect.x + 'px'; focus.style.top = rect.y + 'px';
  focus.style.width = rect.w + 'px'; focus.style.height = rect.h + 'px';
  ov.appendChild(focus);
  document.body.appendChild(ov);
  // fade the layout page out under the zooming focus box
  var page = LAYOUT.svg.closest ? LAYOUT.svg.closest('.layoutPage') : null;
  if (page) page.classList.add('lp-drillFade');
  // scale the focus box up to fill the viewport (about its own center)
  var vw = window.innerWidth, vh = window.innerHeight;
  var sc = Math.min(8, Math.max((vw * 1.15) / Math.max(1, rect.w), (vh * 1.15) / Math.max(1, rect.h), 1.05));
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      ov.classList.add('go');
      focus.style.transform = 'scale(' + sc.toFixed(2) + ')';
      focus.style.opacity = '0';
    });
  });
  setTimeout(function(){
    doDrillSwap(area);                                      // swap to the scoped work map (real render)
    ov.classList.add('done');                               // fade the overlay out over the new content
    setTimeout(function(){ if (ov.parentNode) ov.parentNode.removeChild(ov); }, 180);
  }, 220);
}

// doDrillSwap(area) — the verbatim scope swap (kept identical to the original drill-in body so the
// work map ends up correct whether the transition ran or not).
function doDrillSwap(area){
  viewScope = { plotId: area.plotId || findPlotIdOfArea(getFarm(), area.id), areaId: area.id };
  viewMode = 'work';
  LAYOUT.entered = false;                                    // re-entry to layout should re-fit (UX nit)
  LAYOUT.sel = null;
  clearSelection();
  closeSheet();
  pushView({ view:'work', scope: viewScope });   // owned entry → Back/popstate restores the home (Bug B1)
  render();
  LAYOUT.drilling = false;                        // release the re-entry guard once the swap has landed (Bug B3)
}

// NOTE: the WP8a/WP9 canvas camera-zoom path (enterAreaOnCanvas / frameAreaCamera / plotOfArea /
// NEIGHBOR_MARGIN) was removed after the product decision: tapping a plot on the map opens its clean
// work list (drillIntoArea), and the map is for navigation (pan/pinch). Restore from git/_v2-backups if
// a future "everything on the canvas" mode is wanted.

function prefersReducedMotion(){
  try { return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
  catch (e){ return false; }
}

// layoutAreaScreenRect(area) — viewport-space bounding rect of an area's (rotation-aware) corners,
// using the live pan/zoom. Returns {x,y,w,h} in window coords (svg rect offset added), or null.
function layoutAreaScreenRect(area){
  refreshSvgRect();
  var r = LAYOUT.svgRect; if (!r) return null;
  var cs = areaCorners(area);
  var xs = [], ys = [];
  ['nw','ne','se','sw'].forEach(function(k){
    var sp = toScreen(cs[k].x, cs[k].y);
    xs.push(sp.x); ys.push(sp.y);
  });
  var minX = Math.min.apply(null, xs), maxX = Math.max.apply(null, xs);
  var minY = Math.min.apply(null, ys), maxY = Math.max.apply(null, ys);
  return { x:r.left + minX, y:r.top + minY, w:Math.max(8, maxX-minX), h:Math.max(8, maxY-minY) };
}

/* ── STRUCTURE-EDIT GESTURES (LAYOUT §3/§4) — move / resize / rotate, driven by the pointer router.
      Live drag mutates only the affected node's geometry + redraws (no commit); pointerup snaps +
      ONE commit()+undoable. World-space throughout; rotated areas resize without walking. ── */

// editStartFromHandle(hit) — read data-handle + owning kind/id off a hit node, return a gesture
// descriptor with the original rect snapshot, or null if not an edit handle.
function editStartFromHandle(hit){
  // resolve up to the node that actually carries data-handle (a descendant glyph may be the target)
  while (hit && hit !== LAYOUT.svg && (!hit.getAttribute || !hit.getAttribute('data-handle'))) hit = hit.parentNode;
  if (!hit || !hit.getAttribute) return null;
  var handle = hit.getAttribute('data-handle');
  if (!handle) return null;
  var farm = getFarm();
  var areaId = hit.getAttribute('data-h-area'), plotId = hit.getAttribute('data-h-plot');
  if (areaId){
    var fa = findAreaById(farm, areaId); if (!fa) return null;
    var a = fa.area;
    return { mode:(handle === 'rot' ? 'rotate' : 'resize'), kind:'area', plotId:fa.plot.id, areaId:areaId,
      handle:handle, start:{ x:a.x, y:a.y, w:a.w, h:a.h, rot:a.rot||0 }, moved:false };
  }
  if (plotId){
    var p = (farm.plots||[]).filter(function(q){ return q.id===plotId; })[0]; if (!p) return null;
    return { mode:'resize', kind:'plot', plotId:plotId, handle:handle,
      start:{ x:p.x, y:p.y, w:p.w, h:p.h }, moved:false };
  }
  return null;
}

// editStartMove(kind, plotId, areaId, ptWorld) — begin a body-drag (move) of the selected shape.
function editStartMove(kind, plotId, areaId, ptWorld){
  var farm = getFarm();
  if (kind === 'area'){
    var fa = findAreaById(farm, areaId); if (!fa) return null;
    var a = fa.area;
    return { mode:'move', kind:'area', plotId:fa.plot.id, areaId:areaId,
      start:{ x:a.x, y:a.y, w:a.w, h:a.h, rot:a.rot||0 }, startWorld:ptWorld, moved:false };
  }
  var p = (farm.plots||[]).filter(function(q){ return q.id===plotId; })[0]; if (!p) return null;
  // snapshot every contained area's offset so a plot move carries them by the SAME delta
  var areaStart = p.areas.map(function(ar){ return { id:ar.id, x:ar.x, y:ar.y }; });
  return { mode:'move', kind:'plot', plotId:plotId,
    start:{ x:p.x, y:p.y, w:p.w, h:p.h }, areaStart:areaStart, startWorld:ptWorld, moved:false };
}

// alignCandidates(farm, ed) — sibling/parent/grid edge candidates for X and Y snapping.
function alignCandidates(farm, ed){
  var xs = [], ys = [];
  // coarse grid — spans the farm's content bounds + a margin (was a fixed 0..1000 box, which stopped
  // snapping once the canvas opened up past 1000u). Capped to a sane count so a huge farm can't blow up.
  var gB = layoutContentBounds(farm);
  var gLoX = gB ? gB.x - 300 : 0, gHiX = gB ? gB.x + gB.w + 300 : 1000;
  var gLoY = gB ? gB.y - 300 : 0, gHiY = gB ? gB.y + gB.h + 300 : 1000;
  var gx0 = Math.floor(gLoX/GRID_STEP)*GRID_STEP, gy0 = Math.floor(gLoY/GRID_STEP)*GRID_STEP;
  for (var gx=gx0, gn=0; gx<=gHiX && gn<400; gx+=GRID_STEP, gn++) xs.push(gx);
  for (var gy=gy0, gm=0; gy<=gHiY && gm<400; gy+=GRID_STEP, gm++) ys.push(gy);
  if (ed.kind === 'area'){
    var fa = findAreaById(farm, ed.areaId); var plot = fa && fa.plot;
    if (plot){ xs.push(plot.x, plot.x+plot.w, plot.x+plot.w/2); ys.push(plot.y, plot.y+plot.h, plot.y+plot.h/2);
      plot.areas.forEach(function(sib){ if (sib.id === ed.areaId) return;
        xs.push(sib.x, sib.x+sib.w, sib.x+sib.w/2); ys.push(sib.y, sib.y+sib.h, sib.y+sib.h/2); }); }
  } else {
    (farm.plots||[]).forEach(function(sib){ if (sib.id === ed.plotId) return;
      xs.push(sib.x, sib.x+sib.w, sib.x+sib.w/2); ys.push(sib.y, sib.y+sib.h, sib.y+sib.h/2); });
  }
  return { xs:xs, ys:ys };
}

// growPlotToContainArea(plot, area) — expand a plot's rect so it encloses the (rotation-aware) area bbox
// plus a small pad. Used when an area is dragged: the plot is a soft container that follows its areas
// instead of jailing them, so areas feel freely placeable on the open canvas. Only ever GROWS the plot.
function growPlotToContainArea(plot, area){
  if (!plot || !area) return;
  var c = (typeof areaCorners === 'function') ? areaCorners(area) : null;
  var minX, minY, maxX, maxY;
  if (c){
    var xs = [c.nw.x, c.ne.x, c.se.x, c.sw.x], ys = [c.nw.y, c.ne.y, c.se.y, c.sw.y];
    minX = Math.min.apply(null, xs); maxX = Math.max.apply(null, xs);
    minY = Math.min.apply(null, ys); maxY = Math.max.apply(null, ys);
  } else { minX = area.x; minY = area.y; maxX = area.x + area.w; maxY = area.y + area.h; }
  var pad = 14;
  var L = Math.min(plot.x, minX - pad),           T = Math.min(plot.y, minY - pad);
  var R = Math.max(plot.x + plot.w, maxX + pad),   B = Math.max(plot.y + plot.h, maxY + pad);
  plot.x = L; plot.y = T; plot.w = R - L; plot.h = B - T;
}

// editApply(ed, ptWorld) — drive the live gesture: mutate the model in place, redraw, draw guides.
function editApply(ed, ptWorld){
  var farm = getFarm();
  var tolW = SNAP_TOL_SCREEN / Math.max(0.0001, LAYOUT.view.k);

  if (ed.mode === 'move'){
    var dx = ptWorld.x - ed.startWorld.x, dy = ptWorld.y - ed.startWorld.y;
    if (ed.kind === 'area'){
      var fa = findAreaById(farm, ed.areaId); if (!fa) return;
      var a = fa.area, plot = fa.plot;
      var nx = ed.start.x + dx, ny = ed.start.y + dy;
      // snap top-left + center edges to align candidates
      var cand = alignCandidates(farm, ed);
      var sx = snapVal(nx, cand.xs, tolW), sx2 = snapVal(nx + a.w, cand.xs, tolW) - a.w,
          sxc = snapVal(nx + a.w/2, cand.xs, tolW) - a.w/2;
      nx = pickClosest(nx, [sx, sx2, sxc], tolW);
      var sy = snapVal(ny, cand.ys, tolW), sy2 = snapVal(ny + a.h, cand.ys, tolW) - a.h,
          syc = snapVal(ny + a.h/2, cand.ys, tolW) - a.h/2;
      ny = pickClosest(ny, [sy, sy2, syc], tolW);
      // OPEN canvas: don't jail the area inside its plot rect. Let it move freely; the plot is a SOFT
      // container that GROWS to enclose the area, so dragging an area never dead-ends at the plot wall.
      // (Bug: an area could only travel ~40u inside its plot.) growPlotToContainArea expands plot.x/y/w/h.
      a.x = nx; a.y = ny;
      growPlotToContainArea(plot, a);
    } else {
      var p = (farm.plots||[]).filter(function(q){ return q.id===ed.plotId; })[0]; if (!p) return;
      var npx = ed.start.x + dx, npy = ed.start.y + dy;
      var candP = alignCandidates(farm, ed);
      npx = pickClosest(npx, [snapVal(npx, candP.xs, tolW), snapVal(npx + p.w, candP.xs, tolW) - p.w], tolW);
      npy = pickClosest(npy, [snapVal(npy, candP.ys, tolW), snapVal(npy + p.h, candP.ys, tolW) - p.h], tolW);
      // OPEN canvas: a plot is "entirely different place" — it can be dragged anywhere within the farm's
      // content bounds + a generous margin (NOT the old fixed 1000×1000 box that pinned every new plot onto
      // the first one). The bound tracks live content so placing plots farther out keeps growing the space;
      // a finger drag can't exceed it in one gesture, and Fit-all recovers. (Bug: plot teleported to x=920.)
      var Bp = layoutContentBounds(farm) || { x:0, y:0, w:1000, h:1000 };
      var Mp = Math.max(Bp.w, Bp.h, 1200);
      npx = Math.max(Bp.x - Mp, Math.min(Bp.x + Bp.w + Mp - p.w, npx));
      npy = Math.max(Bp.y - Mp, Math.min(Bp.y + Bp.h + Mp - p.h, npy));
      // carry delta is measured from the gesture START (not the running position) so areas, derived
      // from their OWN start snapshots, move by the SAME total delta as the plot every frame.
      var pdx = npx - ed.start.x, pdy = npy - ed.start.y;
      p.x = npx; p.y = npy;
      // carry contained areas by the SAME delta (absolute world coords)
      ed.areaStart.forEach(function(asnap){
        var ar = p.areas.filter(function(z){ return z.id === asnap.id; })[0];
        if (ar){ ar.x = asnap.x + pdx; ar.y = asnap.y + pdy; }
      });
    }
  } else if (ed.mode === 'resize'){
    if (ed.kind === 'area'){
      var fa2 = findAreaById(farm, ed.areaId); if (!fa2) return;
      var r = resizeAreaLocal(ed.start, ed.handle, ptWorld);
      fa2.area.x = r.x; fa2.area.y = r.y; fa2.area.w = r.w; fa2.area.h = r.h;
    } else {
      resizePlot(farm, ed, ptWorld, tolW);
    }
  } else if (ed.mode === 'rotate'){
    var fa3 = findAreaById(farm, ed.areaId); if (!fa3) return;
    var a3 = fa3.area, c = areaCenter(a3);
    // angle of the pointer about the center; knob sits straight ABOVE center → offset by +90°
    var ang = Math.atan2(ptWorld.y - c.y, ptWorld.x - c.x) * 180 / Math.PI + 90;
    a3.rot = rotateSnap(ang);
  }
  ed.moved = true;
  layoutRedraw();                                            // rebuild scene with live geometry
  // guides drawn AFTER redraw so they sit on top of the freshly-rebuilt world (LAYOUT §3)
  if (ed.mode === 'rotate'){ var far = findAreaById(farm, ed.areaId); if (far) drawRotChip(far.area); }
  else { drawGuidesFor(farm, ed); drawSelBadge(farm); }      // live substance badge tracks the drag (Item 4)
}

// resizePlot — axis-aligned plot resize. Opposite edge anchors; min size; then keep contained
// areas inside the new bounds (clamp/translate, no rescale of area contents). (LAYOUT §4)
function resizePlot(farm, ed, ptWorld, tolW){
  var p = (farm.plots||[]).filter(function(q){ return q.id===ed.plotId; })[0]; if (!p) return;
  var st = ed.start;
  var L = st.x, R = st.x + st.w, T = st.y, B = st.y + st.h;
  var cand = alignCandidates(farm, ed);
  var hx = snapVal(ptWorld.x, cand.xs, tolW), hy = snapVal(ptWorld.y, cand.ys, tolW);
  if (ed.handle.indexOf('w') >= 0) L = hx;
  if (ed.handle.indexOf('e') >= 0) R = hx;
  if (ed.handle.indexOf('n') >= 0) T = hy;
  if (ed.handle.indexOf('s') >= 0) B = hy;
  if (ed.handle.indexOf('w') >= 0 && (R - L) < EDIT_MIN_W) L = R - EDIT_MIN_W;
  if (ed.handle.indexOf('e') >= 0 && (R - L) < EDIT_MIN_W) R = L + EDIT_MIN_W;
  if (ed.handle.indexOf('n') >= 0 && (B - T) < EDIT_MIN_H) T = B - EDIT_MIN_H;
  if (ed.handle.indexOf('s') >= 0 && (B - T) < EDIT_MIN_H) B = T + EDIT_MIN_H;
  p.x = L; p.y = T; p.w = R - L; p.h = B - T;
  // keep contained areas inside the new plot bounds (clamp size + position; don't rescale contents)
  p.areas.forEach(function(a){
    if (a.w > p.w) a.w = Math.max(EDIT_MIN_W, p.w);
    if (a.h > p.h) a.h = Math.max(EDIT_MIN_H, p.h);
    a.x = Math.max(p.x, Math.min(p.x + p.w - a.w, a.x));
    a.y = Math.max(p.y, Math.min(p.y + p.h - a.h, a.y));
  });
}

// pickClosest(orig, options, tol) — return the option nearest orig (within tol), else orig.
function pickClosest(orig, options, tol){
  var best = orig, bestD = tol + 1e-9, picked = false;
  options.forEach(function(o){ var d = Math.abs(o - orig); if (d <= tol && d < bestD){ bestD = d; best = o; picked = true; } });
  return picked ? best : orig;
}

// ── live snap guides (cleared on every editApply + pointerup) ──
function ensureGuideLayer(){
  if (!LAYOUT.world) return null;
  if (!LAYOUT.guides || LAYOUT.guides.parentNode !== LAYOUT.world){
    LAYOUT.guides = s('g', { class:'lp-guides', 'pointer-events':'none' });
    LAYOUT.world.appendChild(LAYOUT.guides);
  } else {
    LAYOUT.world.appendChild(LAYOUT.guides);                  // keep on top after redraw
  }
  return LAYOUT.guides;
}
function clearGuides(){ if (LAYOUT.guides){ while (LAYOUT.guides.firstChild) LAYOUT.guides.removeChild(LAYOUT.guides.firstChild); } }
function removeGuides(){ if (LAYOUT.guides && LAYOUT.guides.parentNode) LAYOUT.guides.parentNode.removeChild(LAYOUT.guides); LAYOUT.guides = null; }

// drawGuidesFor — thin dashed --ok lines where the moved/resized shape's edges/center align to a
// sibling/parent edge (within tolerance). Coarse + cheap; spans the world box. (LAYOUT §3)
function drawGuidesFor(farm, ed){
  var layer = ensureGuideLayer(); if (!layer) return;
  var rect = null;
  if (ed.kind === 'area'){ var fa = findAreaById(farm, ed.areaId); if (fa) rect = fa.area; }
  else { rect = (farm.plots||[]).filter(function(q){ return q.id===ed.plotId; })[0]; }
  if (!rect) return;
  var tolW = 0.75 / Math.max(0.0001, LAYOUT.view.k);          // tight: only show on a real lock
  var cand = alignCandidates(farm, ed);
  var myX = [rect.x, rect.x+rect.w/2, rect.x+rect.w], myY = [rect.y, rect.y+rect.h/2, rect.y+rect.h];
  var sw = 1 / Math.max(0.0001, LAYOUT.view.k);
  var seenX = {}, seenY = {};
  myX.forEach(function(vx){ cand.xs.forEach(function(cx){ if (Math.abs(vx-cx) <= tolW && !seenX[cx]){ seenX[cx]=1;
    layer.appendChild(s('line', { x1:cx, y1:0, x2:cx, y2:1000, stroke:'#2E9E5B', 'stroke-width':sw,
      'stroke-dasharray':(4*sw)+' '+(3*sw), 'pointer-events':'none' })); } }); });
  myY.forEach(function(vy){ cand.ys.forEach(function(cy){ if (Math.abs(vy-cy) <= tolW && !seenY[cy]){ seenY[cy]=1;
    layer.appendChild(s('line', { x1:0, y1:cy, x2:1000, y2:cy, stroke:'#2E9E5B', 'stroke-width':sw,
      'stroke-dasharray':(4*sw)+' '+(3*sw), 'pointer-events':'none' })); } }); });
}

// drawRotChip — a faint NS/EW orientation chip near the rotating area's center.
function drawRotChip(area){
  var layer = ensureGuideLayer(); if (!layer) return;
  var c = areaCenter(area);
  var pad = 6 / Math.max(0.0001, LAYOUT.view.k), fs = 11 / Math.max(0.0001, LAYOUT.view.k);
  var label = areaOrientLabel(area);
  var w = (label.length * fs * 0.62) + pad*2, hh = fs + pad*1.4;
  layer.appendChild(s('rect', { x:c.x - w/2, y:c.y - hh/2, width:w, height:hh, rx:hh/2, ry:hh/2,
    fill:'#DDEFF1', 'pointer-events':'none' }));
  layer.appendChild(s('text', { x:c.x, y:c.y + fs*0.34, fill:'#0A616E', 'font-size':fs, 'font-weight':700,
    'font-family':'inherit', 'text-anchor':'middle', 'pointer-events':'none' }, label));
}

// areaOrientLabel(area) — NS/EW (or degrees) from area.rot, matching the rotate-chip vocabulary.
function areaOrientLabel(area){
  var rot = (((area.rot || 0) % 180) + 180) % 180;
  return (rot < 10 || rot > 170) ? 'EW' : (Math.abs(rot - 90) < 10 ? 'NS' : Math.round(area.rot || 0) + '°');
}

// drawSelBadge(farm) — Item 4: a small live badge with the selected (or dragging) shape's substance.
//   area → "<n> lines · NS|EW"   plot → "<name> · <n> areas"
// Drawn in the guide layer (cleared between redraws) as a dark pill (--toast-bg / white) reusing the
// live drag-chip vocabulary. Floats just above the shape's top edge in world space so it tracks the
// shape during a drag. pointer-events:none → never affects hit-testing.
function drawSelBadge(farm){
  if (!LAYOUT.sel) return;
  var layer = ensureGuideLayer(); if (!layer) return;
  var k = Math.max(0.0001, LAYOUT.view.k);
  var label, anchorX, anchorTop;
  if (LAYOUT.sel.kind === 'area'){
    var fa = findAreaById(farm, LAYOUT.sel.areaId); if (!fa) return;
    var a = fa.area, nL = linesInArea(farm, a.id).length;
    label = nL + (nL === 1 ? ' line · ' : ' lines · ') + areaOrientLabel(a);
    var c = areaCenter(a);
    // top-edge midpoint in world space (respects rotation) → badge sits above it
    var top = rotPt(c.x, a.y, c.x, c.y, a.rot || 0);
    anchorX = top.x; anchorTop = top.y;
  } else {
    var p = (farm.plots || []).filter(function(q){ return q.id === LAYOUT.sel.plotId; })[0]; if (!p) return;
    var nA = p.areas.length;
    label = p.name + ' · ' + nA + (nA === 1 ? ' area' : ' areas');
    anchorX = p.x + p.w/2; anchorTop = p.y;
  }
  var fs = 11 / k, pad = 7 / k, gap = 14 / k;
  var w = (label.length * fs * 0.6) + pad*2, hh = fs + pad*1.5;
  var bx = anchorX - w/2, by = anchorTop - gap - hh;
  var bg = s('g', { 'pointer-events':'none' });
  bg.appendChild(s('rect', { x:bx, y:by, width:w, height:hh, rx:hh/2, ry:hh/2, fill:'#0C2A30' }));
  bg.appendChild(s('text', { x:anchorX, y:by + hh/2 + fs*0.34, fill:'#FFFFFF', 'font-size':fs,
    'font-weight':700, 'font-family':'inherit', 'text-anchor':'middle' }, label));
  layer.appendChild(bg);
}

// editFinalize(ed) — snap-finalize already applied; record ONE undoable + commit. Restores the
// pre-gesture snapshot on undo. Labels: 'Moved/Resized/Rotated area|plot'.
function editFinalize(ed){
  removeGuides();
  var farm = getFarm();
  var verb = ed.mode === 'move' ? 'Moved' : ed.mode === 'rotate' ? 'Rotated' : 'Resized';
  var noun = ed.kind === 'area' ? 'area' : 'plot';
  // capture before/after for undo (geometry only; lines untouched)
  var before = ed.kind === 'area' ? snapAreaGeom(farm, ed.areaId, ed.start) : snapPlotGeom(farm, ed);
  commit();
  undoable(verb + ' ' + noun, function(){
    var f = getFarm();
    before.restore(f);
    commit();
    layoutRedraw();
  });
}
// snapshot helpers — close over the BEFORE values so undo restores them exactly.
function snapAreaGeom(farm, areaId, start){
  return { restore:function(f){ var fa = findAreaById(f, areaId); if (fa){ var a = fa.area;
    a.x = start.x; a.y = start.y; a.w = start.w; a.h = start.h; a.rot = start.rot||0; } } };
}
function snapPlotGeom(farm, ed){
  var st = ed.start, plotId = ed.plotId, areaStart = ed.areaStart;
  // for plot resize there's no areaStart; snapshot current areas' bounds so undo is exact
  var areaBounds = null;
  if (!areaStart){
    var p = (farm.plots||[]).filter(function(q){ return q.id===plotId; })[0];
    areaBounds = p ? p.areas.map(function(a){ return { id:a.id, x:a.x, y:a.y, w:a.w, h:a.h }; }) : [];
  }
  return { restore:function(f){
    var p = (f.plots||[]).filter(function(q){ return q.id===plotId; })[0]; if (!p) return;
    p.x = st.x; p.y = st.y; p.w = st.w; p.h = st.h;
    if (areaStart){ areaStart.forEach(function(asnap){ var a = p.areas.filter(function(z){ return z.id===asnap.id; })[0]; if (a){ a.x = asnap.x; a.y = asnap.y; } }); }
    if (areaBounds){ areaBounds.forEach(function(b){ var a = p.areas.filter(function(z){ return z.id===b.id; })[0]; if (a){ a.x=b.x; a.y=b.y; a.w=b.w; a.h=b.h; } }); }
  } };
}

/* ── layout pointer flow (LAYOUT §3): one delegated handler set on the SVG.
      Intent on pointerdown: 2 pointers → pinch; [data-handle] → resize/rotate; selected-shape body
      → move; else select/pan. Live drag mutates + redraws; pointerup snaps + ONE commit()+undoable. ── */
function wireLayoutPointers(svg){
  var MOVE_THRESH = 4;
  // B2 (desktop): a pan that STARTS on a cage cell ends with a trailing synthetic 'click' on that cell.
  // When the gesture actually MOVED past threshold, we flag the next click so the desktop click→sheet
  // handler bails — a deliberate pan must never open the cage sheet. Mirrors the touch swallowNextClick
  // intent but scoped to this wiring's own click handler. One-shot, with a short fallback so a stale flag
  // can never swallow a later legitimate stationary click.
  var suppressNextClick = false;
  var suppressTid = null;
  function armClickSuppression(){
    suppressNextClick = true;
    if (suppressTid) clearTimeout(suppressTid);
    suppressTid = setTimeout(function(){ suppressNextClick = false; suppressTid = null; }, 400);
  }

    var r = LAYOUT.svgRect || svg.getBoundingClientRect();
    return { x:e.clientX - r.left, y:e.clientY - r.top };
  }

  // FOCUSES it → the focusin handler would PIN the highlight (applyCageHighlight(id,true)). A mouse pan
  // then never clears that pin and onHover bails on `if (LAYOUT.hlPinned) return;`, freezing the peek.
  // Pinning on focus is meant for KEYBOARD only. So flag pointer-driven focus: set LAYOUT.pointerFocus on
  // a pointerdown that lands ON A CAGE CELL (capture phase, so it lands before the focusin the press
  // triggers), and clear it on pointerup/cancel + the next tick. focusin treats a flagged focus as
  // pointer-driven → does NOT pin (Tab focus, which has no preceding pointerdown, still pins → a11y
  // preserved). markPointerFocus is also wired in CAPTURE phase below so it cannot be out-ordered by
  // onDown's bubble-phase listener.
  // B1 (round-11): GATE the flag on a CELL hit. A press on BARE WATER / area body / drill chip does NOT
  // focus a cell, so it must leave pointerFocus=false — otherwise a water-pan's own pointerdown sets the
  // flag and onMove's belt-and-suspenders clear (`mouse && hlPinned && pointerFocus`) then destroys a
  // genuine KEYBOARD pin that the pan should have survived. A mouse press that DID land on a cell still
  // sets the flag (preserving the round-8 fix: a mouse-focus pin doesn't freeze hover).
  function markPointerFocus(e){
    if (!(e && ancestorAttr(e.target, 'data-cage-id'))) return;   // bare water/chip/body → leave flag clear
    LAYOUT.pointerFocus = true;
    if (LAYOUT._pointerFocusTid) clearTimeout(LAYOUT._pointerFocusTid);
    // fallback: a stray pointerdown with no matching up (capture loss, etc.) can't leave the flag stuck.
    LAYOUT._pointerFocusTid = setTimeout(function(){ LAYOUT.pointerFocus = false; LAYOUT._pointerFocusTid = null; }, 700);
  }
  function clearPointerFocus(){

    // (some browsers focus on pointerup/mouseup rather than pointerdown).

    LAYOUT._pointerFocusTid = setTimeout(function(){ LAYOUT.pointerFocus = false; LAYOUT._pointerFocusTid = null; }, 0);
  }

    LAYOUT.ptrs.set(e.pointerId, { x:e.clientX, y:e.clientY });
    try { svg.setPointerCapture(e.pointerId); } catch (err){}

      var pts = Array.from(LAYOUT.ptrs.values());
      var a = pts[0], b = pts[1];
      var r = LAYOUT.svgRect;
      var mid = { x:(a.x+b.x)/2 - r.left, y:(a.y+b.y)/2 - r.top };

        startWorld:toWorld(mid.x, mid.y) };

    }

    var lp = localXY(e);
    var ptWorld = toWorld(lp.x, lp.y);

    if (layoutIsView()){

      return;
    }

    var ed = editStartFromHandle(e.target);
    if (ed){ ed.startSx = lp.x; ed.startSy = lp.y; LAYOUT.edit = ed; LAYOUT.pan = null; e.preventDefault(); return; }

    // 2) pointerdown on the body of the CURRENTLY-SELECTED shape → move that shape
    if (LAYOUT.sel){
      var bodyArea = ancestorAttr(e.target, 'data-area-id');
      var bodyPlot = ancestorAttr(e.target, 'data-plot-id');
      if (LAYOUT.sel.kind === 'area' && bodyArea === LAYOUT.sel.areaId){
        LAYOUT.edit = editStartMove('area', null, LAYOUT.sel.areaId, ptWorld);
      } else if (LAYOUT.sel.kind === 'plot' && bodyPlot === LAYOUT.sel.plotId && !bodyArea){
        // tap inside an area of the selected plot still selects/moves the plot only if not on an area
        LAYOUT.edit = editStartMove('plot', LAYOUT.sel.plotId, null, ptWorld);
      }
      if (LAYOUT.edit){ LAYOUT.edit.startSx = lp.x; LAYOUT.edit.startSy = lp.y; LAYOUT.pan = null; e.preventDefault(); return; }
    }

    // 3) single pointer on empty/other → tentative pan (becomes a tap if it doesn't move)
    LAYOUT.pan = { lastX:lp.x, lastY:lp.y, downX:lp.x, downY:lp.y, moved:false, target:e.target };
  }

  // ancestorAttr(el, name) — first matching attribute value walking up to the svg root, else null.
  function ancestorAttr(el, name){
    while (el && el !== svg){

    if (!LAYOUT.ptrs.has(e.pointerId)) return;

      }

      editApply(LAYOUT.edit, toWorld(lp.x, lp.y));

    }

      e.preventDefault();
      var pts = Array.from(LAYOUT.ptrs.values());
      var a = pts[0], b = pts[1];
      var r = LAYOUT.svgRect;
      var dist = Math.hypot(a.x-b.x, a.y-b.y) || 1;
      var mid = { x:(a.x+b.x)/2 - r.left, y:(a.y+b.y)/2 - r.top };
      var nk = clampZoom(LAYOUT.pinch.startK * (dist / LAYOUT.pinch.startDist));
      // keep the gesture-start world point under the CURRENT centroid (derives from fixed start values
      // → no drift accumulation; centroid translation = two-finger pan).
      var wf = LAYOUT.pinch.startWorld;
      LAYOUT.view.k = nk;
      LAYOUT.view.tx = mid.x - wf.x*nk;
      LAYOUT.view.ty = mid.y - wf.y*nk;

      return;
    }

    if (LAYOUT.pan){
      var p = localXY(e);
      if (!LAYOUT.pan.moved){
        if (Math.abs(p.x - LAYOUT.pan.downX) > MOVE_THRESH || Math.abs(p.y - LAYOUT.pan.downY) > MOVE_THRESH)
          LAYOUT.pan.moved = true;
        else return;
        // WP9: the first real pan dismisses the "drag to the next plot →" coachmark permanently.
        dismissNeighborCoach();
        // B1 (belt-and-suspenders): a MOUSE pan just CROSSED the threshold. If this gesture's own
        // pointerdown left a focus-driven pin behind (pointerFocus is set for this gesture), clear it now so
        // a desktop pan can never strand a frozen peek/highlight. Scoped to MOUSE: a deliberate KEYBOARD pin
        // has no pointerFocus flag (untouched), and a TOUCH pin is owned by handleLayoutTap and MUST survive
        // a one-finger pan (B2) — so a touch pan never clears here. Mouse hover re-resolves on the next move.
        if (lastPointerType === 'mouse' && LAYOUT.hlPinned && LAYOUT.pointerFocus) clearCageHighlight();
        // B3 (round-9): a TRANSIENT (unpinned) mouse-hover peek is position:fixed and does NOT re-anchor
        // during a pan (only PINNED highlights re-anchor via scheduleApplyView's rAF). So a pan that starts
        // on a hovered cell would strand the card over empty water pointing at the wrong cell. Dismiss the
        // transient hover here, the instant the pan threshold is crossed; it re-shows on the next hover after
        // the pan. Scoped to an UNPINNED hover (hoverCageId set, !hlPinned) so a deliberate pin (which
        // correctly re-anchors) is never touched. Cancel any pending peek-grace clear so it can't double-fire.
        if (!LAYOUT.hlPinned && LAYOUT.hoverCageId){ cancelPeekGrace(); clearCageHighlight(); }
      }
      e.preventDefault();
      LAYOUT.view.tx += (p.x - LAYOUT.pan.lastX);
      LAYOUT.view.ty += (p.y - LAYOUT.pan.lastY);

    if (wasEdit){

      if (wasEdit.moved){ editFinalize(wasEdit); }         // real move/resize/rotate → ONE commit+undoable
      else {
        removeGuides(); layoutRedraw();                    // a press that never moved → no-op…
        // …except a tap on a NAME label of the already-selected shape still opens the quick rename.
        if (e.target && e.target.getAttribute &&
            (e.target.getAttribute('data-area-label') || e.target.getAttribute('data-plot-label'))){

        }

      LAYOUT.pan = null; return;
    }

    if (wasPinch){ LAYOUT.pan = null; return; }          // a pinch consumed this gesture

    if (wasPan && !wasPan.moved){
      // a TAP — selection / drill-chip / double-tap
      handleLayoutTap(e, wasPan.target);
    } else if (wasPan && wasPan.moved){
      // B2: a real pan just ended. Suppress the trailing synthetic click so a pan that STARTED on a cage
      // cell does NOT open that cell's sheet. (Touch never reaches the desktop click handler, but arming
      // here is harmless — that handler gates on lastPointerType==='mouse'.)
      armClickSuppression();

      // the camera so the live pan couldn't strand the farm off-screen — keeps the same 40px-of-content
      // margin visible the resize handler enforces. Canvas views only (guarded inside clampViewToContent).

  svg.addEventListener('pointerdown', markPointerFocus, true);

  // ── B5: DESKTOP mouse-wheel / trackpad zoom ─────────────────────────────
  // Zoom LAYOUT.view.k toward the CURSOR, reusing zoomBy's zoom-to-point identity (keep the world point
  // under the cursor fixed) and clampZoom (same ZOOM_MIN/MAX the +/- .lp-zbtn buttons enforce). Works in
  // both overview (view) and the editor (edit); harmless in non-canvas views (svg unmounted → no svg).
  // A two-finger trackpad pinch arrives as ctrlKey+wheel — same code path, no double-fire. preventDefault
  // stops the page from scrolling under the canvas. Scaled deltaY → a modest per-notch zoom factor.
  function onWheel(e){

    // small deltas, a notch wheel sends ~±100. 0.0015 → ~1.16× per notch, gentle per trackpad tick.
    var factor = Math.exp(-e.deltaY * 0.0015);

    LAYOUT.view.tx = sx - wf.x * nk;
    LAYOUT.view.ty = sy - wf.y * nk;

  // ── Component 4: DESKTOP hover ──────────────────────────────────────────

  function onHover(e){

    // hover — neither cleared by moving onto empty water nor retargeted by moving over another cell. A
    // pin is changed only by a deliberate action (click/tap a cell, click empty water, Escape), all of
    // which run their own clearCageHighlight/applyCageHighlight outside this passive move handler.
    if (LAYOUT.hlPinned) return;
    if (LAYOUT.pan || LAYOUT.pinch || LAYOUT.edit || LAYOUT.ptrs.size) return; // mid-gesture → ignore
    var id = ancestorAttr(e.target, 'data-cage-id');
    if (id === LAYOUT.hoverCageId) return;                     // same cell (or still off-cells) → no work
    LAYOUT.hoverCageId = id;
    if (id){
      cancelPeekGrace();                                        // B2: re-entered a cell → abort any pending clear
      var cage = cageById(id);
      if (!cage){ clearCageHighlight(); return; }
      var cell = cellElById(id);
      showPeek(cage, (cell || e.target).getBoundingClientRect());
      var _hp = oysterPeekHost(); if (_hp) _hp.classList.add('hoverbridge'); // B2: this transient peek is a hover-bridge
      applyCageHighlight(id, false);                            // transient (not pinned) — drops on redraw
    } else {
      // B2: moved OFF all cells. Don't clear instantly — the parked peek shows an "Open ›" CTA, and the
      // cursor must cross empty water to reach it. Defer the clear ~PEEK_HOVER_GRACE ms; if the pointer
      // reaches the #oysterPeek card in that window the pointerenter handler cancels this (keepalive). If
      // it doesn't, the timer fires and clears. A move onto a NEW cell cancels it too (branch above).
      armPeekGrace();
    }

      LAYOUT.hoverCageId = null;

  function cancelPeekGrace(){
    if (LAYOUT.peekGraceTimer){ clearTimeout(LAYOUT.peekGraceTimer); LAYOUT.peekGraceTimer = null; }
  }

  // defer it too — the cursor may be leaving the svg precisely to reach the #oysterPeek card parked just
  // outside the svg rect; the card's pointerenter keepalive cancels this if so.
  function onHoverLeave(e){
    if (e.pointerType && e.pointerType !== 'mouse') return;
    if (!LAYOUT.hlPinned){ armPeekGrace(); }
  }
  svg.addEventListener('pointermove', onHover);
  svg.addEventListener('pointerleave', onHoverLeave);

  // ── Bug B2: hover-bridge keepalive on the parked peek card ───────────────
  // #oysterPeek stays pointer-events:none (so it never blocks a cage), but a hover-bridge needs to know
  // when the cursor reaches the card. We listen on the host in CAPTURE so we still hear the pointer even
  // though the host itself is pointer-events:none for its OWN hit-testing — actually pointer-events:none
  // suppresses events on the element, so we instead rely on the .op-hint (pointer-events:auto, the only
  // interactive part) + a thin keepalive zone. Entering the card (via the hint, which DOES receive events)
  // cancels the pending clear; a real leave re-arms it. The card is a sibling of #app, so these never
  // interfere with svg gestures.
  var peekHostEl = oysterPeekHost();
  if (peekHostEl){
    peekHostEl.addEventListener('pointerenter', function(){ if (!LAYOUT.hlPinned) cancelPeekGrace(); }, true);
    peekHostEl.addEventListener('pointermove',  function(){ if (!LAYOUT.hlPinned) cancelPeekGrace(); }, true);
    peekHostEl.addEventListener('pointerleave', function(){ if (!LAYOUT.hlPinned) armPeekGrace(); }, true);
  }

  // ── Component 4: DESKTOP click → open the FULL cage sheet ────────────────
  // A real (non-drag) click on a live cell opens the same sheet the work map opens. Touch never
  // reaches here with intent — its tap is consumed by the pointer router (handleLayoutTap), and a
  // synthetic post-tap click on a cell is harmless (re-opening the same sheet is idempotent), but we
  // gate to mouse-ish clicks anyway. A click that lands on empty water falls through to clear.
  svg.addEventListener('click', function(e){
