// bargeOriginText(barge) — short "from Line 1 · 1-2, 1-3" caption.
// B4 hardening: origin.lineNames / cageLabels are SNAPSHOTTED at pull time and never reconciled, so a
// pulled-then-deleted line would keep showing its (now-stale) name/cages here. We do NOT mutate the stored
// snapshot — instead we gracefully degrade the DISPLAY by filtering the names/labels against the lines/cages
// that still exist in the farm. If every referenced line/cage is gone we drop the clause entirely (the
// count pill still shows), rather than naming something deleted. Normal case (refs still present) is byte-
// identical to before. (Bug B4)
function bargeOriginText(barge){
  var o = barge.origin;
  if (!o) return '';
  var f = (typeof getFarm === 'function') ? getFarm() : null;
  var liveLineNames = null, liveCageLabels = null;
  if (f && Array.isArray(f.lines)){
    liveLineNames = {}; liveCageLabels = {};
    f.lines.forEach(function(l){
      if (l && l.name) liveLineNames[l.name] = true;
      (l && l.cages ? l.cages : []).forEach(function(c){ if (c && c.label) liveCageLabels[c.label] = true; });
    });
  }
  var allLines = (o.lineNames || []).filter(function(n){ return liveLineNames ? !!liveLineNames[n] : true; });
  var allCages = (o.cageLabels || []).filter(function(c){ return liveCageLabels ? !!liveCageLabels[c] : true; });
  var lines = allLines.slice(0, 2);
  var cages = allCages.slice(0, 4);
  var parts = [];
  if (lines.length) parts.push('from ' + lines.join(', ') + (allLines.length > 2 ? '…' : ''));
  if (cages.length) parts.push(cages.join(', ') + (allCages.length > 4 ? '…' : ''));
  return parts.join(' · ');
}

// renderBarge(farm) — art + dynamic pile + count pill + origin caption; tap → Harvest sheet
function renderBarge(farm){
  var barge = farm.barge;
  // BATCH-SPLIT: "loaded" now means the tub holds ANYTHING — a remainder pile OR sorted batches.
  var loaded = bargeHasContent(barge);
  var nSplits = (Array.isArray(barge.splits) ? barge.splits.length : 0);
  // WP6: the wrap is a column; the caption block is appended FIRST and the hull SECOND, so the
  // count/origin/"Tub empty" pill docks ABOVE the hull and never collides with content below it.
  var wrap = h('div', { class:'barge ' + (loaded ? 'loaded' : 'empty'),
    'aria-label':'Tub — tap to harvest', role:'button', tabindex:'0' });

  // count pill / caption — above the hull
  if (loaded){
    var totalCount = bargeTotalCount(barge);
    var pillTxt = (totalCount == null) ? 'uncounted' : ('~' + fmtCompact(totalCount));
    wrap.appendChild(h('div', { class:'barge-pill num' }, pillTxt));
    if (nSplits){
      wrap.appendChild(h('div', { class:'barge-origin' }, nSplits + (nSplits === 1 ? ' batch sorted' : ' batches sorted')));
    } else {
      var origin = bargeOriginText(barge);
      if (origin) wrap.appendChild(h('div', { class:'barge-origin' }, origin));
    }
  } else {
    wrap.appendChild(h('div', { class:'barge-empty-cap' }, 'Tub empty'));
  }

  // hull = the warm hand-painted SVG art + the soft radial "wake" under it (CSS ::after).
  wrap.appendChild(h('div', { class:'barge-hull', html: loaded ? BARGE_LOADED_SVG : BARGE_EMPTY_SVG }));

  // drive the pile after it mounts (next frame so the SVG <g> exists in DOM)
  if (loaded){
    var lvl = pileLevel(bargeTotalCount(barge));
    // apply from the LIVE DOM next frame — a rapid re-render can detach the captured `wrap` (M1)
    requestAnimationFrame(function(){ applyPileLevel(document.querySelector('.barge'), lvl); });
  }

  // tap anywhere on the barge → Harvest sheet (§3.8)
  wrap.addEventListener('click', function(){ openSheet(function(){ return buildHarvestSheet(getFarm()); }); });
  wrap.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openSheet(function(){ return buildHarvestSheet(getFarm()); }); } });
  return wrap;
}

// applyPileLevel — scale the #oysterPile group up from the deck line + gate the depth bands
function applyPileLevel(wrap, lvl){
  if (!wrap) return;
  var pile = wrap.querySelector('#oysterPile');
  if (!pile) return;
  // grow UP from the deck (y≈64), centered at cx=60
  pile.setAttribute('transform', 'translate(60 64) scale(' + (0.55 + 0.6*lvl).toFixed(3) + ') translate(-60 -64)');
  // gate the rows: front always (lvl>0); mid >0.45; back >0.75
  var mid = pile.querySelector('.pileMid'), back = pile.querySelector('.pileBack');
  if (mid)  mid.style.display  = lvl > 0.45 ? '' : 'none';
  if (back) back.style.display = lvl > 0.75 ? '' : 'none';
}

// A transient working model the form edits, then commits.
function blankCageTypes(){ return [{ id:uid(), name:'Cage', shape:'square', meshMm:null }]; }

// buildFarmForm(mode, farm) — mode 'create' (onboarding) or 'edit' (layout). Returns a DOM fragment array.
//   In create mode the form holds its own working state; in edit mode it mutates the active farm directly.
function buildFarmForm(mode, farm){
  var isCreate = mode === 'create';
  // working model
  var model;
  if (isCreate){
    model = { name:'', linesCount:1, cagesPerLine:10, cageTypes:blankCageTypes(),
              grades:[], marketSizeMm:76, neglectIntervalDays:56 };
  } else {
    model = farm;  // edit in place
  }

  var frag = [];

  // ── Farm name ──
  var nameIn = h('input', { type:'text', value:isCreate ? model.name : farm.name, placeholder:'e.g. Brightside Oyster Co.',
    oninput:function(){ if (isCreate) model.name = this.value; else { farm.name = this.value; persist(); } } });
  frag.push(field('Farm name', nameIn));

  // ── Lines / cages (CREATE only — edit mode manages lines via the list below) ──
  if (isCreate){
    // Bug B11 (round-10): NEVER rewrite the field while the user is typing. The old "reflect the clamp
    // back" (B8) wrote "1" into an empty/mid-edit field whenever parseNum was null, so clearing + typing
    // "30" produced "130" (the injected 1 + the new keystrokes) and the farm honored the corrupted size.
    // Fix: oninput only updates the MODEL (clamped to ≥1 for the eventual build); it leaves this.value
    // alone (empty/transient allowed). The DISPLAYED value is normalised on BLUR (change): empty/<1 → 1.
    // min='1' hints the constraint; createFarmFromModel re-clamps at build time as the final guard.
    var normLineCount = function(){ var n = Math.max(1, Math.round(parseNum(this.value) || 1));
      model.linesCount = n; this.value = n; };
    var normCageCount = function(){ var n = Math.max(1, Math.round(parseNum(this.value) || 1));
      model.cagesPerLine = n; this.value = n; };
    var linesIn = h('input', { type:'number', inputmode:'numeric', min:'1', value:model.linesCount,
      oninput:function(){ var n = parseNum(this.value); model.linesCount = (n != null && n >= 1) ? n : 1; },
      onchange:normLineCount, onblur:normLineCount });
    var cagesIn = h('input', { type:'number', inputmode:'numeric', min:'1', value:model.cagesPerLine,
      oninput:function(){ var n = parseNum(this.value); model.cagesPerLine = (n != null && n >= 1) ? n : 1; },
      onchange:normCageCount, onblur:normCageCount });
    var row = h('div', { class:'row2' }, field('How many lines?', linesIn), field('Cages per line', cagesIn));
    var grp = h('div', null, row, h('div', { class:'fieldHint' }, 'You can add or change these later.'));
    frag.push(grp);
  } else {
    // edit mode: per-line list with rename + remove + per-line cage count
    frag.push(buildLinesEditor(farm));
  }

  // ── Cage types editor ──
  frag.push(buildCageTypesEditor(isCreate ? model : farm, isCreate));

  // ── Grades chip editor ──
  frag.push(buildGradesEditor(isCreate ? model : farm, isCreate));

  // ── Market size ──
  var marketIn = h('input', { type:'number', inputmode:'decimal', min:'1',
    value:isCreate ? model.marketSizeMm : farm.settings.marketSizeMm,
    oninput:function(){ var v = Math.max(1, parseNum(this.value) || 76);
      if (isCreate) model.marketSizeMm = v; else { farm.settings.marketSizeMm = v; persist(); } } });
  frag.push(field('Market size (mm)', marketIn, 'The size you sell at — used to project harvest dates.'));

  // ── Needs-work alert ──
  var alertIn = h('input', { type:'number', inputmode:'numeric', min:'1',
    value:isCreate ? model.neglectIntervalDays : farm.settings.neglectIntervalDays,
    oninput:function(){ var v = Math.max(1, parseNum(this.value) || 56);
      if (isCreate) model.neglectIntervalDays = v; else { farm.settings.neglectIntervalDays = v; persist(); } } });
  frag.push(field('Alert if a cage goes unworked for ___ days', alertIn,
    'We’ll flag a cage that hasn’t been worked in this long.'));

  // ── Actions ──
  if (isCreate){
    frag.push(h('button', { class:'btn btn-primary btn-block', style:{marginTop:'22px'},
      onclick:function(){ createFarmFromModel(model, nameIn); } }, 'Create farm'));
    frag.push(h('div', { style:{textAlign:'center', marginTop:'8px'} },
      h('button', { class:'linkBtn', onclick:function(){ loadBrightsideFarm(); } }, 'Load Brightside demo')));
  } else {
    frag.push(h('button', { class:'btn btn-primary btn-block', style:{marginTop:'22px'},
      onclick:closeSheet }, 'Done'));
  }
  return frag;
}

// createFarmFromModel — build the Farm from the working model, set active, render the map.
function createFarmFromModel(model, nameIn){
  var name = (model.name || (nameIn && nameIn.value) || '').trim() || 'My farm';
  if (!model.cageTypes.length){ toast('Add at least one cage type'); return; }
  var farm = {
    id:uid(), name:name, createdAt:Date.now(),
    cageTypes:model.cageTypes.map(function(t){ return { id:t.id || uid(), name:t.name || 'Cage',
      shape:SHAPES.indexOf(t.shape) < 0 ? 'square' : t.shape,
      meshMm:(typeof t.meshMm === 'number' && t.meshMm > 0) ? t.meshMm : null }; }),
    grades:model.grades.slice(),
    lines:[], barge:freshBarge(), harvestLog:[], batches:[],
    settings:{ marketSizeMm:model.marketSizeMm > 0 ? model.marketSizeMm : 76,
               neglectIntervalDays:model.neglectIntervalDays > 0 ? model.neglectIntervalDays : 56 }
  };
  var typeId = farm.cageTypes[0].id;
  // Final guard: build from the clamped+rounded counts (matches the on-blur displayed value). oninput
  // keeps the model ≥1 but may hold a transient float (e.g. "3.5"); normalise here so the built farm
  // honours exactly the number the field shows.
  var nLines = Math.max(1, Math.round(parseNum(model.linesCount) || 1));
  var nCages = Math.max(1, Math.round(parseNum(model.cagesPerLine) || 1));
  for (var li=0; li<nLines; li++){
    var line = { id:uid(), name:'Line ' + (li+1), order:li, cages:[] };
    for (var ci=0; ci<nCages; ci++) line.cages.push(newCage(typeId, li, ci));
    farm.lines.push(line);
  }
  ensureSpatialIndex(farm);             // LAYOUT §6.10 — born into the plot model (no first-load flicker)
  backfillSeedCohorts(farm);            // L1: stamp seedCohortId now so cohort highlight is stable pre-reload
  state.farms.push(farm);
  state.activeFarmId = farm.id;
  closeSheet();
  applyFreshFarmLanding();              // B3: a laid-out farm lands on Overview in this SAME session
  commit();
  toast('Farm created');
}

// applyFreshFarmLanding() — B3: init() computes homeMode ONCE, when there were zero farms (→ 'work').
// After a farm is created (onboarding) or the demo is loaded, the new farm has ≥1 plot, so recompute
// the landing the same way init() does and switch to Overview in-session (no reload needed). A truly
// empty/no-plot farm keeps homeMode 'work' and is left untouched. commit()/render() runs right after.
function applyFreshFarmLanding(){
  homeMode = defaultHomeMode();
  if (homeMode === 'overview'){
    viewMode = 'overview'; viewScope = null; LAYOUT.mode = 'view'; LAYOUT.entered = false;
  }
}

// buildCageTypesEditor — rows: name · 3-way shape toggle (glyph preview) · mesh mm; + Add type.
function buildCageTypesEditor(target, isCreate){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Cage types'));
  var list = h('div', { class:'typeList' });

  function renderRows(){
    list.innerHTML = '';
    target.cageTypes.forEach(function(t){
      var nameIn = h('input', { class:'tname', type:'text', value:t.name, placeholder:'e.g. FlipFarm',
        oninput:function(){ t.name = this.value; if (!isCreate) persist(); } });
      var meshIn = h('input', { class:'tmesh num-in', type:'number', inputmode:'decimal', min:'0', placeholder:'mm',
        value:(t.meshMm != null ? t.meshMm : ''),
        oninput:function(){ var v = parseNum(this.value); t.meshMm = (v != null && v > 0) ? v : null; if (!isCreate) persist(); } });
      var toggle = h('div', { class:'shapeToggle' });
      SHAPES.forEach(function(sh){
        var btn = h('button', { class:'sbtn' + (t.shape === sh ? ' on' : ''),
          html:shapeSVG(sh, '#C3D2D4', false, 16, false), 'aria-label':sh,
          onclick:function(){ t.shape = sh; renderRows(); if (!isCreate) persist(); } });
        toggle.appendChild(btn);
      });
      var rm = h('button', { class:'trm', 'aria-label':'Remove type', html:'×',
        onclick:function(){ removeCageType(target, t, isCreate, renderRows); } });
      list.appendChild(h('div', { class:'typeRow' }, nameIn, toggle, meshIn, rm));
    });
  }
  renderRows();
  wrap.appendChild(list);
  wrap.appendChild(h('button', { class:'chip add', style:{marginTop:'10px'},
    onclick:function(){ target.cageTypes.push({ id:uid(), name:'', shape:'square', meshMm:null });
      renderRows(); if (!isCreate) persist(); } }, h('span', { html:icon('plus', 16) }), 'Add type'));
  return wrap;
}

// removeCageType — blocked with a toast if the type is in use (edit mode); always keep ≥1.
function removeCageType(target, t, isCreate, redraw){
  if (target.cageTypes.length <= 1){ toast('Keep at least one cage type'); return; }
  if (!isCreate){
    var inUse = false;
    target.lines.forEach(function(l){ l.cages.forEach(function(c){ if (c.typeId === t.id) inUse = true; }); });
    if (inUse){ toast('That cage type is in use — change those cages first'); return; }
  }
  var idx = target.cageTypes.indexOf(t);
  if (idx >= 0) target.cageTypes.splice(idx, 1);
  redraw();
  if (!isCreate) persist();
}

// buildGradesEditor — chip add/remove for the custom grade vocabulary.
function buildGradesEditor(target, isCreate){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Grades'));
  var chips = h('div', { class:'chips' });
  function renderChips(){
    chips.innerHTML = '';
    target.grades.forEach(function(g, i){
      chips.appendChild(h('span', { class:'chip on' }, g,
        h('button', { class:'x', 'aria-label':'Remove ' + g, html:'×',
          onclick:function(){ target.grades.splice(i, 1); renderChips(); if (!isCreate) persist(); } })));
    });
    var addInput = h('input', { type:'text', placeholder:'Add grade + Enter', style:{flex:'1 1 130px', minWidth:'130px'},
      onkeydown:function(e){ if (e.key === 'Enter'){ e.preventDefault(); var v = this.value.trim();
        if (v && target.grades.indexOf(v) < 0){ target.grades.push(v); renderChips(); if (!isCreate) persist(); } this.value = ''; } } });
    chips.appendChild(addInput);
  }
  renderChips();
  wrap.appendChild(chips);
  return wrap;
}

// buildLinesEditor (edit mode) — list each line with rename + remove; add-line button.
function buildLinesEditor(farm){
  var wrap = h('div', { class:'fieldGroup' });
  wrap.appendChild(h('label', null, 'Lines'));
  var list = h('div', null);
  function renderLines(){
    list.innerHTML = '';
    farm.lines.forEach(function(l){
      var nameIn = h('input', { type:'text', value:l.name, style:{flex:'1 1 auto'},
        oninput:function(){ l.name = this.value; persist(); } });
      var count = h('span', { class:'hint', style:{flex:'0 0 auto', whiteSpace:'nowrap'} }, l.cages.length + ' cages');
      var rm = h('button', { class:'trm', 'aria-label':'Remove line', html:icon('trash', 18),
        onclick:function(){ removeLineFromFarm(farm, l, renderLines); } });
      list.appendChild(h('div', { class:'typeRow' }, nameIn, count, rm));
    });
  }
  renderLines();
  wrap.appendChild(list);
  wrap.appendChild(h('button', { class:'chip add', style:{marginTop:'10px'},
    onclick:function(){ addLine(); renderLines(); refreshSheet(); } },
    h('span', { html:icon('plus', 16) }), 'Add line'));
  return wrap;
}

// removeLineFromFarm — explicit line delete + renumber (edit mode).
function removeLineFromFarm(farm, line, redraw){
  var idx = farm.lines.indexOf(line);
  if (idx < 0) return;
  farm.lines.splice(idx, 1);
  reindexLines(farm);
  rebuildLineIds(farm);                 // LAYOUT §6.9 — re-derive area.lineIds after a structural remove
  save();
  if (redraw) redraw();
  render();
}

  var kids = [];
  kids.push(h('h2', null, 'Set up your farm'));

  return kids.concat(buildFarmForm('create', null));

function buildFarmLayout(){

/* ── EDIT-AREA SHEET (LAYOUT §4 "Set lines / cages / spacing / orientation") ──
   Name · Lines stepper (ACTUAL count, lineIds-backed) · Cages per line · Spacing · Orientation
   chip · Open ›. Line-count changes route through setAreaLineCount (grow/blocked-reduce). */
function buildEditAreaSheet(area){
  var farm = getFarm();
  // resolve the live area object by id (the captured ref may be stale after a re-render)
  var fa = findAreaById(farm, area.id);
  if (!fa){ return sheetHead('Area').concat(h('div', { class:'sheetSub' }, 'This area no longer exists.')); }
  area = fa.area;
  var actual = linesInArea(farm, area.id).length;          // the TRUTH (migrated areas: lineCount 0)
  if (area.lineCount !== actual) area.lineCount = actual;  // reconcile the raw field to reality

  var frag = sheetHead('Edit area', fa.plot.name);

  // ── Area name (live-persist while typing; ONE undoable registered on blur/commit) ──
  var nameBefore = area.name;
  var nameIn = h('input', { type:'text', value:area.name, placeholder:'e.g. A1',
    oninput:function(){ var v = this.value; area.name = v; persist(); layoutRedraw(); },
    onchange:function(){
      var v = (this.value || '').trim() || nameBefore; area.name = v; this.value = v;
      if (v !== nameBefore){ commit(); commitRename('area', area.id, nameBefore); nameBefore = v; }
      else persist();
    } });
  frag.push(field('Area name', nameIn));

  // ── Lines (stepper showing the ACTUAL count) ──
  var linesVal = h('input', { class:'num-in stp-val', type:'number', inputmode:'numeric', min:'0',
    value:actual });
  function applyLines(target){
    target = Math.max(0, Math.floor(target || 0));
    setAreaLineCount(getFarm(), area, target);            // grow / blocked-reduce, self-commits + undoable
    refreshSheet();                                       // re-read the live count into the stepper
  }
  var linesStep = h('div', { class:'stepper' },
    h('button', { class:'stp-btn', 'aria-label':'Remove a line',
      onclick:function(){ applyLines(linesInArea(getFarm(), area.id).length - 1); } }, '−'),
    linesVal,
    h('button', { class:'stp-btn', 'aria-label':'Add a line',
      onclick:function(){ applyLines(linesInArea(getFarm(), area.id).length + 1); } }, '+'));
  linesVal.addEventListener('change', function(){ applyLines(parseNum(this.value)); });
  frag.push(field('Lines', linesStep, 'Adds empty lines; reducing removes empty lines from the end.'));

  // ── Cages per line (seed for newly-added lines) ──
  var cagesIn = h('input', { class:'num-in', type:'number', inputmode:'numeric', min:'1',
    value:(area.cagesPerLine || 10),
    onchange:function(){
      var v = Math.max(1, parseNum(this.value) || 10);
      area.cagesPerLine = v; this.value = v; persist();
    } });
  frag.push(field('Cages per line', cagesIn, 'Used when you add new lines.'));

  // ── Spacing (segmented: tight / normal / wide → area.spacing) ──
  var SPACES = [{ k:'Tight', v:0.1 }, { k:'Normal', v:0.2 }, { k:'Wide', v:0.4 }];
  function spaceMatch(v){
    var best = SPACES[1].v, bd = Infinity;
    SPACES.forEach(function(o){ var d = Math.abs((v == null ? 0.2 : v) - o.v); if (d < bd){ bd = d; best = o.v; } });
    return best;
  }
  var curSpace = spaceMatch(area.spacing);
  var spaceSeg = h('div', { class:'chips' });
  SPACES.forEach(function(o){
    var chip = h('button', { class:'chip' + (o.v === curSpace ? ' on' : ''), onclick:function(){
      area.spacing = o.v; persist(); layoutRedraw();
      var sibs = spaceSeg.querySelectorAll('.chip'); for (var i=0;i<sibs.length;i++) sibs[i].classList.remove('on');
      this.classList.add('on');
    } }, o.k);
    spaceSeg.appendChild(chip);
  });
  frag.push(field('Spacing', spaceSeg));

  // ── Orientation (NS / EW chip — sets area.rot like the rotate chip; reconciles axis) ──
  var rotN = (((area.rot || 0) % 180) + 180) % 180;
  var orient = (Math.abs(rotN - 90) < 10) ? 'NS' : (rotN < 10 || rotN > 170 ? 'EW' : null);
  var orientSeg = h('div', { class:'chips' });
  [['EW','East–West'], ['NS','North–South']].forEach(function(o){
    var chip = h('button', { class:'chip' + (orient === o[0] ? ' on' : ''), onclick:function(){
      setAreaOrientation(getFarm(), area, o[0]); layoutRedraw(); refreshSheet();
    } }, o[1]);
    orientSeg.appendChild(chip);
  });
  frag.push(field('Orientation', orientSeg,
    (orient ? null : 'Rotated ' + Math.round(area.rot || 0) + '° — pick EW or NS to square it up.')));

  // ── Open this area › (drill-in) ──
  // WP8a: from the canvas this is a CAMERA zoom that stays on the map (closeSheet first so the reduced-
  // motion path isn't framing behind an open sheet); the animated path closes the sheet itself.
  frag.push(h('button', { class:'btn btn-primary btn-block', style:{ marginTop:'22px' },
    onclick:function(){ closeSheet(); drillIntoArea(area); } }, 'Open this area ›'));

  return frag;
}

// buildRenameSheet(kind, id) — the quick inline-rename sheet for a plot or area NAME label tap.
// SIMPLEST touch-friendly path: one focused text field + Done; persists via renameShape (undoable).
function buildRenameSheet(kind, id){
  var farm = getFarm();
  var cur = '', label = (kind === 'area') ? 'Area name' : 'Plot name';
  if (kind === 'area'){ var fa = findAreaById(farm, id); if (fa) cur = fa.area.name; }
  else { var p = (farm.plots || []).filter(function(q){ return q.id === id; })[0]; if (p) cur = p.name; }
  var renameBefore = cur;
  function applyName(target, v){
    if (kind === 'area'){ var fa = findAreaById(getFarm(), id); if (fa) fa.area.name = v; }
    else { var p = (getFarm().plots || []).filter(function(q){ return q.id === id; })[0]; if (p) p.name = v; }
  }
  var input = h('input', { type:'text', value:cur, placeholder:label,
    oninput:function(){ applyName(id, this.value); persist(); layoutRedraw(); },
    onchange:function(){
      var v = (this.value || '').trim() || renameBefore; applyName(id, v); this.value = v;
      if (v !== renameBefore){ commit(); commitRename(kind, id, renameBefore); renameBefore = v; }
      else persist();
    } });
  var frag = sheetHead('Rename').concat(field(label, input));
  frag.push(h('button', { class:'btn btn-primary btn-block', style:{ marginTop:'22px' }, onclick:closeSheet }, 'Done'));
  // focus + select for an immediate edit (after the sheet paints)
  setTimeout(function(){ try { input.focus(); input.select(); } catch (e){} }, 60);
  return frag;
}

/* ═══════════════════════════════════════════════════════════════════
   FARM LAYOUT EDITOR (LAYOUT §3/§4) — Builder 2: read-only SVG canvas
   + pan/pinch/zoom + LOD tiers + drill-in/back. Editing is Builder 3.
   ═══════════════════════════════════════════════════════════════════ */
// One fixed logical world (1000×1000 abstract units). pan/zoom lives on the inner <g>.
var LAYOUT = {
  view: { k:1, tx:0, ty:0 },        // screen = world*k + (tx,ty)
  svg: null, world: null,           // current SVG root + inner transform group
  svgRect: null,                    // cached getBoundingClientRect of svg (gesture start / resize)
  mode: 'edit',                     // 'edit' (full layout editor) | 'view' (read-only overview: pan/zoom + tap-area-to-drill only)
  sel: null,                        // { kind:'plot'|'area', plotId, areaId } | null — single-selection
  ptrs: null,                       // active-pointer Map (pinch) keyed by pointerId
  pinch: null,                      // { startDist, startK, startMid }
  pan: null,                        // { lastX, lastY, moved }
  edit: null,                       // active move/resize/rotate gesture (Builder 3) | null
  guides: null,                     // <g> holding live snap/alignment guide lines | null
  rafPending: false,                // applyView coalescer
  lastTier: null,                   // last LOD band ('farm'|'plot'|'area') for rebuild-on-cross
  lastTap: 0, lastTapXY: null,      // double-tap detection
  entered: false,                   // FIRST entry to the layout page fits-to-content; commit-triggered
                                    // re-mounts PRESERVE the live pan/zoom (reset on exit to work mode)
  savedView: null,                  // last view snapshot, restored across a commit re-mount
  redrawSeq: 0,                     // bumped each layoutRedraw — keys the per-redraw cage-count cache (Component 3)
  _cellTotal: -1, _cellSeq: -1,     // memoized farm-wide cage total for the CELL_MAX LOD gate (Component 3)
  // ── Component 4: cell hover/tap + sibling highlight ──
  hlGroup: null,                    // active batch-group key (highlight target) | null
  hlCage: null,                     // active cage id (the cell that triggered the highlight) | null
  hlPinned: false,                  // true = persistent (touch/keyboard pin) → survives redraw; false = transient mouse hover
  pointerFocus: false,              // B1: true while a pointer-driven focus is in flight → focusin must NOT pin (keyboard only)
  hoverCageId: null,                // last cage id under the mouse (debounces re-entering the same cell)
  lastTapCageId: null,              // first tap of a two-tap "open" gesture (touch)
  lastTapCageXY: null,              // Bug B3: WHERE the first tap landed → radius fallback for the 2nd tap
  tapTimer: null,                   // window for the second tap to land on the same cell
  cellCount: 0,                     // cells drawn this redraw (gates keyboard focusability ≤120)
  peekGraceTimer: null              // Bug B2: pending deferred clear of a TRANSIENT hover peek (hover-bridge)
};
var PEEK_HOVER_GRACE = 200;         // Bug B2: ms a transient hover peek lingers after going off-cell, so the
                                    // cursor can cross the gap and reach the parked card's "Open ›" CTA.
var TWO_TAP_R = 22;                 // Bug B3: px radius around the first tap that still counts as the 2nd tap
var LOD_PLOT = 0.6, LOD_AREA = 1.6; // tier thresholds (k)
// WP7: a 4th 'work' band for the canvas. NOTE the k value is informational only — cage DETAIL is
// chosen by the cell's actual ON-SCREEN pixel size inside drawCageCells, NOT by this fixed tier
// (LOD_WORK=3.2 is miscalibrated for this geometry: at k=3.2 a ~70-world cell is 224px, so only
// 1–2 cages fit). layoutTier() still reports 'work' past k≥3.2 for any tier-aware chrome that wants it.
var LOD_WORK = 3.2;
var ZOOM_MIN = 0.1, ZOOM_MAX = 8;   // 0.1 (was 0.2): a wide multi-plot farm must fit at the overview (3 plots ≈ k0.13) instead of clamping + clustering low

// Builder 3 editing hooks — Builder 2 calls these only if defined (drop/move/resize live there).
function layoutHasEditing(){ return typeof addPlotToFarm === 'function'; }
// layoutIsView() — true when the shared SVG canvas is mounted READ-ONLY (the home Overview). Gates
// off every editing affordance (handles, add-plot, action bar, select/rename/CTA taps). (Component 2)
function layoutIsView(){ return LAYOUT.mode === 'view'; }

function layoutTier(){
  var k = LAYOUT.view.k;
  if (k < LOD_PLOT) return 'farm';
  if (k < LOD_AREA) return 'plot';
  if (k < LOD_WORK) return 'area';
  return 'work';                       // WP7: 4th band (chrome-level only; cell detail is by on-screen px)
}

function applyView(){
  if (!LAYOUT.world) return;
  var v = LAYOUT.view;
  LAYOUT.world.setAttribute('transform',
    'translate(' + v.tx.toFixed(2) + ' ' + v.ty.toFixed(2) + ') scale(' + v.k.toFixed(4) + ')');
  LAYOUT.savedView = { k:v.k, tx:v.tx, ty:v.ty };       // remember camera across commit re-mounts (UX nit)
}
function scheduleApplyView(){
  if (LAYOUT.rafPending) return;
  LAYOUT.rafPending = true;
  requestAnimationFrame(function(){
    LAYOUT.rafPending = false;
    applyView();
    // crossing an LOD band → rebuild the scene (semantic disclosure) (LAYOUT §4)
    var t = layoutTier();
    if (t !== LAYOUT.lastTier){ LAYOUT.lastTier = t; layoutRedraw(); }
    // WP9: refresh the breadcrumb scope text every committed frame (cheap text-only write; layoutRedraw
    // already covers the tier-change case but a SAME-TIER pan that crosses a plot boundary must update too).
    if (layoutIsView()) updateBreadcrumb();
    // B2: the highlighted CELLS ride #layoutWorld's transform, but the #oysterPeek card is position:fixed,
    // so a SAME-TIER pan/zoom (no layoutRedraw, hence no reapplyCageHighlight→positionPeek) leaves the card
    // stranded over empty water while still naming the pinned cage. When a highlight is PINNED, re-anchor
    // the peek to the pinned cell's fresh on-screen rect every frame. One getBoundingClientRect + style
    // write while pinned only; null-guarded (the cell may be off-screen / not drawn at this LOD). Transient
    // hover is NOT repositioned here (it hides on pan via the gesture gates / onHoverLeave).
    else if (LAYOUT.hlPinned && LAYOUT.hlCage){
      // B5 (round-9): re-anchor the pinned peek to the cell's fresh on-screen rect, and HIDE the card if
      // the cell has scrolled off-screen (keeping pin/highlight state). syncPinnedPeek also covers the
      // tier-change redraw path (reapplyCageHighlight). Null-guarded (cell may be off-LOD / not drawn).
      syncPinnedPeek(cellElById(LAYOUT.hlCage));
    }
  });
}
function clampZoom(k){ return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, k)); }
function toWorld(sx, sy){ var v = LAYOUT.view; return { x:(sx - v.tx)/v.k, y:(sy - v.ty)/v.k }; }
function toScreen(wx, wy){ var v = LAYOUT.view; return { x:wx*v.k + v.tx, y:wy*v.k + v.ty }; }
function refreshSvgRect(){ if (LAYOUT.svg) LAYOUT.svgRect = LAYOUT.svg.getBoundingClientRect(); }

// fitToContent(farm, [target]) — fit all plots (or one shape) into the viewport with margin. (LAYOUT §3)
// Bug B2 (SAFETY): in the EDITOR a selection's docked .lp-actionbar (Remove / Edit area / Open) floats
// over the BOTTOM of the canvas (CSS bottom:calc(78px+safe-area), ~64px tall). A fit-to-fill area's
// bottom edge + its se/sw/s resize handles would land UNDER that bar — and the destructive "Remove"
// button sits right under the se handle. To keep the handles always reachable (and never on Remove),
// the editor RESERVES bottom space in the fit so content + handles clear the bar. The reservation is
// applied whenever the editor can show the bar (edit mode), since selecting an area does NOT re-fit.
// Overview (view mode) has no bar/handles → no inset, so its fit is unchanged.
function editorBottomInset(){
  if (layoutIsView()) return 0;                            // overview: no action bar / no handles
  // action-bar bottom offset (78) + bar height (~64) + handle hit-radius slack + a small margin,
  // plus the iOS safe-area inset so a fit-to-fill area always clears the bar on a notched phone.
  var safe = 0;
  try {
    var probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;bottom:env(safe-area-inset-bottom);height:0;width:0;visibility:hidden;';
    document.body.appendChild(probe);
    safe = probe.getBoundingClientRect().bottom - (window.innerHeight || 0);
    safe = (isFinite(safe) && safe > 0) ? safe : 0;
    document.body.removeChild(probe);
  } catch (e) { safe = 0; }
  return 120 + safe;                                       // ≈ bar bottom-offset + bar height + handle slack + margin
}
// fitViewFor(farm, [target]) — PURE compute of the camera {k,tx,ty} that frames `target` ({x,y,w,h}
// world bbox) or, when target is omitted, all plots. Shared by the INSTANT fit (fitToContent) and the
// ANIMATED fit (zoomToShape) so a tap-zoom lands EXACTLY where a fit-all / double-tap would. Returns null
// if the canvas isn't measurable. `.whole` flags the all-plots fit (callers store it as LAYOUT.fitView);
// `.empty` flags the no-plots fallback (don't store that as fitView). See fitToContent for the Bug B2/B4
// rationale (the math is verbatim — only the apply step moved out).
function fitViewFor(farm, target){
  refreshSvgRect();
  var r = LAYOUT.svgRect; if (!r || !r.width || !r.height) return null;
  var B;
  if (target){ B = { x:target.x, y:target.y, w:target.w, h:target.h }; }
  else {
    B = layoutContentBounds(farm);
    if (!B) return { k:1, tx:r.width/2 - 500, ty:r.height/2 - 500, whole:true, empty:true };
  }
  // Reserve a bottom band in the EDITOR so content+handles never tuck under the action bar (Bug B2).
  // Fit into the SHRUNK viewport (availH) and center the content within that band (its vertical center
  // lands at availH/2, not r.height/2) → the whole content sits ABOVE the reserved strip.
  var inset = Math.min(editorBottomInset(), r.height * 0.45);  // never eat more than ~45% of the canvas
  var availH = Math.max(1, r.height - inset);
  var m = Math.max(B.w, B.h) * 0.10 + 20;                  // margin in world units
  var k = clampZoom(Math.min(r.width/(B.w + 2*m), availH/(B.h + 2*m)));
  var cx = B.x + B.w/2, cy = B.y + B.h/2;
  return { k:k, tx:r.width/2 - cx*k, ty:availH/2 - cy*k, whole:!target, empty:false };
}

// fitToContent(farm, [target]) — INSTANT fit (behavior verbatim). Remembers the whole-farm fit camera in
// LAYOUT.fitView (Bug B4): the resize handler treats "view still equals this" as "the user hasn't taken
// over the zoom" → re-fit on resize; once they pan/zoom away, only re-clamp.
function fitToContent(farm, target){
  var v = fitViewFor(farm, target); if (!v) return;
  LAYOUT.view = { k:v.k, tx:v.tx, ty:v.ty };
  if (v.whole && !v.empty) LAYOUT.fitView = { k:v.k, tx:v.tx, ty:v.ty };
  scheduleApplyView();
}

// areaWorldBox(area) — the area's AXIS-ALIGNED world bbox, accounting for area.rot (rotated areas use
// areaCorners). Feeds zoomToShape so a tap-zoom frames a rotated area without clipping it.
function areaWorldBox(area){
  if (!area.rot) return { x:area.x, y:area.y, w:area.w, h:area.h };
  var c = areaCorners(area);
  var xs = [c.nw.x, c.ne.x, c.se.x, c.sw.x], ys = [c.nw.y, c.ne.y, c.se.y, c.sw.y];
  var minX = Math.min.apply(null, xs), maxX = Math.max.apply(null, xs);
  var minY = Math.min.apply(null, ys), maxY = Math.max.apply(null, ys);
  return { x:minX, y:minY, w:maxX - minX, h:maxY - minY };
}

// animateViewTo(target, dur, done) — tween LAYOUT.view {k,tx,ty} to `target` over `dur` ms with an
// easeInOutCubic, applying the transform each frame (applyView is cheap — no scene rebuild). On the LAST
// frame it calls scheduleApplyView() ONCE so the LOD tier-change redraw (cells/strokes for the new tier)
// fires a single time at rest, not on every animated frame. Honors prefers-reduced-motion (jumps). A new
// call — or a pointerdown (onDown clears LAYOUT.viewAnim) — supersedes any in-flight tween via the token.
function animateViewTo(target, dur, done){
  if (!LAYOUT.world || !target){ if (done) done(); return; }
  var reduce = false;
  try { reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e){}
  if (reduce || !window.requestAnimationFrame){
    LAYOUT.view = { k:target.k, tx:target.tx, ty:target.ty }; scheduleApplyView(); if (done) done(); return;
  }
  var token = (LAYOUT.viewAnim || 0) + 1; LAYOUT.viewAnim = token;
  var from = { k:LAYOUT.view.k, tx:LAYOUT.view.tx, ty:LAYOUT.view.ty };
  var nowFn = (window.performance && performance.now) ? function(){ return performance.now(); } : function(){ return Date.now(); };
  var t0 = nowFn();
  function step(){
    if (LAYOUT.viewAnim !== token) return;                 // superseded by a newer tween or a manual gesture
    var p = Math.min(1, (nowFn() - t0) / dur);
    var e = (p < 0.5) ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;   // easeInOutCubic
    LAYOUT.view = { k:from.k + (target.k - from.k) * e,
                    tx:from.tx + (target.tx - from.tx) * e,
                    ty:from.ty + (target.ty - from.ty) * e };
    applyView();
    if (p < 1){ requestAnimationFrame(step); }
    else { LAYOUT.viewAnim = 0; scheduleApplyView(); if (done) done(); }
  }
  requestAnimationFrame(step);
}

// zoomToShape(farm, [target], done) — smooth camera move that frames `target` ({x,y,w,h} world bbox) or
// all plots (target omitted). The progressive tap-to-zoom uses this: tap a plot → frame the plot; tap an
// area → frame the area; the breadcrumb steps back out. Camera-only — NO history entry (per the nav model:
// camera state isn't on the back stack; only drillIntoArea/scope changes are). ~260ms.
function zoomToShape(farm, target, done){
  var v = fitViewFor(farm, target); if (!v){ if (done) done(); return; }
  if (v.whole && !v.empty) LAYOUT.fitView = { k:v.k, tx:v.tx, ty:v.ty };
  animateViewTo({ k:v.k, tx:v.tx, ty:v.ty }, 260, done);
}

// zoomBy(factor) — step k about the viewport center (the +/− cluster).
function zoomBy(factor){
  refreshSvgRect();
  var r = LAYOUT.svgRect; if (!r) return;
  var mid = { x:r.width/2, y:r.height/2 };
  var wf = toWorld(mid.x, mid.y);
  var nk = clampZoom(LAYOUT.view.k * factor);
  LAYOUT.view.k = nk;
  LAYOUT.view.tx = mid.x - wf.x*nk;
  LAYOUT.view.ty = mid.y - wf.y*nk;
  scheduleApplyView();
}

// layoutContentBounds(farm) — world-space bbox of all plots, or null if none. (shared by fit + clamp)
function layoutContentBounds(farm){
  var plots = (farm && farm.plots) || [];
  if (!plots.length) return null;
  var minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  plots.forEach(function(p){ minX=Math.min(minX,p.x); minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+p.w); maxY=Math.max(maxY,p.y+p.h); });
  return { x:minX, y:minY, w:Math.max(1,maxX-minX), h:Math.max(1,maxY-minY) };
}

// clampOpenAxis(t, lo, hi, k, viewLen) — clamp a translate so the world envelope [lo,hi] (world units)
// stays reachable: if the envelope is narrower than the viewport on this axis, center it; otherwise allow
// panning anywhere WITHIN the envelope (the envelope edges can reach the viewport edges, no further).
function clampOpenAxis(t, lo, hi, k, viewLen){
  var span = (hi - lo) * k;
  if (span <= viewLen) return (viewLen - span)/2 - lo*k;   // envelope fits the viewport → center it
  return Math.max(viewLen - hi*k, Math.min(-lo*k, t));     // else keep the envelope covering the viewport
}

// clampViewToContent(farm) — keep the user's zoom (k); nudge tx/ty so the camera stays within the farm's
// content bounds PLUS a generous open margin of water on every side. The owner wants an OPEN canvas (plots
// in "entirely different places", room to pan over and place new ones), so this is NOT a tight leash — you
// can pan a screen-or-more of empty water past the content, but you can't lose the farm to infinity.
// Fit-all (the ⤢ control) / the breadcrumb are the get-unlost recovery. (Was a tight 40px-of-content clamp.)
function clampViewToContent(farm){
  refreshSvgRect();
  var r = LAYOUT.svgRect; if (!r || !r.width || !r.height) return;
  var B = layoutContentBounds(farm); if (!B) return;
  var v = LAYOUT.view, k = v.k;
  var MARGIN = Math.max(B.w, B.h, 1200);                   // ≥ one content-size / 1200u of open water each side
  v.tx = clampOpenAxis(v.tx, B.x - MARGIN, B.x + B.w + MARGIN, k, r.width);
  v.ty = clampOpenAxis(v.ty, B.y - MARGIN, B.y + B.h + MARGIN, k, r.height);
  scheduleApplyView();
}

// onLayoutViewportResize() — DEBOUNCED window-resize handler (Bug B4). Only the canvas views (the
// read-only overview + the layout editor) own LAYOUT.svg; the work map / onboarding don't, so we no-op
// there. Refreshes the cached SVG rect, then: if the user is still parked at the auto-fit view, re-FIT
// (so a resize keeps the whole farm framed); otherwise just re-CLAMP the pan to keep content on-screen
// without fighting their zoom. Guarded so a stray resize in a non-canvas view can't throw.
var _layoutResizeTimer = null;
function onLayoutViewportResize(){
  if (_layoutResizeTimer) clearTimeout(_layoutResizeTimer);
  _layoutResizeTimer = setTimeout(function(){
    _layoutResizeTimer = null;
    if (viewMode !== 'overview' && viewMode !== 'layout') return;   // canvas views only
    if (!LAYOUT.svg || !document.body.contains(LAYOUT.svg)) return; // svg must be mounted
    var farm = getFarm(); if (!farm) return;
    refreshSvgRect();
    // "still at fit" heuristic: the user hasn't panned/zoomed away from the auto-fit camera. We re-fit
    // then to keep the farm framed; if they've moved, we respect their zoom and only re-clamp.
    if (atFitView(farm)){ fitToContent(farm); }
    else { clampViewToContent(farm); }
  }, 150);
}

// atFitView(farm) — true when the live camera still equals the camera the last whole-farm fit produced,
// i.e. the user hasn't panned/zoomed away. Compared against the stored LAYOUT.fitView (set in fitToContent)
// so it stays correct even after the viewport size changed. No mutation.
function atFitView(farm){
  var fv = LAYOUT.fitView, v = LAYOUT.view;
  if (!fv) return false;
  return Math.abs(v.k - fv.k) < 1e-4 && Math.abs(v.tx - fv.tx) < 0.5 && Math.abs(v.ty - fv.ty) < 0.5;
}

// toggleOverviewWork(target) — the TRANSIENT Overview⇄Work flip on the segmented toggle. (Bug B1/B7)
//   • Does NOT mutate the persistent homeMode — toggling is a view-only change, so the editor Back and
//     scope-back keep returning to the computed default home (overview for a laid-out farm). homeMode is
//     reserved for the session's real landing surface (set in init / SpatMapDebug only).
//   • Going TO 'work' pushes a history entry (mirrors doDrillSwap) so the device/browser Back button
//     returns to the Overview instead of unloading the page; the popstate handler restores it. (B7)
//   • Going back TO 'overview' from the work map: if our pushed entry is on top of the history stack,
//     pop it (history.back) so the URL stays clean; otherwise just re-render the overview directly.
function toggleOverviewWork(target){
  clearSelection();
  if (target === 'work'){
    viewMode = 'work'; viewScope = null; LAYOUT.mode = 'edit';
    pushView({ view:'work', ovWork:true });   // owned entry → Back/popstate restores the overview (Bug B1/B7)
    render();
  } else {                                            // → overview
    if (history.state && history.state.ovWork){ history.back(); return; }  // popstate restores overview
    viewMode = 'overview'; viewScope = null; LAYOUT.mode = 'view'; LAYOUT.entered = false;
    render();
  }
}

// buildOverview(farm) — the HOME page (Component 2): a zoomed-out, READ-ONLY whole-farm map. Reuses
// the layout editor's shared canvas/transform/draw core (buildLayoutEditor in 'view' mode), so plots &
// areas draw and pan/zoom works, but no edit handles / add controls / selection. Tapping an area drills
// into its daily-work map (drillIntoArea → doDrillSwap, verbatim). Cages + hover land in later components.
function buildOverview(farm){ return buildLayoutEditor(farm, 'view'); }


/* ╔══ DARK DASHBOARD JS (BIT B/C/D, spliced) ══╗ */
/* ─────────────────────────────────────────────────────────────────
   DASHBOARD (BIT B) — the dark, DOM, card-based whole-farm home.
   Replaces the SVG overview for (viewMode==='overview' && !viewScope).
   Pure render: builds DOM + returns root. No bead interaction handlers
   (BIT D attaches delegated listeners on .dashboard). Color via tokens.
   All farm-derived strings go through h() text kids (createTextNode) → XSS-safe.
   ───────────────────────────────────────────────────────────────── */
function buildDashboard(farm){
  farm = farm || getFarm();
  var root = h('div', { class:'dashboard' });

  // 1. slim top bar
  root.appendChild(dbTopBar(farm));

  // 2. five stat cards
  root.appendChild(dbStatCards(farm));

  // 3. EMPTY conditions host (BIT C fills #conditionsBar; we only render + style the shell)
  root.appendChild(h('div', { id:'conditionsBar', class:'condbar' }));

  // empty farm → friendly invite, then bail (no plots to render)
  if (!farm || !farm.plots || !farm.plots.length){
    root.appendChild(h('div', { class:'db-empty' },
      h('div', { class:'db-empty-title' }, 'No plots yet'),
      h('div', { class:'db-empty-sub' },
        'Open the menu to lay out your farm — add a plot, mark its areas, and string your lines.')
    ));
    root.appendChild(dbLegend());
    return root;
  }

  // 4. one section per plot (display order)
  farm.plots.forEach(function(plot){
    root.appendChild(dbPlotSection(farm, plot));
  });

  // 7. collapsible legend
  root.appendChild(dbLegend());

  return root;
}

/* dbTopBar — farm name + menu + the existing Overview/Work segmented toggle.
   The toggle reuses toggleOverviewWork() (the file's own escape-hatch). We're on
   the unscoped overview, so "Overview" is the active tab; "Work" flips to the work list. */
function dbTopBar(farm){
  var menuBtn = h('button', {
    class:'db-menu-btn', 'aria-label':'Menu',

    onclick:function(){ openSheet(buildMenu); }
  });

  var actions = h('div', { class:'db-top-actions' });

  // overviewAvailable()/toggleOverviewWork() are the file's existing nav primitives.
  if (typeof overviewAvailable === 'function' && overviewAvailable()){
    actions.appendChild(
      h('div', { class:'db-seg', role:'tablist', 'aria-label':'Map mode' },

/* dbFarmStats — the 5 STAT COMPUTATIONS over ALL farm cages (viewScope-independent). */
function dbFarmStats(farm){
  var cages = 0, stocked = 0, oysters = 0, oystersCounted = false,
      sizeSum = 0, sizeN = 0, ready = 0;
  (farm && farm.lines ? farm.lines : []).forEach(function(line){
    (line.cages || []).forEach(function(c){
      cages++;
      if (c.batch){
        stocked++;
        if (typeof c.batch.count === 'number'){ oysters += c.batch.count; oystersCounted = true; }
        var sz = latestSize(c);
        if (typeof sz === 'number'){ sizeSum += sz; sizeN++; }
        if (cageStatus(c, farm).ready) ready++;
      }
    });
  });
  // CAGES authoritative count (cached) — prefer farmTotalCageCount when present
  var totalCages = (typeof farmTotalCageCount === 'function') ? farmTotalCageCount(farm) : cages;
  return {
    cages: totalCages,
    stocked: stocked,
    oysters: oystersCounted ? fmtCompact(oysters) : '—',
    avgSize: sizeN ? (Math.round(sizeSum / sizeN) + ' mm') : '—',
    ready: ready
  };
}

/* dbStatCards — the .db-stats row of 5 .db-stat cards. */
function dbStatCards(farm){
  var s = dbFarmStats(farm);
  var wrap = h('div', { class:'db-stats' });

  function card(num, label){
    return h('div', { class:'db-stat' },
      h('div', { class:'db-stat-num' }, String(num)),
      h('div', { class:'db-stat-label' }, label)
    );
  }
  wrap.appendChild(card(s.cages,   'Cages'));
  wrap.appendChild(card(s.stocked, 'Stocked'));
  wrap.appendChild(card(s.oysters, 'Oysters'));
  wrap.appendChild(card(s.avgSize, 'Avg size'));

  // MARKET READY — a button with a trailing chevron affordance (drill to ready list; no-op for now).
  var readyCard = h('button', {
    class:'db-stat is-ready',
    'aria-label':'Market ready: ' + s.ready + ' cages'
  },
    h('div', { class:'db-stat-num' },
      String(s.ready),
      h('span', { class:'db-stat-chev', html:icon('chevron', 14) })
    ),
    h('div', { class:'db-stat-label' }, 'Market ready')
  );
  // affordance only for now: scroll to first ready bead if one exists, else no-op (never throws)
  readyCard.addEventListener('click', function(){
    try {
      var first = document.querySelector('.dashboard .db-bead.is-ready');
      if (first && first.scrollIntoView) first.scrollIntoView({ block:'center', inline:'nearest' });
    } catch (e){ /* affordance only */ }
  });
  wrap.appendChild(readyCard);

  return wrap;
}

/* dbPlotSection — section head (.db-section-head) + .db-quarters grid of area cards. */
function dbPlotSection(farm, plot){
  var section = h('div', { class:'db-section' });
  section.appendChild(
    h('div', { class:'db-section-head' },
      h('span', { class:'db-section-title' }, plot.name),   // text node
      h('span', { class:'db-rule' })
    )
  );

  var grid = h('div', { class:'db-quarters' });
  if (!plot.areas || !plot.areas.length){
    // plot with 0 areas → single full-width empty quarter card titled with the plot name
    grid.style.gridTemplateColumns = '1fr';
    grid.appendChild(
      h('div', { class:'db-quarter is-empty' },
        h('div', { class:'db-q-head' },
          h('div', { class:'db-q-titles' },
            h('div', { class:'db-q-title' }, plot.name),
            h('div', { class:'db-q-sub' }, 'No areas yet')
          )
        )
      )
    );
  } else {
    plot.areas.forEach(function(area){
      // stamp plotId so doDrillSwap's primary path resolves without a scan (it falls back regardless)
      if (!area.plotId) area.plotId = plot.id;
      grid.appendChild(dbQuarterCard(farm, area));
    });
  }
  section.appendChild(grid);
  return section;
}

/* dbQuarterCard — one area card: header + drill button + subtitle + line rows of beads. */
function dbQuarterCard(farm, area){
  var lines = linesInArea(farm, area.id) || [];
  // X/Y stocked across the area's cages
  var stocked = 0, total = 0;
  lines.forEach(function(l){
    (l.cages || []).forEach(function(c){ total++; if (c.batch) stocked++; });
  });

  var drill = h('button', {
    class:'db-q-open', 'aria-label':'Open ' + area.name,
    onclick:function(){ doDrillSwap(area); }
  }, h('span', { html:icon('chevron', 18) }));

  var head = h('div', { class:'db-q-head' },
    h('div', { class:'db-q-titles' },
      h('div', { class:'db-q-title' }, area.name),       // text node
      h('div', { class:'db-q-sub' },
        lines.length + ' line' + (lines.length === 1 ? '' : 's') + ' · ' + stocked + '/' + total + ' stocked')
    ),
    drill
  );

  var card = h('div', { class:'db-quarter' }, head);

  if (!lines.length){
    card.appendChild(h('div', { class:'db-q-empty' }, 'No lines'));
    return card;
  }

  var body = h('div', { class:'db-lines' });
  // line.order is the display order; sort a shallow copy so we never mutate farm.lines
  lines.slice().sort(function(a, b){ return (a.order || 0) - (b.order || 0); })
    .forEach(function(line){ body.appendChild(dbLineRow(farm, line)); });
  card.appendChild(body);
  return card;
}

/* dbLineRow — a label + a rope with cage beads strung along it. */
function dbLineRow(farm, line){
  var rope = h('div', { class:'db-rope' });
  if (!line.cages || !line.cages.length){
    rope.appendChild(h('div', { class:'db-rope-empty' }, 'empty'));
  } else {
    line.cages.forEach(function(cage){ rope.appendChild(dbBead(farm, cage)); });
  }
  return h('div', { class:'db-line' },
    h('div', { class:'db-line-label', title:line.name }, line.name),   // text node + truncates via CSS
    rope
  );
}

/* dbStatusWord — human word for a cage's status (for the bead aria-label). */
function dbStatusWord(st){
  switch (st.key){
    case 'fresh': return 'fresh';
    case 'mid':   return 'mid';
    case 'old':   return 'old';
  }
  return 'stocked';
}

/* dbBead — the §6 CONTRACT bead. DOM + classes only; NO interaction handlers (BIT D owns those). */
function dbBead(farm, cage){
  var st = cageStatus(cage, farm);
  var word = cage.batch ? dbStatusWord(st) : 'empty';

  return h('div', {
    'class': cls,
    'data-cage-id': cage.id,
    'data-batch-group': batchGroupKey(cage) || '',     // '' for empty cages

    'role': 'button',
    'aria-label': (cage.label || 'Cage') + ' · ' + word
  });
}
