  <ellipse cx="29.5" cy="93" rx="2.1" ry="1.4" fill="#AC9D82" opacity="0.7"/>
  <path d="M 28 91 Q 26 97 29 100" fill="none" stroke="#3E3324" stroke-width="2" stroke-linecap="round"/>
