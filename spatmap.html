    if (lastPointerType !== 'mouse') return;     // touch opens via the two-tap path, not this click
    if (suppressNextClick){                      // B2: this click trails a real pan (that may have started
      suppressNextClick = false;                 // on a cell) → consume it; a pan must not open the sheet.
      if (suppressTid){ clearTimeout(suppressTid); suppressTid = null; }
      e.stopPropagation();
      return;
    }
    var id = ancestorAttr(e.target, 'data-cage-id');
    // Pointer capture (set on pointerdown for pan/pinch) can retarget the trusted click to the SVG
    // root, so e.target may not be the cell. Fall back to a hit-test at the click point.
    if (!id){
      var hit = document.elementFromPoint(e.clientX, e.clientY);
      id = hit ? ancestorAttr(hit, 'data-cage-id') : null;
    }
    if (id){
      var cage = cageById(id);
      if (cage){ e.stopPropagation(); clearCageHighlight(); openSheet(function(){ return buildCageDetail(cage); }); }
    }
  });

  // ── Component 4: KEYBOARD a11y (capped) ─────────────────────────────────
  // Cells are focusable (tabindex/role/aria-label) only when ≤120 cells (drawCageCells). Focusing a
  // cell mirrors hover: peek + sibling highlight (pinned so it survives a redraw). Blur clears it.
  // Enter/Space opens the full sheet (matching a click). Delegated → robust across redraws.
  svg.addEventListener('focusin', function(e){
    if (!layoutIsView()) return;
    var id = e.target && e.target.getAttribute && e.target.getAttribute('data-cage-id');
    if (!id || !e.target.classList || !e.target.classList.contains('lp-cagecell')) return;
    var cage = cageById(id); if (!cage) return;
    // B1: distinguish KEYBOARD focus (Tab → pin, a11y) from POINTER-driven focus (a mouse/touch press on
    // a cell focuses it as a side effect — must NOT pin, or a desktop pan freezes the peek). Two signals,
    // either of which means "this came from a pointer": (1) LAYOUT.pointerFocus, set by the capture-phase
    // pointerdown that immediately precedes this focusin; (2) the element is NOT :focus-visible (browsers
    // only mark focus-visible for keyboard/programmatic focus, never a plain mouse click). Pointer focus →
    // do NOTHING here: the existing onHover (mouse) and handleLayoutTap (touch) paths own that interaction.
    var pointerDriven = !!LAYOUT.pointerFocus;
    if (!pointerDriven){
      try { if (e.target.matches && !e.target.matches(':focus-visible')) pointerDriven = true; }
      catch (err){ /* :focus-visible unsupported → fall back to the flag alone */ }
    }
    if (pointerDriven) return;                    // mouse/touch focus → let the pointer paths handle it
    showPeek(cage, e.target.getBoundingClientRect());
    applyCageHighlight(id, true);                 // KEYBOARD pin: a focus-driven highlight outlives a redraw
    LAYOUT.hoverCageId = id;
  });
  svg.addEventListener('focusout', function(e){
    if (!layoutIsView()) return;
    if (LAYOUT._redrawing) return;                // cell removed by a redraw, not a user blur → keep the pin
    var id = e.target && e.target.getAttribute && e.target.getAttribute('data-cage-id');
    if (!id) return;
    // B1: NEVER clear a PINNED highlight on focusout. A pin is a deliberate, persistent selection
    // (touch tap or keyboard focus) and must survive any focus YANK — pan/pinch capture, AND tapping
    // an in-app control such as a toolbar zoom button (which blurs the focused cell). reapplyCageHighlight
    // restores it after the redraw. Deliberate DISMISSALS still clear via their own explicit
    // clearCageHighlight() calls: empty water (handleLayoutTap), tapping another cell (re-pins),
    // Escape (global keydown), and opening the full sheet. Only TRANSIENT keyboard-focus highlights
    // (an unpinned focusin, if any) fall through to clear here.
    if (LAYOUT.hlPinned) return;
    // ignore focus moving BETWEEN cells (focusin on the next cell repaints); only clear on a real exit
    var to = e.relatedTarget;
    if (to && to.getAttribute && to.getAttribute('data-cage-id')) return;
    clearCageHighlight();
  });
  svg.addEventListener('keydown', function(e){
    if (!layoutIsView()) return;
    if (e.key !== 'Enter' && e.key !== ' ' && e.key !== 'Spacebar') return;
    var id = e.target && e.target.getAttribute && e.target.getAttribute('data-cage-id');
    if (!id) return;
    var cage = cageById(id); if (!cage) return;
    e.preventDefault();
    clearCageHighlight();
    openSheet(function(){ return buildCageDetail(cage); });
  });
}

/* ── Component 4: sibling-highlight engine ─────────────────────────────────
   The active state lives on LAYOUT (hlGroup/hlCage/hlPinned) so it survives the
   per-pan/zoom rebuild. The VISUAL is a pure class toggle: #layoutWorld.hl-active
   dims every .lp-cagecell to opacity .3 (CSS); one JS pass then adds .lp-cell-match
   to the cells whose data-batch-group === the active key, lifting them back to
   opacity 1 with a teal glow. Opacity/filter only → GPU-friendly, no layout. ─── */

// cellElById(id) — the live SVG cell rect for a cage in the overview canvas, or null.
function cellElById(id){
  if (!id || !LAYOUT.world) return null;
  return LAYOUT.world.querySelector('.lp-cagecell[data-cage-id="' + cssEsc(id) + '"]');
}
// cageIdFromTarget(el) — walk up from a hit target to the owning cage cell's id (else null).
function cageIdFromTarget(el){
  while (el && el !== LAYOUT.svg){
    if (el.getAttribute){ var v = el.getAttribute('data-cage-id'); if (v) return v; }
    el = el.parentNode;
  }
  return null;
}
// cellElAtPoint(x, y) — Bug B7 (round-10): find the cell hit element (.lp-cellhit or .lp-cagecell)
// that sits UNDER a screen point, looking past anything painted on top of it (e.g. the area's "Open ›"
// chip, which is drawn LAST and can occlude an edge cell's centroid). Returns the element carrying the
// owning data-cage-id, or null if the point is over bare area body / water / a foreign element. We only
// accept the app's cage hit elements — never the chip, area body, or label — so a chip tap over bare
// body still drills.
function cellElAtPoint(x, y){
  if (!document.elementsFromPoint) return null;
  var stack = document.elementsFromPoint(x, y);
  for (var i=0; i<stack.length; i++){
    var el = stack[i];
    if (el === LAYOUT.svg) break;
    if (el.classList && (el.classList.contains('lp-cagecell') || el.classList.contains('lp-cellhit'))){
      if (el.getAttribute && el.getAttribute('data-cage-id')) return el;
    }
  }
  return null;
}
// visibleCellAtPoint(x, y) — the cage id under a point (see cellElAtPoint), or null.
function visibleCellAtPoint(x, y){ var el = cellElAtPoint(x, y); return el ? el.getAttribute('data-cage-id') : null; }
// cssEsc — minimal attribute-selector escape (cage ids are app-minted, but stay safe).
function cssEsc(v){
  if (window.CSS && CSS.escape) return CSS.escape(v);
  return String(v).replace(/["\\\]]/g, '\\$&');
}

// applyCageHighlight(id, pin) — pin the peek's sibling group. pin=true → persistent (touch/keyboard),
// survives redraws; pin=false → transient mouse hover, dropped on the next redraw.
function applyCageHighlight(id, pin){
  var world = LAYOUT.world; if (!world) return;
  var cage = cageById(id);
  var key = cage ? batchGroupKey(cage) : null;            // null for empty cages → "self only", no phantom group
  LAYOUT.hlCage = id; LAYOUT.hlGroup = key; LAYOUT.hlPinned = !!pin;
  paintHighlight(id, key);
}

// paintHighlight — the one-pass DOM sweep (separated so reapply can re-stamp after a redraw).
function paintHighlight(id, key){
  var world = LAYOUT.world; if (!world) return;
  // clear any prior match flags
  var prev = world.querySelectorAll('.lp-cell-match');
  for (var i=0; i<prev.length; i++) prev[i].classList.remove('lp-cell-match');
  if (!id){ world.classList.remove('hl-active'); return; }
  if (key){
    // stocked cage with a real cohort → dim the farm + spotlight the sibling group (data-batch-group)
    world.classList.add('hl-active');
    var sibs = world.querySelectorAll('.lp-cagecell[data-batch-group="' + cssEsc(key) + '"]');
    for (var j=0; j<sibs.length; j++) sibs[j].classList.add('lp-cell-match');
  } else {
    // B4: EMPTY cage (no cohort) → DON'T dim the rest of the farm. Spotlighting a single cell that holds
    // nothing reads like the map was disabled. Just show the peek; give the hovered cell a light self
    // outline via .lp-cell-match but withhold #layoutWorld.hl-active so no other cage is dimmed.
    world.classList.remove('hl-active');
    // B4 (round-11 hygiene): strip ALL existing .lp-cell-match before stamping the self outline so no
    // prior sibling can linger as stale state under the empty-cage path. The top-of-function clear loop
    // already covers this; re-asserting it locally keeps the empty branch's "self only" invariant
    // bulletproof and independent of paint ordering.
    var stale = world.querySelectorAll('.lp-cell-match');
    for (var k=0; k<stale.length; k++) stale[k].classList.remove('lp-cell-match');
    var self = cellElById(id);
    if (self) self.classList.add('lp-cell-match');
  }
}

// clearCageHighlight — drop the peek + un-dim everything. Idempotent.
function clearCageHighlight(){
  LAYOUT.hlCage = null; LAYOUT.hlGroup = null; LAYOUT.hlPinned = false;
  LAYOUT.hoverCageId = null;
  hidePeek();
  if (LAYOUT.world){
    LAYOUT.world.classList.remove('hl-active');
    var m = LAYOUT.world.querySelectorAll('.lp-cell-match');
    for (var i=0; i<m.length; i++) m[i].classList.remove('lp-cell-match');
  }
}

// reapplyCageHighlight — after layoutRedraw rebuilt the cells, re-stamp a PINNED highlight (touch /
// keyboard) so panning/zooming while pinned doesn't lose it. Also reposition the peek over the cell's
// fresh rect. Transient mouse hover is NOT re-applied (it self-heals on the next pointermove).
function reapplyCageHighlight(){
  // B8(a): when there is NO pinned highlight to re-stamp, a transient mouse hover that was active
  // when the cells were torn down leaves stale DOM behind — #layoutWorld.hl-active stays set (so CSS
  // dims ALL cells with 0 matches), the peek floats at a stale position, and LAYOUT.hoverCageId is
  // still the old cell (so onHover's debounce won't re-resolve it). Clear that leftover so the next
  // pointermove re-resolves cleanly. clearCageHighlight is idempotent and self-heals on re-hover.
  if (!LAYOUT.hlPinned || !LAYOUT.hlCage){
    if (LAYOUT.world && (LAYOUT.world.classList.contains('hl-active') || LAYOUT.hoverCageId)) clearCageHighlight();
    return;
  }
  var cage = cageById(LAYOUT.hlCage);
  if (!cage){ clearCageHighlight(); return; }              // cage vanished (data change) → drop cleanly
  var cell = cellElById(LAYOUT.hlCage);
  if (!cell){ return; }                                    // cell not drawn at this LOD/cap → keep state, skip paint
  paintHighlight(LAYOUT.hlCage, LAYOUT.hlGroup);
  syncPinnedPeek(cell);                                    // B5: re-anchor, but hide the card while the cell is off-screen
}

// swallowNextClick — capture-phase one-shot that eats the single synthetic click a touch tap emits
// after pointerup (so it can't reach the overlay backdrop and close a just-opened sheet). Self-clears
// after the click or a 500ms fallback. Scoped to Component 4's touch-open path. (Mirrors the work
// map's suppressNextClick pattern but un-scoped to any selector.)
function swallowNextClick(){
  var done = false;
  function eat(ev){
    if (done) return; done = true;
    ev.stopPropagation(); ev.preventDefault();
    document.removeEventListener('click', eat, true);
    clearTimeout(tid);
  }
  document.addEventListener('click', eat, true);
  var tid = setTimeout(function(){ done = true; document.removeEventListener('click', eat, true); }, 500);
}

// handleLayoutTap — resolve a tap into select / drill / double-tap-fit. Innermost (area) wins.
function handleLayoutTap(e, target){
  var farm = getFarm();
  var now = Date.now();
  var p = { x:e.clientX, y:e.clientY };
  var isDouble = (now - LAYOUT.lastTap < 320) && LAYOUT.lastTapXY &&
    Math.abs(p.x - LAYOUT.lastTapXY.x) < 28 && Math.abs(p.y - LAYOUT.lastTapXY.y) < 28;
  LAYOUT.lastTap = now; LAYOUT.lastTapXY = p;

  // VIEW mode (Overview): two tap affordances now coexist —
  //   • a CAGE CELL  → peek + sibling highlight (pinned). A SECOND tap on the SAME cell opens the
  //                    full cage sheet (classic tap-gap). Cells take priority over the area drill.
  //   • the AREA BODY → drill into its daily-work map (the original behavior, unchanged).
  // Disambiguation: resolve data-cage-id FIRST; if found it's a cell (no drill). Else fall back to
  // the area-id walk-up and drill. Empty water clears any active pin.
  if (layoutIsView()){
    // ── Progressive tap-to-zoom (owner ask) ──────────────────────────────────────────────────────────
    // On the zoomed-OUT framings a single tap NAVIGATES the camera one level deeper instead of jumping
    // straight to the work list, so you walk farm → plot → area → work:
    //   • all-plots framing  → tap a plot  → smooth-zoom to frame that plot (its areas appear)
    //   • one-plot framing    → tap an area → smooth-zoom to frame that area
    //   • one-area framing    → fall through to the cage-peek / area-drill logic below (open the work map)
    // The LEVEL is decided by COVERAGE scope (isScopedIntoPlot / isScopedIntoArea — the same on-screen
    // model the breadcrumb uses), NOT the raw k-tier: a single-plot farm fits in the 'farm' k-band yet is
    // already "scoped into" its one plot, so coverage avoids a stuck state where a tap can't progress.
    // Double-tap and an in-flight drill are left to the existing fit/drill paths. Camera-only (no history).
    if (!isDouble && !LAYOUT.drilling){
      var scopedArea = isScopedIntoArea(farm);             // one area fills the viewport → deepest map level
      if (!scopedArea){
        var scopedPlot = isScopedIntoPlot(farm);           // one plot fills the viewport → next stop is an area
        // resolve the tapped plot + area by walking up the data-* ids
        var zAreaId = null, zPlotId = null, zEl = target;
        while (zEl && zEl !== LAYOUT.svg){
          if (zEl.getAttribute){
            if (!zAreaId) zAreaId = zEl.getAttribute('data-area-id');
            if (!zPlotId) zPlotId = zEl.getAttribute('data-plot-id');
          }
          if (zAreaId && zPlotId) break;
          zEl = zEl.parentNode;
        }
        if (!scopedPlot){
          // all-plots framing → zoom to the tapped plot (or the plot owning the tapped area)
          var zPlot = zPlotId ? (farm.plots || []).filter(function(q){ return q.id === zPlotId; })[0] : null;
          if (!zPlot && zAreaId){ var zfa0 = findAreaById(farm, zAreaId); if (zfa0) zPlot = zfa0.plot; }
          if (zPlot){
            if (LAYOUT.hlCage || LAYOUT.hlGroup) clearCageHighlight();
            LAYOUT.sel = null; zoomToShape(farm, zPlot);
          }
          return;                                          // tapped a plot → zoomed in; tapped open water → no-op
        } else {
          // one-plot framing → zoom to the tapped area (the next level in)
          if (zAreaId){
            var zfa = findAreaById(farm, zAreaId);
            if (zfa){
              if (LAYOUT.hlCage || LAYOUT.hlGroup) clearCageHighlight();
              LAYOUT.sel = null; zoomToShape(farm, areaWorldBox(zfa.area));
            }
          }
          return;                                          // tapped an area → zoomed in; header/water → no-op
        }
      }
      // scopedArea set → fall through: at the area level a tap peeks a cage / drills into the work map.
    }
    // Bug B1 (round-9): the VIEW-mode "Open ›" chip (drawArea) drills immediately — resolve it FIRST,
    // before cage/area disambiguation, so its tap is never mistaken for a cell peek or empty water. The
    // chip carries data-open-area-id on the group + its rect; walk up to find it (text is pointer-none).
    var vOpenEl = target, vOpenId = null;
    while (vOpenEl && vOpenEl !== LAYOUT.svg){
      if (vOpenEl.getAttribute){ vOpenId = vOpenEl.getAttribute('data-open-area-id'); if (vOpenId) break; }
      vOpenEl = vOpenEl.parentNode;
    }
    if (vOpenId){
      // Bug B1 (round-12): `data-open-area-id` lives ONLY on the chip group, so vOpenId is non-null ONLY when
      // the tap's `target` resolved to the chip ITSELF (it's painted LAST → on top → it receives the event).
      // A tap that lands on the chip is unambiguously a DRILL intent — so drill, even if a cage cell is
      // occluded beneath this exact point. Round-10's B7 fix over-corrected: it let ANY occluded cell defeat
      // the chip (`if (!occludedCellId)`), which left the chip's CENTER dead on iPhone — tapping the obvious
      // middle of "Open ›" peeked the empty top-row edge cell underneath instead of opening the area. The
      // chip is the explicit affordance and wins within its own (small, top-right-corner) rect; the occluded
      // cell stays peekable on its EXPOSED footprint OUTSIDE the chip (a tap there resolves to the cell's
      // hit-rect, not the chip → the cell branch below peeks it), so B7's "empty edge cage must be peekable"
      // still holds. Also fixes the latent desktop case where clicking the chip center was a silent no-op.
      var vOpenFa = findAreaById(farm, vOpenId);
      if (vOpenFa){
        if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
        LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
        if (LAYOUT.hlCage || LAYOUT.hlGroup) clearCageHighlight();
        drillIntoArea(vOpenFa.area);                       // tap "Open ›" → open the clean work list (user choice: map navigates, list does)
        return;
      }
    }
    var cellId = cageIdFromTarget(target) || visibleCellAtPoint(p.x, p.y);
    if (cellId){
      // B5: distinguish the element that actually OWNS this data-cage-id. The VISIBLE cell (.lp-cagecell)
      // paints on top of an INVISIBLE, expanded touch hit-rect (.lp-cellhit) that blankets the empty water
      // around the row. A MOUSE click that resolved via the hit-rect ONLY (not a real visible cell) is a
      // click on empty area water → fall through to the area-drill branch (desktop), instead of no-op'ing.
      // Touch is unchanged: the hit-rect still drives tap-to-peek + two-tap-open.
      var cellHost = target;
      while (cellHost && cellHost !== LAYOUT.svg && !(cellHost.getAttribute && cellHost.getAttribute('data-cage-id'))) cellHost = cellHost.parentNode;
      // Bug B7 (round-10): when the cage was resolved via the under-point lookup (the chip occluded it,
      // so `target` is the chip not the cell), walk-up from `target` won't reach the cell — use the cell
      // element actually under the point so onVisibleCell + the peek anchor below stay correct.
      if (!(cellHost && cellHost.getAttribute && cellHost.getAttribute('data-cage-id') === cellId)){
        var underEl = cellElAtPoint(p.x, p.y);
        if (underEl && underEl.getAttribute('data-cage-id') === cellId) cellHost = underEl;
      }
      var onVisibleCell = !!(cellHost && cellHost.classList && cellHost.classList.contains('lp-cagecell'));
      // MOUSE: hover already shows the peek/highlight and the svg click handler opens the sheet, so
      // a mouse tap on a VISIBLE cell is a no-op here (just don't drill). A mouse click that only landed
      // on the invisible hit-rect over empty water falls through to drill (B5).
      if (e.pointerType === 'mouse'){ if (onVisibleCell) return; /* else: hit-rect-over-water → drill below */ }
      else {
      // TOUCH two-tap "open" (Bug B3): a second tap opens the full sheet ONLY when it resolves to the
      // SAME cage as the first/pinned tap (cellId === lastTapCageId). The TWO_TAP_R radius stays purely
      // as tolerance for RE-HITTING THE SAME cell — it forgives a slightly-off second tap on that one
      // cage, but it must NEVER adopt a DIFFERENT resolved cage. A near-edge tap that clearly resolves to
      // neighbor B re-pins B (peek/highlight move) instead of opening A's sheet.
      var nearFirst = LAYOUT.lastTapCageXY &&
        Math.abs(p.x - LAYOUT.lastTapCageXY.x) <= TWO_TAP_R &&
        Math.abs(p.y - LAYOUT.lastTapCageXY.y) <= TWO_TAP_R;
      var openId = (cellId === LAYOUT.lastTapCageId && nearFirst) ? cellId : null;
      if (openId && cageById(openId)){
        if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
        LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
        var cgOpen = cageById(openId);
        clearCageHighlight();
        // A touch tap emits a trailing synthetic click ~300ms later; once the sheet is open that click
        // would land on the overlay backdrop and immediately CLOSE it. Swallow exactly that one click.
        swallowNextClick();
        openSheet(function(){ return buildCageDetail(cgOpen); });
        return;
      }
      // FIRST tap on a cell → peek + pinned highlight; arm the window for the second tap.
      var cgTap = cageById(cellId);
      if (cgTap){
        var cellEl = cellElById(cellId);
        showPeek(cgTap, (cellEl || target).getBoundingClientRect());
        applyCageHighlight(cellId, true);                  // pinned → survives pan/zoom redraws
        LAYOUT.lastTapCageId = cellId;
        LAYOUT.lastTapCageXY = { x:p.x, y:p.y };           // remember WHERE → radius fallback for the 2nd tap
        if (LAYOUT.tapTimer) clearTimeout(LAYOUT.tapTimer);
        LAYOUT.tapTimer = setTimeout(function(){ LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null; LAYOUT.tapTimer = null; }, 700);
      }
      return;                                              // a touch cell tap NEVER also drills
      } // end TOUCH cell branch (B5)
    }
    // (B5) a MOUSE click that only hit the invisible hit-rect over empty water reaches here and falls
    // through to the area-drill resolution below, exactly like a click on bare area background.
    // resolve whether this non-cell tap landed on an AREA BODY (a different ELEMENT TYPE than the pinned
    // cage) vs. truly empty water. Bug B4: the two-tap "open the pinned cage" affordance (B3) must be
    // scoped to SAME-ELEMENT repeats — a near tap that resolves to the area background is the natural
    // "tap a cage, then tap nearby to drill in" gesture and must DRILL, not reopen the cage sheet.
    var nearAreaId = null, naEl = target;
    while (naEl && naEl !== LAYOUT.svg){ if (naEl.getAttribute && !nearAreaId) nearAreaId = naEl.getAttribute('data-area-id'); if (nearAreaId) break; naEl = naEl.parentNode; }
    // not a cell → Bug B3: if a cage is pinned and this tap is a near-miss of the FIRST tap (within the
    // two-tap radius) AND landed on EMPTY WATER (not an area body), treat it as the SECOND tap and open
    // that cage rather than dismissing the pin. A near tap on the area body falls through to the drill.
    if (!nearAreaId && LAYOUT.lastTapCageId && cageById(LAYOUT.lastTapCageId) && LAYOUT.lastTapCageXY &&
        Math.abs(p.x - LAYOUT.lastTapCageXY.x) <= TWO_TAP_R &&
        Math.abs(p.y - LAYOUT.lastTapCageXY.y) <= TWO_TAP_R){
      if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
      var cgNear = cageById(LAYOUT.lastTapCageId);
      LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
      clearCageHighlight();
      swallowNextClick();
      openSheet(function(){ return buildCageDetail(cgNear); });
      return;
    }
    // B6 (touch dismiss-first): on TOUCH, when a cage is currently pinned (lastTapCageId set) and this
    // tap lands on the AREA BODY, the area body + expanded .lp-cellhit rects blanket the whole canvas at
    // default zoom, so there is no neutral "tap away" target — the first such tap would otherwise DRILL
    // (B4 below) and yank the user out of the overview by accident. Treat this FIRST area-body tap as a
    // pure DISMISS: drop the peek + highlight, clear the touch pin/tap state, and stay on the overview.
    // The pin is now gone, so a SUBSEQUENT area-body tap falls through to the normal B4 drill. This is
    // scoped to the TOUCH pin path (lastTapCageId is the touch-tap pin tracker) AND a touch/pen pointer,
    // so desktop's one-click area-water drill (B5) is untouched — desktop hover/keyboard pins live on
    // hlPinned/hoverCageId, never lastTapCageId, and a mouse pointer skips this branch entirely.
    // Same-cell / near-miss two-tap-open already resolved above (~B3), so reaching here is never an open.
    if (nearAreaId && LAYOUT.lastTapCageId && e.pointerType && e.pointerType !== 'mouse'){
      if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
      LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
      clearCageHighlight();                                   // drops peek + un-dims (idempotent)
      return;                                                 // stay on overview; next area tap drills
    }
    // B4: prior tap was a CAGE (pin) and this one resolves to an AREA BODY → DRILL into that area now
    // (don't let the isDouble window below re-route it to double-tap-fit). Clear the two-tap/pin state
    // first so a different element type never carries the cage's two-tap arming forward.
    if (nearAreaId && LAYOUT.lastTapCageId){
      if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
      LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
      if (LAYOUT.hlCage || LAYOUT.hlGroup) clearCageHighlight();
      var b4fa = findAreaById(farm, nearAreaId);
      if (b4fa){ drillIntoArea(b4fa.area); return; }       // tap an area (after a cage pin) → open its clean work list
    }
    // otherwise → clear any active cell pin, then the original area-drill / fit behavior
    if (LAYOUT.hlCage || LAYOUT.hlGroup) clearCageHighlight();
    LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
    if (LAYOUT.tapTimer){ clearTimeout(LAYOUT.tapTimer); LAYOUT.tapTimer = null; }
    if (isDouble){
      var dvAid = null, dvEl = target;
      while (dvEl && dvEl !== LAYOUT.svg){ if (dvEl.getAttribute && !dvAid) dvAid = dvEl.getAttribute('data-area-id'); if (dvAid) break; dvEl = dvEl.parentNode; }
      // B4 (round-9): a fast double-tap on an AREA BODY DRILLS, not zoom-fits. The isDouble window is
      // position-based, so after B6's dismiss-first clears the pin, the 2nd fast area tap (lastTapCageId now
      // null) used to fall here and run fitToContent — a dead no-op for the user, who wanted to drill. Make
      // the fast path match the slow path: single area tap drills, double area tap drills too. EMPTY CANVAS
      // (no area) keeps fit-all (zoom-fit) as before.
      if (dvAid){ var dvfa = findAreaById(farm, dvAid); if (dvfa){ drillIntoArea(dvfa.area); return; } }  // double-tap area → open its clean work list
      LAYOUT.sel = null; fitToContent(farm); return;
    }
    var vAreaId = null, vEl = target;
    while (vEl && vEl !== LAYOUT.svg){ if (vEl.getAttribute && !vAreaId) vAreaId = vEl.getAttribute('data-area-id'); if (vAreaId) break; vEl = vEl.parentNode; }
    if (vAreaId){ var vfa = findAreaById(farm, vAreaId); if (vfa) drillIntoArea(vfa.area); }  // tap a plot/area on the map → open its clean work list
    return;                                                 // tapped empty water in the overview → no-op
  }

  // Open › chip → drill in immediately
  var chipId = target && target.getAttribute && target.getAttribute('data-open-area-id');
  if (chipId){
    var found0 = findAreaById(farm, chipId);
    if (found0){ drillIntoArea(found0.area); return; }
  }

  // empty-plot "+ Add an area" CTA → add an area to that plot (Item 2b)
  var addPid = target && target.getAttribute && target.getAttribute('data-addarea-plot');
  if (addPid){
    var ap = (farm.plots || []).filter(function(q){ return q.id === addPid; })[0];
    if (ap){
      LAYOUT.sel = { kind:'plot', plotId:ap.id };
      if (layoutHasEditing()){ addAreaToPlot(ap); } else { toast('Add-area lands in the next build'); }
      return;
    }
  }

  // empty-area "Set lines" chip → select the area + open the Edit-area sheet (Item 2c)
  var setAid = target && target.getAttribute && target.getAttribute('data-setlines-area');
  if (setAid){
    var fas = findAreaById(farm, setAid);
    if (fas){
      LAYOUT.sel = { kind:'area', plotId:fas.plot.id, areaId:setAid };
      layoutRedraw();
      openSheet(function(){ return buildEditAreaSheet(fas.area); });
      return;
    }
  }

  // NAME-label tap → select the shape + open the quick rename sheet (LAYOUT §4 "Rename").
  // Plots rename inline; an area's name field also lives in the Edit-area sheet, but a direct label
  // tap is the SIMPLEST touch path for both. (Skip on a double-tap so fit-to-shape still works.)
  if (!isDouble && target && target.getAttribute){
    var aLbl = target.getAttribute('data-area-label');
    if (aLbl){ var faL = findAreaById(farm, aLbl);
      if (faL){ LAYOUT.sel = { kind:'area', plotId:faL.plot.id, areaId:aLbl }; layoutRedraw();
        openSheet(function(){ return buildRenameSheet('area', aLbl); }); return; } }
    var pLbl = target.getAttribute('data-plot-label');
    if (pLbl){ LAYOUT.sel = { kind:'plot', plotId:pLbl }; layoutRedraw();
      openSheet(function(){ return buildRenameSheet('plot', pLbl); }); return; }
  }

  // walk up to find an owning area (innermost) else plot
  var areaId = null, plotId = null, el = target;
  while (el && el !== LAYOUT.svg){
    if (!areaId && el.getAttribute){ areaId = el.getAttribute('data-area-id'); }
    if (!plotId && el.getAttribute){ plotId = el.getAttribute('data-plot-id'); }
    if (areaId) break;                                   // innermost area wins
    el = el.parentNode;
  }

  if (isDouble){
    // double-tap a shape = fit that shape; double-tap empty = fit-all
    if (areaId){ var fa = findAreaById(farm, areaId); if (fa){ fitToContent(farm, fa.area); return; } }
    if (plotId){ var pp = (farm.plots||[]).filter(function(q){ return q.id===plotId; })[0]; if (pp){ fitToContent(farm, pp); return; } }
    LAYOUT.sel = null; fitToContent(farm); layoutRedraw(); return;
  }

  if (areaId){
    var fa2 = findAreaById(farm, areaId);
    LAYOUT.sel = fa2 ? { kind:'area', plotId:fa2.plot.id, areaId:areaId } : null;
  } else if (plotId){
    LAYOUT.sel = { kind:'plot', plotId:plotId };
  } else {
    LAYOUT.sel = null;                                   // tapped empty water → deselect
  }
  layoutRedraw();
}

/* ── Builder 3: drop flow (Add plot / Add area + auto-fill). Move/resize/rotate/edit-sheet
      arrive in later components; this component only makes drop + auto-fill real. (LAYOUT §4) ── */

// viewportCenterWorld() — world coords of the current viewport center (the live pan/zoom state),
// the drop point for a new shape. Falls back to world (500,500) before the svg is measured.
function viewportCenterWorld(){
  refreshSvgRect();
  var r = LAYOUT.svgRect;
  if (!r || !r.width || !r.height) return { x:500, y:500 };
  return toWorld(r.width/2, r.height/2);
}

// addPlotToFarm() — drop a new axis-aligned plot at the viewport center, pre-select it, ONE
// commit()+undoable. A plot is the lease container; it is NOT line-filled. (LAYOUT §4 "Add a plot")
function addPlotToFarm(){
  var farm = getFarm(); if (!farm) return;
  if (!Array.isArray(farm.plots)) farm.plots = [];
  var DW = 360, DH = 280;                                   // default plot size (world units)
  // Bug B3 (round-12): drop the new plot in a NON-overlapping spot instead of the raw viewport center,
  // which buried it on top of the existing plot's areas/lines and forced the user to drag it out blind.
  // Place it just to the RIGHT of the rightmost existing plot (top-aligned to that plot); x ≥ every plot's
  // right edge + GAP guarantees no overlap with ANY plot regardless of y. First plot still uses the
  // viewport center. A fresh plot has no lines, so position is the only state → undo (splice) is unchanged.
  var px, py;
  if (farm.plots.length){
    var maxRight = -Infinity, topY = 0;
    farm.plots.forEach(function(p){ var rr = p.x + p.w; if (rr > maxRight){ maxRight = rr; topY = p.y; } });
    px = maxRight + 40; py = topY;
  } else {
    var c = viewportCenterWorld();
    px = c.x - DW/2; py = c.y - DH/2;
  }
  var plot = { id:uid(), name:'Plot ' + (farm.plots.length + 1), order:farm.plots.length,
    x:px, y:py, w:DW, h:DH, areas:[] };
  farm.plots.push(plot);
  reindexPlots(farm);
  LAYOUT.sel = { kind:'plot', plotId:plot.id };             // pre-select the new plot
  commit();                                                 // save + render (work mode no-ops; layout re-mounts)
  fitToContent(farm);                                       // re-fit so the new (off-to-the-right) plot is visible, not stranded
  layoutRedraw();                                           // reflect selection + new card now
  undoable('Plot added', function(){
    var f = getFarm();
    var idx = f.plots.indexOf(plot);
    if (idx >= 0) f.plots.splice(idx, 1);                   // a fresh plot has no lines → nothing else to unwind
    reindexPlots(f);
    if (LAYOUT.sel && LAYOUT.sel.kind === 'plot' && LAYOUT.sel.plotId === plot.id) LAYOUT.sel = null;
    commit();
    layoutRedraw();
  });
}

// addAreaToPlot(plot) — drop an area centered in the given (or selected) plot, then immediately
// auto-fill it with default lines via the existing bulk-fill core, pre-select it. The WHOLE
// drop+fill is ONE commit()+undoable so a single Undo reverses both. (LAYOUT §4 "Add / drop an area")
function addAreaToPlot(plot){
  var farm = getFarm(); if (!farm) return;
  if (!plot && LAYOUT.sel && LAYOUT.sel.kind === 'plot'){
    plot = (farm.plots || []).filter(function(p){ return p.id === LAYOUT.sel.plotId; })[0];
  }
  if (!plot){ toast('Select a plot first'); return; }
  if (!Array.isArray(plot.areas)) plot.areas = [];

  // centered, inset rect at a default size that fits inside the plot
  var W = Math.max(120, Math.min(280, plot.w - 80));
  var H = Math.max(100, Math.min(200, plot.h - 80));
  // Bug B3 (round-12): CASCADE each new area off the centered position by a per-area delta so repeated
  // adds don't perfectly stack/bury each other; clamp so the rect stays fully inside the plot.
  var cx0 = plot.x + (plot.w - W)/2, cy0 = plot.y + (plot.h - H)/2;
  var step = 24 * plot.areas.length;
  var ax = Math.max(plot.x + 4, Math.min(cx0 + step, plot.x + plot.w - W - 4));
  var ay = Math.max(plot.y + 4, Math.min(cy0 + step, plot.y + plot.h - H - 4));
  var area = { id:uid(), name:'Area ' + (plot.areas.length + 1), order:plot.areas.length,
    x:ax, y:ay, w:W, h:H, rot:0,
    lineCount:4, cagesPerLine:10, spacing:0.2,
    axis:(W >= H ? 'h' : 'v'),                              // lines run along the rect's LONG side
    lineIds:[] };
  plot.areas.push(area);
  reindexPlots(farm);

  // auto-fill with default lines (mutate-only core → real farm.lines with valid areaId +
  // cages carrying a valid cageTypes[0].id), batched under THIS action's single undo.
  var createdLines = buildLinesForArea(farm, area, area.lineCount, area.cagesPerLine);

  LAYOUT.sel = { kind:'area', plotId:plot.id, areaId:area.id };  // pre-select the new area
  commit();
  layoutRedraw();
  undoable('Area added', function(){
    var f = getFarm();
    createdLines.forEach(function(cl){ var idx = f.lines.indexOf(cl); if (idx >= 0) f.lines.splice(idx, 1); });
    var ai = plot.areas.indexOf(area);
    if (ai >= 0) plot.areas.splice(ai, 1);                 // remove the area itself
    reindexPlots(f);
    reindexLines(f);
    rebuildLineIds(f);                                     // re-derive lineIds after both removals
    if (LAYOUT.sel && LAYOUT.sel.kind === 'area' && LAYOUT.sel.areaId === area.id) LAYOUT.sel = null;
    commit();
    layoutRedraw();
  });
}

/* ── Builder 3: REMOVE area / plot + the stocked-lines safety confirm (LAYOUT §4 "Rename / delete",
      §7 Builder 3, §8 test J). A layout delete NEVER destroys a stocked line, cage, or batch — it
      only removes the spatial grouping; stocked lines are reassigned to a DIFFERENT default area
      (re-healed by ensureSpatialIndex on next load, so safety holds across reload). ── */

// pickTargetArea(farm, excludeAreaId) — the destination area for "move lines to default area" when
// the area/plot being removed holds stock. Prefers defaultArea(farm); if that IS the one excluded,
// falls back to the first OTHER existing area (any plot). Returns { plot, area } | null.
function pickTargetArea(farm, excludeAreaId){
  if (!farm || !farm.plots) return null;
  var def = defaultArea(farm);
  if (def && def.id !== excludeAreaId){
    var dp = findAreaById(farm, def.id); return dp || null;
  }
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    for (var j=0; j<p.areas.length; j++){
      var a = p.areas[j];
      if (a.id !== excludeAreaId) return { plot:p, area:a };
    }
  }
  return null;
}

// areaStockedLines(farm, areaId) — the lines in this area that carry stock (block targets).
function areaStockedLines(farm, areaId){
  return linesInArea(farm, areaId).filter(lineHasStock);
}

// reassignLinesToArea(farm, fromAreaId, target) — repoint EVERY line of an area to target.area/plot
// (stock-safe; never touches cages/batches), returns the moved-line snapshots for an exact undo.
function reassignLinesToArea(farm, fromAreaId, target){
  var moved = [];
  farm.lines.forEach(function(l){
    if (l.areaId !== fromAreaId) return;
    moved.push({ line:l, plotId:l.plotId, areaId:l.areaId });   // remember old refs for undo
    l.plotId = target.plot.id;
    l.areaId = target.area.id;
  });
  return moved;
}

// removeAreaFromPlot(plot, area) — remove one area. EMPTY (no stocked lines) → immediate + undoable
// (its empty lines go with it; undo restores the area AND its lines exactly). STOCKED → open the
// "Move lines to default area" confirm sheet instead (never destroys stock). (LAYOUT §4 / §8-J)
function removeAreaFromPlot(plot, area){
  var farm = getFarm(); if (!farm || !plot || !area) return;
  // resolve live refs by id (captured refs may be stale after a re-render)
  var fa = findAreaById(farm, area.id);
  if (!fa){ if (LAYOUT.sel && LAYOUT.sel.areaId === area.id) LAYOUT.sel = null; layoutRedraw(); return; }
  plot = fa.plot; area = fa.area;
  // never orphan: if this is the ONLY area of the ONLY plot, keep it (the one-rule needs ≥1 area).
  if (farm.plots.length === 1 && plot.areas.length === 1){
    toast('A farm needs at least one area'); return;
  }
  if (areaStockedLines(farm, area.id).length){
    openSheet(function(){ return buildRemoveAreaConfirm(area.id); });   // stocked → confirm path
    return;
  }
  removeAreaImmediate(farm, plot, area);
}

// removeAreaImmediate(farm, plot, area) — the EMPTY-area path: splice the area + remove its (empty)
// lines from farm.lines, reindex, ONE commit()+undoable that restores both exactly.
function removeAreaImmediate(farm, plot, area){
  var removedLines = linesInArea(farm, area.id).map(function(line){
    return { line:line, idx:farm.lines.indexOf(line) };           // remember slot for exact undo
  });
  removedLines.forEach(function(r){ var i = farm.lines.indexOf(r.line); if (i >= 0) farm.lines.splice(i, 1); });
  var areaIdx = plot.areas.indexOf(area);
  var plotId = plot.id;
  if (areaIdx >= 0) plot.areas.splice(areaIdx, 1);
  reindexPlots(farm); reindexLines(farm); rebuildLineIds(farm);
  if (LAYOUT.sel && LAYOUT.sel.kind === 'area' && LAYOUT.sel.areaId === area.id) LAYOUT.sel = null;
  commit();
  layoutRedraw();
  undoable('Area removed', function(){
    var f = getFarm();
    var p = (f.plots || []).filter(function(q){ return q.id === plotId; })[0];
    if (p){ p.areas.splice(Math.min(areaIdx, p.areas.length), 0, area); }   // restore the area itself
    // restore its lines at their original slots (low→high so indices stay valid)
    removedLines.slice().sort(function(a,b){ return a.idx - b.idx; }).forEach(function(r){
      f.lines.splice(Math.min(Math.max(0, r.idx), f.lines.length), 0, r.line);
    });
    reindexPlots(f); reindexLines(f); rebuildLineIds(f);
    commit();
    layoutRedraw();
  });
}

// removeAreaWithMove(area) — the STOCKED-area confirm action: reassign EVERY line to a different
// default area (stock-safe), then remove the now-empty area. ONE commit()+undoable. (LAYOUT §8-J)
function removeAreaWithMove(area){
  var farm = getFarm(); if (!farm || !area) return;
  var fa = findAreaById(farm, area.id); if (!fa){ closeSheet(); return; }
  area = fa.area; var plot = fa.plot;
  var target = pickTargetArea(farm, area.id);
  if (!target){ toast('No other area to move lines into'); closeSheet(); return; }
  var moved = reassignLinesToArea(farm, area.id, target);          // repoint lines → target (stock kept)
  var areaIdx = plot.areas.indexOf(area), plotId = plot.id;
  if (areaIdx >= 0) plot.areas.splice(areaIdx, 1);                 // remove the now-empty source area
  reindexPlots(farm); reindexLines(farm); rebuildLineIds(farm);
  if (LAYOUT.sel && LAYOUT.sel.kind === 'area' && LAYOUT.sel.areaId === area.id) LAYOUT.sel = null;
  closeSheet();
  commit();
  layoutRedraw();
  undoable('Lines moved · area removed', function(){
    var f = getFarm();
    var p = (f.plots || []).filter(function(q){ return q.id === plotId; })[0];
    if (p){ p.areas.splice(Math.min(areaIdx, p.areas.length), 0, area); }   // restore the source area
    moved.forEach(function(m){ if (m.line){ m.line.plotId = m.plotId; m.line.areaId = m.areaId; } });
    reindexPlots(f); reindexLines(f); rebuildLineIds(f);
    commit();
    layoutRedraw();
  });
}

// removePlotFromFarm(plot) — remove one plot. Blocks the LAST plot. EMPTY (no stocked lines across
// any of its areas) → immediate + undoable. STOCKED → "Move lines to default area" confirm (lines go
// to a default area that lives in a SURVIVING plot). NEVER destroys stock. (LAYOUT §4 / §8-J)
function removePlotFromFarm(plot){
  var farm = getFarm(); if (!farm || !plot) return;
  plot = (farm.plots || []).filter(function(q){ return q.id === plot.id; })[0];   // live ref
  if (!plot){ if (LAYOUT.sel && LAYOUT.sel.plotId === plot) LAYOUT.sel = null; layoutRedraw(); return; }
  if (farm.plots.length <= 1){ toast('A farm needs at least one plot'); return; }

  var stocked = farm.lines.filter(function(l){ return l.plotId === plot.id && lineHasStock(l); });
  if (stocked.length){
    // need a destination area that survives the removal (i.e. lives in ANOTHER plot)
    if (!pickTargetAreaOutsidePlot(farm, plot.id)){
      toast('Move stock to another plot first'); return;
    }
    openSheet(function(){ return buildRemovePlotConfirm(plot.id); });
    return;
  }
  removePlotImmediate(farm, plot);
}

// pickTargetAreaOutsidePlot(farm, excludePlotId) — first area in a plot OTHER than the one being
// removed (prefers the default area if it survives). Returns { plot, area } | null.
function pickTargetAreaOutsidePlot(farm, excludePlotId){
  var def = defaultArea(farm);
  if (def){ var dp = findAreaById(farm, def.id); if (dp && dp.plot.id !== excludePlotId) return dp; }
  for (var i=0; i<farm.plots.length; i++){
    var p = farm.plots[i];
    if (p.id === excludePlotId) continue;
    if (p.areas && p.areas.length) return { plot:p, area:p.areas[0] };
  }
  return null;
}

// removePlotImmediate(farm, plot) — EMPTY-plot path: splice the plot + remove its (empty) lines,
// reindex, ONE commit()+undoable that restores the plot AND its lines exactly.
function removePlotImmediate(farm, plot){
  var plotIdx = farm.plots.indexOf(plot);
  var removedLines = farm.lines.filter(function(l){ return l.plotId === plot.id; }).map(function(line){
    return { line:line, idx:farm.lines.indexOf(line) };
  });
  removedLines.forEach(function(r){ var i = farm.lines.indexOf(r.line); if (i >= 0) farm.lines.splice(i, 1); });
  if (plotIdx >= 0) farm.plots.splice(plotIdx, 1);
  reindexPlots(farm); reindexLines(farm); rebuildLineIds(farm);
  if (LAYOUT.sel && LAYOUT.sel.kind === 'plot' && LAYOUT.sel.plotId === plot.id) LAYOUT.sel = null;
  commit();
  layoutRedraw();
  undoable('Plot removed', function(){
    var f = getFarm();
    f.plots.splice(Math.min(plotIdx, f.plots.length), 0, plot);          // restore the plot
    removedLines.slice().sort(function(a,b){ return a.idx - b.idx; }).forEach(function(r){
      f.lines.splice(Math.min(Math.max(0, r.idx), f.lines.length), 0, r.line);
    });
    reindexPlots(f); reindexLines(f); rebuildLineIds(f);
    commit();
    layoutRedraw();
  });
}

// removePlotWithMove(plot) — STOCKED-plot confirm action: reassign every line of every area in the
// plot to ONE surviving default area (stock-safe), remove the plot. ONE commit()+undoable. (§8-J)
function removePlotWithMove(plot){
  var farm = getFarm(); if (!farm || !plot) return;
  plot = (farm.plots || []).filter(function(q){ return q.id === plot.id; })[0];
  if (!plot){ closeSheet(); return; }
  var target = pickTargetAreaOutsidePlot(farm, plot.id);
  if (!target){ toast('No other plot to move lines into'); closeSheet(); return; }
  var moved = [];
  farm.lines.forEach(function(l){
    if (l.plotId !== plot.id) return;
    moved.push({ line:l, plotId:l.plotId, areaId:l.areaId });
    l.plotId = target.plot.id; l.areaId = target.area.id;
  });
  var plotIdx = farm.plots.indexOf(plot);
  if (plotIdx >= 0) farm.plots.splice(plotIdx, 1);
  reindexPlots(farm); reindexLines(farm); rebuildLineIds(farm);
  if (LAYOUT.sel && LAYOUT.sel.kind === 'plot' && LAYOUT.sel.plotId === plot.id) LAYOUT.sel = null;
  closeSheet();
  commit();
  layoutRedraw();
  undoable('Lines moved · plot removed', function(){
    var f = getFarm();
    f.plots.splice(Math.min(plotIdx, f.plots.length), 0, plot);
    moved.forEach(function(m){ if (m.line){ m.line.plotId = m.plotId; m.line.areaId = m.areaId; } });
    reindexPlots(f); reindexLines(f); rebuildLineIds(f);
    commit();
    layoutRedraw();
  });
}

// buildRemoveAreaConfirm(areaId) — the stocked-area confirm sheet: explain, offer "Move lines to
// default area" (primary, safe) + Cancel. Never a destroy-stock option. (LAYOUT §4 / §8-J)
function buildRemoveAreaConfirm(areaId){
  var farm = getFarm();
  var fa = findAreaById(farm, areaId);
  if (!fa){ return sheetHead('Remove area').concat(h('div', { class:'sheetSub' }, 'This area no longer exists.')); }
  var area = fa.area;
  var total = linesInArea(farm, areaId).length;
  var stocked = areaStockedLines(farm, areaId).length;
  var target = pickTargetArea(farm, areaId);
  var frag = sheetHead('Remove ' + area.name, fa.plot.name);
  frag.push(h('div', { class:'sheetSub' },
    'This area holds ' + total + (total === 1 ? ' line' : ' lines') + ', '
    + stocked + ' with stock. Removing it keeps every line, cage, and batch — they move to '
    + (target ? (target.plot.name + ' · ' + target.area.name) : 'the default area') + '.'));
  frag.push(h('button', { class:'btn btn-primary btn-block', style:{ marginTop:'18px' },
    onclick:function(){ removeAreaWithMove(area); } }, 'Move lines to default area'));
  frag.push(h('button', { class:'btn btn-quiet btn-block', style:{ marginTop:'10px' },
    onclick:closeSheet }, 'Cancel'));
  return frag;
}

// buildRemovePlotConfirm(plotId) — the stocked-plot confirm sheet (analogous to the area one).
function buildRemovePlotConfirm(plotId){
  var farm = getFarm();
  var plot = (farm.plots || []).filter(function(q){ return q.id === plotId; })[0];
  if (!plot){ return sheetHead('Remove plot').concat(h('div', { class:'sheetSub' }, 'This plot no longer exists.')); }
  var lines = farm.lines.filter(function(l){ return l.plotId === plotId; });
  var stocked = lines.filter(lineHasStock).length;
  var target = pickTargetAreaOutsidePlot(farm, plotId);
  var frag = sheetHead('Remove ' + plot.name);
  frag.push(h('div', { class:'sheetSub' },
    'This plot holds ' + lines.length + (lines.length === 1 ? ' line' : ' lines') + ', '
    + stocked + ' with stock. Removing it keeps every line, cage, and batch — they move to '
    + (target ? (target.plot.name + ' · ' + target.area.name) : 'the default area') + '.'));
  frag.push(h('button', { class:'btn btn-primary btn-block', style:{ marginTop:'18px' },
    onclick:function(){ removePlotWithMove(plot); } }, 'Move lines to default area'));
  frag.push(h('button', { class:'btn btn-quiet btn-block', style:{ marginTop:'10px' },
    onclick:closeSheet }, 'Cancel'));
  return frag;
}

// buildOnboardingPage — full-page onboarding (no farms yet); not a sheet.
function buildOnboardingPage(){
  var page = h('div', { class:'onboardWrap' });
  page.appendChild(h('div', { class:'obTitle' }, 'SpatMap'));
  page.appendChild(h('div', { class:'obSub' }, 'Design your oyster farm, then run your day on the water from it.'));
  appendKids(page, buildFarmForm('create', null));
  return page;
}

/* ─────────────────────────────────────────────────────────────────
   BRIGHTSIDE DEMO FIXTURE — a realistic farm that visibly exercises
   the map colors, needs-work, projection, and the loaded barge.
   ───────────────────────────────────────────────────────────────── */
function isoDaysAgo(days){
  var ms = isoToMs(todayISO()) - days * 86400000;
  var d = new Date(ms);
  return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate());
}
function loadBrightsideFarm(){
  var flip = { id:uid(), name:'FlipFarm', shape:'rect', meshMm:6 };
  var oygro = { id:uid(), name:'OyGro', shape:'circle', meshMm:9 };
  var vexar = { id:uid(), name:'Vexar bag', shape:'square', meshMm:4 };
  var farm = {
    id:uid(), name:'Brightside Oyster Co.', createdAt:Date.now(),
    cageTypes:[flip, oygro, vexar],
    grades:['Standard','Petite','Jumbo'],
    lines:[], barge:freshBarge(), harvestLog:[], batches:[],
    settings:{ marketSizeMm:76, neglectIntervalDays:56 }
  };

  // batch ages drive the fresh/mid/old color bands; sizes drive ready + projection.
  // recipe: [typeObj, ageDays(stocked), sizeMm, count, ploidy, hatchery, grade, neglectedDays?, growthChecks?]
  var FILL = 1, EMPTY = 0;
  function makeBatch(typeId, ageDays, sizeMm, count, ploidy, hatchery, grade){
    return { id:uid(), count:count, sizeMm:sizeMm, ploidy:ploidy, hatchery:hatchery, grade:grade || null,
      notes:'', stockedDate:isoDaysAgo(ageDays), photoIds:[], origin:null };
  }
  // build a line of `n` cages from a plan function planFn(i) → cage spec or null(empty)
  function buildLine(name, type, n, planFn){
    var li = farm.lines.length;
    var line = { id:uid(), name:name, order:li, cages:[] };
    for (var i=0; i<n; i++){
      var cage = newCage(type.id, li, i);
      var spec = planFn(i);
      if (spec){
        var b = makeBatch(type.id, spec.age, spec.size, spec.count, spec.ploidy || 'triploid', spec.hatch || 'Grand Isle Hatchery', spec.grade);
        cage.batch = b;
        farm.batches.push(b);
        // stocked event
        cage.events.push({ id:uid(), type:'stocked', date:b.stockedDate, batchId:b.id, method:null,
          sizeMm:spec.startSize || 15, count:b.count, note:null, photoIds:[] });
        // a growth check partway (so a couple cages have observed rate + recent measurement)
        if (spec.checkAge != null){
          cage.events.push({ id:uid(), type:'growth', date:isoDaysAgo(spec.checkAge), batchId:b.id, method:null,
            sizeMm:spec.size, count:null, note:null, photoIds:[] });
        }
        // a work event so the neglect timer is sensible unless we WANT it overdue
        if (spec.workedAge != null){
          cage.events.push({ id:uid(), type:'worked', date:isoDaysAgo(spec.workedAge), batchId:b.id,
            method:spec.method || 'tumbled', sizeMm:null, count:null, note:null, photoIds:[] });
        }
        if (spec.workDue) cage.workDue = spec.workDue;
      }
      line.cages.push(cage);
    }
    farm.lines.push(line);
    return line;
  }

  // Line 1 — young FlipFarm seed, mostly filled, fresh green, recently worked
  buildLine('Line 1', flip, 10, function(i){
    if (i >= 8) return null;                       // last two empty
    return { age:70, startSize:14, size:28, count:1800, checkAge:5, workedAge:6, method:'tumbled' };
  });
  // Line 2 — mid-age OyGro, copper band; one cage overdue for work (needs-work ring)
  buildLine('Line 2', oygro, 9, function(i){
    if (i === 4) return null;
    var s = { age:240, startSize:15, size:58, count:1400, checkAge:20, workedAge:30, method:'washed' };
    if (i === 1){ s.workedAge = 80; s.checkAge = 80; }   // overdue → needs work
    return s;
  });
  // Line 3 — old, market-ready Jumbos (teal ready edge), counted
  buildLine('Line 3', oygro, 8, function(i){
    if (i >= 6) return null;
    return { age:400, startSize:16, size:82, count:900, ploidy:'diploid', grade:'Jumbo', checkAge:8, workedAge:10, method:'flipped' };
  });
  // Line 4 — mixed: some filled Vexar bags, some empty (for fill/pull demos)
  buildLine('Line 4', vexar, 10, function(i){
    if (i % 2 === 0) return null;                  // every other empty
    return { age:150, startSize:15, size:46, count:2200, checkAge:14, workedAge:18, method:'desiccated' };
  });
  // Line 5 — all empty (a clean line to fill from the barge)
  buildLine('Line 5', flip, 8, function(){ return null; });
  // Line 6 — young triploid, uncounted batch (tests "uncounted" + null-size projection copy)
  buildLine('Line 6', vexar, 7, function(i){
    if (i >= 5) return null;

// setLineCageCount(farm, line, target) — BULK add/remove cages on ONE line (work view, owner ask).
// Grow → append empty cages (the line's existing type). Shrink → remove EMPTY cages from the END only,
// stopping at the first stocked cage from the end (those must be emptied first). One commit + one undo.
function lineByIdLocal(f, id){ for (var i=0;i<f.lines.length;i++) if (f.lines[i].id === id) return f.lines[i]; return null; }
function setLineCageCount(farm, line, target){
  target = Math.max(0, Math.floor(target || 0));
  var cur = line.cages.length;
  if (target === cur) return;
  var lineId = line.id;
  if (target > cur){
    var typeId = cur ? line.cages[cur-1].typeId : farm.cageTypes[0].id;
    var added = target - cur, freshAdd = [];
    for (var i=cur; i<target; i++){ var nc = newCage(typeId, line.order, i); freshAdd.push(nc); line.cages.push(nc); }
    reindexLines(farm); commit();
    undoable('Added ' + added + (added===1 ? ' cage' : ' cages'), function(){
      var l = lineByIdLocal(getFarm(), lineId); if (!l) return;
      // remove only the cages WE added that are still empty — never splice off one stocked since (audit F8/H3)
      freshAdd.forEach(function(fc){ var ix = l.cages.indexOf(fc); if (ix >= 0 && !fc.batch) l.cages.splice(ix, 1); });
      reindexLines(getFarm()); commit();
    });
  } else {
    var want = cur - target, removed = [];
    for (var j=line.cages.length-1; j>=0 && removed.length<want; j--){
      if (line.cages[j].batch) break;                    // stocked → can't trim past it
      removed.push({ index:j, cage:line.cages[j] });
    }
    if (!removed.length){ toast('Those end cages are stocked — empty them first'); return; }
    removed.forEach(function(r){ line.cages.splice(r.index, 1); });
    reindexLines(farm); commit();
    var n = removed.length;
    undoable('Removed ' + n + (n===1 ? ' cage' : ' cages') + ' — line keeps its place', function(){
      var l = lineByIdLocal(getFarm(), lineId); if (!l) return;
      removed.slice().sort(function(a,b){ return a.index - b.index; }).forEach(function(r){
        l.cages.splice(Math.min(r.index, l.cages.length), 0, r.cage);
      });
      reindexLines(getFarm()); commit();
    });
  }
}
function removeLineWithUndo(farm, line){
  var idx = farm.lines.indexOf(line);
  if (idx < 0) return;
  var snapshot = line;                  // keeps snapshot.areaId so undo restores area membership
  farm.lines.splice(idx, 1);
  reindexLines(farm);
  rebuildLineIds(farm);                 // LAYOUT §6.9 — re-derive area.lineIds after a structural remove
  closeSheet();
  commit();
  undoable('Line removed', function(){
    var f = getFarm();
    f.lines.splice(Math.min(idx, f.lines.length), 0, snapshot);
    reindexLines(f);
    rebuildLineIds(f);
    commit();
  });
}

// addCagesToLineEnd(farm, line, count, atStart) — BULK add empty cages to EITHER end of a line (owner ask).
// atStart=true prepends (clip cages onto the start piling end), else appends. Cage objects (with any
// batch) keep travelling; reindexLines renumbers every cage's position label. One commit + one undo.
function addCagesToLineEnd(farm, line, count, atStart){
  count = Math.max(1, Math.floor(count || 1));
  var refIdx = atStart ? 0 : line.cages.length - 1;
  var typeId = line.cages.length ? line.cages[refIdx].typeId : farm.cageTypes[0].id;
  var fresh = [];
  for (var i=0; i<count; i++) fresh.push(newCage(typeId, line.order, 0));   // label fixed by reindexLines
  line.cages = atStart ? fresh.concat(line.cages) : line.cages.concat(fresh);
  reindexLines(farm); commit();
  var lineId = line.id;
  undoable('Added ' + count + (count===1 ? ' cage' : ' cages') + (atStart ? ' to start' : ' to end'), function(){
    var l = lineByIdLocal(getFarm(), lineId); if (!l) return;
    // remove exactly the cages we added, and only while still empty — a stocked one stays (no orphaned batch) (audit F8/H3)
    fresh.forEach(function(fc){ var ix = l.cages.indexOf(fc); if (ix >= 0 && !fc.batch) l.cages.splice(ix, 1); });
    reindexLines(getFarm()); commit();
  });
}

// buildPriceEditor(farm) — compact $/oyster editor: one decimal input per grade in farm.grades, plus a
// "default / ungraded" input. Reuses the field() idiom. Writes farm.settings.gradePrices[grade] (delete
// on blank) and farm.settings.defaultPrice (null on blank); persist() on every input (no full re-render).
function buildPriceEditor(farm){
  if (!farm.settings.gradePrices) farm.settings.gradePrices = {};   // guard: an unpriced farm has no map yet (was crashing Settings)
  var wrap = h('div', { class:'priceEditor' });
  wrap.appendChild(h('div', { class:'priceEditor-lbl' }, 'Price per oyster'));
  function priceRow(label, getVal, setVal){
    var v = getVal();
    var input = h('input', { type:'number', inputmode:'decimal', min:'0', step:'0.01',
      value:(typeof v === 'number' ? v : ''),
      oninput:function(){ var n = parseNum(this.value); setVal(this.value.trim() === '' ? null : (n != null && n >= 0 ? n : null)); persist(); } });
    return h('div', { class:'priceRow' },
      h('span', { class:'priceRow-name' }, label),
      h('span', { class:'priceRow-cur' }, '$'),
      input);
  }
  (farm.grades || []).forEach(function(g){
    if (typeof g !== 'string') return;
    wrap.appendChild(priceRow(g,
      function(){ var p = farm.settings.gradePrices[g]; return (typeof p === 'number') ? p : null; },
      function(val){ if (val == null) delete farm.settings.gradePrices[g]; else farm.settings.gradePrices[g] = val; }));
  });
  wrap.appendChild(priceRow('Default / ungraded',
    function(){ return (typeof farm.settings.defaultPrice === 'number') ? farm.settings.defaultPrice : null; },
    function(val){ farm.settings.defaultPrice = val; }));
  wrap.appendChild(h('div', { class:'fieldHint' }, 'Used for the overview crop value. Leave blank where you don’t price.'));
  return wrap;
