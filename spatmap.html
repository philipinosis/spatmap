/* NOTE on legend chips: .db-legend-chip shares .db-bead's status-fill + edge selectors (attribute/
   class based) so chips render the EXACT same colors/edges as real beads. The fresh GLOW is scoped
   to .db-bead only, so legend chips stay flat and legible. */

/* ══════════════════════════════════════════════════════════════════
   BIT C — NOAA conditions bar + gauge search.
   Public entry: renderConditionsBar() — populates #conditionsBar, no-op
   safe if the host is absent. Everything else is cond*-prefixed + private.
   Offline-first: cache last-good per stationId+product; render cached
   instantly, refresh in the background, show age, never throw into UI.
   ══════════════════════════════════════════════════════════════════ */

/* ── localStorage keys ─────────────────────────────────────────────── */
var COND_K_LASTGOOD = 'spatmapCondCache'; // last-good readings per siteId+product
var COND_STATIONS_TTL = 30 * 86400000;   // 30-day TTL on the per-state USGS site list
var COND_NWS_TTL      = 6 * 3600000;      // 6h TTL on the resolved NWS forecast URL

/* request generation token — a newer renderConditionsBar() invalidates older in-flight fetches */
var condReqSeq = 0;

/* ── tiny safe storage helpers (never throw) ──────────────────────── */
function condLSget(key){
  try { var v = localStorage.getItem(key); return v == null ? null : JSON.parse(v); }
  catch (e) { return null; }
}
function condLSset(key, val){
  try { localStorage.setItem(key, JSON.stringify(val)); return true; }
  catch (e) { return false; }   // quota / private mode — degrade silently
}

/* ── manual salinity (the farm's own refractometer reading) ───────────
   Most NOAA tide gauges DON'T report salinity — only a handful of PORTS stations do — so the
   live `salinity` product is empty at a station like Grand Isle and the gauge never showed one.
   Salinity is also hyper-local to the lease, so the farmer's own reading is the one that matters.
   Stored once for the farm with the date it was taken; shown on the bar, tap to update. (owner ask) */
var COND_K_SALINITY = 'spatmapSalinity';   // { ppt:Number, at:ms }
function condGetSalinity(){
  var s = condLSget(COND_K_SALINITY);
  if (s && typeof s.ppt === 'number' && isFinite(s.ppt)) return s;
  return null;
}
function condSetSalinity(ppt){
  if (ppt == null || !isFinite(ppt)){ try { localStorage.removeItem(COND_K_SALINITY); } catch (e) {} }
  else { var v = Math.max(0, Math.min(45, +ppt)); condLSset(COND_K_SALINITY, { ppt:v, at:Date.now() }); }   // 0–45 ppt is the real-world envelope
  renderConditionsBar();
}

/* ── USGS monitoring site = the conditions source ─────────────────────
   USGS coastal gauges carry the WATER data an oyster farm actually needs — live salinity, water
   temp, gage height (water level + rising/falling trend), and wind at some sites — refreshed every
   ~15 min, at sites all along the coast (picker below). This REPLACES the NOAA CO-OPS tide gauge as
   the bar's source. USGS has no tide *prediction* or weather *forecast*, so the live water level +
   trend stands in for the tide line, and the NWS forecast is still pulled — but from the chosen
   site's own lat/lng, so there is still only ONE site to pick. */
var COND_K_SITE      = 'spatmapUsgsSite';     // chosen USGS site: {id,name,state,lat,lng}
var COND_K_USGS_SITES = 'usgsSalinitySites';  // per-state cached site lists: { LA:{ts,list[]}, ... }
var COND_USGS_PARAMS = '00010,00065,00480,00035,00036';   // temp · gage ht · salinity · wind spd · wind dir (00095 spec-cond was requested but never read)
var COND_USGS_SUGGESTED = { id:'07380249', name:'Caminada Pass NW of Grand Isle, LA', state:'LA', lat:29.2313611, lng:-90.0485278 };
function condGetSite(){
  var s = condLSget(COND_K_SITE);
  if (s && s.id && isFinite(s.lat) && isFinite(s.lng)) return s;
  return null;
}
function condSetSite(s){
  if (!s){ try { localStorage.removeItem(COND_K_SITE); } catch (e) {} }
  else condLSset(COND_K_SITE, { id:String(s.id), name:s.name, state:s.state || '', lat:+s.lat, lng:+s.lng });
  renderConditionsBar();
}
function condSiteLabel(site){ return (site && (site.name || ('USGS ' + site.id))) || 'USGS site'; }
function condDegToCompass(deg){
  if (deg == null || !isFinite(deg)) return '';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round((((+deg % 360) + 360) % 360) / 45) % 8];
}

/* text GET (RDB site lists are tab-separated text, not JSON) — abort-bounded like condGetJSON */
function condGetText(url, ms){
  ms = ms || 9000;
  var ctl, timer;
  try { ctl = new AbortController(); timer = setTimeout(function(){ try { ctl.abort(); } catch (e) {} }, ms); }
  catch (e) { ctl = null; }
  var opts = {}; if (ctl) opts.signal = ctl.signal;
  return fetch(url, opts).then(function(r){
    if (timer) clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }, function(err){ if (timer) clearTimeout(timer); throw err; });
}

/* USGS instantaneous values → normalized latest reading per parameter. One call, ~6h window so a
   dead/stale sensor (no recent point) naturally drops out and gage-height trend can be derived. */
function condUsgsLastPt(series){
  var vs = series && series.values && series.values[0] && series.values[0].value;
  if (!vs || !vs.length) return null;
  for (var i = vs.length - 1; i >= 0; i--){
    var v = parseFloat(vs[i].value);
    if (isFinite(v) && v > -999990) return { v:v, at:vs[i].dateTime };   // -999999 is USGS "no value"
  }
  return null;
}
function condFetchUsgs(siteId){
  var u = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=' + encodeURIComponent(siteId) +
          '&parameterCd=' + COND_USGS_PARAMS + '&period=PT6H&siteStatus=all';
  return condGetJSON(u, 9000).then(function(d){
    var ts = d && d.value && d.value.timeSeries;
    if (!ts || !ts.length) throw new Error('no usgs data');
    var out = { params:{} };   // the picker already supplies name/coords; we only need the readings here
    ts.forEach(function(s){
      var code = s.variable && s.variable.variableCode && s.variable.variableCode[0] && s.variable.variableCode[0].value;
      if (!code) return;
      var pt = condUsgsLastPt(s);
      if (!pt) return;
      var trend = null, delta = null;
      if (code === '00065'){   // gage height → derive rising/falling from first→last in the window
        var vs = s.values[0].value, first = null;
        for (var i = 0; i < vs.length; i++){ var fv = parseFloat(vs[i].value); if (isFinite(fv) && fv > -999990){ first = fv; break; } }
        if (first != null){ delta = pt.v - first; trend = (delta > 0.05) ? 'rising' : (delta < -0.05) ? 'falling' : 'flat'; }
      }
      out.params[code] = { v:pt.v, at:pt.at, trend:trend, delta:delta };
    });
    return out;
  });
}

/* ════════════════ CONDITIONS HISTORY — water temp / salinity / level over time + oyster insight.
   Pulls ~30 days of real USGS instantaneous values for the chosen site, charts them, and derives things
   a farmer can ACT on (growing days, near-stall days, heat-stress/Vibrio watch, low-salinity events,
   spawning window). Also passively logs each live reading locally so a record persists offline. ════════ */
var COND_K_HIST = 'spatmapCondHist';   // { siteId: [{ms,t,s,g}] } local rolling log (one sample / ~hour)

function condFetchUsgsHistory(siteId, period){
  var u = 'https://waterservices.usgs.gov/nwis/iv/?format=json&sites=' + encodeURIComponent(siteId) +
          '&parameterCd=' + COND_USGS_PARAMS + '&period=' + (period || 'P30D') + '&siteStatus=all';
  return condGetJSON(u, 15000).then(function(d){
    var ts = d && d.value && d.value.timeSeries;
    if (!ts || !ts.length) throw new Error('no usgs history');
    var series = {};
    ts.forEach(function(s){
      var code = s.variable && s.variable.variableCode && s.variable.variableCode[0] && s.variable.variableCode[0].value;
      if (!code) return;
      var vs = s.values && s.values[0] && s.values[0].value; if (!vs) return;
      var pts = [];
      for (var i = 0; i < vs.length; i++){
        var v = parseFloat(vs[i].value);
        if (isFinite(v) && v > -999990){ var ms = Date.parse(vs[i].dateTime); if (isFinite(ms)) pts.push({ ms:ms, v:v }); }
      }
      if (pts.length) series[code] = pts;
    });
    return series;
  });
}

// passive local log — one sample per ~hour per site, capped. Called from condRefresh on a good fetch.
function condLogSample(siteId, tempC, salPpt, gageFt){
  if (!siteId) return;
  try {
    var all = condLSget(COND_K_HIST) || {}, arr = all[siteId] || [], now = Date.now();
    if (arr.length && (now - arr[arr.length-1].ms) < 50*60000) return;   // ~hourly dedupe
    function num(x){ return (typeof x === 'number' && isFinite(x)) ? x : null; }
    arr.push({ ms:now, t:num(tempC), s:num(salPpt), g:num(gageFt) });
    if (arr.length > 800) arr = arr.slice(arr.length - 800);
    all[siteId] = arr; condLSset(COND_K_HIST, all);
  } catch (e) {}
}

function cToF(c){ return c * 9/5 + 32; }

// condDailyAgg(series) — group USGS points by UTC day → [{ms,meanT,minT,maxT,meanS,minS}] (temp °C, sal ppt)
function condDailyAgg(series){
  var days = {};
  function bucket(pts, key){
    (pts || []).forEach(function(p){
      var d = new Date(p.ms), k = d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate());
      if (!days[k]) days[k] = { k:k, ms:Date.parse(k + 'T12:00:00Z'), ts:[], ss:[] };
      days[k][key].push(p.v);
    });
  }
  bucket(series['00010'], 'ts'); bucket(series['00480'], 'ss');
  function mean(a){ return a.length ? a.reduce(function(s,x){ return s+x; }, 0) / a.length : null; }
  var arr = Object.keys(days).map(function(k){ return days[k]; }).sort(function(a,b){ return a.ms - b.ms; });
  arr.forEach(function(d){
    d.meanT = mean(d.ts); d.minT = d.ts.length ? Math.min.apply(null, d.ts) : null; d.maxT = d.ts.length ? Math.max.apply(null, d.ts) : null;
    d.meanS = mean(d.ss); d.minS = d.ss.length ? Math.min.apply(null, d.ss) : null;
  });
  return arr;
}

// condInsights(daily) — oyster-relevant flags. Thresholds are GUIDANCE (labeled as such in the UI).
//   growth band 12–28 °C · near-stall <12 °C · heat stress >28 °C · Vibrio season avg >20 °C · spawn cue 25–27 °C
//   low salinity <10 ppt (freshwater-intrusion stress / possible closures).
function condInsights(daily){
  var o = { days:daily.length, growDays:0, stallDays:0, heatDays:0, lowSalDays:0, spawnWatch:false,
            minT:null, maxT:null, avgT:null, minS:null, maxS:null, avgS:null, vibrio:false };
  var tsum=0, tn=0, ssum=0, sn=0;
  daily.forEach(function(d){
    if (d.meanT != null){
      tsum += d.meanT; tn++;
      if (d.meanT >= 12 && d.meanT <= 28) o.growDays++;
      if (d.meanT < 12) o.stallDays++;
      if (d.maxT != null && d.maxT > 28) o.heatDays++;
      if (d.maxT != null && d.minT != null && d.maxT >= 25 && d.minT <= 27) o.spawnWatch = true;
      if (o.minT == null || (d.minT != null && d.minT < o.minT)) o.minT = d.minT;
      if (o.maxT == null || (d.maxT != null && d.maxT > o.maxT)) o.maxT = d.maxT;
    }
    if (d.meanS != null){ ssum += d.meanS; sn++;
      if (o.minS == null || (d.minS != null && d.minS < o.minS)) o.minS = d.minS;
      if (o.maxS == null || d.meanS > o.maxS) o.maxS = d.meanS;
      if (d.minS != null && d.minS < 10) o.lowSalDays++;
    }
  });
  o.avgT = tn ? tsum/tn : null; o.avgS = sn ? ssum/sn : null;
  o.vibrio = (o.avgT != null && o.avgT > 20);
  return o;
}

// condHistChart(points, opts) → SVG string. points=[{ms,v}]; opts:{unit,color,bands:[{lo,hi,fill}]}
function condHistChart(points, opts){
  opts = opts || {};
  if (!points || !points.length) return '<div style="padding:8px 0;color:#6E878C;font-size:12px">No data in range.</div>';
  var W=300, H=92, padL=4, padR=30, padT=8, padB=14;
  var xs0 = points[0].ms, xs1 = points[points.length-1].ms; if (xs1 <= xs0) xs1 = xs0 + 86400000;
  var lo=null, hi=null;
  points.forEach(function(p){ if (lo==null||p.v<lo) lo=p.v; if (hi==null||p.v>hi) hi=p.v; });
  var span = (hi - lo) || 1, padv = span*0.18; lo -= padv; hi += padv;
  function X(ms){ return padL + (ms-xs0)/(xs1-xs0) * (W-padL-padR); }
  function Y(v){ return H - padB - (v-lo)/(hi-lo) * (H-padT-padB); }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" aria-hidden="true">';
  (opts.bands||[]).forEach(function(b){
    var top = Y(Math.min(hi, b.hi==null?hi:b.hi)), bot = Y(Math.max(lo, b.lo==null?lo:b.lo));
    if (bot > top) svg += '<rect x="'+padL+'" y="'+top.toFixed(1)+'" width="'+(W-padL-padR)+'" height="'+(bot-top).toFixed(1)+'" fill="'+b.fill+'" opacity="0.15"/>';
  });
  svg += '<polyline points="'+points.map(function(p){ return X(p.ms).toFixed(1)+','+Y(p.v).toFixed(1); }).join(' ')+'" fill="none" stroke="'+(opts.color||'#0E7C8B')+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>';
  svg += '<text x="'+(W-padR+3)+'" y="'+(Y(hi-padv)+3).toFixed(1)+'" font-family="ui-monospace,Menlo,monospace" font-size="8" fill="#6E878C">'+Math.round(hi-padv)+(opts.unit||'')+'</text>';
  svg += '<text x="'+(W-padR+3)+'" y="'+(Y(lo+padv)+3).toFixed(1)+'" font-family="ui-monospace,Menlo,monospace" font-size="8" fill="#6E878C">'+Math.round(lo+padv)+(opts.unit||'')+'</text>';
  svg += '<text x="'+padL+'" y="'+(H-3)+'" font-family="ui-monospace,Menlo,monospace" font-size="8" fill="#6E878C">'+monthDay(toISOfromMs(xs0))+'</text>';
  svg += '<text x="'+(W-padR)+'" y="'+(H-3)+'" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="8" fill="#6E878C">'+monthDay(toISOfromMs(xs1))+'</text>';
  svg += '</svg>';
  return svg;
}

// buildCondHistory() — the Settings → "Water conditions over time" sheet.
function buildCondHistory(){
  var site = condGetSite();
  var kids = sheetHead('Water conditions', site ? (site.name + (site.state ? ' · ' + site.state : '')) : 'No gauge picked');
  if (!site){
    kids.push(h('div', { class:'emptyNote', style:{marginTop:'14px'} }, 'No USGS gauge selected.\nTap the conditions bar on the overview to pick the gauge nearest your farm, then come back.'));
    return kids;
  }
  var body = h('div'); kids.push(body);
  body.appendChild(h('div', { style:{padding:'10px 0', color:'#6E878C', fontSize:'13px'} }, 'Loading ~30 days from USGS ' + site.id + '…'));

  function chartCard(title, svgStr, legend){
    var card = h('div', { style:{margin:'14px 0 4px'} });
    card.appendChild(h('div', { style:{fontWeight:'600', fontSize:'13px', marginBottom:'2px'} }, title));
    card.appendChild(h('div', { html:svgStr }));
    if (legend) card.appendChild(h('div', { style:{fontSize:'10px', color:'#6E878C', marginTop:'2px'} }, legend));
    return card;
  }
  function statRow(label, val, hot){
    return h('div', { style:{display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid #EDEAE2'} },
      h('span', { style:{fontSize:'13px', color:'#42525A'} }, label),
      h('span', { style:{fontSize:'13px', fontWeight:'600', color: hot ? '#B4541E' : '#1B2B30'} }, val));
  }

  function paintFromUsgs(series){
    body.innerHTML = '';
    var daily = condDailyAgg(series), ins = condInsights(daily);
    var tempC = series['00010'] || [], sal = series['00480'] || [], gage = series['00065'] || [];
    var tempF = tempC.map(function(p){ return { ms:p.ms, v:cToF(p.v) }; });

    // ── INSIGHT card (the "didn't know you could track this" part) ──
    var card = h('div', { style:{background:'#F7F5EF', borderRadius:'12px', padding:'10px 12px', marginTop:'6px'} });
    card.appendChild(h('div', { style:{fontWeight:'700', fontSize:'13px', marginBottom:'4px', color:'#1B2B30'} }, 'Last ' + ins.days + ' days · what it means for your oysters'));
    if (ins.avgT != null) card.appendChild(statRow('Water temp', Math.round(cToF(ins.minT)) + '–' + Math.round(cToF(ins.maxT)) + '°F (avg ' + Math.round(cToF(ins.avgT)) + ')'));
    card.appendChild(statRow('Good growing days', ins.growDays + ' of ' + ins.days));
    if (ins.stallDays) card.appendChild(statRow('Near-stall days (cold)', ins.stallDays + ' — growth slows', true));
    if (ins.heatDays) card.appendChild(statRow('Heat-stress days >82°F', ins.heatDays + ' — chill harvest fast', true));
    if (ins.vibrio) card.appendChild(statRow('Vibrio season', 'yes — short time-to-ice on harvest', true));
    if (ins.spawnWatch) card.appendChild(statRow('Spawning window hit', '25–27°C — diploids may spawn'));
    if (ins.avgS != null) card.appendChild(statRow('Salinity', Math.round(ins.minS) + '–' + Math.round(ins.maxS) + ' ppt (avg ' + Math.round(ins.avgS) + ')'));
    if (ins.lowSalDays) card.appendChild(statRow('Low-salinity days <10 ppt', ins.lowSalDays + ' — freshwater stress', true));
    card.appendChild(h('div', { style:{fontSize:'10px', color:'#8A99A0', marginTop:'6px'} }, 'Guidance from public USGS data — not a substitute for your shellfish-control authority.'));
    body.appendChild(card);

    // ── charts ──
    if (tempF.length) body.appendChild(chartCard('Water temperature (°F)', condHistChart(tempF, { unit:'°', color:'#C77A2E',
      bands:[ {lo:cToF(12), hi:cToF(28), fill:'#2E9C6A'}, {lo:cToF(28), hi:200, fill:'#C0392B'}, {lo:-50, hi:cToF(12), fill:'#3B7DB0'} ] }),
      'green = growing 54–82°F · blue = cold stall · red = heat stress'));
    if (sal.length) body.appendChild(chartCard('Salinity (ppt)', condHistChart(sal, { unit:'', color:'#2B7A8C',
      bands:[ {lo:-5, hi:10, fill:'#3B7DB0'} ] }), 'blue band = below 10 ppt (freshwater-intrusion stress)'));
    if (gage.length) body.appendChild(chartCard('Water level (ft)', condHistChart(gage, { unit:'', color:'#6E878C' })));
    body.appendChild(h('div', { style:{fontSize:'11px', color:'#8A99A0', marginTop:'10px'} }, 'SpatMap also logs each live reading on your device, so this record keeps growing even where USGS history is thin.'));
  }

  function paintFromLog(){
    body.innerHTML = '';
    var all = condLSget(COND_K_HIST) || {}, log = all[site.id] || [];
    if (!log.length){ body.appendChild(h('div', { class:'emptyNote', style:{marginTop:'14px'} }, 'Could not reach USGS, and no local readings logged yet.\nOpen the app on the water with signal to start building a record here.')); return; }
    body.appendChild(h('div', { style:{padding:'6px 0', color:'#6E878C', fontSize:'12px'} }, 'Offline — showing ' + log.length + ' readings logged on this device.'));
    var tF = log.filter(function(x){ return x.t != null; }).map(function(x){ return { ms:x.ms, v:cToF(x.t) }; });
    var sP = log.filter(function(x){ return x.s != null; }).map(function(x){ return { ms:x.ms, v:x.s }; });
    if (tF.length) body.appendChild(chartCard('Water temperature (°F)', condHistChart(tF, { unit:'°', color:'#C77A2E' })));
    if (sP.length) body.appendChild(chartCard('Salinity (ppt)', condHistChart(sP, { unit:'', color:'#2B7A8C' })));
  }

  condFetchUsgsHistory(site.id, 'P30D').then(paintFromUsgs, paintFromLog);
  return kids;
}

/* per-state active salinity (00480) IV site list — cached 30d, RDB parsed */
function condLoadUsgsSites(state){
  state = String(state || 'LA').toUpperCase();
  var all = condLSget(COND_K_USGS_SITES) || {};
  var cached = all[state];
  if (cached && cached.ts && cached.list && (Date.now() - cached.ts) < COND_STATIONS_TTL) return Promise.resolve(cached.list);
  var stale = (cached && cached.list) ? cached.list : null;
  var u = 'https://waterservices.usgs.gov/nwis/site/?format=rdb&stateCd=' + state +
          '&parameterCd=00480&siteStatus=active&hasDataTypeCd=iv';
  return condGetText(u, 12000).then(function(txt){
    var list = condParseUsgsRdb(txt, state);
    if (!list.length) throw new Error('no sites');
    all[state] = { ts:Date.now(), list:list };
    condLSset(COND_K_USGS_SITES, all);
    return list;
  }).catch(function(){ return stale; });
}
function condParseUsgsRdb(txt, state){
  var out = [];
  if (!txt) return out;
  var lines = String(txt).split('\n');
  var ix = null;
  for (var i = 0; i < lines.length; i++){
    var ln = lines[i];
    if (!ln || ln.charAt(0) === '#') continue;
    var cols = ln.split('\t');
    if (!ix){ ix = {}; for (var c = 0; c < cols.length; c++) ix[cols[c]] = c; continue; }   // first non-# line = header
    if (/^\d+[sdn]/.test(cols[0])) continue;   // the "5s 15s 50s …" format-spec line
    var id = cols[ix['site_no']], nm = cols[ix['station_nm']];
    var lat = parseFloat(cols[ix['dec_lat_va']]), lng = parseFloat(cols[ix['dec_long_va']]);
    if (id && isFinite(lat) && isFinite(lng)) out.push({ id:id, name:(nm || ('USGS ' + id)), state:state, lat:lat, lng:lng });
  }
  return out;
}
function condSearchUsgsSites(list, q){
  if (!list) return [];
  q = String(q || '').toLowerCase().trim();
  if (!q) return list.slice(0, 30);
  return list.filter(function(st){ return (st.name + ' ' + st.id).toLowerCase().indexOf(q) !== -1; }).slice(0, 30);
}

/* ── networking: AbortController-bounded JSON GET ─────────────────── */
function condGetJSON(url, ms){
  ms = ms || 7000;
  var ctl, timer;
  try { ctl = new AbortController(); timer = setTimeout(function(){ try { ctl.abort(); } catch (e) {} }, ms); }
  catch (e) { ctl = null; }   // very old engines — fetch without abort
  var opts = { headers:{ Accept:'application/json' } };
  if (ctl) opts.signal = ctl.signal;
  return fetch(url, opts).then(function(r){
    if (timer) clearTimeout(timer);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }, function(err){
    if (timer) clearTimeout(timer);
    throw err;
  });
}


/* ── last-good cache: keyed by stationId + '|' + product ──────────── */
function condCacheKey(id, product){ return id + '|' + product; }
function condReadCache(id, product){
  var all = condLSget(COND_K_LASTGOOD);
  if (!all) return null;
  var e = all[condCacheKey(id, product)];
  return (e && typeof e === 'object') ? e : null;
}
function condWriteCache(id, product, entry){
  var all = condLSget(COND_K_LASTGOOD) || {};
  all[condCacheKey(id, product)] = entry;   // {value, observedAt, fetchedAt}
  condLSset(COND_K_LASTGOOD, all);
}
/* drop expired NWS point-resolution entries ('nws|lat,lng|point') so panning the site picker across
   many coordinates can't grow the cache without bound. The site/product readings self-overwrite. */
function condPruneCache(){
  var all = condLSget(COND_K_LASTGOOD);
  if (!all) return;
  var now = Date.now(), changed = false;
  for (var k in all){
    if (all.hasOwnProperty(k) && k.indexOf('nws|') === 0){
      var e = all[k];
      if (!e || !e.fetchedAt || (now - e.fetchedAt) > COND_NWS_TTL){ delete all[k]; changed = true; }
    }
  }
  if (changed) condLSset(COND_K_LASTGOOD, all);
}

/* ── date / format helpers ────────────────────────────────────────── */
/* parse a timestamp (USGS ISO "…T12:45:00.000-05:00" or "YYYY-MM-DD HH:MM") → Date; getTime() is absolute */
function condParseT(t){
  if (!t) return null;
  var d = new Date(String(t).replace(' ', 'T'));
  return isNaN(d.getTime()) ? null : d;
}
/* "12 min ago" / "just now" / "3 hr ago" from an ms timestamp */
function condAgo(ms){
  if (!ms || !isFinite(ms)) return '';
  var s = Math.max(0, Math.round((Date.now() - ms) / 1000));
  if (s < 45) return 'just now';
  var min = Math.round(s / 60);
  if (min < 60) return min + ' min ago';
  var hr = Math.round(min / 60);
  if (hr < 24) return hr + ' hr ago';
  var dy = Math.round(hr / 24);
  return dy + (dy === 1 ? ' day ago' : ' days ago');
}
/* ── NWS forecast fetcher (the one piece USGS can't provide) ───────── */
/* NWS: resolve point → forecast URL (cached 6h by rounded lat/lng), then period[0]. */
function condNwsPointKey(lat, lng){ return 'nws|' + (+lat).toFixed(2) + ',' + (+lng).toFixed(2); }
function condFetchWeather(lat, lng){
  var pkey = condNwsPointKey(lat, lng);
  var cachedPt = condReadCache(pkey, 'point');
  var fcUrlP;
  if (cachedPt && cachedPt.value && cachedPt.value.url && (Date.now() - cachedPt.fetchedAt) < COND_NWS_TTL){
    fcUrlP = Promise.resolve(cachedPt.value);
  } else {
    fcUrlP = condGetJSON('https://api.weather.gov/points/' + (+lat).toFixed(4) + ',' + (+lng).toFixed(4))
      .then(function(pt){
        if (!pt || !pt.properties || !pt.properties.forecast) throw new Error('no NWS point');
        var val = {
          url: pt.properties.forecast,
          place: (pt.properties.relativeLocation && pt.properties.relativeLocation.properties &&
                  pt.properties.relativeLocation.properties.city) || null
        };
        condWriteCache(pkey, 'point', { value:val, observedAt:Date.now(), fetchedAt:Date.now() });
        return val;
      });
  }
  return fcUrlP.then(function(pt){
    return condGetJSON(pt.url).then(function(fc){
      if (!fc || !fc.properties || !fc.properties.periods || !fc.properties.periods.length) throw new Error('no NWS forecast');
      var p = fc.properties.periods[0];
      var precip = (p.probabilityOfPrecipitation && p.probabilityOfPrecipitation.value != null)
        ? p.probabilityOfPrecipitation.value : null;
      return { value:{
        place: pt.place,
        temp: p.temperature, unit: p.temperatureUnit || 'F',
        windDir: p.windDirection || '', windSpeed: p.windSpeed || '',
        forecast: p.shortForecast || '', precip: precip
      }, observedAt:Date.now() };
    });
  });
}

/* ── refresh: one USGS water call + the NWS forecast (via the site's coords), cache, re-render ─ */
function condRefresh(site, mySeq){
  // Offline? Don't fire network calls that each hang to their abort timeout on a boat with no signal —
  // paint whatever's cached and bail. condIsOffline()/the empty-state copy explain staleness. (audit F14/H4)
  if (typeof navigator !== 'undefined' && navigator.onLine === false){
    var hostOff = document.getElementById('conditionsBar');
    if (hostOff && condGetSite() && condGetSite().id === site.id) condPaint(hostOff, site, true);
    return;
  }
  var now = Date.now();
  var usgsJob = condFetchUsgs(site.id).then(function(u){
    if (mySeq !== condReqSeq) return { ok:false };   // a newer render superseded us — don't overwrite the cache with stale data
    function wr(prod, val, atStr){ var ms = condParseT(atStr); condWriteCache(site.id, prod, { value:val, observedAt:(ms ? ms.getTime() : now), fetchedAt:now }); }
    var p = u.params;
    if (p['00010']) wr('u_temp', { c:p['00010'].v }, p['00010'].at);
    if (p['00065']) wr('u_gage', { ft:p['00065'].v, trend:p['00065'].trend, delta:p['00065'].delta }, p['00065'].at);
    if (p['00480']) wr('u_sal',  { ppt:p['00480'].v }, p['00480'].at);
    if (p['00035'] || p['00036']){
      var wAt = (p['00035'] || p['00036']).at;
      wr('u_wind', { mph:(p['00035'] ? p['00035'].v : null), deg:(p['00036'] ? p['00036'].v : null) }, wAt);
    }
    condLogSample(site.id, p['00010'] ? p['00010'].v : null, p['00480'] ? p['00480'].v : null, p['00065'] ? p['00065'].v : null);  // build the local conditions record
    return { ok:true };
  }, function(){ return { ok:false }; });
  var wxJob = condFetchWeather(site.lat, site.lng).then(function(res){
    if (mySeq !== condReqSeq) return { ok:false };   // superseded — don't overwrite the cache with stale data
    condWriteCache(site.id, 'weather', { value:res.value, observedAt:res.observedAt, fetchedAt:Date.now() });
    return { ok:true };
  }, function(){ return { ok:false }; });   // swallow — cached value (if any) stays good
  Promise.all([usgsJob, wxJob]).then(function(){
    if (mySeq !== condReqSeq) return;          // a newer render superseded us
    var host = document.getElementById('conditionsBar');
    if (host && condGetSite() && condGetSite().id === site.id) condPaint(host, site, true);
  });
}

/* ── PAINT: build the bar DOM from cached values (sync, no network) ── */
function condPaint(host, gauge, refreshed){
  try {
    host.innerHTML = '';
    host.classList.add('condbar');

    if (!gauge){ host.appendChild(condEmptyState()); return; }

    var left  = condLeftSide(gauge);
    var right = condRightSide(gauge);
    appendKids(host, [ left, h('div', { class:'cond-div' }), right ]);
  } catch (e) {
    /* last-ditch guard — never let a render bug blank the dashboard */
    try { host.innerHTML = ''; host.appendChild(condEmptyState()); } catch (e2) {}
  }
}

function condEmptyState(){
  return h('button', {
    class:'cond-empty', type:'button', 'aria-label':'No water data yet — tap to pick a USGS site',
    onclick:condOpenSearch
  },
    h('span', { class:'cond-emptic', html:icon('anchor', 18) }),
    'no water data yet',
    h('span', { class:'cond-empadd' }, 'pick site', h('span', { html:icon('plus', 13) }))
  );
}

/* LEFT — live water level + trend (USGS gage height), then water temp · salinity · age */
function condLeftSide(site){
  var side = h('div', { class:'cond-side cond-left' });

  /* primary: live water level + rising/falling (replaces NOAA tide predictions) */
  var gage = condReadCache(site.id, 'u_gage');
  var primary = h('div', { class:'cond-primary cond-tide' });
  if (gage && gage.value && isFinite(gage.value.ft)){
    var ft = (Math.round(gage.value.ft * 10) / 10).toFixed(1);
    var tr = gage.value.trend;
    var arrow = tr === 'rising' ? '↑' : tr === 'falling' ? '↓' : '→';
    var acls = tr === 'rising' ? 'cond-up' : tr === 'falling' ? 'cond-dn' : '';
    primary.appendChild(h('span', { class:acls }, arrow + ' ' + ft + ' ft'));
    primary.appendChild(h('span', { class:'cond-dot' }, '·'));
    primary.appendChild(h('span', { class:'cond-na' }, 'water level'));
  } else {
    primary.appendChild(h('span', { class:'cond-na' }, 'water level —'));
  }
  side.appendChild(primary);

  /* sub: water temp (°C→°F) · salinity · freshest age */
  var sub = h('div', { class:'cond-sub' });
  var temp = condReadCache(site.id, 'u_temp');
  if (temp && temp.value && isFinite(temp.value.c)){
    sub.appendChild(h('span', { class:'cond-wtemp' }, Math.round(temp.value.c * 9 / 5 + 32) + '° water'));
  } else {
    sub.appendChild(h('span', { class:'cond-na' }, 'no water temp'));
  }
  /* salinity — live USGS reading first; the farm's own logged value is the offline fallback/override.
     The chip is always tappable → log a manual reading (refractometer at the lease). */
  var liveSal = condReadCache(site.id, 'u_sal');
  var manSal = condGetSalinity();
  var salPpt = (liveSal && liveSal.value && isFinite(liveSal.value.ppt)) ? liveSal.value.ppt : null;
  if (salPpt != null){
    var sr = Math.round(salPpt * 10) / 10;
    sub.appendChild(h('button', { class:'cond-sal', type:'button',
      'aria-label':'Salinity ' + sr + ' ppt (USGS) — tap to log your own', onclick:condOpenSalinity }, sr + ' ppt'));
  } else if (manSal){
    var mr = Math.round(manSal.ppt * 10) / 10;
    sub.appendChild(h('button', { class:'cond-sal', type:'button',
      'aria-label':'Salinity ' + mr + ' ppt, logged ' + condAgo(manSal.at) + ' — tap to update', onclick:condOpenSalinity }, mr + ' ppt'));
  } else {
    sub.appendChild(h('button', { class:'cond-sal add', type:'button', 'aria-label':'Log salinity', onclick:condOpenSalinity }, '+ salinity'));
  }
  /* age of the freshest LIVE value on this sub-line (temp / live salinity). Deliberately excludes the
     gage (its own primary line) and a manual salinity reading — so the age can never imply a manual
     ppt is fresher than it is; the manual chip carries its own "logged Nh ago" in the aria-label. */
  var ageSrc = 0;
  if (temp && temp.observedAt && temp.observedAt > ageSrc) ageSrc = temp.observedAt;
  if (salPpt != null && liveSal && liveSal.observedAt && liveSal.observedAt > ageSrc) ageSrc = liveSal.observedAt;
  if (ageSrc){ var age = condAgo(ageSrc); if (age) sub.appendChild(h('span', { class:'cond-age' }, age)); }
  if (condIsOffline(site)) sub.appendChild(h('span', { class:'cond-off' }, 'offline'));
  side.appendChild(sub);

  return side;
}

/* RIGHT — weather (NWS forecast via the site's coords; wind prefers the live USGS sensor) + site chip */
function condRightSide(site){
  var side = h('div', { class:'cond-side cond-right' });

  var wx = condReadCache(site.id, 'weather');
  var uwind = condReadCache(site.id, 'u_wind');
  var primary = h('div', { class:'cond-primary' });

  if (wx && wx.value && wx.value.temp != null && isFinite(wx.value.temp)){
    primary.appendChild(h('span', { class:'cond-airtemp' }, Math.round(wx.value.temp) + '°'));
  }
  var windStr = condUsgsWind(uwind) || condWeatherWind(wx);
  if (windStr) primary.appendChild(h('span', null, windStr));

  if (wx && wx.value && wx.value.forecast){
    var fc = String(wx.value.forecast);
    var pct = (wx.value.precip != null && wx.value.precip > 0) ? (' ' + wx.value.precip + '%') : '';
    primary.appendChild(h('span', null, fc + pct));
  }
  if (!primary.childNodes.length) primary.appendChild(h('span', { class:'cond-na' }, 'no forecast'));
  side.appendChild(primary);

  /* site chip → USGS site search */
  var label = condSiteLabel(site);
  var chip = h('button', {
    class:'cond-station', type:'button', 'aria-label':'USGS site: ' + label + ' — tap to change',
    onclick:condOpenSearch
  },
    h('span', { class:'cond-stname' }, label),
    h('span', { class:'cond-chev', html:icon('chevron', 13) })
  );
  side.appendChild(chip);

  return side;
}

/* live USGS wind → "SW 18" (direction compass + mph), or '' when neither sensor reported */
function condUsgsWind(uwind){
  if (!uwind || !uwind.value) return '';
  var w = uwind.value;
  var dir = condDegToCompass(w.deg);
  var mph = (w.mph != null && isFinite(w.mph)) ? Math.round(w.mph) : null;
  if (!dir && mph == null) return '';
  return (dir + ' ' + (mph != null ? mph : '')).trim();
}

/* NWS forecast wind → "SW 15" (used only when the USGS site has no live wind sensor) */
function condWeatherWind(wx){
  if (wx && wx.value && (wx.value.windDir || wx.value.windSpeed)){
    var spd = String(wx.value.windSpeed || '').replace(/\s*mph\s*/i, '');   // "15 mph" → "15"
    return (wx.value.windDir + ' ' + spd).trim();
  }
  return '';
}

/* offline heuristic: we have a site but NO product cache has been fetched in the last ~30 min.
   Conservative: only true when the freshest fetchedAt across products is older than 30 min. */
function condIsOffline(site){
  var products = ['u_temp', 'u_gage', 'u_sal', 'u_wind', 'weather'];
  var freshest = 0, any = false;
  for (var i = 0; i < products.length; i++){
    var c = condReadCache(site.id, products[i]);
    if (c && c.fetchedAt){ any = true; if (c.fetchedAt > freshest) freshest = c.fetchedAt; }
  }
  if (!any) return false;                       // nothing cached yet → not "offline", just loading
  return (Date.now() - freshest) > 30 * 60000;  // 30 min stale → show the faint note
}

/* ── SALINITY LOG SHEET ────────────────────────────────────────────── */
function condOpenSalinity(){

}
function condBuildSalinitySheet(){

  else frag.push(h('div', { class:'cond-search-note' }, 'The bar shows live USGS salinity for your site. Log your own refractometer reading here as an offline fallback.'));

/* renderConditionsBar() — populate #conditionsBar. No-op safe if absent.
   Paints cached values immediately, then refreshes in the background. */
function renderConditionsBar(){
  var host = document.getElementById('conditionsBar');
  if (!host) return;                  // host absent → no-op
  try { condPruneCache(); } catch (e) {}
  condReqSeq++;
  var mySeq = condReqSeq;
  var site = condGetSite();
  try { condPaint(host, site, false); } catch (e) {}
  if (site){
    try { condRefresh(site, mySeq); } catch (e) {}   // background, non-blocking
  }
}

/* ── USGS SITE SEARCH SHEET ────────────────────────────────────────────
   Pick a USGS monitoring site (the water-data source) for any coastal state. The list is every
   ACTIVE site that reports salinity (param 00480) with real-time data, so the picker covers all of
   them. Filter by name; switch state from the dropdown. */
var COND_USGS_STATES = ['LA','TX','MS','AL','FL','GA','SC','NC','VA','MD','DE','NJ','NY','CT','RI','MA','NH','ME','WA','OR','CA','AK','HI'];
function condOpenSearch(){
  if (typeof openSheet === 'function') openSheet(condBuildSearchSheet);
}
function condBuildSearchSheet(){
  var frag = [];
  if (typeof sheetHead === 'function') frag = frag.concat(sheetHead('Water data site', 'Live USGS salinity, temp & water level — pick a site'));

  var active = condGetSite();
  var stateSel = h('select', { class:'cond-search-in', 'aria-label':'State' },
    COND_USGS_STATES.map(function(s){ return h('option', { value:s }, s); }));
  stateSel.value = (active && active.state && COND_USGS_STATES.indexOf(active.state) >= 0) ? active.state : 'LA';

  var input = h('input', {
    class:'cond-search-in', type:'search', autocomplete:'off', autocapitalize:'none',
    spellcheck:'false', placeholder:'Filter by name… (e.g. Barataria)', 'aria-label':'Filter USGS sites'
  });
  var results = h('div', { class:'cond-results', role:'listbox', 'aria-label':'USGS site results' });
  var note = h('div', { class:'cond-search-note' });

  if (typeof field === 'function'){ frag.push(field('State', stateSel)); frag.push(field(null, input)); }
  else { frag.push(stateSel); frag.push(input); }
  frag.push(results);
  frag.push(note);

  var siteList = null;     // populated async per state

  function siteRow(st){
    var isActive = active && active.id === st.id;
    return h('button', {
      class:'cond-result' + (isActive ? ' is-active' : ''), type:'button', role:'option',
      'aria-selected': isActive ? 'true' : 'false',
      onclick:function(){
        condSetSite({ id:st.id, name:st.name, state:st.state, lat:st.lat, lng:st.lng });
        if (typeof toast === 'function') toast('Site set — ' + (st.name || st.id));
        if (typeof closeSheet === 'function') closeSheet();
      }
    },
      h('span', { class:'cond-r-ic', html:icon('anchor', 20) }),
      h('div', { class:'cond-r-main' },
        h('div', { class:'cond-r-name' }, st.name || ('USGS ' + st.id)),
        h('div', { class:'cond-r-sub' }, (st.state ? st.state + ' · ' : '') + 'USGS ' + st.id)
      ),
      isActive ? h('span', { class:'cond-r-chk', html:icon('check', 18) }) : null
    );
  }

  function paintResults(){
    results.innerHTML = '';
    var q = input.value;
    if (siteList == null){ results.appendChild(h('div', { class:'cond-search-empty' }, 'Loading sites…')); return; }

    /* suggested (Caminada Pass) at the top when LA + empty box */
    if (!q.trim() && stateSel.value === 'LA'){
      results.appendChild(h('div', { class:'cond-suggest-lbl' }, 'Suggested'));
      results.appendChild(siteRow(COND_USGS_SUGGESTED));
    }
    var matches = condSearchUsgsSites(siteList, q);
    if (!q.trim() && stateSel.value === 'LA'){
      matches = matches.filter(function(st){ return st.id !== COND_USGS_SUGGESTED.id; });
      if (matches.length) results.appendChild(h('div', { class:'cond-suggest-lbl' }, 'All ' + stateSel.value + ' sites'));
    }
    if (!matches.length && q.trim()){ results.appendChild(h('div', { class:'cond-search-empty' }, 'No sites match “' + q + '”')); return; }
    if (!matches.length && !q.trim()){ results.appendChild(h('div', { class:'cond-search-empty' }, 'No active salinity sites in ' + stateSel.value + '.')); return; }
    matches.forEach(function(st){ results.appendChild(siteRow(st)); });
  }

  function loadState(){
    siteList = null; note.textContent = ''; paintResults();
    condLoadUsgsSites(stateSel.value).then(function(list){
      siteList = list || [];
      if (!list) note.textContent = 'Offline — connect once to load the ' + stateSel.value + ' site list.';
      paintResults();
    }, function(){ siteList = []; note.textContent = 'Could not load USGS sites for ' + stateSel.value + '.'; paintResults(); });
  }

  stateSel.addEventListener('change', loadState);
  var debounce;
  input.addEventListener('input', function(){ clearTimeout(debounce); debounce = setTimeout(paintResults, 90); });

  loadState();
  setTimeout(function(){ try { input.focus(); } catch (e) {} }, 120);
  return frag;
}

/* ------------------------------------------------------------------
   BIT D — wireDashboardPeek(root)
   Delegated listeners on the .dashboard root so they survive re-render.
   Call ONCE per mounted dashboard, right after buildDashboard() is in the DOM:
       app.appendChild(buildDashboard(farm));
       wireDashboardPeek(app.querySelector('.dashboard'));
       renderConditionsBar();
   (Safe to call again on a fresh root after a re-render — it tags the root so
    it won't double-bind the same element.)

   Reuses existing globals (all typeof-guarded, never throws if absent):
     showPeek(cage, rect), hidePeek(), buildOysterPeek (via showPeek),
     cageById(id), getFarm(), openSheet(fn), buildCageDetail(cage),
     clearCageHighlight() (for the shared #oysterPeek teardown),
     oysterPeekHost() (#oysterPeek; only used to toggle .hoverbridge).
   Owns ONLY its own DOM highlight classes (.db-hl / .db-bead-match /
   .db-bead-active) — independent of the retiring SVG LAYOUT state. ------ */

/* Module-local state (one active bead at a time across the whole dashboard). */
var dbPeek = {
  root:        null,   // the .dashboard currently showing a peek
  cageId:      null,   // active cage id
  group:       '',     // active data-batch-group ('' = empty cage, no sibling hl)
  pinned:      false,  // true for keyboard-focus / touch — survives pointerleave
  graceTimer:  null,   // pending deferred clear for a transient mouse hover
  lastTapId:   null,   // touch double-tap tracking
  lastTapAt:   0,
  hostWired:   false   // #oysterPeek pointerenter/leave keepalive bound once
};
var DB_PEEK_GRACE = 200;       // ms a transient hover lingers (mirrors PEEK_HOVER_GRACE)
var DB_TAP_WINDOW = 600;       // ms window for a second tap to count as "open sheet"

/* Resolve the .db-bead an event landed on (or null). Delegated: we walk up
   from e.target to the nearest [data-cage-id] inside this root. */
function dbBeadFromEvent(root, e){
  var t = e && e.target;
  if (!t || !t.closest) return null;
  var bead = t.closest('.db-bead[data-cage-id]');
  if (!bead || !root.contains(bead)) return null;
  return bead;
}

/* Clear ONLY the dashboard's own highlight DOM (dim classes + active bead).
   Does not touch the shared peek host. */
function dbClearHighlight(){
  if (dbPeek.root){
    dbPeek.root.classList.remove('db-hl');
    var lit = dbPeek.root.querySelectorAll('.db-bead-match, .db-bead-active');
    for (var i=0; i<lit.length; i++){
      lit[i].classList.remove('db-bead-match', 'db-bead-active');
    }
  }
}

/* Full teardown: hide the floating peek + drop our highlight. Idempotent.
   Reuses clearCageHighlight() when present (it calls hidePeek() and clears the
   SVG state harmlessly); falls back to hidePeek(). Then clears OUR classes. */
function dbClearPeek(){
  if (dbPeek.graceTimer){ clearTimeout(dbPeek.graceTimer); dbPeek.graceTimer = null; }
  try {
    if (typeof clearCageHighlight === 'function') clearCageHighlight();
    else if (typeof hidePeek === 'function') hidePeek();
  } catch(_){ /* never let teardown throw */ }
  dbClearHighlight();
  dbPeek.cageId = null;
  dbPeek.group  = '';
  dbPeek.pinned = false;
}

/* Show the peek for a bead + stamp the same-oysters highlight.
   pinned=true keeps it open until an explicit clear (keyboard/touch).
   hoverBridge=true lets the cursor travel onto the card (desktop hover only). */
function dbShowBeadPeek(root, bead, opts){
  opts = opts || {};
  if (!bead) return;
  var id    = bead.getAttribute('data-cage-id');
  var group = bead.getAttribute('data-batch-group') || '';
  if (!id) return;

  var cage = (typeof cageById === 'function') ? cageById(id) : null;
  if (!cage) return;                 // cage vanished (data changed) → bail cleanly

  // Cancel any pending grace clear; we're (re)activating.
  if (dbPeek.graceTimer){ clearTimeout(dbPeek.graceTimer); dbPeek.graceTimer = null; }

  // Re-stamp highlight: clear our old classes, then light the new cohort.
  dbClearHighlight();
  dbPeek.root   = root;
  dbPeek.cageId = id;
  dbPeek.group  = group;
  dbPeek.pinned = !!opts.pinned;

  root.classList.add('db-hl');
  bead.classList.add('db-bead-active');
  // Empty beads (group === '') get NO sibling highlight — only the active bead.
  if (group){
    var sel = '.db-bead[data-batch-group="' + dbCssAttrEscape(group) + '"]';
    var sibs = root.querySelectorAll(sel);
    for (var i=0; i<sibs.length; i++) sibs[i].classList.add('db-bead-match');
  }

  // The floating glance card — reuse the existing host + builder + positioner.
  if (typeof showPeek === 'function'){
    try { showPeek(cage, bead.getBoundingClientRect()); } catch(_){ /* host missing → highlight only */ }
    // Desktop hover: make the card a hover-bridge so the cursor can cross the
    // gap onto it (and its "Open ›" hint) without us tearing down. Touch /
    // keyboard pins leave it pointer-events:none (can't block a tap beneath).
    if (opts.hoverBridge && typeof oysterPeekHost === 'function'){
      var host = oysterPeekHost();
      if (host) host.classList.add('hoverbridge');
    }
  }
}

/* Escape a value for safe interpolation into a [data-batch-group="..."] CSS
   selector. batchGroupKey values are 'pull:<id>' / 'seed:<id>' (and a legacy
   '|'-joined hash for old seed cohorts) — escape quotes/backslashes/newlines
   defensively so querySelectorAll never throws on an odd id. */
function dbCssAttrEscape(v){
  return String(v).replace(/(["\\\n\r])/g, '\\$1');
}

/* Open the full cage sheet for a bead (Enter/Space, second touch tap). */
function dbOpenCageSheet(bead){
  if (!bead) return;
  var id = bead.getAttribute('data-cage-id');
  var cage = (id && typeof cageById === 'function') ? cageById(id) : null;
  if (!cage) return;
  // openSheet() already calls clearCageHighlight() internally, but it won't
  // touch OUR db-* classes — drop them ourselves first.
  dbClearPeek();
  if (typeof openSheet === 'function' && typeof buildCageDetail === 'function'){
    openSheet(function(){ return buildCageDetail(cage); });
  }
}

/* Arm the grace-period clear for a transient mouse hover (so moving the cursor
   onto the floating card keeps it open). A pin (keyboard/touch) is never armed. */
function dbArmPeekGrace(){
  if (dbPeek.graceTimer){ clearTimeout(dbPeek.graceTimer); dbPeek.graceTimer = null; }
  dbPeek.graceTimer = setTimeout(function(){
    dbPeek.graceTimer = null;
    if (dbPeek.pinned) return;     // a pin took over during the window → leave it
    dbClearPeek();
  }, DB_PEEK_GRACE);
}

/* ------------------------------------------------------------------
   wireDashboardPeek(root) — bind all delegated listeners ONCE per root.
   ------------------------------------------------------------------ */
function wireDashboardPeek(root){
  if (!root || root.dataset.dbPeekWired === '1') return;
  root.dataset.dbPeekWired = '1';

  /* --- DESKTOP HOVER (pointerType === 'mouse') ---------------------- */
  // Delegated pointerover/pointerout fire as the pointer crosses bead
  // boundaries (they bubble; pointerenter/leave do not), so one pair on the
  // root covers every bead and survives re-render.
  root.addEventListener('pointerover', function(e){
    if (e.pointerType && e.pointerType !== 'mouse') return;  // touch/pen handled elsewhere
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    if (dbPeek.pinned) return;                               // a pin owns the view; don't retarget
    dbShowBeadPeek(root, bead, { pinned:false, hoverBridge:true });
  });

  root.addEventListener('pointerout', function(e){
    if (e.pointerType && e.pointerType !== 'mouse') return;
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    if (dbPeek.pinned) return;
    // Moving to another bead inside the row: the related target is still a bead,
    // so pointerover will re-stamp immediately — but defer the clear regardless
    // so the cross-gap-to-card case (relatedTarget outside the dashboard) keeps
    // the card alive for the grace window.
    var to = e.relatedTarget;
    if (to && to.closest && to.closest('.db-bead[data-cage-id]') && root.contains(to)) return;
    dbArmPeekGrace();
  });

  /* --- KEYBOARD FOCUS (:focus-visible) ----------------------------- */
  // focusin/focusout bubble; focus/blur do not. Pin on focus, clear on blur.
  root.addEventListener('focusin', function(e){
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    dbShowBeadPeek(root, bead, { pinned:true, hoverBridge:false });
  });
  root.addEventListener('focusout', function(e){
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    // Only clear if focus is genuinely leaving this bead (not just a child).
    var to = e.relatedTarget;
    if (to && bead.contains(to)) return;
    dbClearPeek();
  });

  // Enter / Space on a focused bead → open the full cage sheet.
  root.addEventListener('keydown', function(e){
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar'){
      e.preventDefault();           // Space must not scroll the page
      dbOpenCageSheet(bead);
    } else if (e.key === 'Escape'){
      dbClearPeek();
    }
  });

  /* --- TOUCH TAP --------------------------------------------------- */
  // First tap: pin peek + highlight. Second tap on the SAME bead within the
  // window: open the full sheet. A tap on a different bead re-pins.
  root.addEventListener('pointerup', function(e){
    if (e.pointerType !== 'touch') return;           // mouse/keyboard own their paths
    var bead = dbBeadFromEvent(root, e);
    if (!bead) return;
    var id  = bead.getAttribute('data-cage-id');
    var now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
    var isSecond = (dbPeek.lastTapId === id) && (now - dbPeek.lastTapAt < DB_TAP_WINDOW);
    if (isSecond){
      dbPeek.lastTapId = null; dbPeek.lastTapAt = 0;
      dbOpenCageSheet(bead);                          // tears down peek, opens sheet
      return;
    }
    dbPeek.lastTapId = id; dbPeek.lastTapAt = now;
    dbShowBeadPeek(root, bead, { pinned:true, hoverBridge:false });
  });

  // A touch tap on EMPTY dashboard space (not a bead) dismisses a pinned peek.
  root.addEventListener('pointerdown', function(e){
    if (e.pointerType !== 'touch') return;
    if (!dbPeek.pinned) return;
    if (dbBeadFromEvent(root, e)) return;             // tapping a bead is handled on pointerup
    dbPeek.lastTapId = null; dbPeek.lastTapAt = 0;
    dbClearPeek();
  });

  /* --- HOVER-BRIDGE KEEPALIVE on the shared #oysterPeek host -------- */
  // Bind ONCE globally: when the cursor reaches the floating card, cancel the
  // pending grace clear; when it leaves the card, re-arm it. Capture phase so a
  // pointer-events:auto .opeek-card child still notifies us. (The SVG overview
  // bound the same keepalive; it is being retired, so we own it now. Guarded by
  // dbPeek.hostWired so re-wiring the dashboard doesn't double-bind.) ------- */
  if (!dbPeek.hostWired && typeof oysterPeekHost === 'function'){
    var host = oysterPeekHost();
    if (host){
      dbPeek.hostWired = true;
      host.addEventListener('pointerenter', function(){
        if (!dbPeek.pinned && dbPeek.graceTimer){
          clearTimeout(dbPeek.graceTimer); dbPeek.graceTimer = null;
        }
      }, true);
      host.addEventListener('pointermove', function(){
        if (!dbPeek.pinned && dbPeek.graceTimer){
          clearTimeout(dbPeek.graceTimer); dbPeek.graceTimer = null;
        }
      }, true);
      host.addEventListener('pointerleave', function(){
        if (!dbPeek.pinned) dbArmPeekGrace();
      }, true);
    }
  }
}

// buildLayoutEditor(farm, mode) — the whole-farm SVG canvas page (its own topbar; owns #app).
//   mode 'edit' (default) → the full layout EDITOR: handles, add-plot/area, select/move/resize/rotate.
//   mode 'view'           → the read-only OVERVIEW home: pan/zoom + tap-an-area-to-drill ONLY. The
//                           canvas/transform/draw core (LAYOUT.view, toScreen/toWorld, drawPlot/drawArea,
//                           the pointer pan/pinch logic) is SHARED; view mode just suppresses editing
//                           affordances via layoutIsView(). (Component 2)
function buildLayoutEditor(farm, mode){
  LAYOUT.mode = (mode === 'view') ? 'view' : 'edit';
  var isView = layoutIsView();
  // reset gesture state for a fresh mount (no leaked captures across render())
  LAYOUT.ptrs = new Map();
  LAYOUT.pinch = null; LAYOUT.pan = null; LAYOUT.lastTier = null;
  LAYOUT.edit = null; LAYOUT.guides = null;
  LAYOUT.lastTap = 0; LAYOUT.lastTapXY = null;
  LAYOUT.lastTapCageId = null; LAYOUT.lastTapCageXY = null;
  if (isView) LAYOUT.sel = null;          // an overview is never in a "selected shape" state

  var page = h('div', { class:'layoutPage' });

  if (isView){
    // ── OVERVIEW topbar: segmented [Overview | Work] toggle (left) · farm name · menu (right) ──
    // The toggle is the escape hatch to the WHOLE-FARM daily work list, preserving the old home.
    var seg = h('div', { class:'ovSeg', role:'tablist', 'aria-label':'Map mode' },
      h('button', { class:'ovSegBtn active', role:'tab', 'aria-selected':'true' }, 'Overview'),
      h('button', { class:'ovSegBtn', role:'tab', 'aria-selected':'false',
        onclick:function(){ toggleOverviewWork('work'); } },
        'Work'));
    var ovTitle = h('div', { class:'lp-title ovTitle' }, farm.name);
    var menuBtn = h('button', { class:'menuBtn', 'aria-label':'Menu', html:icon('menu', 24),
      onclick:function(){ openSheet(buildMenu); } });
    page.appendChild(h('div', { class:'topbar layoutTop ovTop' }, seg, ovTitle, menuBtn));
    // BIT C conditions strip (NOAA/USGS water·tide·weather) — re-homed onto the map home (owner ask).
    // Empty host; render()'s renderConditionsBar() fills it (no-op safe when absent / in the editor).
    page.appendChild(h('div', { id:'conditionsBar', class:'condbar' }));
    // DASHBOARD: money + readiness HUD — UNSCOPED whole-farm overview ONLY (the scoped Work list keeps
    // its plain renderStatStrip). Sits above the canvas in normal flow; reads farmDashboard (pure).
    if (!viewScope) page.appendChild(renderDashboardCard(farm));
  } else {
    // ── EDITOR topbar: ‹ Map · farm name · gear ──
    var back = h('button', { class:'menuBtn', 'aria-label':'Back to map',
      onclick:function(){ leaveLayoutView(); } },   // pop the {view:'layout'} entry → popstate restores parent (Bug B1)
      h('span', { class:'lp-back' }, h('span', { html:icon('back', 22) }), 'Map'));
    var title = h('div', { class:'lp-title' }, farm.name);
    var gear = h('button', { class:'menuBtn', 'aria-label':'Farm settings', html:icon('gear', 24),
      onclick:function(){ openSheet(buildFarmSettingsSheet); } });
    page.appendChild(h('div', { class:'topbar layoutTop' }, back, title, gear));
  }

  // ── the SVG canvas (touch-action:none ONLY here) ──
  var svg = s('svg', { class:'layoutSvg', xmlns:SVGNS, width:'100%', height:'100%',
    preserveAspectRatio:'xMidYMid slice' });
  var world = s('g', { id:'layoutWorld' });
  svg.appendChild(world);
  LAYOUT.svg = svg; LAYOUT.world = world;

  // compass rose — a fixed N-up overlay (NOT in the panning world group) so the NS/EW orientation
  // vocabulary has a spatial anchor. Corner-placed, low-opacity, pointer-events:none → never obstructs
  // shapes or hit-testing. (LAYOUT §5 "Canvas background"/"Snap guides") (Item 3)
  var compass = h('div', { class:'lp-compass', 'aria-hidden':'true', html:COMPASS_SVG });
  var canvasWrap = h('div', { class:'layoutCanvas' }, svg, compass);
  // WP9 #4: breadcrumb pill, floated TOP-CENTER over the canvas, shows the current scope (e.g.
  // "Brightside › North Plot" zoomed into a plot, just "Brightside" at the all-plots zoom). It is the
  // PRIMARY zoom-out affordance: tapping it zooms out one step to all-plots (fitToContent). The text is
  // re-derived on every pan/zoom (cheap, text-only — see updateBreadcrumb, hooked off scheduleApplyView).
  // View mode only (the editor keeps its ‹ Map back chip). The Overview/Work segmented toggle stays too.
  if (isView){
    var crumb = h('button', { class:'lp-crumb', id:'lpCrumb', type:'button', 'aria-label':'Zoom out one level',
      // Step OUT one level (mirrors the progressive tap-to-zoom IN): area framing → zoom to its plot;
      // plot framing → zoom to all plots. Animated (zoomToShape), camera-only — no history entry.
      onclick:function(){
        var f = getFarm(); if (!f) return;
        LAYOUT.sel = null;
        if (isScopedIntoArea(f)){
          var sp = currentScopePlot(f);
          if (sp){ zoomToShape(f, sp); return; }
        }
        zoomToShape(f);                                    // → all plots
      } });
    canvasWrap.appendChild(crumb);
    // WP9 #5: first-run "drag to the next plot →" coachmark (reuses the .lp-zoomhint pill look). Hidden
    // by default; updateNeighborCoach shows it once when zoomed into a plot that has a neighbor; the
    // first pan dismisses it permanently (localStorage). Bottom-center so it never fights the breadcrumb.
    var coach = h('div', { class:'lp-coach', id:'lpCoach', 'aria-hidden':'true', hidden:true },
      h('span', null, 'drag to the next plot '),
      h('span', { class:'lp-coach-arrow', 'aria-hidden':'true' }, '→'));
    canvasWrap.appendChild(coach);
  }
  // Zoom-in hint (Bug B5): on a LARGE farm (> CELL_MAX cages) the per-cage cells are suppressed at the
  // zoomed-out farm/plot tiers for perf, leaving bare bars with no cue. This unobtrusive banner makes the
  // gate discoverable; layoutRedraw shows/hides it via updateZoomHint. View-mode only (cells are view-only);
  // small farms (cells everywhere) never see it. textContent only. (Bug B5)
  if (isView){
    var zoomHint = h('div', { class:'lp-zoomhint', id:'lpZoomHint', 'aria-hidden':'true', hidden:true },
      h('span', { class:'lp-zoomhint-ico', 'aria-hidden':'true', html:icon('plus', 16) }),
      h('span', null, 'Zoom in to see individual cages'));
    canvasWrap.appendChild(zoomHint);
  }
  page.appendChild(canvasWrap);

  // ── persistent bottom controls ──
  var zoomCluster = h('div', { class:'lp-zoom' },
    h('button', { class:'lp-zbtn', 'aria-label':'Zoom in', html:icon('plus', 22), onclick:function(){ zoomBy(1.3); } }),
    h('button', { class:'lp-zbtn', 'aria-label':'Zoom out', html:'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>', onclick:function(){ zoomBy(1/1.3); } }),
    h('button', { class:'lp-zbtn', 'aria-label':'Fit all', html:'<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>',
      onclick:function(){ LAYOUT.sel = null; fitToContent(getFarm()); } }));
  page.appendChild(zoomCluster);

  // editing affordances are EDIT-only: add-plot button + the selection-driven action bar mount.
  if (!isView){
    var addPlot = h('button', { class:'lp-addplot', onclick:function(){
      if (layoutHasEditing()){ addPlotToFarm(); }
      else { toast('Add-plot lands in the next build'); }
    } }, h('span', { html:icon('plus', 20) }), 'Add plot');
    page.appendChild(addPlot);

    // action bar mount (selection-driven; populated by layoutRedraw)
    page.appendChild(h('div', { class:'lp-actionbar', id:'lpActionBar' }));
  }

  wireLayoutPointers(svg);

  // first paint → measure → fit-all ONLY on first entry; commit-triggered re-mounts PRESERVE the
  // user's live pan/zoom so a move/grow/rename never snaps the camera back to fit-all (LAYOUT §3 +
  // UX nit). Run in rAF after svgRect is real. Exit to work mode clears LAYOUT.entered (see back btn).
  requestAnimationFrame(function(){
    refreshSvgRect();
    if (LAYOUT.entered && LAYOUT.savedView){
      LAYOUT.view = { k:LAYOUT.savedView.k, tx:LAYOUT.savedView.tx, ty:LAYOUT.savedView.ty };
      applyView();
    } else {
      fitToContent(farm);
      LAYOUT.entered = true;
    }
    LAYOUT.lastTier = layoutTier();
    layoutRedraw();
  });

  return page;
}

// layoutRedraw() — rebuild the SVG scene + the selection action bar. Called on mount, LOD-cross,
// and selection change. Read-only: draws existing geometry only (no .cage cells ever). (LAYOUT §4)
function layoutRedraw(){
  var farm = getFarm();
  var world = LAYOUT.world;
  if (!farm || !world) return;
  LAYOUT.redrawSeq++;                                    // Component 3: invalidate the per-redraw cage-count cache
  LAYOUT.cellCount = 0;                                  // Component 4: re-counted by drawCageCells this pass
  LAYOUT._redrawing = true;                              // Component 4: suppress focusout-clear while cells are torn down
  try {                                                  // L2: reset the flag even if a draw call throws
    while (world.firstChild) world.removeChild(world.firstChild);
    var tier = layoutTier();
    (farm.plots || []).forEach(function(p){ world.appendChild(drawPlot(farm, p, tier)); });
    applyView();
    renderLayoutActionBar(farm);
    renderEmptyFarmState(farm);
    // selection badge (Item 4) — keep the guide layer on top of the freshly-rebuilt scene; show the
    // selected shape's substance. During a live drag editApply re-draws guides/chip after this.
    if (LAYOUT.sel && !LAYOUT.edit){ clearGuides(); ensureGuideLayer(); drawSelBadge(farm); }
  } finally {
    // Component 4: cells were rebuilt — a PINNED highlight (touch/keyboard) must survive pan/zoom
    // redraws, so re-stamp .hl-active + .lp-cell-match onto the new cells. Transient mouse hover is
    // re-evaluated on the next pointermove, so it self-heals and is dropped here.
    LAYOUT._redrawing = false;
  }
  reapplyCageHighlight();
  updateZoomHint(farm, tier);                            // Bug B5: surface the "zoom in" cue when cells are capped
  updateBreadcrumb();                                    // WP9: keep the scope pill current across tier-change redraws
  updateNeighborCoach(farm);                             // WP9: show/hide the first-run "drag to the next plot" coachmark
}

// updateZoomHint(farm, tier) — show the "Zoom in to see individual cages" banner ONLY when cells are
// suppressed by the perf cap: a LARGE farm (> CELL_MAX) at a tier other than 'area'. Hidden for small
// farms (cells draw everywhere now) and once zoomed to 'area' tier where the cells appear. (Bug B5)
function updateZoomHint(farm, tier){
  var el = document.getElementById('lpZoomHint');
  if (!el) return;
  var show = layoutIsView() && !farmIsSmall(farm) && tier !== 'area';
  el.hidden = !show;
}

// currentScopePlot(farm) — WP9: which plot the camera is "in" right now = the plot whose axis-aligned
// box best contains the VIEWPORT CENTER in world coords (toWorld on the screen center). Returns the plot
// object, or null when the center is over open water. Cheap: one toWorld + a linear scan of plots. NOTE:
// this is SCOPE (which plot is centered), independent of the k-tier — because a whole-plot fit for this
// 880-wide geometry settles in the farm k-band (k≈0.37 < LOD_PLOT), the tier alone can't tell "one plot"
// from "all plots." isScopedIntoPlot() adds the on-screen-coverage test that distinguishes them.
function currentScopePlot(farm){
  if (!farm || !farm.plots || !farm.plots.length) return null;
  refreshSvgRect();
  var r = LAYOUT.svgRect; if (!r || !r.width) return null;
  var wc = toWorld(r.width/2, r.height/2);                 // viewport center in world space
  var best = null, bestD = Infinity;
  farm.plots.forEach(function(p){
    if (wc.x >= p.x && wc.x <= p.x+p.w && wc.y >= p.y && wc.y <= p.y+p.h){
      // inside this plot's box → pick the one whose center is nearest (handles any overlap)
      var dx = wc.x - (p.x+p.w/2), dy = wc.y - (p.y+p.h/2), d = dx*dx + dy*dy;
      if (d < bestD){ bestD = d; best = p; }
    }
  });
  return best;
}

// isScopedIntoPlot(farm) — WP9: true when the user has pinch-zoomed in so ONE plot fills most of the
// viewport, false at the all-plots overview. The signal is on-screen COVERAGE, not the k-tier: a plot the
// user has zoomed into occupies most of the viewport width, while at the all-plots fit the centered card is
// a smaller fraction. The 0.62 cut sits between those two so a zoomed-in plot reads as scoped and the
// all-plots view does not. Drives the breadcrumb. Returns the plot, or null when unscoped.
function isScopedIntoPlot(farm){
  var p = currentScopePlot(farm);                           // already ran refreshSvgRect()
  if (!p) return null;
  var r = LAYOUT.svgRect; if (!r || !r.width) return null;  // reuse the rect — no 2nd getBoundingClientRect per frame (perf)
  var onScreenW = p.w * LAYOUT.view.k;                     // the centered plot's width in screen px
  return (onScreenW >= r.width * 0.62) ? p : null;
}

// currentScopeArea(farm) — the AREA the camera is "in": within the scoped plot, the area whose world box
// (rotation-aware) best contains the viewport center. Returns { area, box } or null. Used by the
// progressive tap-to-zoom + the 3-level breadcrumb. Mirrors currentScopePlot at one level deeper.
function currentScopeArea(farm){
  var p = currentScopePlot(farm); if (!p) return null;     // already ran refreshSvgRect()
  var r = LAYOUT.svgRect; if (!r || !r.width) return null;
  var wc = toWorld(r.width/2, r.height/2);
  var best = null, bestD = Infinity;
  (p.areas || []).forEach(function(a){
    var b = areaWorldBox(a);
    if (wc.x >= b.x && wc.x <= b.x+b.w && wc.y >= b.y && wc.y <= b.y+b.h){
      var dx = wc.x - (b.x+b.w/2), dy = wc.y - (b.y+b.h/2), d = dx*dx + dy*dy;
      if (d < bestD){ bestD = d; best = { area:a, box:b }; }
    }
  });
  return best;
}

// isScopedIntoArea(farm) — true (returns the area) when the camera is zoomed in to frame ONE area: the
// level where cage peek + drill-to-work take over from the progressive zoom. Measured by ZOOM LEVEL, not
// on-screen width: "scoped in" = the current k has reached ≥85% of this area's own fit-zoom. This is
// aspect-ratio robust (a tall/narrow area's fitted on-screen WIDTH can stay small, which a width test
// would never register → a tap would re-zoom forever instead of drilling). At plot framing the camera k
// is well below an area's fit-k, so this stays false until a tap zooms to the area. A single-area plot
// (area ≈ plot) reads as scoped as soon as the plot is framed — correct: there's no deeper level to step
// through, so the next tap drills.
function isScopedIntoArea(farm){
  var sa = currentScopeArea(farm); if (!sa) return null;
  var v = fitViewFor(farm, sa.box); if (!v) return null;
  return (LAYOUT.view.k >= v.k * 0.85) ? sa.area : null;
}

// updateBreadcrumb() — WP9 #4: refresh the top-center breadcrumb pill text from the current scope. At the
// all-plots zoom (tier 'farm', or the center over open water) it shows just the farm name; zoomed into a
// plot it shows "Farm › Plot". Text-only DOM write (no scene rebuild) so it is cheap to call every frame
// from scheduleApplyView's rAF. Null-guarded (the pill only exists in view mode). The pill is the primary
// zoom-out affordance; we hide it at the all-plots zoom where there is nothing to zoom out TO.
function updateBreadcrumb(){
  var el = document.getElementById('lpCrumb');
  if (!el) return;
  var farm = getFarm(); if (!farm){ el.hidden = true; return; }
  var scope = isScopedIntoPlot(farm);                      // by on-screen coverage, not the k-tier
  if (!scope){
    // all-plots scope: nothing to zoom out to → hide the pill (the Fit-all button / pinch cover it).
    el.hidden = true;
    el.textContent = farm.name || 'Farm';
    return;
  }
  el.hidden = false;
  // Build "Farm › Plot[ › Area]": ancestors muted, the current (deepest) level bright. textContent on
  // spans → XSS-safe. The pill is the step-OUT affordance (onclick zooms out one level); the trail just
  // shows where you are. When zoomed into an area, the plot becomes a muted ancestor and the area is bright.
  while (el.firstChild) el.removeChild(el.firstChild);
  var area = isScopedIntoArea(farm);                       // deepest level, or null when only plot-scoped
  var root = farm.name || 'Farm';
  var plotName = scope.name || 'Plot';
  el.appendChild(h('span', { class:'lp-crumb-root' }, root));
  // dedupe: when the plot is named the same as the farm (e.g. the Brightside seed), don't repeat it (UX #12)
  if (plotName !== root){
    el.appendChild(h('span', { class:'lp-crumb-sep', 'aria-hidden':'true' }, ' › '));
    el.appendChild(h('span', { class: area ? 'lp-crumb-root' : 'lp-crumb-here' }, plotName));
  }
  if (area){
    el.appendChild(h('span', { class:'lp-crumb-sep', 'aria-hidden':'true' }, ' › '));
    el.appendChild(h('span', { class:'lp-crumb-here' }, area.name || 'Area'));
  }
}

// COACHMARK_KEY — localStorage flag: the "drag to the next plot →" first-run coachmark shows ONCE.
var COACHMARK_KEY = 'spatmap.v2.neighborCoach';
// updateNeighborCoach(farm) — WP9 #5: the first time the user is zoomed INTO a plot that HAS a neighbor,
// reuse the .lp-zoomhint pill pattern to show "drag to the next plot →". Dismissed on the first pan (see
// wireLayoutPointers) and gated by a localStorage flag so it only ever appears once. Subtle, non-blocking
// (pointer-events:none). No-op once the flag is set, when not scoped into a plot, or with no neighbor.
function updateNeighborCoach(farm){
  var el = document.getElementById('lpCoach');
  if (!el) return;
  var seen = false;
  try { seen = localStorage.getItem(COACHMARK_KEY) === '1'; } catch (e) {}
  if (seen || !layoutIsView()){ el.hidden = true; return; }
  var scope = isScopedIntoPlot(farm);                      // zoomed into one plot (by on-screen coverage)
  var hasNeighbor = scope && farm.plots && farm.plots.length > 1;
  el.hidden = !hasNeighbor;
}
// dismissNeighborCoach() — hide + permanently flag the coachmark (called on the first real pan).
function dismissNeighborCoach(){
  var el = document.getElementById('lpCoach');
  if (el && !el.hidden){
    el.hidden = true;
    try { localStorage.setItem(COACHMARK_KEY, '1'); } catch (e) {}
  }
}

// renderEmptyFarmState(farm) — Item 2a: a farm/canvas with NO plots → a centered "No plots yet" CTA
// overlay with a prominent "+ Add plot" call to action. NOTE: currently UNREACHABLE through the UI —
// ensureSpatialIndex guarantees ≥1 plot and removePlotFromFarm blocks removing the last plot. The
// rendering is wired for the genuinely-empty case (e.g. a future "clear all plots" path) and is a
// harmless no-op while a plot exists. (LAYOUT §5 "Empty states · No plots")
function renderEmptyFarmState(farm){
  var wrap = LAYOUT.svg && LAYOUT.svg.parentNode;            // the .layoutCanvas
  if (!wrap) return;
  var existing = wrap.querySelector('.lp-emptyfarm');
  var empty = !farm || !(farm.plots && farm.plots.length);
  if (!empty){ if (existing) existing.parentNode.removeChild(existing); return; }
  if (existing) return;                                      // already shown
  var box = h('div', { class:'lp-emptyfarm' },
    h('div', { class:'lp-ef-art', html:COMPASS_SVG }),
    h('div', { class:'lp-ef-title' }, 'No plots yet'),
    h('div', { class:'lp-ef-sub' }, 'A plot is one lease or patch of water. Add your first to start laying out lines.'),
    h('button', { class:'btn btn-primary lp-ef-btn', onclick:function(){
      if (layoutHasEditing()){ addPlotToFarm(); } else { toast('Add-plot lands in the next build'); }
    } }, '+ Add plot'));
  wrap.appendChild(box);
}

/* ── STRUCTURE-EDIT GEOMETRY (LAYOUT §3/§4) — pure, zoom-independent, world-space math.
      Used by both the live gesture handlers and the unit harness. All angles in DEGREES. ── */
var EDIT_MIN_W = 40, EDIT_MIN_H = 36;          // min area/plot size (world units)
var HANDLE_HIT = 22;                            // hit radius (world units scaled by k → ≥44px target)
var ROT_KNOB_GAP = 30;                          // rotate knob distance above top edge (world units)
var SNAP_TOL_SCREEN = 7;                        // edge/center snap tolerance (screen px → /k world)
var GRID_STEP = 50;                             // coarse world grid snap step
var ROT_SNAP_DEG = 15, ROT_SNAP_TOL = 6;        // rotate increments + tolerance (degrees)

function deg2rad(d){ return d * Math.PI / 180; }
// rotPt(px,py, cx,cy, deg) — rotate point (px,py) about center (cx,cy) by deg.
function rotPt(px, py, cx, cy, deg){
  var a = deg2rad(deg), co = Math.cos(a), si = Math.sin(a);
  var dx = px - cx, dy = py - cy;
  return { x:cx + dx*co - dy*si, y:cy + dx*si + dy*co };
}
// areaCenter(area) — rect center in world coords.
function areaCenter(area){ return { x:area.x + area.w/2, y:area.y + area.h/2 }; }
// areaCorners(area) — the 4 world-space corners (rotation applied), keyed nw/ne/se/sw.
function areaCorners(area){
  var c = areaCenter(area), rot = area.rot || 0;
  return {
    nw: rotPt(area.x,          area.y,          c.x, c.y, rot),
    ne: rotPt(area.x+area.w,   area.y,          c.x, c.y, rot),
    se: rotPt(area.x+area.w,   area.y+area.h,   c.x, c.y, rot),
    sw: rotPt(area.x,          area.y+area.h,   c.x, c.y, rot)
  };
}
// handleAnchorMap — for a dragged handle, which corner/edge stays fixed (the anchor).
var HANDLE_OPPOSITE = { nw:'se', ne:'sw', se:'nw', sw:'ne', n:'s', s:'n', e:'w', w:'e' };

// resizeAreaLocal(start, handle, ptWorld) — rotated-aware resize. Converts the pointer into the
// rect's LOCAL (un-rotated) frame about the ORIGINAL center, pins the opposite corner/edge as the
// fixed anchor, recomputes w/h + a new center, maps the center back to world, returns {x,y,w,h}.
// `start` = the original area rect {x,y,w,h,rot}. The rect must NOT walk when rotated.
function resizeAreaLocal(start, handle, ptWorld){
  var rot = start.rot || 0;
  var c0 = { x:start.x + start.w/2, y:start.y + start.h/2 };   // original center (rotation pivot)
  // local frame: un-rotate about the ORIGINAL center → axis-aligned coords
  var loc = rotPt(ptWorld.x, ptWorld.y, c0.x, c0.y, -rot);
  // local corner positions (un-rotated rect is axis-aligned about c0)
  var L = c0.x - start.w/2, R = c0.x + start.w/2, T = c0.y - start.h/2, B = c0.y + start.h/2;
  var newL = L, newR = R, newT = T, newB = B;
  // move the dragged edge(s) to the pointer's local position; opposite edge is the anchor
  if (handle.indexOf('w') >= 0) newL = loc.x;
  if (handle.indexOf('e') >= 0) newR = loc.x;
  if (handle.indexOf('n') >= 0) newT = loc.y;
  if (handle.indexOf('s') >= 0) newB = loc.y;
  // enforce min size while keeping the ANCHOR edge fixed
  if (handle.indexOf('w') >= 0 && (newR - newL) < EDIT_MIN_W) newL = newR - EDIT_MIN_W;
  if (handle.indexOf('e') >= 0 && (newR - newL) < EDIT_MIN_W) newR = newL + EDIT_MIN_W;
  if (handle.indexOf('n') >= 0 && (newB - newT) < EDIT_MIN_H) newT = newB - EDIT_MIN_H;
  if (handle.indexOf('s') >= 0 && (newB - newT) < EDIT_MIN_H) newB = newT + EDIT_MIN_H;
  var nw = newR - newL, nh = newB - newT;
  // new local center, then map back to world about the ORIGINAL center (so the anchor stays put)
  var lc = { x:(newL + newR)/2, y:(newT + newB)/2 };
  var wc = rotPt(lc.x, lc.y, c0.x, c0.y, rot);                 // new center in world space
  return { x:wc.x - nw/2, y:wc.y - nh/2, w:nw, h:nh };
}

// rotateSnap(deg) — wrap to [0,360), snap to the nearest 15° within tolerance (covers orthogonal).
function rotateSnap(deg){
  var d = ((deg % 360) + 360) % 360;
  var near = Math.round(d / ROT_SNAP_DEG) * ROT_SNAP_DEG;
  if (Math.abs(d - near) <= ROT_SNAP_TOL) d = near % 360;
  return d;
}
// snapVal(v, candidates, tolWorld) — snap scalar v to the closest candidate within tolWorld; else v.
function snapVal(v, candidates, tolWorld){
  var best = null, bestD = tolWorld;
  for (var i=0; i<candidates.length; i++){
    var d = Math.abs(v - candidates[i]);
    if (d <= bestD){ bestD = d; best = candidates[i]; }
  }
  return best == null ? v : best;
}

// drawHandles(parentG, kind, shape) — selection handles for a plot (axis-aligned) or area (rotated).
// 4 corner + 4 edge resize handles, and (areas only) a rotate knob above the top edge. Each handle
// carries data-handle + owning kind/id so the pointer router can hit-test it FIRST. Visible dot ~12px
// + a transparent ≥44px-target hit circle. For areas these are drawn INSIDE the area's rotate() <g>,
// so they ride the rotation; the router reads geometry from the model, not the DOM. (LAYOUT §3/§4)
function drawHandles(parentG, kind, shape){
  var hr = HANDLE_HIT / Math.max(0.0001, LAYOUT.view.k);       // hit radius in world units (≥~44px)
  var dot = 7 / Math.max(0.0001, LAYOUT.view.k);               // visible dot radius (~14px diameter)
  var x = shape.x, y = shape.y, w = shape.w, hgt = shape.h;
  var pts = {
    nw:{ x:x,        y:y },        n:{ x:x+w/2, y:y },        ne:{ x:x+w,   y:y },
    w: { x:x,        y:y+hgt/2 },                              e: { x:x+w,   y:y+hgt/2 },
    sw:{ x:x,        y:y+hgt },    s:{ x:x+w/2, y:y+hgt },    se:{ x:x+w,   y:y+hgt }
  };
  var id = (kind === 'area') ? shape.id : shape.id;
  var ownerAttr = (kind === 'area') ? { 'data-h-kind':'area', 'data-h-area':shape.id } : { 'data-h-kind':'plot', 'data-h-plot':shape.id };
  function mkHandle(name, cx, cy, edge){
    var g = s('g', { class:'lp-handle' });
    // transparent oversized hit target
    var hit = s('circle', { cx:cx, cy:cy, r:hr, fill:'transparent', 'data-handle':name });
    for (var k in ownerAttr) hit.setAttribute(k, ownerAttr[k]);
    g.appendChild(hit);
    if (edge){
      g.appendChild(s('rect', { x:cx-dot, y:cy-dot*0.5, width:dot*2, height:dot, rx:dot*0.5, ry:dot*0.5,
        fill:'#FFFFFF', stroke:'#0E7C8B', 'stroke-width':1.5/LAYOUT.view.k, 'pointer-events':'none' }));
    } else {
      g.appendChild(s('circle', { cx:cx, cy:cy, r:dot, fill:'#FFFFFF', stroke:'#0E7C8B',
        'stroke-width':1.8/LAYOUT.view.k, 'pointer-events':'none' }));
    }
    return g;
  }
  ['nw','ne','se','sw'].forEach(function(nm){ parentG.appendChild(mkHandle(nm, pts[nm].x, pts[nm].y, false)); });
  ['n','e','s','w'].forEach(function(nm){ parentG.appendChild(mkHandle(nm, pts[nm].x, pts[nm].y, true)); });

  if (kind === 'area'){
    // rotate knob: above the top edge in the rect's LOCAL frame (rides the area's rotate() <g>)
    var kx = x + w/2, ky = y - ROT_KNOB_GAP / Math.max(0.4, LAYOUT.view.k);
    parentG.appendChild(s('line', { x1:x+w/2, y1:y, x2:kx, y2:ky, stroke:'#9DB3B6',
      'stroke-width':1/LAYOUT.view.k, 'pointer-events':'none' }));
    var rg = s('g', { class:'lp-handle lp-rot' });
    var rhit = s('circle', { cx:kx, cy:ky, r:hr, fill:'transparent', 'data-handle':'rot' });
    for (var k2 in ownerAttr) rhit.setAttribute(k2, ownerAttr[k2]);
    rg.appendChild(rhit);
    rg.appendChild(s('circle', { cx:kx, cy:ky, r:dot, fill:'#FFFFFF', stroke:'#0E7C8B',
      'stroke-width':1.8/LAYOUT.view.k, 'pointer-events':'none' }));
    // small rotate glyph
    rg.appendChild(s('path', { d:'M '+(kx-dot*0.45)+' '+(ky-dot*0.1)+' a '+(dot*0.45)+' '+(dot*0.45)+' 0 1 1 '+(dot*0.4)+' '+(dot*0.55),
      fill:'none', stroke:'#0E7C8B', 'stroke-width':1.4/LAYOUT.view.k, 'stroke-linecap':'round', 'pointer-events':'none' }));
    parentG.appendChild(rg);
  }
}

// drawPlot — a plot card (rounded rect + corner label tab + status roll-up) holding its areas.
function drawPlot(farm, plot, tier){
  var g = s('g', { 'data-plot-id':plot.id });
  var selected = LAYOUT.sel && LAYOUT.sel.kind === 'plot' && LAYOUT.sel.plotId === plot.id;
  // Bug B9: a ROTATED area's grid can swing past the plot's axis-aligned w/h and clip at the card edge /
  // status bar. Grow the card to contain each area's ROTATED bounding box (rotate its 4 corners about its
