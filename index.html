// triggerImport — hidden file input + scary confirm; strips photos before localStorage; reloads state.
function triggerImport(){
  var input = h('input', { type:'file', accept:'application/json,.json', style:{display:'none'} });
  input.addEventListener('change', function(){
    var file = input.files && input.files[0];
    if (!file){ document.body.removeChild(input); return; }
    var reader = new FileReader();
    reader.onload = function(){
      var data;
      try { data = JSON.parse(reader.result); } catch (e){ toast('That file is not valid JSON'); cleanup(); return; }
      if (!data || typeof data !== 'object' || !Array.isArray(data.farms)){ toast('That file is not a SpatMap backup'); cleanup(); return; }
      if (!window.confirm('Import REPLACES all current data on this device. This cannot be undone. Continue?')){ cleanup(); return; }
      var photos = Array.isArray(data.photos) ? data.photos : null;   // hold photos aside
      delete data.photos;                                             // CRITICAL: never to localStorage
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e){ toast('Could not save imported data — too large?'); cleanup(); return; }
      state = loadState();
      closeSheet();
      commit();
      if (photos && photos.length && typeof restoreImportedPhotos === 'function'){
        restoreImportedPhotos(photos);   // Builder 3 restores blobs + sweeps
      } else {
        toast('Backup imported');
      }
      cleanup();
    };
    reader.onerror = function(){ toast('Could not read that file'); cleanup(); };
    reader.readAsText(file);
    function cleanup(){ if (input.parentNode) document.body.removeChild(input); }
  });
  document.body.appendChild(input);
  input.click();
}

/* ═══════════════════════════════════════════════════════════════════
   STUBS — Builder 2 (selection/popup/actions/detail/projection) and
   Builder 3 (IndexedDB photos) implement these. Defined here so every
   call resolves; safe no-ops until replaced.
   ═══════════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════════
   BUILDER 2 — selection · popup · action flows · cage detail · growth
   ═══════════════════════════════════════════════════════════════════ */

/* ── selection store + clear (clearSelection/removeDragBands/hidePopup
      are foundation helpers other code calls; keep them exact) ──────── */
var selCages = {};                                   // selection store, keyed by cage id
function clearSelection(){
  selCages = {};
  hidePopup();
  // de-select any rendered cells without a full re-render
  var sel = document.querySelectorAll('.cage.sel');
  for (var i=0; i<sel.length; i++) sel[i].classList.remove('sel');
  removeDragBands();
}
function removeDragBands(){ var b = document.querySelectorAll('.dragBand'); for (var i=0;i<b.length;i++) b[i].parentNode && b[i].parentNode.removeChild(b[i]); }
function hidePopup(){ var m = document.getElementById('popupMount'); if (m) m.innerHTML = ''; }

/* ── cage / line lookup helpers (no foundation equivalent) ─────────── */
function cageById(id){
  var farm = getFarm(); if (!farm) return null;
  for (var i=0; i<farm.lines.length; i++){
    var cs = farm.lines[i].cages;
    for (var j=0; j<cs.length; j++) if (cs[j].id === id) return cs[j];
  }
  return null;
}
function lineOfCage(id){
  var farm = getFarm(); if (!farm) return null;
  for (var i=0; i<farm.lines.length; i++){
    var cs = farm.lines[i].cages;
    for (var j=0; j<cs.length; j++) if (cs[j].id === id) return farm.lines[i];
  }
  return null;
}
// selectedCages() — resolve selCages keys to live cage objects (skips any gone after re-render)
function selectedCages(){
  var out = [];
  for (var id in selCages){ if (selCages[id]){ var c = cageById(id); if (c) out.push(c); } }
  return out;
}
function selectedIds(){ var a = []; for (var id in selCages){ if (selCages[id]) a.push(id); } return a; }

/* ── toggle one cage's selection (used by tap + drag) ──────────────── */
function toggleCage(id, on){
  if (on) selCages[id] = true; else delete selCages[id];
  var el = document.querySelector('.cage[data-cage-id="' + id + '"]');
  if (el) el.classList.toggle('sel', !!on);
}

/* ── denseRangeSelect(strip, line) — pointerdown→move→up drag-select.
      §2.4 + HARVEST-KIT §4. Cells carry data-pos + data-cage-id;
      touch-action:pan-y is on .cage so vertical scroll still works. ── */
function denseRangeSelect(strip, line){
  if (!strip) return;
  var cells = strip.querySelectorAll('.cage');
  if (!cells.length) return;

  var dragging = false, moved = false, startPos = -1, paintOn = true, band = null, activeId = null;

  function cellAt(clientX, clientY){
    var el = document.elementFromPoint(clientX, clientY);
    while (el && el !== document.body){
      if (el.classList && el.classList.contains('cage') && el.parentNode === strip) return el;
      el = el.parentNode;
    }
    return null;
  }
  function posOf(cell){ return cell ? (parseInt(cell.getAttribute('data-pos'), 10) || 0) : -1; }

  // paint cells [lo..hi] to the current paint direction; clear sel outside the range it started in
  function paintRange(lo, hi){
    if (lo > hi){ var t = lo; lo = hi; hi = t; }
    for (var i=0; i<cells.length; i++){
      var p = posOf(cells[i]);
      if (p >= lo && p <= hi){
        var id = cells[i].getAttribute('data-cage-id');
        if (paintOn) selCages[id] = true; else delete selCages[id];
        cells[i].classList.toggle('sel', !!paintOn);
      }
    }
    drawBand(lo, hi);
  }
  function drawBand(lo, hi){
    if (band && band.parentNode) band.parentNode.removeChild(band);
    var first = null, last = null;
    for (var i=0; i<cells.length; i++){ var p = posOf(cells[i]); if (p === lo) first = cells[i]; if (p === hi) last = cells[i]; }
    if (!first || !last) return;
    var sr = strip.getBoundingClientRect();
    var fr = first.getBoundingClientRect(), lr = last.getBoundingClientRect();
    band = h('div', { class:'dragBand' });
    band.style.left  = (Math.min(fr.left, lr.left) - sr.left) + 'px';
    band.style.width = (Math.max(fr.right, lr.right) - Math.min(fr.left, lr.left)) + 'px';
    strip.appendChild(band);
  }
  function removeBand(){ if (band && band.parentNode) band.parentNode.removeChild(band); band = null; }

  function onDown(e){
    if (e.button != null && e.button !== 0) return;        // primary button / touch only
    var cell = cellAt(e.clientX, e.clientY);
    if (!cell) return;
    // a drag begins on whatever cell the finger lands on; clear any selection from OTHER lines/cells first
    dragging = true; moved = false;
    startPos = posOf(cell);
    activeId = cell.getAttribute('data-cage-id');
    // paint direction: if the start cell is already selected, this gesture DEselects; else selects (§2.4)
    paintOn = !selCages[activeId];
    if (e.pointerId != null && strip.setPointerCapture){ try { strip.setPointerCapture(e.pointerId); } catch (err){} }
  }
  function onMove(e){
    if (!dragging) return;
    var cell = cellAt(e.clientX, e.clientY);
    var p = cell ? posOf(cell) : startPos;
    if (p !== startPos) moved = true;
    if (!moved){ return; }                                 // not a drag yet — leave it to the click handler
    e.preventDefault();                                    // we own the horizontal gesture now
    paintRange(startPos, p);
    if (typeof syncPopup === 'function') syncPopup();
  }
  function onUp(e){
    if (!dragging) return;
    dragging = false;
    if (e.pointerId != null && strip.releasePointerCapture){ try { strip.releasePointerCapture(e.pointerId); } catch (err){} }
    removeBand();
    if (moved){
      // a real drag happened → suppress the synthetic click so it can't open a sheet (§2.4)
      suppressNextClick();
      renderPopup(getFarm());
      if (typeof syncPopup === 'function') syncPopup();
    }
    // a non-moved pointer is a tap → handled by the click listener below
  }

  strip.addEventListener('pointerdown', onDown);
  strip.addEventListener('pointermove', onMove);
  strip.addEventListener('pointerup', onUp);
  strip.addEventListener('pointercancel', function(){ dragging = false; removeBand(); });

  // TAP a cage → toggle it; rebuild + position the popup (§2.4)
  strip.addEventListener('click', function(e){
    if (clickSuppressed) return;
    var cell = cellAt(e.clientX, e.clientY);
    if (!cell) return;
    var id = cell.getAttribute('data-cage-id');
    toggleCage(id, !selCages[id]);
    renderPopup(getFarm());
    if (typeof syncPopup === 'function') syncPopup();
  });
}

// one-shot capture-phase click suppressor (400ms fallback) so a drag's click can't open a sheet
var clickSuppressed = false;
function suppressNextClick(){
  clickSuppressed = true;
  var done = false;
  function release(e){
    if (done) return; done = true;
    if (e){ e.stopPropagation(); e.preventDefault(); }
    document.removeEventListener('click', cap, true);
    clearTimeout(tid);
    setTimeout(function(){ clickSuppressed = false; }, 0);
  }
  function cap(e){ if (e && e.target && e.target.closest && !e.target.closest('.cage')){ return; } release(e); } // only suppress a click landing on a cage (M2)
  document.addEventListener('click', cap, true);
  var tid = setTimeout(function(){ done = true; document.removeEventListener('click', cap, true); clickSuppressed = false; }, 400);
}

/* ── renderPopup(farm) — the contextual action popup (§2.5 matrix +
      §10 pin 1 "Open ›"). Built into #popupMount; positioned by
      syncPopup() out-of-band so dragging stays smooth. ─────────────── */
function renderPopup(farm){
  var mount = document.getElementById('popupMount');
  if (!mount) return;
  mount.innerHTML = '';
  farm = farm || getFarm();
  if (!farm) return;
  var sel = selectedCages();
  if (!sel.length) return;

  var allFilled = true, allEmpty = true, i;
  for (i=0; i<sel.length; i++){ if (sel[i].batch) allEmpty = false; else allFilled = false; }
  var bargeHasPile = farm.barge.state === 'pile';
  var n = sel.length;

  var pop = h('div', { class:'popup' });

  // §10 pin 1 — exactly one cage selected → tappable "Open 1-3 ›" row above the buttons
  if (n === 1){
    var only = sel[0];
    pop.appendChild(h('button', { class:'openRow', onclick:function(){
      openSheet(function(){ return buildCageDetail(only); });
    } }, 'Open ' + only.label, h('span', { html:icon('chevron', 16) })));
  }

  if (!allFilled && !allEmpty){
    // mixed → label only, no buttons (§2.5)
    pop.appendChild(h('div', { class:'lbl' }, 'Mixed selection — pick all-filled or all-empty'));
    mount.appendChild(pop);
    syncPopup();
    return;
  }

  var row = h('div', { class:'row' });
  if (allFilled){
    pop.appendChild(h('div', { class:'lbl' }, n + (n === 1 ? ' filled cage' : ' filled cages')));
    row.appendChild(h('button', { class:'pbtn pull', onclick:function(){ pullSelectedCages(selectedIds()); } }, 'Pull'));
    row.appendChild(h('button', { class:'pbtn work', onclick:function(){
      var ids = selectedIds(); openSheet(function(){ return buildWorkSheet(ids); });
    } }, 'Work'));
  } else { // allEmpty
    var fillHint = bargeHasPile ? ' · distribute' : ' · new seed';
    pop.appendChild(h('div', { class:'lbl' }, n + (n === 1 ? ' empty cage' : ' empty cages') + fillHint));
    row.appendChild(h('button', { class:'pbtn fill', onclick:function(){
      var ids = selectedIds();
      if (getFarm().barge.state === 'pile') fillFromBarge(ids);
      else openSheet(function(){ return buildFillSeedForm(ids); });
    } }, 'Fill'));
    // Remove only when exactly one empty cage is selected (§2.5)
    if (n === 1){
      row.appendChild(h('button', { class:'pbtn remove', onclick:function(){ removeCages(selectedIds()); } }, 'Remove'));
    }
  }
  pop.appendChild(row);
  mount.appendChild(pop);
  syncPopup();
}

/* ── syncPopup() — position the popup above the topmost selected cell,
      caret down, clamped to the viewport (HARVEST-KIT §4). No re-render. */
function syncPopup(){
  var mount = document.getElementById('popupMount');
  if (!mount) return;
  var pop = mount.firstChild;
  if (!pop){ return; }
  var picks = document.querySelectorAll('.cage.sel');
  if (!picks.length){ mount.innerHTML = ''; return; }
  var minTop = Infinity, maxBottom = -Infinity, sumLeft = 0, cnt = 0;
  for (var i=0; i<picks.length; i++){
    var r = picks[i].getBoundingClientRect();
    if (r.top < minTop) minTop = r.top;
    if (r.bottom > maxBottom) maxBottom = r.bottom;
    sumLeft += r.left + r.width/2; cnt++;
  }
  var popH = pop.offsetHeight || 80, popW = pop.offsetWidth || 200, avgLeft = sumLeft / cnt;
  // park above the selection; if that would collide with the sticky top bar (top-row cages),
  // flip BELOW the selection and point the caret up (§ polish — dogfood: popup ate the top bar)
  var tb = document.querySelector('.topbar');
  var topGuard = (tb ? tb.getBoundingClientRect().bottom : 0) + 6;
  var aboveTop = minTop - popH - 14;
  if (aboveTop < topGuard){
    pop.classList.add('below');
    pop.style.top = Math.min(window.innerHeight - popH - 8, maxBottom + 14) + 'px';
  } else {
    pop.classList.remove('below');
    pop.style.top = aboveTop + 'px';
  }
  pop.style.left = Math.max(8 + popW/2, Math.min(avgLeft, window.innerWidth - popW/2 - 8)) + 'px';
}

// keep the popup glued to its cells on scroll/resize while a selection exists (rAF-throttled — M2)
var _syncRAF = 0;
function syncPopupThrottled(){ if (_syncRAF) return; _syncRAF = requestAnimationFrame(function(){ _syncRAF = 0; if (selectedIds().length) syncPopup(); }); }
window.addEventListener('resize', syncPopupThrottled);
window.addEventListener('scroll', syncPopupThrottled, true);

/* ═══════════════════════════════════════════════════════════════════
   ACTION FLOWS — every mutation goes through commit() + offers Undo.
   One source of truth = Cage.events[]; every batch is added to farm.batches.
   ═══════════════════════════════════════════════════════════════════ */

// newBatch — a fresh Batch object (lineage id). origin null = fresh seed.
function newBatch(fields){
  return {
    id: uid(),
    count:      (fields.count != null ? fields.count : null),
    sizeMm:     (fields.sizeMm != null ? fields.sizeMm : null),
    ploidy:     fields.ploidy || null,
    hatchery:   fields.hatchery || '',
    grade:      (fields.grade != null ? fields.grade : null),
    notes:      fields.notes || '',
    stockedDate: fields.stockedDate || todayISO(),
    photoIds:   Array.isArray(fields.photoIds) ? fields.photoIds.slice() : [],
    origin:     fields.origin || null
  };
}
// newEvent — a timeline Event tagged by batchId
function newEvent(type, batchId, fields){
  fields = fields || {};
  return {
    id: uid(), type:type, date: fields.date || todayISO(), batchId: batchId || '',
    method: (fields.method != null ? fields.method : null),
    sizeMm: (fields.sizeMm != null ? fields.sizeMm : null),
    count:  (fields.count  != null ? fields.count  : null),
    note:   (fields.note   != null ? fields.note   : null),
    photoIds: Array.isArray(fields.photoIds) ? fields.photoIds.slice() : []
  };
}

/* ── §3.4 — Fill new seed. Each selected cage gets its OWN Batch
      (own lineage id) with the SAME form values; a `stocked` event. ── */
function fillNewSeed(cageIds, values){
  var farm = getFarm(); if (!farm) return;
  var date = isValidISO(values.date) ? values.date : todayISO();
  var made = [];
  cageIds.forEach(function(id){
    var cage = cageById(id); if (!cage || cage.batch) return;     // only fill empties
    var batch = newBatch({
      count: values.count, sizeMm: values.sizeMm, ploidy: values.ploidy,
      hatchery: values.hatchery, grade: cage.currentGrade || null,
      notes: values.notes, stockedDate: date,
      photoIds: values.photoIds, origin: null
    });
    cage.batch = batch;
    farm.batches.push(batch);
    cage.events.push(newEvent('stocked', batch.id, {
      date: date, sizeMm: values.sizeMm, count: values.count, note: values.notes || null,
      photoIds: values.photoIds
    }));
    cage.workDue = null;                                          // a fresh stock resets any reminder
    made.push({ cage:cage, batch:batch });
  });
  if (!made.length){ toast('Nothing to fill'); return; }
  closeSheet();
  clearSelection();
  commit();
  undoable('Filled ' + made.length + (made.length === 1 ? ' cage' : ' cages'), function(){
    var f = getFarm();
    made.forEach(function(m){
      var c = cageById(m.cage.id); if (c){ c.batch = null; c.events = c.events.filter(function(ev){ return ev.batchId !== m.batch.id; }); }
      var bi = f.batches.indexOf(m.batch); if (bi >= 0) f.batches.splice(bi, 1);
    });
    commit();
  });
}

/* ── §3.5 — Pull selected filled cages into the barge pile. ────────── */
function pullSelectedCages(cageIds){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  var sources = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) sources.push(c); });
  if (!sources.length){ toast('Nothing to pull'); return; }

  // snapshot for undo
  var snapBarge = JSON.parse(JSON.stringify(barge));
  var snapSources = sources.map(function(c){ return { id:c.id, batch:JSON.parse(JSON.stringify(c.batch)), evLen:c.events.length }; }); // clone, don't alias (C1)

  // pool: counts add (null-aware), size = max, grade = common-or-null, origin = union
  var startCount = (barge.state === 'pile') ? barge.count : 0;
  var anyUncounted = (barge.state === 'pile' && barge.count == null);
  var total = startCount || 0;
  var maxSize = (barge.state === 'pile' && typeof barge.sizeMm === 'number') ? barge.sizeMm : null;
  var grades = {}; if (barge.state === 'pile' && barge.grade) grades[barge.grade] = 1;
  var cageLabels = (barge.origin && barge.origin.cageLabels) ? barge.origin.cageLabels.slice() : [];
  var lineNames  = (barge.origin && barge.origin.lineNames)  ? barge.origin.lineNames.slice()  : [];
  var parentIds  = (barge.origin && barge.origin.parentBatchIds) ? barge.origin.parentBatchIds.slice() : [];
  if (barge.state === 'pile' && barge.batchId && parentIds.indexOf(barge.batchId) < 0) parentIds.push(barge.batchId);

  sources.forEach(function(cage){
    var b = cage.batch;
    if (b.count == null) anyUncounted = true; else total += b.count;
    var sz = latestSize(cage);
    if (typeof sz === 'number' && (maxSize == null || sz > maxSize)) maxSize = sz;
    if (b.grade) grades[b.grade] = 1;
    var ln = lineOfCage(cage.id);
    if (cage.label && cageLabels.indexOf(cage.label) < 0) cageLabels.push(cage.label);
    if (ln && ln.name && lineNames.indexOf(ln.name) < 0) lineNames.push(ln.name);
    if (parentIds.indexOf(b.id) < 0) parentIds.push(b.id);
    // per-source: pulled event (count), then empty the cage.
    // Carry the batch's stock photos onto the summary event so they survive in the permanent timeline.
    var pulledEv = newEvent('pulled', b.id, { count: (b.count != null ? b.count : null) });
    if (b.photoIds && b.photoIds.length) pulledEv.photoIds = b.photoIds.slice();
    cage.events.push(pulledEv);
    cage.batch = null;
  });

  var gradeKeys = Object.keys(grades);
  // keep ONE pile batchId; create one if the barge was empty
  if (barge.state !== 'pile' || !barge.batchId) barge.batchId = uid();
  barge.state = 'pile';
  barge.count = anyUncounted ? null : total;
  barge.sizeMm = maxSize;
  barge.grade = (gradeKeys.length === 1) ? gradeKeys[0] : null;
  barge.origin = { parentBatchIds: parentIds, cageLabels: cageLabels, lineNames: lineNames, pulledDate: todayISO() };
  if (!Array.isArray(barge.events)) barge.events = [];
  // barge-local pull record — the qty added by THIS pull (sum of just-pulled cages only)
  var pulledNow = 0, pulledUncounted = false;
  snapSources.forEach(function(s){ if (s.batch.count == null) pulledUncounted = true; else pulledNow += s.batch.count; });
  barge.events.push(newEvent('pulled', barge.batchId, { count: pulledUncounted ? null : pulledNow }));

  clearSelection();
  commit();
  undoable('Pulled ' + sources.length + (sources.length === 1 ? ' cage to the barge' : ' cages to the barge'), function(){
    var f = getFarm();
    f.barge = snapBarge;
    snapSources.forEach(function(s){
      var c = cageById(s.id);
      if (c){ c.batch = s.batch; if (c.events.length > s.evLen) c.events.length = s.evLen; }
    });
    commit();
  });
}

/* ── §3.6 — Fill selected empty cages from the barge pile (even split,
      lose no oysters). Each cage gets a CHILD batch with provenance. ── */
function fillFromBarge(cageIds){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  if (barge.state !== 'pile'){ toast('Barge is empty'); return; }
  var targets = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && !c.batch) targets.push(c); });
  if (!targets.length){ toast('Nothing to fill'); return; }

  var snapBarge = JSON.parse(JSON.stringify(barge));
  var n = targets.length;
  var total = barge.count;                        // number | null
  var shares = [];                                // per-target count (number | null)
  var used = targets.slice();                     // which cages actually get filled
  var shortfall = false;

  if (total == null){
    for (var i=0; i<n; i++) shares.push(null);     // uncounted pile → even share, no number
  } else if (total <= 0){
    toast('Barge is empty'); return;
  } else if (total < n){
    // fewer oysters than cages → fill the first `total` cages with 1 each, leave the rest empty (§3.6 decision)
    used = targets.slice(0, total);
    for (var j=0; j<used.length; j++) shares.push(1);
    shortfall = true;
  } else {
    var base = Math.floor(total / n), rem = total - base * n;
    for (var k=0; k<n; k++) shares.push(base + (k < rem ? 1 : 0));   // spread remainder; sum === total exactly
  }

  var made = [];
  var prov = barge.origin || {};
  used.forEach(function(cage, idx){
    var share = shares[idx];
    var child = newBatch({
      count: share, sizeMm: barge.sizeMm, ploidy: null, hatchery: '',
      grade: barge.grade, notes: '', stockedDate: todayISO(), photoIds: [],
      origin: {
        // chain to BOTH the pile id and the real source batch ids so lineageEvents
        // (and the photo strips it drives) can walk back to the originating cages.
        parentBatchIds: (function(){
          var pp = (prov.parentBatchIds || []).slice();
          if (barge.batchId && pp.indexOf(barge.batchId) < 0) pp.unshift(barge.batchId);
          return pp;
        })(),
        cageLabels: (prov.cageLabels || []).slice(),
        lineNames:  (prov.lineNames || []).slice(),
        pulledDate: prov.pulledDate || todayISO()
      }
    });
    cage.batch = child;
    farm.batches.push(child);
    cage.events.push(newEvent('filled', child.id, { count: share }));
    cage.workDue = null;
    made.push({ cageId:cage.id, batch:child });
  });

  // decrement the pile; fully drained → empty
  var distributed = 0;
  if (total != null){ shares.forEach(function(s){ if (typeof s === 'number') distributed += s; }); }
  if (total == null){
    // uncounted pile → the whole working pile was just distributed into the selected cages, so it's
    // gone (H1: prevents minting unlimited child batches from a pile that's physically empty).
    barge.state = 'empty'; barge.batchId = null; barge.count = null;
    barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.events = [];
  } else {
    barge.count = total - distributed;
    if (barge.count <= 0){
      barge.state = 'empty'; barge.batchId = null; barge.count = null;
      barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.events = [];
    }
  }

  clearSelection();
  commit();
  var msg = 'Filled ' + made.length + (made.length === 1 ? ' cage from the barge' : ' cages from the barge');
  if (shortfall) msg = 'Only ' + snapBarge.count + ' oysters — filled ' + made.length + (made.length === 1 ? ' cage' : ' cages');
  undoable(msg, function(){
    var f = getFarm();
    f.barge = snapBarge;
    made.forEach(function(m){
      var c = cageById(m.cageId);
      if (c){ c.batch = null; c.events = c.events.filter(function(ev){ return ev.batchId !== m.batch.id; }); }
      var bi = f.batches.indexOf(m.batch); if (bi >= 0) f.batches.splice(bi, 1);
    });
    commit();
  });
}

/* ── §3.9 — Work selected filled cages. Writes ONE event to EACH. ──── */
function workCages(cageIds, opts){
  var farm = getFarm(); if (!farm) return;
  opts = opts || {};
  var targets = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) targets.push(c); });
  if (!targets.length){ toast('Nothing to work'); return; }

  var date = isValidISO(opts.date) ? opts.date : todayISO();
  var snap = targets.map(function(c){ return { id:c.id, evLen:c.events.length, sizeMm:c.batch.sizeMm, workDue:c.workDue }; });
  var verb;
  targets.forEach(function(cage){
    if (opts.method){
      cage.events.push(newEvent('worked', cage.batch.id, { method:opts.method, date:date, note:opts.note || null, photoIds:opts.photoIds }));
    } else if (typeof opts.sizeMm === 'number'){
      cage.events.push(newEvent('growth', cage.batch.id, { sizeMm:opts.sizeMm, date:date, note:opts.note || null, photoIds:opts.photoIds }));
      cage.batch.sizeMm = opts.sizeMm;               // mirror
    } else if (opts.note){
      cage.events.push(newEvent('note', cage.batch.id, { note:opts.note, date:date, photoIds:opts.photoIds }));
    }
    // work-again reminder (sets/clears the needs-work date)
    if ('workDue' in opts) cage.workDue = opts.workDue || null;
    else if (opts.method || typeof opts.sizeMm === 'number') cage.workDue = null;  // a real work clears an old reminder
  });
  verb = opts.method ? cap(opts.method) : (typeof opts.sizeMm === 'number' ? 'Logged growth on' : 'Noted');

  var label = opts.method ? ('Worked ' + targets.length + (targets.length === 1 ? ' cage' : ' cages'))
            : (typeof opts.sizeMm === 'number' ? ('Logged growth · ' + targets.length + (targets.length === 1 ? ' cage' : ' cages'))
            : ('Noted ' + targets.length + (targets.length === 1 ? ' cage' : ' cages')));
  commit();
  refreshSheet();                                    // keep the Work sheet open, banner/history update
  undoable(label, function(){
    snap.forEach(function(s){
      var c = cageById(s.id);
      if (c){ if (c.events.length > s.evLen) c.events.length = s.evLen; if (c.batch) c.batch.sizeMm = s.sizeMm; c.workDue = s.workDue; }
    });
    commit(); refreshSheet();
  });
}

// buildWorkSheet(cageIds) — §3.9. Last-action banner · history · method chips · Log growth · reminder.
function buildWorkSheet(cageIds){
  var farm = getFarm();
  var cages = [];
  cageIds.forEach(function(id){ var c = cageById(id); if (c && c.batch) cages.push(c); });
  if (!cages.length) return sheetHead('Work').concat(h('div', { class:'emptyNote' }, 'These cages are empty.'));
  var bulk = cages.length > 1;
  var primary = cages[0];
  var kids = sheetHead(bulk ? ('Work ' + cages.length + ' cages') : ('Work ' + primary.label),
    bulk ? 'One entry is written to each selected cage.' : null);

  // one shared photoField for this Work submit (bulk → one capture, N event references)
  var photos = photoField([]);

  // Last action banner (single-cage only — bulk has many)
  if (!bulk){
    var le = lastEvent(primary);
    kids.push(h('div', { class:'work-banner' },
      h('span', { html:icon('wrench', 18) }),
      le ? ('Last: ' + eventLabel(le) + ' · ' + monthDay(le.date)) : 'No work logged yet'));
  }

  // method chips → append a worked event on tap
  var methodChips = h('div', { class:'chips' });
  ['tumbled','washed','desiccated','flipped'].forEach(function(m){
    methodChips.appendChild(h('button', { class:'chip', type:'button', onclick:function(){
      if (photos.busy()){ toast('Photo still saving…'); return; }
      workCages(cageIds, { method:m, note:(noteIn.value || '').trim(), workDue:reminderDue, photoIds:photos.ids() });
    } }, cap(m)));
  });
  kids.push(h('section', null, h('label', null, 'Log a handling'), methodChips));

  // Log growth — size field
  var growthIn = h('input', { type:'number', inputmode:'decimal', min:'0', step:'0.1', placeholder:'e.g. 48' });
  var growthBtn = h('button', { class:'btn btn-quiet', onclick:function(){
    var v = parseNum(growthIn.value);
    if (v == null || v <= 0){ toast('Enter a size in mm'); return; }
    if (photos.busy()){ toast('Photo still saving…'); return; }
    workCages(cageIds, { sizeMm:v, note:(noteIn.value || '').trim(), workDue:reminderDue, photoIds:photos.ids() });
  } }, 'Log growth');
  kids.push(h('section', null, h('label', null, 'Log growth'),
    h('div', { style:{display:'flex', gap:'10px'} },
      h('div', { style:{flex:'1'} }, growthIn), growthBtn)));

  // optional note (read by the buttons above)
  var noteIn = h('textarea', { placeholder:'Optional note' });
  kids.push(field('Note', noteIn));

  // Builder 3: photoField mounts in the slot Builder 2 left
  var workPhotoSlot = h('div', { id:'workPhotoSlot' });
  workPhotoSlot.appendChild(photos.el);
  kids.push(workPhotoSlot);

  // optional "work again" reminder
  var reminderDue = null;
  var remChips = h('div', { class:'chips' });
  function setReminder(days, chip){
    var iso = days == null ? null : isoDaysAhead(days);
    reminderDue = (reminderDue === iso && iso != null) ? null : iso;
    var all = remChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on');
    if (reminderDue != null && chip) chip.classList.add('on');
  }
  [['1w',7],['2w',14],['4w',28],['8w',56]].forEach(function(p){
    var chip = h('button', { class:'chip', type:'button' }, p[0]);
    chip.addEventListener('click', function(){ setReminder(p[1], chip); });
    remChips.appendChild(chip);
  });
  var pickWrap = h('input', { type:'date', style:{maxWidth:'180px', marginTop:'8px'},
    onchange:function(){ reminderDue = isValidISO(this.value) ? this.value : null;
      var all = remChips.querySelectorAll('.chip'); for (var i=0;i<all.length;i++) all[i].classList.remove('on'); } });
  kids.push(h('section', null, h('label', null, 'Work again reminder'),
    h('div', { class:'fieldHint', style:{marginBottom:'6px'} }, 'Optional — flag this cage on a date.'),
    remChips, pickWrap));

  // history timeline (single-cage), newest first
  if (!bulk){
    var evs = primary.events.slice().sort(function(a,b){ return isoToMs(b.date) - isoToMs(a.date); });
    if (evs.length){
      var tl = h('div', { class:'timeline' });
      evs.forEach(function(ev){
        var row = h('div', { class:'tlRow' }, h('span', { class:'dot' }),
          h('div', { class:'tlTop' }, h('span', { class:'tlLabel' }, eventLabel(ev)), h('span', { class:'tlDate num' }, monthDay(ev.date))));
        var det = eventDetail(ev);
        if (det) row.appendChild(h('div', { class:'tlDetail' }, det));
        if (ev.photoIds && ev.photoIds.length) row.appendChild(photoStrip(ev.photoIds, eventLabel(ev)));
        tl.appendChild(row);
      });
      kids.push(h('section', null, h('label', null, 'History'), tl));
    }
  }
  return kids;
}
function isoDaysAhead(days){ var d = new Date(); d.setUTCDate(d.getUTCDate() + days);
  return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate()); }
// eventDetail — the secondary line for a timeline row
function eventDetail(ev){
  var bits = [];
  if (typeof ev.count === 'number') bits.push(fmtCompact(ev.count) + (ev.type === 'harvested' ? ' harvested' : (ev.type === 'pulled' ? ' pulled' : (ev.type === 'filled' ? ' placed' : ' oysters'))));
  if (typeof ev.sizeMm === 'number' && ev.type !== 'growth') bits.push(ev.sizeMm + ' mm');
  if (ev.note) bits.push(ev.note);
  return bits.join(' · ');
}

/* ── §3.10 — Remove selected EMPTY cages (splice; line stays). ─────── */
function removeCages(cageIds){
  var farm = getFarm(); if (!farm) return;
  var removed = [];
  cageIds.forEach(function(id){
    var line = lineOfCage(id); if (!line) return;
    var idx = -1;
    for (var i=0; i<line.cages.length; i++) if (line.cages[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    if (line.cages[idx].batch) return;                  // only empties (popup already guards this)
    removed.push({ lineId:line.id, index:idx, cage:line.cages[idx] });
  });
  if (!removed.length){ toast('Only empty cages can be removed'); return; }
  // splice in descending index order so earlier indices stay valid
  removed.sort(function(a,b){ return b.index - a.index; });
  removed.forEach(function(r){
    var line = null; for (var i=0;i<farm.lines.length;i++) if (farm.lines[i].id === r.lineId) line = farm.lines[i];
    if (line) line.cages.splice(r.index, 1);
  });
  reindexLines(farm);
  clearSelection();
  commit();
  undoable('Removed cage — the line keeps its place', function(){
    var f = getFarm();
    // re-insert in ascending index order so positions land back correctly
    removed.slice().sort(function(a,b){ return a.index - b.index; }).forEach(function(r){
      var line = null; for (var i=0;i<f.lines.length;i++) if (f.lines[i].id === r.lineId) line = f.lines[i];
      if (line) line.cages.splice(Math.min(r.index, line.cages.length), 0, r.cage);
    });
    reindexLines(f);
    commit();
  });
}

/* ── §3.8 — Harvest from the barge pile. ───────────────────────────── */
function harvestFromBarge(count, note, photoIds){
  var farm = getFarm(); if (!farm) return;
  var barge = farm.barge;
  if (barge.state !== 'pile'){ toast('Barge is empty'); return; }
  var take = parseCount(count);   // whole oysters, integer (H4)
  if (take == null || take <= 0){ toast('Enter how many you harvested'); return; }
  if (barge.count != null && take > barge.count) take = barge.count;     // cap at the pile

  var snapBarge = JSON.parse(JSON.stringify(barge));
  var origin = barge.origin ? JSON.parse(JSON.stringify(barge.origin)) : null;
  var entry = {
    id: uid(), date: todayISO(), count: take, grade: barge.grade,
    sizeMm: (typeof barge.sizeMm === 'number' ? barge.sizeMm : null),
    origin: origin, note: (note && note.trim()) ? note.trim() : null,
    photoIds: Array.isArray(photoIds) ? photoIds.slice() : []
  };
  farm.harvestLog.push(entry);

  // best-effort harvested events on resolvable source cages (currently holding a lineage batch)
  var snapEvents = [];
  if (origin && origin.parentBatchIds && origin.parentBatchIds.length){
    var pset = {}; origin.parentBatchIds.forEach(function(p){ pset[p] = 1; });
    farm.lines.forEach(function(line){ line.cages.forEach(function(c){
      if (c.batch && pset[c.batch.id]){
        snapEvents.push({ id:c.id, evLen:c.events.length });
        var hev = newEvent('harvested', c.batch.id, { count:null, note:'Harvested from the barge' });
        if (c.batch.photoIds && c.batch.photoIds.length) hev.photoIds = c.batch.photoIds.slice();
        c.events.push(hev);
      }
    }); });
  }

  // barge-local record + decrement
  if (!Array.isArray(barge.events)) barge.events = [];
  barge.events.push(newEvent('harvested', barge.batchId || '', { count: take }));
  if (barge.count != null){
    barge.count -= take;
    if (barge.count <= 0){ barge.state = 'empty'; barge.batchId = null; barge.count = null; barge.sizeMm = null; barge.grade = null; barge.origin = null; barge.events = []; }
  }
  // uncounted pile: KEEP the pile after a partial harvest — we can't know what remains, so emptying it
  // would be silent data loss (C2). The farmer empties it explicitly via "Clear the barge".

  closeSheet();
  commit();
  undoable('Harvest logged · ' + fmtCompact(take), function(){
    var f = getFarm();
    var ei = f.harvestLog.indexOf(entry); if (ei >= 0) f.harvestLog.splice(ei, 1);
    f.barge = snapBarge;
    snapEvents.forEach(function(s){ var c = cageById(s.id); if (c && c.events.length > s.evLen) c.events.length = s.evLen; });
    commit();
  });
}

// clearBarge() — explicitly empty the working pile (an uncounted pile worked off, or any leftover the
// farmer discards). Undoable. (C2: uncounted piles get a non-destructive-by-default empty path.)
function clearBarge(){
  var farm = getFarm(); if (!farm) return;
  if (farm.barge.state !== 'pile'){ toast('Barge is already empty'); return; }
  var snapBarge = JSON.parse(JSON.stringify(farm.barge));
  farm.barge = freshBarge();
  closeSheet();
  commit();
  undoable('Barge cleared', function(){ getFarm().barge = snapBarge; commit(); });
}

// buildHarvestSheet(farm) — §3.8. Pile summary + on-barge history + count field.
function buildHarvestSheet(farm){
  farm = farm || getFarm();
  var kids = sheetHead('Harvest');
  var b = farm.barge;
  if (b.state !== 'pile'){
    kids.push(h('div', { class:'emptyNote' }, 'Nothing on the barge yet —\nPull some cages first.'));
    return kids;
  }
  var pill = (b.count == null) ? 'uncounted' : ('~' + fmtCompact(b.count) + ' oysters');
  var card = h('div', { class:'card' },
    h('div', { class:'eyebrow' }, 'On the barge'),
    h('div', { class:'hero num' }, pill),
    b.sizeMm != null ? h('div', { class:'kv' }, h('span', { class:'k' }, 'Last size'), h('span', { class:'v' }, b.sizeMm + ' mm')) : null,
    b.grade ? h('div', { class:'kv' }, h('span', { class:'k' }, 'Grade'), h('span', { class:'v' }, b.grade)) : null,
    bargeOriginText(b) ? h('div', { class:'kv' }, h('span', { class:'k' }, 'From'), h('span', { class:'v' }, bargeOriginText(b))) : null);
  kids.push(card);

  // history of the oysters on the barge (barge.events + origin)
  var hist = bargeHistoryRows(b);
  if (hist.length){
    var tl = h('div', { class:'timeline' });
    hist.forEach(function(r){ tl.appendChild(r); });
    kids.push(h('section', null, h('label', null, 'On-barge history'), tl));
  }

  var countIn = h('input', { type:'number', inputmode:'numeric', min:'1',
    value: (b.count != null ? b.count : ''),
    max: (b.count != null ? b.count : null), placeholder:'How many' });
  kids.push(field('How many harvested', countIn, b.count != null ? ('Up to ' + fmtCompact(b.count) + ' on the barge.') : 'The pile is uncounted.'));

  var noteIn = h('textarea', { placeholder:'Optional note' });
  kids.push(field('Note', noteIn));

  // optional photoField → ids ride onto the HarvestEntry
  var harvestPhotoSlot = h('div', { id:'harvestPhotoSlot' });
  var photos = photoField([]);
  harvestPhotoSlot.appendChild(photos.el);
  kids.push(harvestPhotoSlot);

  kids.push(h('div', { class:'btnRow' },
    h('button', { class:'btn btn-quiet', onclick:closeSheet }, 'Cancel'),
    h('button', { class:'btn btn-barge', onclick:function(){
      if (photos.busy()){ toast('Photo still saving…'); return; }
      harvestFromBarge(countIn.value, noteIn.value, photos.ids());
    } }, 'Harvest')));
  // explicit empty path — uncounted piles never auto-empty on harvest (C2)
  kids.push(h('button', { class:'btn btn-block', style:{ marginTop:'10px', color:'var(--danger)', background:'var(--surface)', border:'1.5px solid var(--hair-strong)' }, onclick:clearBarge }, 'Clear the barge'));
  return kids;
}
// bargeHistoryRows — timeline rows describing what's piled (origin summary + barge events)
function bargeHistoryRows(b){
  var rows = [];
  if (b.origin && (b.origin.lineNames || []).length){
    var src = bargeOriginText(b);
    var detail = [];
    if (b.count != null) detail.push('~' + fmtCompact(b.count));
    if (typeof b.sizeMm === 'number') detail.push(b.sizeMm + ' mm');
    rows.push(h('div', { class:'tlRow' }, h('span', { class:'dot' }),
      h('div', { class:'tlTop' }, h('span', { class:'tlLabel' }, 'Pulled ' + src),
        h('span', { class:'tlDate num' }, monthDay(b.origin.pulledDate || todayISO()))),
      detail.length ? h('div', { class:'tlDetail' }, detail.join(' · ')) : null));
  }
  return rows;
}

/* ═══════════════════════════════════════════════════════════════════
   CAGE DETAIL (§3.12) — insight-first; NO actions here.
   ═══════════════════════════════════════════════════════════════════ */
function buildCageDetail(cage){
  var farm = getFarm();
  var t = cageType(farm, cage.typeId);
  var ln = lineOfCage(cage.id);
  var kids = sheetHead(cage.label, (ln ? ln.name : '') + (ln && t ? ' · ' : '') + (t ? typeLabel(t) : ''));

  // small "Change type" link (rare action), not blocking content
  kids.push(h('div', { style:{margin:'-2px 0 6px'} },
    h('button', { class:'linkBtn', onclick:function(){ openSheet(function(){ return buildCageTypePicker(cage); }); } }, 'Change type')));

  if (cage.batch){
    var size = latestSize(cage);
    var months = monthsSince(cage.batch.stockedDate);
    var st = cageStatus(cage, farm);
    var card = h('div', { class:'card' });
    card.appendChild(h('div', { class:'hero num' }, (size != null ? size + ' mm' : '— mm')));
    if (st.ready) card.appendChild(h('div', { class:'ready-badge', style:{marginTop:'4px'} }, h('span', { html:icon('check', 14) }), 'Market-ready'));
    card.appendChild(h('div', { class:'kv' }, h('span', { class:'k' }, 'Count'), h('span', { class:'v' }, cage.batch.count != null ? fmtCompact(cage.batch.count) : 'uncounted')));
    card.appendChild(h('div', { class:'kv' }, h('span', { class:'k' }, 'Ploidy'), h('span', { class:'v' }, cage.batch.ploidy ? cap(cage.batch.ploidy) : '—')));
    card.appendChild(h('div', { class:'kv' }, h('span', { class:'k' }, 'Hatchery'), h('span', { class:'v' }, cage.batch.hatchery || '—')));
    if (cage.batch.grade) card.appendChild(h('div', { class:'kv' }, h('span', { class:'k' }, 'Grade'), h('span', { class:'v' }, cage.batch.grade)));
    card.appendChild(h('div', { class:'kv' }, h('span', { class:'k' }, 'In water'), h('span', { class:'v' }, months != null ? (months < 1 ? '<1 mo' : Math.round(months) + ' mo') : '—')));
    if (cage.batch.photoIds && cage.batch.photoIds.length) card.appendChild(photoStrip(cage.batch.photoIds, 'Seed'));
    kids.push(card);

    // projection + chart + confidence
    var model = growthModel(cage, farm);
    var projWrap = h('div', { class:'card' });
    projWrap.appendChild(h('div', { class:'eyebrow' }, 'Projected harvest'));
    projWrap.appendChild(h('div', { class:'projLine' }, projectionLabel(model, farm)));
    var hint = confidenceHint(model);
    if (hint) projWrap.appendChild(h('div', { class:'projHint' }, hint));
    if (model.rateSource !== 'observed'){
      projWrap.appendChild(h('div', { class:'projHint' },
        '~' + DEFAULT_GROWTH_MM_DAY.toFixed(2) + ' mm/day · ~' + (DEFAULT_GROWTH_MM_DAY * 30.4375).toFixed(1) + ' mm/mo (typical rate — no usable checks yet)'));
    }
    var chart = growthChartSVG(cage, farm.settings.marketSizeMm, model);
    if (chart) projWrap.appendChild(h('div', { class:'chartFrame', html:chart }));
    kids.push(projWrap);
  } else {
    var last = lastEvent(cage);
    kids.push(h('div', { class:'card' },
      h('div', { class:'eyebrow' }, 'Empty cage'),
      h('div', { class:'projHint' }, last ? ('Empty — last held a batch (' + eventLabel(last) + ' · ' + monthDay(last.date) + ').') : 'Empty — nothing has been stocked here yet.')));
  }

  // full lineage timeline across cages + barge (§3.12)
  var evs = cage.batch ? lineageEvents(cage.batch, farm) : cage.events.slice().sort(function(a,b){ return isoToMs(b.date) - isoToMs(a.date); });
  if (evs.length){
    var tl = h('div', { class:'timeline' });
    evs.forEach(function(ev){
      var row = h('div', { class:'tlRow' }, h('span', { class:'dot' }),
        h('div', { class:'tlTop' }, h('span', { class:'tlLabel' }, eventLabel(ev)), h('span', { class:'tlDate num' }, monthDay(ev.date))));
      var det = eventDetail(ev);
      if (det) row.appendChild(h('div', { class:'tlDetail' }, det));
      if (ev.photoIds && ev.photoIds.length) row.appendChild(photoStrip(ev.photoIds, eventLabel(ev)));
      tl.appendChild(row);
    });
    kids.push(h('section', null, h('label', null, 'History'), tl));
  }
  return kids;
}

// buildCageTypePicker — the "Change type" sheet (rare action from cage detail)
function buildCageTypePicker(cage){
  var farm = getFarm();
  var kids = sheetHead('Change cage type', cage.label);
  var list = h('div', { class:'menuList' });
  farm.cageTypes.forEach(function(t){
    list.appendChild(h('button', { class:'menuItem', onclick:function(){
      cage.typeId = t.id; commit(); openSheet(function(){ return buildCageDetail(cageById(cage.id)); });
    } },
      h('span', { class:'mi-t' }, typeLabel(t)),
      t.id === cage.typeId ? h('span', { class:'mi-chev', html:icon('check', 18) }) : null));
  });
  kids.push(list);
  return kids;
}

/* ── lineageEvents(batch, farm) — every Event whose batchId is in this
      batch's lineage chain (this id + origin.parentBatchIds upward),
      across ALL cages + the barge, sorted newest first (§3.12). ─────── */
function lineageEvents(batch, farm){
  if (!batch) return [];
  // walk the provenance chain upward to collect every ancestor batch id
  var chain = {};
  var byId = {};
  (farm.batches || []).forEach(function(b){ byId[b.id] = b; });
  var stack = [batch.id]; chain[batch.id] = 1;
  while (stack.length){
    var id = stack.pop();
    var b = byId[id] || (batch.id === id ? batch : null);
    if (b && b.origin && b.origin.parentBatchIds){
      b.origin.parentBatchIds.forEach(function(pid){ if (!chain[pid]){ chain[pid] = 1; stack.push(pid); } });
    }
  }
  var out = [];
  farm.lines.forEach(function(line){ line.cages.forEach(function(c){
    c.events.forEach(function(ev){ if (ev.batchId && chain[ev.batchId]) out.push(ev); });
  }); });
  // include barge events tied to any chain batch id
  if (farm.barge && Array.isArray(farm.barge.events)){
    farm.barge.events.forEach(function(ev){ if (ev.batchId && chain[ev.batchId]) out.push(ev); });
  }
  out.sort(function(a,b){ return isoToMs(b.date) - isoToMs(a.date); });
  return out;
}

/* ═══════════════════════════════════════════════════════════════════
   GROWTH + SEASONAL PROJECTION (§4 — exact constants + honest copy)
   ═══════════════════════════════════════════════════════════════════ */
var DEFAULT_GROWTH_MM_DAY = 0.18;   // Gulf triploid prior: ~15mm seed → ~76mm in ~1yr
var MIN_GROWTH_MM_DAY = 0.02;       // below this, projected date is "unknown", not 50yr out
var STALE_DAYS = 30;
var MAX_PROJECTION_DAYS = 730;
var SEASON_MULT = [0.35,0.45,0.8,1.2,1.35,1.35,1.05,1.0,1.2,1.3,0.8,0.45]; // Jan..Dec Gulf seasonality

// growthPoints(cage) — growth/stocked events with a sizeMm, sorted by date
function growthPoints(cage){
  if (!cage || !cage.events) return [];
  var pts = [];
  cage.events.forEach(function(ev){
    if ((ev.type === 'growth' || ev.type === 'stocked') && typeof ev.sizeMm === 'number'){
      pts.push({ ms:isoToMs(ev.date), date:ev.date, size:ev.sizeMm });
    }
  });
  pts.sort(function(a,b){ return a.ms - b.ms; });
  return pts;
}

// integrateGrowth — seasonal forward-integration (§4.3, verbatim)
function integrateGrowth(fromMs, size, ratePerDay, targetSize, maxDays){
  var ms = fromMs, days = 0;
  while (size < targetSize && days < maxDays){
    ms += 86400000; days++;
    size += ratePerDay * SEASON_MULT[new Date(ms).getUTCMonth()];
  }
  return { ms:ms, size:size, days:days, reached: size >= targetSize };
}

// growthModel(cage, farm) — rate selection + estimate today + projection + confidence (§4.2–4.4)
function growthModel(cage, farm){
  var market = farm.settings.marketSizeMm;
  var pts = growthPoints(cage);
  var model = {
    ok:false, points:pts, rateMmPerDay:DEFAULT_GROWTH_MM_DAY, rateMmPerMonth:DEFAULT_GROWTH_MM_DAY*30.4375,
    rateSource:'prior', noisy:false, estTodayMm:null, readyNow:false, daysToMarket:null,
    projectedDate:null, projectionCapped:false, confidence:'low',
    lastMeasuredSizeMm:null, lastMeasuredDate:null, isStale:false
  };
  if (!cage || !cage.batch) return model;

  var rate = DEFAULT_GROWTH_MM_DAY, source = 'prior', noisy = false;
  if (pts.length >= 2){
    var first = pts[0], last = pts[pts.length-1];
    if (pts.length === 2){
      var dd = (last.ms - first.ms) / 86400000;
      rate = dd > 0 ? (last.size - first.size) / dd : DEFAULT_GROWTH_MM_DAY;
      source = 'observed';
    } else {
      // ordinary least-squares slope over (dayOffset, size)
      var n = pts.length, sx = 0, sy = 0, sxx = 0, sxy = 0;
      for (var i=0; i<n; i++){
        var x = (pts[i].ms - first.ms) / 86400000, y = pts[i].size;
        sx += x; sy += y; sxx += x*x; sxy += x*y;
      }
      var denom = (n*sxx - sx*sx);
      rate = denom !== 0 ? (n*sxy - sx*sy) / denom : DEFAULT_GROWTH_MM_DAY;
      source = 'observed';
    }
    if (!(rate > 0)){ rate = DEFAULT_GROWTH_MM_DAY; source = 'prior'; noisy = true; }   // oysters don't shrink
  }
  if (rate < MIN_GROWTH_MM_DAY) rate = MIN_GROWTH_MM_DAY;

  model.rateMmPerDay = rate; model.rateMmPerMonth = rate * 30.4375; model.rateSource = source; model.noisy = noisy;

  // estimate today: integrate from the last measurement forward to today
  var todayMs = isoToMs(todayISO());
  var lastPt = pts.length ? pts[pts.length-1] : null;
  if (lastPt){
    model.lastMeasuredSizeMm = lastPt.size; model.lastMeasuredDate = lastPt.date;
    var ds = daysSince(lastPt.date); model.isStale = (ds != null && ds > 90);
    if (lastPt.ms < todayMs){
      var est = integrateGrowth(lastPt.ms, lastPt.size, rate, Infinity, Math.min(MAX_PROJECTION_DAYS, Math.max(0, Math.round((todayMs-lastPt.ms)/86400000)))); // clamp (H3)
      model.estTodayMm = est.size;
    } else model.estTodayMm = lastPt.size;
  } else {
    // no points → estimate from stockedDate using the prior
    var sd = cage.batch.stockedDate, base = (typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : 15;
    if (isValidISO(sd) && isoToMs(sd) < todayMs){
      var est0 = integrateGrowth(isoToMs(sd), base, rate, Infinity, Math.min(MAX_PROJECTION_DAYS, Math.round((todayMs-isoToMs(sd))/86400000))); // clamp (H3)
      model.estTodayMm = est0.size;
    } else model.estTodayMm = base;
  }
  model.ok = true;

  // ready now?
  model.readyNow = (model.estTodayMm != null && model.estTodayMm >= market);

  // projection: integrate today → market, capped
  if (!model.readyNow){
    var proj = integrateGrowth(todayMs, model.estTodayMm != null ? model.estTodayMm : 15, rate, market, MAX_PROJECTION_DAYS);
    model.daysToMarket = proj.days;
    if (proj.reached && rate >= MIN_GROWTH_MM_DAY){
      var pd = new Date(proj.ms);
      model.projectedDate = pd.getUTCFullYear() + '-' + pad2(pd.getUTCMonth()+1) + '-' + pad2(pd.getUTCDate());
    }
    if (!proj.reached) model.projectionCapped = true;
  }

  // confidence (§4.4)
  var spanDays = pts.length ? (pts[pts.length-1].ms - pts[0].ms) / 86400000 : 0;
  var freshEnough = (model.lastMeasuredDate != null && daysSince(model.lastMeasuredDate) != null && daysSince(model.lastMeasuredDate) >= 0 && daysSince(model.lastMeasuredDate) <= STALE_DAYS);
  if (source === 'prior' || noisy || model.isStale) model.confidence = 'low';
  else if (pts.length >= 3 && spanDays >= 45 && freshEnough) model.confidence = 'high';
  else model.confidence = 'medium';

  return model;
}

// projectionLabel(model, farm) — honest copy (§4.5)
function projectionLabel(model, farm){
  if (!model || !model.ok) return '—';
  farm = farm || getFarm();
  var market = farm.settings.marketSizeMm;
  if (model.readyNow){
    var measuredReady = typeof model.lastMeasuredSizeMm === 'number' && model.lastMeasuredSizeMm >= market;
    return measuredReady ? 'Market-ready now' : 'Likely market-ready (est.) — log a growth check to confirm';
  }
  if (model.projectionCapped) return '1+ years out';
  if (model.projectedDate) return '~' + monthYear(model.projectedDate) + ' (' + market + ' mm)';
  return '—';
}

// confidenceHint(model) — the one-line "why" (§4.5)
function confidenceHint(model){
  if (!model || model.confidence === 'high') return null;
  var why;
  if (model.rateSource !== 'observed') why = 'based on a typical Gulf growth rate — log growth checks to use this cage’s own pace';
  else if (model.noisy)   why = 'recent checks disagree — re-measure to sharpen it';
  else if (model.isStale) why = 'last check was ' + daysSince(model.lastMeasuredDate) + ' days ago — log a fresh growth check to sharpen it';
  else                    why = 'log another growth check to sharpen it';
  return (model.confidence === 'low' ? 'Low' : 'Medium') + ' confidence projection: ' + why + '.';
}

/* ── growthChartSVG(cage, marketMm, model) — inline SVG (§4.6).
      Solid teal polyline through measurements; dashed projection to the
      market line; dashed market threshold labeled "market N mm". ─────── */
function growthChartSVG(cage, marketMm, model){
  var pts = (model && model.points) ? model.points : growthPoints(cage);
  var W = 320, H = 150, padL = 8, padR = 10, padT = 12, padB = 18;
  var todayMs = isoToMs(todayISO());

  // x-domain: first point (or stockedDate) → projectedDate/today; y-domain: 0 → max(market, sizes)+pad
  var startMs = pts.length ? pts[0].ms : (isValidISO(cage.batch && cage.batch.stockedDate) ? isoToMs(cage.batch.stockedDate) : todayMs);
  var endMs = todayMs;
  if (model && model.projectedDate) endMs = Math.max(endMs, isoToMs(model.projectedDate));
  if (endMs <= startMs) endMs = startMs + 86400000 * 30;
  var maxSize = marketMm;
  pts.forEach(function(p){ if (p.size > maxSize) maxSize = p.size; });
  if (model && typeof model.estTodayMm === 'number' && model.estTodayMm > maxSize) maxSize = model.estTodayMm;
  maxSize = maxSize * 1.12;

  function X(ms){ return padL + (ms - startMs) / (endMs - startMs) * (W - padL - padR); }
  function Y(s){ return H - padB - (s / maxSize) * (H - padT - padB); }

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" preserveAspectRatio="xMidYMid meet" aria-hidden="true">';
  // axes (hairline)
  svg += '<line x1="' + padL + '" y1="' + (H-padB) + '" x2="' + (W-padR) + '" y2="' + (H-padB) + '" stroke="#CBD9DB" stroke-width="1"/>';
  // market threshold (dashed teal) + label
  var my = Y(marketMm);
  svg += '<line x1="' + padL + '" y1="' + my.toFixed(1) + '" x2="' + (W-padR) + '" y2="' + my.toFixed(1) + '" stroke="#0E7C8B" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>';
  svg += '<text x="' + (W-padR) + '" y="' + (my - 4).toFixed(1) + '" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#0E7C8B">market ' + marketMm + ' mm</text>';

  // measured polyline (solid teal) + nodes
  if (pts.length){
    var d = '';
    pts.forEach(function(p, i){ d += (i ? ' L' : 'M') + X(p.ms).toFixed(1) + ' ' + Y(p.size).toFixed(1); });
    svg += '<polyline points="' + pts.map(function(p){ return X(p.ms).toFixed(1) + ',' + Y(p.size).toFixed(1); }).join(' ') + '" fill="none" stroke="#0E7C8B" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    // projection segment: last real point → (projectedDate, market) or (today, est)
    var lp = pts[pts.length-1];
    var px, py;
    if (model && model.projectedDate){ px = X(isoToMs(model.projectedDate)); py = Y(marketMm); }
    else if (model && typeof model.estTodayMm === 'number'){ px = X(todayMs); py = Y(model.estTodayMm); }
    if (px != null){
      svg += '<line x1="' + X(lp.ms).toFixed(1) + '" y1="' + Y(lp.size).toFixed(1) + '" x2="' + px.toFixed(1) + '" y2="' + py.toFixed(1) + '" stroke="#0E7C8B" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>';
    }
    pts.forEach(function(p){ svg += '<circle cx="' + X(p.ms).toFixed(1) + '" cy="' + Y(p.size).toFixed(1) + '" r="3.2" fill="#0E7C8B"/>'; });
  } else {
    // no measurements → just a dashed prior line from start to projected/today
    var sy = Y((cage.batch && typeof cage.batch.sizeMm === 'number') ? cage.batch.sizeMm : 15);
    var ex, ey;
    if (model && model.projectedDate){ ex = X(isoToMs(model.projectedDate)); ey = Y(marketMm); }
    else { ex = X(todayMs); ey = Y(model && typeof model.estTodayMm === 'number' ? model.estTodayMm : marketMm); }
    svg += '<line x1="' + X(startMs).toFixed(1) + '" y1="' + sy.toFixed(1) + '" x2="' + ex.toFixed(1) + '" y2="' + ey.toFixed(1) + '" stroke="#0E7C8B" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>';
  }
  // axis labels (start date left, projected/today right)
  svg += '<text x="' + padL + '" y="' + (H-5) + '" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#6E878C">' + (isValidISO(toISOfromMs(startMs)) ? monthYear(toISOfromMs(startMs)) : '') + '</text>';
  var rightIso = (model && model.projectedDate) ? model.projectedDate : todayISO();
  svg += '<text x="' + (W-padR) + '" y="' + (H-5) + '" text-anchor="end" font-family="ui-monospace,Menlo,monospace" font-size="9" fill="#6E878C">' + monthYear(rightIso) + '</text>';
  svg += '</svg>';
  return svg;
}
// toISOfromMs — UTC ms → ISO yyyy-mm-dd (chart axis labels)
function toISOfromMs(ms){ var d = new Date(ms); return d.getUTCFullYear() + '-' + pad2(d.getUTCMonth()+1) + '-' + pad2(d.getUTCDate()); }

/* ══════════════════════════════════════════════════════════════════
   PHOTOS — IndexedDB blobs + capture/compress + widgets + viewer + sweep
   (§5 / PHOTOS-IMPLEMENTATION-PLAN). ES5 .then() style, no async/await.
   Binary lives ONLY in IDB 'spatmapPhotos'; never base64 in localStorage.
   ══════════════════════════════════════════════════════════════════ */
var PHOTO_DB = 'spatmapPhotos', PHOTO_STORE = 'photos', PHOTO_DB_VER = 1;
var photosUnavailable = false;          // true once we know IDB can't be used (private mode / Lockdown)
var photoDBP = null;                    // cached OPEN promise (never cache a rejection)
var photoPersistAsked = false;          // fire navigator.storage.persist() once
var PHOTO_CAP = 6;                      // soft cap of photos per event/batch

// photoDB() → Promise<IDBDatabase|null>. Creates the store on upgrade.
//   Missing IDB / open error / private mode → resolve null + set photosUnavailable.
//   Wrapped in a ~3s timeout that resolves null and retries next call (Safari first-open hang);
//   a rejected/null result is never cached, so the next call re-tries cleanly.
function photoDB(){
  if (photoDBP) return photoDBP;
  if (typeof indexedDB === 'undefined' || !indexedDB){ photosUnavailable = true; return Promise.resolve(null); }
  photoDBP = new Promise(function(resolve){
    var settled = false;
    function done(db){ if (settled) return; settled = true; if (!db){ photoDBP = null; } resolve(db); }
    var timer = setTimeout(function(){ done(null); }, 3000);   // first-open hang guard
    var req;
    try { req = indexedDB.open(PHOTO_DB, PHOTO_DB_VER); }
    catch (e){ clearTimeout(timer); photosUnavailable = true; done(null); return; }
    req.onupgradeneeded = function(){
      try { var db = req.result; if (!db.objectStoreNames.contains(PHOTO_STORE)) db.createObjectStore(PHOTO_STORE, { keyPath:'id' }); }
      catch (e){}
    };
    req.onsuccess = function(){ clearTimeout(timer);
      var db = req.result;
      // guard against a half-created DB (store missing) → unusable
      if (!db.objectStoreNames.contains(PHOTO_STORE)){ photosUnavailable = true; done(null); return; }
      db.onclose = function(){ photoDBP = null; };               // let a future call reopen
      done(db);
    };
    req.onerror = function(){ clearTimeout(timer); photosUnavailable = true; done(null); };
    req.onblocked = function(){ clearTimeout(timer); done(null); };
  });
  return photoDBP;
}
// photoTxStore(mode) → Promise<IDBObjectStore|null>
function photoTxStore(mode){
  return photoDB().then(function(db){
    if (!db) return null;
    try { return db.transaction(PHOTO_STORE, mode).objectStore(PHOTO_STORE); }
    catch (e){ return null; }
  });
}
// photoPut(rec) → Promise<id>. Rejects on quota / failure. First success asks for persistence.
function photoPut(rec){
  return photoTxStore('readwrite').then(function(store){
    if (!store) return Promise.reject(new Error('Photos need browser storage that isn\'t available here.'));
    return new Promise(function(resolve, reject){
      var req;
      try { req = store.put(rec); }
      catch (e){ reject(e); return; }
      req.onsuccess = function(){
        if (!photoPersistAsked){ photoPersistAsked = true;
          try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch (e){} }
        resolve(rec.id);
      };
      req.onerror = function(){ reject(req.error || new Error('Could not save photo — device storage may be full.')); };
    });
  });
}
// photoGet(id) → Promise<rec|null>
function photoGet(id){
  if (!id) return Promise.resolve(null);
  return photoTxStore('readonly').then(function(store){
    if (!store) return null;
    return new Promise(function(resolve){
      var req; try { req = store.get(id); } catch (e){ resolve(null); return; }
      req.onsuccess = function(){ resolve(req.result || null); };
      req.onerror = function(){ resolve(null); };
    });
  });
}
// photoGetMany(ids) → Promise<rec[]> (nulls filtered, order follows ids)
function photoGetMany(ids){
  ids = ids || [];
  return Promise.all(ids.map(function(id){ return photoGet(id); }))
    .then(function(recs){ return recs.filter(function(r){ return !!r; }); });
}
// photoDeleteMany(ids) → Promise
function photoDeleteMany(ids){
  ids = ids || [];
  if (!ids.length) return Promise.resolve();
  return photoTxStore('readwrite').then(function(store){
    if (!store) return;
    return new Promise(function(resolve){
      var pending = ids.length;
      function step(){ if (--pending <= 0) resolve(); }
      ids.forEach(function(id){
        var req; try { req = store.delete(id); } catch (e){ step(); return; }
        req.onsuccess = step; req.onerror = step;
      });
    });
  });
}
// photoAllIds() → Promise<string[]>
function photoAllIds(){
  return photoTxStore('readonly').then(function(store){
    if (!store) return [];
    return new Promise(function(resolve){
      var req;
      try { req = store.getAllKeys(); }
      catch (e){ resolve([]); return; }
      req.onsuccess = function(){ resolve(req.result || []); };
      req.onerror = function(){ resolve([]); };
    });
  });
}

/* ── Capture + compression (§5.2) ─────────────────────────────────── */
// compressPhoto(file) → Promise<{blob,w,h}>. Re-encodes to ≤1280px JPEG q0.72
//   (transparently converts HEIC, strips EXIF/GPS). Prefers createImageBitmap with
//   from-image orientation; falls back to new Image()+objectURL for older Safari.
function compressPhoto(file){
  return new Promise(function(resolve, reject){
    if (!file){ reject(new Error('No photo selected.')); return; }
    function fromCanvas(srcW, srcH, draw){
      var longest = Math.max(srcW, srcH) || 1;
      var scale = Math.min(1, 1280 / longest);
      var w = Math.max(1, Math.round(srcW * scale)), hh = Math.max(1, Math.round(srcH * scale));
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = hh;
      var ctx = canvas.getContext('2d');
      try { draw(ctx, w, hh); } catch (e){ reject(new Error('Could not read that photo.')); return; }
      canvas.toBlob(function(blob){
        if (!blob){ reject(new Error('Photo too large to save on this device.')); return; }   // low-memory / corrupt
        resolve({ blob:blob, w:w, h:hh });
      }, 'image/jpeg', 0.72);
    }
    // Path A: createImageBitmap with EXIF-orientation applied
    if (typeof createImageBitmap === 'function'){
      var opts = null;
      try { opts = { imageOrientation:'from-image' }; } catch (e){ opts = null; }
      createImageBitmap(file, opts || undefined).then(function(bmp){
        fromCanvas(bmp.width, bmp.height, function(ctx, w, hh){ ctx.drawImage(bmp, 0, 0, w, hh); if (bmp.close) bmp.close(); });
      }).catch(function(){ pathB(); });
      return;
    }
    pathB();
    // Path B: <img> + object URL fallback
    function pathB(){
      var url, img = new Image();
      try { url = URL.createObjectURL(file); } catch (e){ reject(new Error('Could not read that photo.')); return; }
      img.onload = function(){
        var sw = img.naturalWidth || img.width, sh = img.naturalHeight || img.height;
        fromCanvas(sw, sh, function(ctx, w, hh){ ctx.drawImage(img, 0, 0, w, hh); });
        URL.revokeObjectURL(url);
      };
      img.onerror = function(){ URL.revokeObjectURL(url); reject(new Error('Could not read that photo.')); };
      img.src = url;
    }
  });
}
// addPhotoFromFile(file) → Promise<id>. Compress → store a PhotoRecord, resolve its id.
function addPhotoFromFile(file){
  return compressPhoto(file).then(function(out){
    var rec = { id:uid(), blob:out.blob, w:out.w, h:out.h, createdAt:Date.now() };
    return photoPut(rec);
  });
}

/* ── Widgets (§5.3) ───────────────────────────────────────────────── */
// photoField(existingIds) → { el, ids(), busy() }. Editable capture widget.
//   Thumbs (each with a ✕ that drops the id from the LOCAL list only — the sweep
//   reclaims the blob), then a dashed "Add photo" tile wired to a hidden file input.
function photoField(existingIds){
  var ids = (existingIds || []).slice();
  var pending = 0;                                   // compressions in flight
  var el = h('div', null);
  el.appendChild(h('label', null, 'Photos'));
  if (photosUnavailable){
    el.appendChild(h('div', { class:'fieldHint' }, 'Photos need browser storage that isn\'t available here (private browsing?).'));
    return { el:el, ids:function(){ return ids.slice(); }, busy:function(){ return false; } };
  }
  var row = h('div', { class:'photoRow' });
  el.appendChild(row);
  // hidden file input MUST live in the DOM when .click()ed (iOS) — keep it inside el
  var input = h('input', { type:'file', accept:'image/*', multiple:true, style:{display:'none'} });
  el.appendChild(input);

  function thumbFor(id){
    var wrap = h('div', { class:'photoThumbWrap' });
    var img = h('img', { alt:'photo' });
    wrap.appendChild(img);
    photoGet(id).then(function(rec){
      if (rec && rec.blob){ img.src = trackURL(URL.createObjectURL(rec.blob)); }
      else { img.style.opacity = '.4'; }             // blob not (yet) present
    });
    wrap.appendChild(h('button', { type:'button', class:'rmph', 'aria-label':'Remove photo', onclick:function(){
      var i = ids.indexOf(id); if (i >= 0) ids.splice(i, 1);   // local only; never deletes the blob
      if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
    } }, '×'));
    return wrap;
  }
  function addTile(){
    return h('button', { type:'button', class:'photoAdd', 'aria-label':'Add photo',
      html:icon('camera', 24), onclick:function(){ input.click(); } });
  }
  var tile = addTile();
  ids.forEach(function(id){ row.appendChild(thumbFor(id)); });
  row.appendChild(tile);

  input.addEventListener('change', function(){
    var files = input.files ? Array.prototype.slice.call(input.files) : [];
    input.value = '';                                // allow re-picking the same file
    files.forEach(function(file){
      if (ids.length + pending >= PHOTO_CAP){ toast('Up to ' + PHOTO_CAP + ' photos'); return; }
      pending++;
      addPhotoFromFile(file).then(function(id){
        pending--;
        ids.push(id);
        row.insertBefore(thumbFor(id), tile);        // keep the Add tile last
      }).catch(function(err){
        pending--;
        toast((err && err.message) ? err.message : 'Could not save photo');
      });
    });
  });

  return {
    el: el,
    ids: function(){ return ids.slice(); },
    busy: function(){ return pending > 0; }
  };
}

// photoStrip(photoIds, caption) → read-only horizontal thumb row. Tap → openPhotoViewer.
//   `caption` (optional) is passed to the viewer so the caption strip can name the event.
function photoStrip(photoIds, caption){
  var strip = h('div', { class:'photoStrip' });
  var list = (photoIds || []).filter(function(p){ return typeof p === 'string'; });
  list.forEach(function(id, idx){
    var img = h('img', { class:'thumb', alt:'photo' });
    img.addEventListener('click', function(){ openPhotoViewer(list, idx, caption); });
    photoGet(id).then(function(rec){
      if (rec && rec.blob){ img.src = trackURL(URL.createObjectURL(rec.blob)); }
      else { img.style.opacity = '.35'; img.style.background = 'var(--surface-sink)'; }   // muted placeholder
    });
    strip.appendChild(img);
  });
  return strip;
}

// openPhotoViewer(photoIds, start, caption) → singleton #photoViewer over the sheet.
//   Fit-to-screen img, ✕ close, swipe/Arrow prev-next, "2 / 5" counter, caption strip
//   (photo date + the event it's attached to). Escape closes the viewer first (the global
//   keydown handler defers when #photoViewer has a child). Revokes its own URL on nav/close.
var _pvURL = null;
function openPhotoViewer(photoIds, start, caption){
  var list = (photoIds || []).filter(function(p){ return typeof p === 'string'; });
  if (!list.length) return;
  var idx = Math.max(0, Math.min(start || 0, list.length - 1));
  var host = document.getElementById('photoViewer');
  if (!host){ host = h('div', { id:'photoViewer' }); document.body.appendChild(host); }
  host.className = 'viewer';                           // apply the full-screen overlay styling while open
  host.innerHTML = '';

  function revoke(){ if (_pvURL){ URL.revokeObjectURL(_pvURL); _pvURL = null; } }
  function close(){
    revoke();
    document.removeEventListener('keydown', onKey, true);
    host.removeEventListener('touchstart', onTouchStart);
    host.removeEventListener('touchend', onTouchEnd);
    host.innerHTML = '';                              // empties firstChild → Escape returns to the sheet
    host.className = '';                              // drop .viewer so the empty div stops covering the screen
  }

  var img = h('img', { alt:'photo' });
  var cap = h('div', { class:'cap' });
  var counter = h('div', { class:'cap', style:{paddingTop:'2px', opacity:'.85'} });
  var closeBtn = h('button', { class:'x', 'aria-label':'Close', html:icon('close', 22), onclick:close });
  var prev = h('button', { class:'nav prev', 'aria-label':'Previous', html:icon('back', 22),
    onclick:function(){ show(idx - 1); } });
  var next = h('button', { class:'nav next', 'aria-label':'Next', html:icon('chevron', 22),
    onclick:function(){ show(idx + 1); } });

  function show(i){
    if (!list.length) return;
    idx = (i + list.length) % list.length;            // wrap
    revoke();
    img.removeAttribute('src');
    photoGet(list[idx]).then(function(rec){
      if (rec && rec.blob){ _pvURL = URL.createObjectURL(rec.blob); img.src = _pvURL; }
      var bits = [];
      if (typeof caption === 'string' && caption) bits.push(caption);
      else if (typeof caption === 'function'){ var c = caption(idx, rec); if (c) bits.push(c); }
      if (rec && rec.createdAt) bits.push(monthDay(toISOfromMs(rec.createdAt)));
      cap.textContent = bits.join(' · ');
      counter.textContent = (idx + 1) + ' / ' + list.length;
    });
    prev.style.display = next.style.display = (list.length > 1) ? '' : 'none';
  }

  host.appendChild(img);
  host.appendChild(closeBtn);
  host.appendChild(prev);
  host.appendChild(next);
  var capWrap = h('div', { style:{position:'absolute', left:'0', right:'0', bottom:'0'} }, cap, counter);
  host.appendChild(capWrap);

  function onKey(e){
    if (e.key === 'Escape'){ e.stopPropagation(); e.preventDefault(); close(); }
    else if (e.key === 'ArrowLeft'){ show(idx - 1); }
    else if (e.key === 'ArrowRight'){ show(idx + 1); }
  }
  document.addEventListener('keydown', onKey, true);   // capture phase → runs before the sheet's Escape

  var tx = 0, ty = 0;
  function onTouchStart(e){ if (e.touches && e.touches[0]){ tx = e.touches[0].clientX; ty = e.touches[0].clientY; } }
  function onTouchEnd(e){
    var t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
    if (!t) return;
    var dx = t.clientX - tx, dy = t.clientY - ty;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){ show(idx + (dx < 0 ? 1 : -1)); }
  }
  host.addEventListener('touchstart', onTouchStart, { passive:true });
  host.addEventListener('touchend', onTouchEnd, { passive:true });

  show(idx);
}

/* ── Reference scan + orphan sweep (§5.7) ─────────────────────────── */
// referencedPhotoIds() → map { id:true } of every photoId referenced anywhere in state.
function referencedPhotoIds(){
  var set = {};
  function add(arr){ if (Array.isArray(arr)) arr.forEach(function(p){ if (typeof p === 'string') set[p] = true; }); }
  (state && state.farms ? state.farms : []).forEach(function(farm){
    (farm.batches || []).forEach(function(b){ add(b.photoIds); });
    (farm.lines || []).forEach(function(line){
      (line.cages || []).forEach(function(cage){
        if (cage.batch) add(cage.batch.photoIds);
        (cage.events || []).forEach(function(ev){ add(ev.photoIds); });
      });
    });
    if (farm.barge && Array.isArray(farm.barge.events)) farm.barge.events.forEach(function(ev){ add(ev.photoIds); });
    (farm.harvestLog || []).forEach(function(hentry){ add(hentry.photoIds); });
  });
  return set;
}
// sweepPhotos() → delete IDB blobs not referenced anywhere AND older than 10 min (grace window).
function sweepPhotos(){
  if (photosUnavailable) return Promise.resolve();
  var refs = referencedPhotoIds();
  var cutoff = Date.now() - 10 * 60 * 1000;
  return photoAllIds().then(function(allIds){
    if (!allIds.length) return;
    var unref = allIds.filter(function(id){ return !refs[id]; });
    if (!unref.length) return;
    // only delete those past the grace window (protects an in-progress, unsubmitted form)
    return photoGetMany(unref).then(function(recs){
      var byId = {}; recs.forEach(function(r){ byId[r.id] = r; });
      var toDelete = unref.filter(function(id){
        var r = byId[id];
        if (!r) return true;                          // record vanished mid-scan → safe to drop key
        return (typeof r.createdAt === 'number') ? (r.createdAt < cutoff) : true;
      });
      if (toDelete.length) return photoDeleteMany(toDelete);
    });
  }).catch(function(){});
}

/* ── Export / import with photos (§5.6) ───────────────────────────── */
// exportDataWithPhotos() → full backup JSON inlining referenced blobs as data URLs.
function exportDataWithPhotos(){
  var refs = referencedPhotoIds();
  var ids = Object.keys(refs);
  if (ids.length > 20) toast('Packing ' + ids.length + ' photos…');
  photoGetMany(ids).then(function(recs){
    return Promise.all(recs.map(function(rec){
      return new Promise(function(resolve){
        var reader = new FileReader();
        reader.onload = function(){ resolve({ id:rec.id, w:rec.w, h:rec.h, createdAt:rec.createdAt, dataUrl:reader.result }); };
        reader.onerror = function(){ resolve(null); };
        reader.readAsDataURL(rec.blob);
      });
    }));
  }).then(function(photos){
    photos = photos.filter(function(p){ return !!p; });
    var data = { v:1, farms:state.farms, activeFarmId:state.activeFarmId, photos:photos };
    var json = JSON.stringify(data);
    var blob = new Blob([json], { type:'application/json' });
    var url = URL.createObjectURL(blob);
    var d = new Date();
    var dateStr = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
    var a = h('a', { href:url, download:'spatmap-backup-with-photos-' + dateStr + '.json' });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    toast('Backup downloaded · ' + photos.length + (photos.length === 1 ? ' photo' : ' photos'));
  }).catch(function(){ toast('Could not pack photos for export'); });
}
// restoreImportedPhotos(photos) → write each data URL back into IDB, then sweep.
function restoreImportedPhotos(photos){
  if (!photos || !photos.length){ toast('Backup imported'); return; }
  Promise.all(photos.map(function(p){
    if (!p || !p.dataUrl || !p.id) return Promise.resolve(false);
    return fetch(p.dataUrl).then(function(r){ return r.blob(); }).then(function(blob){
      return photoPut({ id:p.id, blob:blob, w:p.w || 0, h:p.h || 0, createdAt:p.createdAt || Date.now() }).then(function(){ return true; });
    }).catch(function(){ return false; });
  })).then(function(results){
    var n = results.filter(function(ok){ return ok; }).length;
    sweepPhotos();
    toast('Backup imported · ' + n + (n === 1 ? ' photo restored' : ' photos restored'));
  });
}

// shared stub helpers
function comingSoon(){ toast('Coming soon'); }
function stubSheet(title){ return sheetHead(title).concat(h('div', { class:'fieldHint', style:{marginTop:'12px'} }, 'Coming soon.')); }

/* ═══════════════════════════════════════════════════════════════════
   GLOBAL KEY HANDLING + BOOT
   ═══════════════════════════════════════════════════════════════════ */
// Escape closes: photo viewer first (Builder 3 may pre-empt), then sheet.
document.addEventListener('keydown', function(e){
  if (e.key !== 'Escape') return;
  var viewer = document.getElementById('photoViewer');
  if (viewer && viewer.firstChild) return;   // viewer handles its own Escape (Builder 3)
  if (document.getElementById('overlay').classList.contains('open')) closeSheet();
});
// Tap the overlay backdrop (not the sheet) → close.
document.getElementById('overlay').addEventListener('click', function(e){
  if (e.target === this) closeSheet();
});

function init(){
  state = loadState();
  render();
  // orphan-photo sweep ~3s after first render (Builder 3 implements sweepPhotos)
  setTimeout(function(){ if (typeof sweepPhotos === 'function') sweepPhotos(); }, 3000);
}

// Debug handle for console + Playwright (extend in later builders).
window.SpatMapDebug = {
  get state(){ return state; },
  getFarm: getFarm,
  save: save,
  render: render,
  commit: commit,
  loadBrightside: loadBrightsideFarm,
  pileLevel: pileLevel,
  // photo layer (Builder 3) — console + Playwright testing
  addPhotoFromFile: addPhotoFromFile,
  photoGet: photoGet,
  photoAllIds: photoAllIds,
  referencedPhotoIds: referencedPhotoIds,
  sweepPhotos: sweepPhotos
};

init();
</script>
