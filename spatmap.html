<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A151B">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SpatMap v4</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A2E38'/%3E%3Cellipse cx='16' cy='18' rx='9' ry='6.5' fill='%23EAF1F2'/%3E%3Cpath d='M7.5 18 Q16 8 24.5 18' fill='none' stroke='%230E7C8B' stroke-width='2.2'/%3E%3C/svg%3E">
<style>
/* ══════════════════════════════════════════════════════════════════
   SpatMap v7 — DESIGN system (light-first nautical chart).
   :root from DESIGN §2; type §3; surfaces §4; map §5; popup/photo/etc.
   This REPLACES the harvest kit's dark :root on purpose.
   ══════════════════════════════════════════════════════════════════ */
:root{
  color-scheme: dark;

  /* ── CANVAS / PAPER (the dark working chart) ──────────────────────── */
  --paper:        #0C1A20;
  --paper-2:      #0F2129;
  --chart-line:   #1B333D;
  --surface:      #152C35;
  --surface-sink: #112730;
  --hair:         #243E48;
  --hair-strong:  #345462;

  /* ── INK (text) ───────────────────────────────────────────────────── */
  --ink:          #E8F1F2;
  --ink-2:        #9FB6BC;
  --ink-3:        #6E888F;

  /* ── BRAND / PRIMARY ACTION ───────────────────────────────────────── */
  --deep:         #0A151B;
  --teal:         #34B3C4;
  --teal-press:   #2491A0;
  --teal-tint:    #14323A;

  /* ── CAGE / OYSTER STATUS (the meaningful color) ──────────────────── */
  --c-empty:      #3C5560;
  --c-empty-ink:  #8BA2A9;
  --c-fresh:      #51B97B;
  --c-mid:        #D38C33;
  --c-old:        #CB5A2F;
  --c-ready:      #34B3C4;
  --c-work:       #E65A40;
  --c-work-soft:  #3A241F;

  --fresh-ink:    #93D9AC;
  --mid-ink:      #EBBE7E;
  --old-ink:      #ED9F82;

  /* ── BARGE (its own warmer world) ─────────────────────────────────── */
  --barge-amber:  #D89B43;
  --barge-amber-ink:#EFC98E;
  --barge-hull:   #2E5C44;
  --barge-wake:   rgba(8,26,33,.62);  /* NEW (WP6): soft water-shadow under the hull */

  /* ── FEEDBACK ─────────────────────────────────────────────────────── */
  --danger:       #E65A40;
  --ok:           #51B97B;
  --toast-bg:     #20424E;

  /* ── GEAR / WATER tokens (re-tokenized for dark water) ────────────── */
  --water-ripple: #15303A;
  --rope:         #8A6A40;
  --rope-shadow:  #5E4528;
  --rope-hi:      #B18B53;
  --piling:       #6E5436;
  --piling-top:   #8B6D47;
  --piling-ring:  #3A2A18;

  /* glyph internals — these names match shapeSVG()/pilingSVG() var() calls */
  --cage-stroke:  #0A151B;
  --cage-mesh:    rgba(8,18,24,.42);
  --cage-float:   rgba(8,18,24,.14);
  --cage-status-dot: var(--c-ready);
  /* aliases pilingSVG uses */
  --piling-color: #6E5436;

  /* ── METRICS ──────────────────────────────────────────────────────── */
  --tap:          48px;
  --tap-min:      44px;
  --radius:       16px;
  --radius-sm:    11px;
  --radius-pill:  999px;
  --gap:          16px;
  --row-gap:      20px;   /* NEW (WP3) — real separation between line rows in the work view */
  --shadow-card:  0 1px 2px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.30);
  --shadow-pop:   0 12px 36px rgba(0,0,0,.55);
  --shadow-sheet: 0 -12px 44px rgba(0,0,0,.55);
  --ease:         cubic-bezier(.22,1,.36,1);

  /* ── TYPE ─────────────────────────────────────────────────────────── */
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-num: ui-monospace, "SF Mono", "DM Mono", "JetBrains Mono", Menlo, Consolas, monospace;
}

/* ── RESET + BASE ─────────────────────────────────────────────────── */
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html{ font-size:16px; -webkit-text-size-adjust:100%; }
body{ font-family:var(--font-ui); color:var(--ink); font-weight:450; background:var(--paper);
  -webkit-font-smoothing:antialiased; letter-spacing:-0.005em;
  min-height:100dvh; overscroll-behavior-y:none; }
button{ font-family:inherit; cursor:pointer; background:none; border:none; color:inherit; }
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{ transition-duration:.01ms!important; animation-duration:.01ms!important; }
}

/* ── TYPE ROLES ───────────────────────────────────────────────────── */
.eyebrow{ font:700 12px/1 var(--font-ui); letter-spacing:.10em; text-transform:uppercase; color:var(--ink-2); }
.hint{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); }
.num{ font-family:var(--font-num); font-variant-numeric:tabular-nums; }

/* ══════════════════════════════════════════════════════════════════
   APP SHELL
   ══════════════════════════════════════════════════════════════════ */
#app{ min-height:100dvh; display:flex; flex-direction:column; }

/* top bar — the one dark anchor */
.topbar{ position:sticky; top:0; z-index:40; background:var(--deep); color:#fff;
  display:flex; align-items:center; gap:10px;
  padding:max(10px, env(safe-area-inset-top)) 14px 10px 14px;
  box-shadow:0 1px 0 rgba(0,0,0,.15); }
.topbar .fname{ font:800 20px/1.1 var(--font-ui); color:#fff; display:flex; align-items:center; gap:5px;
  flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  min-height:var(--tap); background:none; text-align:left; }
.topbar .fname .chev{ flex:0 0 auto; opacity:.8; }
.topbar .menuBtn{ flex:0 0 auto; width:var(--tap); height:var(--tap); border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center; color:#fff; }
.topbar .menuBtn:active{ background:rgba(255,255,255,.12); }

/* one quiet summary strip */
.statstrip{ background:var(--paper); color:var(--ink-2);
  font:600 13px/1 var(--font-ui); padding:9px 16px;
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  border-bottom:1px solid var(--hair); }
.statstrip .st{ display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.statstrip .st .n{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink); }
/* WP5: leading status dot — colored per action class, carries the "this is status" read */
.statstrip .st .dot{ font-size:11px; line-height:1; }
.statstrip .st.work .n{ color:var(--c-work); }
.statstrip .st.work .dot{ color:var(--c-work); }
.statstrip .st.ready .n{ color:var(--teal); }
.statstrip .st.ready .dot{ color:var(--teal); }
/* WP5: quiet totals — one lighter weight, no color punch, they sit behind the action numbers */
.statstrip .st.quiet{ color:var(--ink-3); }
.statstrip .st.quiet .n{ font-weight:600; color:var(--ink-2); }
.statstrip .sep{ color:var(--hair-strong); }
/* WP5: empty-farm CTA — one quiet line in place of the totals run */
.statstrip.empty .cta{ color:var(--ink-3); font-weight:600; }

/* ── DASHBOARD CARD (overview-only money + readiness HUD) ─────────────
   Token-only, dark; sits above the canvas on the unscoped overview. */
.dashcard{ margin:10px 12px 0; padding:14px 16px 12px;
  background:var(--surface); border:1px solid var(--hair); border-radius:14px;
  display:flex; flex-direction:column; gap:11px; }
/* headline row: crop value · sale-ready, split by a hairline rule */
.dc-head{ display:flex; align-items:stretch; gap:14px; }
.dc-stat{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; gap:2px; justify-content:center; }
.dc-vrule{ flex:0 0 1px; align-self:stretch; background:var(--hair-strong); margin:2px 0; }
.dc-big{ font:800 26px/1 var(--font-num); font-variant-numeric:tabular-nums;
  letter-spacing:-.02em; color:var(--ink); }
.dc-money .dc-big{ color:var(--teal); }
.dc-cap{ font:600 12px/1.25 var(--font-ui); color:var(--ink-3); }
.dc-cap .dc-sub{ color:var(--ink-3); font-weight:600; }
/* price CTA — shown in place of the crop value when no prices are set */
.dc-setprice{ display:inline-flex; align-items:center; gap:2px; min-height:34px;
  background:transparent; border:0; padding:0; cursor:pointer; text-align:left;
  font:700 17px/1.1 var(--font-ui); color:var(--teal); -webkit-tap-highlight-color:transparent; }
.dc-setprice .dc-chev{ font-weight:700; opacity:.9; }
.dc-setprice:active{ opacity:.7; }
.dc-setprice:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; border-radius:8px; }
/* quiet count run (oysters / filled / empty) */
.dc-counts{ display:flex; align-items:center; flex-wrap:wrap; gap:6px;
  font:600 12.5px/1 var(--font-ui); color:var(--ink-3); }
.dc-ct{ display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.dc-ct .dc-n{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; color:var(--ink-2); }
.dc-sep{ color:var(--hair-strong); }
.dc-tub{ color:var(--ink-3); white-space:nowrap; font-weight:600; }
/* recent-activity feed — quiet, one row per event */
.dc-feed{ display:flex; flex-direction:column; gap:1px; border-top:1px solid var(--hair); padding-top:9px; }
.dc-row{ display:flex; align-items:baseline; flex-wrap:wrap; gap:5px;
  font:500 12.5px/1.5 var(--font-ui); color:var(--ink-3); min-width:0; }
.dc-row .dc-rlabel{ color:var(--ink-2); font-weight:600; }
.dc-row .dc-rwhere{ color:var(--ink-3); font-family:var(--font-num); font-variant-numeric:tabular-nums; }
.dc-row .dc-rdate{ color:var(--ink-3); font-variant-numeric:tabular-nums; }
.dc-row .dc-rsep{ color:var(--hair-strong); }
/* tappable "N cages need work" row → work queue */
.dc-work{ display:flex; align-items:center; gap:6px; width:100%; margin-top:9px; padding:9px 11px;
  border-radius:10px; background:var(--surface-sink); border:1px solid var(--hair-strong);
  font:650 13px/1 var(--font-ui); color:var(--ink); text-align:left; }
.dc-work:active{ filter:brightness(1.08); }
.dc-work .dc-wflag{ color:var(--barge-amber); }
.dc-work .dc-wn{ font-family:var(--font-num); font-weight:800; }
.dc-work .dc-wlbl{ flex:1 1 auto; }
.dc-work .dc-chev{ color:var(--ink-3); font-size:16px; }
/* dc-ready is now a tappable button (→ harvest forecast) — strip the native button chrome */
button.dc-ready{ background:none; border:0; padding:0; margin:0; font:inherit; color:inherit; cursor:pointer; }
/* harvest-forecast sheet rows */
.fc-big{ font:800 26px/1.1 var(--font-num); color:var(--teal); margin-top:4px; }
.fc-big .fc-sub{ font:600 14px/1 var(--font-ui); color:var(--ink-3); }
.fc-row{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:6px 0; border-top:1px solid var(--hair); }
.fc-row:first-of-type{ border-top:0; }
.fc-m{ color:var(--ink-2); font:600 14px/1.3 var(--font-ui); }
.fc-v{ color:var(--ink); font:700 14px/1.3 var(--font-num); text-align:right; }

/* ── PRICE-PER-OYSTER EDITOR (settings sheet) ────────────────────────── */
.priceEditor{ margin-top:10px; }
.priceEditor-lbl{ font:700 12px/1 var(--font-ui); letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-2); margin:14px 0 8px; }
.priceRow{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.priceRow-name{ flex:1 1 0; min-width:0; font:600 14px/1.3 var(--font-ui); color:var(--ink);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.priceRow-cur{ flex:0 0 auto; font:600 15px/1 var(--font-num); color:var(--ink-3); }
.priceRow input{ flex:0 0 96px; width:96px; min-height:42px; text-align:right; }

/* the map well — WP3: flat calm water directly behind the line rows (no ripple
   grid), so we stop stacking grid-on-grid under an already-dense cell field. The
   ripple texture survives only in the open margin below the last line (the
   ::after band), where it reads as open water rather than noise. */
.mapwell{ flex:1; position:relative; background:var(--paper-2);
  padding:8px 16px calc(150px + env(safe-area-inset-bottom)) 16px; }
/* open-water ripple in the bottom margin only — pinned to the lower padding region
   and BEHIND the line rows (z-index:0), so it never sits under the cages above it. */
.mapwell::after{ content:''; position:absolute; left:0; right:0; z-index:0;
  bottom:0; height:calc(150px + env(safe-area-inset-bottom)); pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 22px, var(--water-ripple) 22px 23px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(36,62,72,.55) 22px 23px);
  opacity:.7;
  -webkit-mask-image:linear-gradient(180deg, transparent 0, #000 40px);
          mask-image:linear-gradient(180deg, transparent 0, #000 40px); }
.mapwell > *{ position:relative; z-index:1; }  /* lift the line rows above the ripple band */
.mapwell.ripplesoft{ } /* hook for reduced texture if needed */
/* WP6 (QA-revised): the fixed barge is a bottom-right HUD object. A full-height right gutter wide
   enough to clear it (140px) stole 36% of a 390px phone and force-scrolled even short lines, hiding
   cages — legibility loses to a corner overlap that matters less. So on mobile we DON'T reserve a
   right gutter: lines run ~full width and a 10-cage line fits with no scroll (over-long lines still
   pan, WP4). Instead a tall BOTTOM pad lets the last line + Add-line scroll fully clear above the
   hull, so when parked at the list end nothing important sits under the barge; mid-scroll a corner
   tuck is acceptable HUD behavior (Phase 2 makes the barge a true canvas HUD anyway). Desktop, with
   room to spare, keeps the clean right gutter. */
.mapwell{ padding-right:calc(12px + env(safe-area-inset-right));
  padding-bottom:calc(160px + env(safe-area-inset-bottom)); }
.mapwell::after{ height:calc(160px + env(safe-area-inset-bottom)); }
@media(min-width:768px){ .mapwell{ padding-right:172px; } }

/* ── FARM LAYOUT EDITOR (LAYOUT §3/§5) ────────────────────────────── */
.layoutPage{ flex:1; display:flex; flex-direction:column; min-height:0; position:relative; }
.topbar.layoutTop{ }
.layoutTop .lp-title{ flex:1; min-width:0; text-align:center; color:#fff;
  font:800 18px/1.1 var(--font-ui); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.layoutTop .lp-back{ display:inline-flex; align-items:center; gap:2px; color:#fff; font:700 15px/1 var(--font-ui); }
.layoutTop .menuBtn{ color:#fff; }
/* Overview home topbar: segmented [Overview | Work] toggle (Component 2) */
.ovTop .ovTitle{ flex:1; min-width:0; text-align:center; font:700 15px/1.1 var(--font-ui); opacity:.85;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ovSeg{ flex:0 0 auto; display:inline-flex; background:rgba(255,255,255,.14); border-radius:999px;
  padding:2px; gap:2px; }
.ovSegBtn{ appearance:none; border:0; background:transparent; color:rgba(255,255,255,.78);
  font:700 13px/1 var(--font-ui); padding:7px 13px; border-radius:999px; min-height:32px; cursor:pointer;
  white-space:nowrap; }
.ovSegBtn.active{ background:var(--ink); color:var(--deep); }
.ovSegBtn:not(.active):active{ background:rgba(255,255,255,.10); }
.layoutCanvas{ flex:1; min-height:0; position:relative; background:var(--paper-2);
  background-image:
    repeating-linear-gradient(0deg, transparent 0 22px, var(--water-ripple) 22px 23px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(36,62,72,.55) 22px 23px); }
.layoutSvg{ position:absolute; inset:0; width:100%; height:100%; display:block;
  touch-action:none; -webkit-user-select:none; user-select:none; }
/* Bug B6: a touch interaction (double-tap/fit) can focus the whole <svg>, which paints a thick amber
   UA outline framing the entire map. Suppress the canvas-level ring. Cage cells keep their own teal
   :focus-visible ring (keyboard a11y) — that rule is more specific and is NOT affected. */
.layoutSvg:focus, .layoutSvg:focus-visible{ outline:none; }
/* compass rose — fixed N-up overlay, bottom-right; subtle, never obstructs shapes (Item 3) */
.lp-compass{ position:absolute; right:14px; bottom:calc(16px + env(safe-area-inset-bottom));
  width:64px; height:64px; z-index:3; pointer-events:none; opacity:.55; }
.lp-compass svg{ display:block; width:100%; height:100%; }
/* zoom-in hint banner — only shown on LARGE farms where per-cage cells are capped at zoomed-out tiers
   (Bug B5). Top-center pill, low-key, never blocks pan/tap (pointer-events:none). */
.lp-zoomhint{ position:absolute; left:50%; top:12px; transform:translateX(-50%); z-index:4;
  display:inline-flex; align-items:center; gap:6px; pointer-events:none;
  background:var(--toast-bg); color:#fff; font:600 12.5px/1 var(--font-ui);
  padding:8px 13px; border-radius:999px; box-shadow:0 2px 8px rgba(0,0,0,.18);
  white-space:nowrap; max-width:calc(100% - 24px); }
.lp-zoomhint[hidden]{ display:none; }
.lp-zoomhint-ico{ display:inline-flex; align-items:center; opacity:.85; }
.lp-zoomhint-ico svg{ display:block; width:16px; height:16px; }
/* WP9 breadcrumb pill — top-center scope ("Farm › Plot"); the PRIMARY zoom-out affordance (tap → all
   plots). Sits above the canvas, clears the topbar. Tappable (pointer-events:auto), hidden at all-plots
   zoom (nothing to zoom out to). Matches the toast/pill vocabulary so it reads as map chrome. */
.lp-crumb{ position:absolute; left:50%; top:12px; transform:translateX(-50%); z-index:6;
  display:inline-flex; align-items:center; gap:2px; appearance:none; border:0; cursor:pointer;
  background:var(--toast-bg); color:#fff; font:600 13px/1 var(--font-ui);
  padding:8px 15px; min-height:34px; border-radius:999px; box-shadow:0 2px 10px rgba(0,0,0,.32);
  white-space:nowrap; max-width:calc(100% - 24px); overflow:hidden; text-overflow:ellipsis; }
.lp-crumb[hidden]{ display:none; }
.lp-crumb:active{ background:var(--toast-bg); filter:brightness(1.12); }
.lp-crumb .lp-crumb-root{ color:rgba(255,255,255,.62); }
.lp-crumb .lp-crumb-sep{ color:rgba(255,255,255,.45); }
.lp-crumb .lp-crumb-here{ color:#fff; font-weight:700; }
/* WP9 first-run coachmark — "drag to the next plot →"; reuses the zoomhint pill look, docked bottom-center
   above the zoom cluster so it never overlaps the breadcrumb. Non-blocking; dismissed on first pan. */
.lp-coach{ position:absolute; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:5;
  transform:translateX(-50%); display:inline-flex; align-items:center; gap:2px; pointer-events:none;
  background:var(--toast-bg); color:rgba(255,255,255,.92); font:600 12.5px/1 var(--font-ui);
  padding:8px 14px; border-radius:999px; box-shadow:0 2px 8px rgba(0,0,0,.22);
  white-space:nowrap; opacity:.92; }
.lp-coach[hidden]{ display:none; }
.lp-coach .lp-coach-arrow{ font-weight:700; animation:lpCoachNudge 1.4s ease-in-out infinite; }
@keyframes lpCoachNudge{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(3px); } }
@media (prefers-reduced-motion:reduce){ .lp-coach .lp-coach-arrow{ animation:none; } }
/* empty-farm state — centered CTA overlay when there are zero plots (Item 2a) */
.lp-emptyfarm{ position:absolute; inset:0; z-index:4; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; padding:0 32px; gap:6px;
  pointer-events:none; }
.lp-emptyfarm .lp-ef-art{ width:88px; height:88px; opacity:.85; margin-bottom:8px; }
.lp-emptyfarm .lp-ef-art svg{ width:100%; height:100%; }
.lp-emptyfarm .lp-ef-title{ font:800 22px/1.15 var(--font-ui); color:var(--ink-2); }
.lp-emptyfarm .lp-ef-sub{ font:500 14px/1.45 var(--font-ui); color:var(--ink-3); max-width:300px;
  margin-bottom:16px; }
.lp-emptyfarm .lp-ef-btn{ pointer-events:auto; min-height:var(--tap); padding:0 28px;
  border-radius:var(--radius-pill); box-shadow:var(--shadow-pop); }
/* drill-in zoom/cross-fade overlay (Item 1) — covers the viewport with the same paper feel; a teal
   focus box scales from the area's screen rect to full-bleed, then the overlay fades over the new
   work map. GPU-friendly (transform/opacity only). Skipped entirely under prefers-reduced-motion. */
.lp-drillOv{ position:fixed; inset:0; z-index:800; pointer-events:none; overflow:hidden;
  background:var(--paper-2);
  background-image:
    repeating-linear-gradient(0deg, transparent 0 22px, var(--water-ripple) 22px 23px),
    repeating-linear-gradient(90deg, transparent 0 22px, rgba(36,62,72,.55) 22px 23px);
  opacity:0; transition:opacity .12s ease; }
.lp-drillOv.go{ opacity:1; }
.lp-drillOv.done{ opacity:0; transition:opacity .18s ease; }
.lp-drillFocus{ position:absolute; border-radius:14px; background:var(--teal-tint);
  border:2px solid var(--teal); box-shadow:var(--shadow-pop); transform-origin:center center;
  opacity:.9; transition:transform .22s var(--ease), opacity .22s var(--ease); }
.layoutPage.lp-drillFade{ transition:opacity .2s var(--ease); opacity:0; }
@media (prefers-reduced-motion:reduce){
  .lp-drillOv, .lp-drillFocus, .layoutPage.lp-drillFade{ transition:none !important; }
}
.lp-plotcard{ filter:drop-shadow(0 4px 14px rgba(0,0,0,.45)); }
.lp-plotlabel{ letter-spacing:.04em; text-transform:uppercase; }
/* ── Component 4: cage-cell interactivity + sibling highlight ──
   Cells are pointer-events:none by default (set in drawCageCells); the .lp-cell-live
   class (added ONLY in view/overview mode) flips them to auto so hover/tap can land.
   Highlight is a CLASS TOGGLE on #layoutWorld: when .hl-active is set, every cell dims
   to opacity .3; a one-pass JS sweep adds .lp-cell-match to siblings (same batch group)
   so they stay fully lit (opacity:1) with a subtle teal glow. GPU-friendly (opacity only,
   no layout). The focus-ring outline aids keyboard a11y. */
.lp-cell-live{ pointer-events:auto; cursor:pointer; }
#layoutWorld .lp-cagecell{ transition:opacity .12s ease; }
#layoutWorld.hl-active .lp-cagecell{ opacity:.28; }
#layoutWorld.hl-active .lp-cagecell.lp-cell-match{ opacity:1;
  filter:drop-shadow(0 0 2.5px var(--teal, #34B3C4)); }
.lp-cagecell:focus-visible{ outline:2px solid var(--teal, #34B3C4); outline-offset:1px; }
/* selection handles (resize/rotate) — visible dot/cap (pointer-events:none) + transparent ≥44px
   hit circle (carries data-handle). Do NOT force pointer-events on the inner glyphs; the inline
   pointer-events:none must win so elementFromPoint resolves to the hit circle. */
.lp-handle{ cursor:pointer; }
.lp-rot{ cursor:grab; }
.lp-guides line{ pointer-events:none; }
/* bottom-left zoom cluster */
.lp-zoom{ position:absolute; left:14px; bottom:calc(82px + env(safe-area-inset-bottom)); z-index:5;
  display:flex; flex-direction:column; gap:8px; }
.lp-zbtn{ width:var(--tap); height:var(--tap); border-radius:var(--radius-sm); background:var(--surface);
  border:1px solid var(--hair); color:var(--ink-2); box-shadow:var(--shadow-card);
  display:flex; align-items:center; justify-content:center; }
.lp-zbtn:active{ background:var(--teal-tint); color:var(--teal-press); }
/* + Add plot pill */
.lp-addplot{ position:absolute; left:50%; transform:translateX(-50%);
  bottom:calc(16px + env(safe-area-inset-bottom)); z-index:5;
  min-height:var(--tap); padding:0 26px; border-radius:var(--radius-pill);
  background:var(--teal); color:#fff; font:750 15px/1 var(--font-ui);
  display:inline-flex; align-items:center; gap:7px; box-shadow:var(--shadow-pop); }
.lp-addplot:active{ background:var(--teal-press); }
/* selection action bar (docked above the add-plot pill) */
.lp-actionbar{ position:absolute; left:14px; right:14px; bottom:calc(78px + env(safe-area-inset-bottom));
  z-index:6; display:none; align-items:center; gap:10px;
  background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius-sm);
  box-shadow:var(--shadow-pop); padding:10px 12px; }
.lp-actionbar.show{ display:flex; }
.lp-actionbar .lp-abtitle{ flex:1; min-width:0; font:700 14px/1.2 var(--font-ui); color:var(--ink-2);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lp-actionbar .btn{ flex:0 0 auto; min-height:44px; padding:0 16px; }
/* scoped work-map back chip (in renderTopBar) */
.topbar .fname.scopeBack{ font:750 16px/1.1 var(--font-ui); gap:4px; }
.topbar .fname.scopeBack .chev{ opacity:1; }

/* ── LINE ROW ─────────────────────────────────────────────────────── */
/* WP3: each line is a discrete band with --row-gap air above/below. The
   inter-row separation is the gap, not padding, so consecutive ropes never
   touch and one line reads as one object. */
.lineRow{ padding:6px 0 8px 0; }
.lineRow + .lineRow{ margin-top:var(--row-gap); }
.lineHead{ display:flex; align-items:center; gap:8px; margin:0 2px 7px 2px; }
.lineHead .eyebrow{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lineHead .lineMenu{ flex:0 0 auto; width:32px; height:32px; border-radius:8px; color:var(--ink-2);
  display:flex; align-items:center; justify-content:center; font-size:20px; line-height:1; }
.lineHead .lineMenu:active{ background:var(--hair); }
.lineBody{ display:flex; align-items:stretch; gap:2px; position:relative; }
/* WP3: pilings are two firm bookend posts — 16px wide, full row height, a single
   bold post + cap with a darker fouling band near the waterline. The grain / mooring
   ring detail is dropped (it vanishes at this size). */
.linePiling{ flex:0 0 auto; width:16px; align-self:stretch; display:flex; align-items:stretch; }
.linePiling svg{ width:16px; height:100%; display:block; }
.linePiling.right svg{ transform:scaleX(-1); }
/* WP4: the strip scrolls horizontally rather than squashing cells. A line longer
   than the ~12–16 cages that fit legibly at 390px overflows to the right and is
   reached by panning the strip, so every glyph keeps its full 22–26px size.
   The braided rope (WP3 spine) is painted as a background-image with
   background-attachment:local so it spans the FULL scroll-content width and stays
   under every cage even when the strip is scrolled right (an absolute child would
   stop at the viewport edge). 4px tall, full opacity — the clearest horizontal
   element on the row; the cages hang FROM it. */
.cageStrip{ flex:1 1 auto; display:flex; align-items:center; gap:4px; position:relative; min-width:0;
  padding:0 4px; overflow-x:auto; overflow-y:visible; scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  background-image:repeating-linear-gradient(115deg,
    var(--rope-hi) 0 4px, var(--rope) 4px 8px, var(--rope-shadow) 8px 10px);
  background-repeat:no-repeat; background-position:left center; background-size:100% 4px;
  background-attachment:local; }
.cageStrip::-webkit-scrollbar{ display:none; }
/* WP4: the braided rope moved onto the .cageStrip background (above) so it spans
   the full scroll content; the standalone .lineRope div is retired. */
.cageStrip .emptyLine{ flex:1; text-align:center; font:500 12px/1.2 var(--font-ui); color:var(--ink-3);
  padding:8px 0; }

/* ── A CAGE CELL (legible, not dense) ─────────────────────────────── */
/* WP4: cells hold a legible size instead of sharing the row width. Target
   22–26px wide, min 18px, height 28px; ~12–16 fit across a 390px phone and the
   rest overflow into the scrollable strip. flex:0 0 auto stops the squash. */
.cage{ position:relative; flex:0 0 auto; flex-basis:24px; min-width:18px; max-width:26px;
  padding:0; border-radius:3px; z-index:1; touch-action:pan-y; }
/* per-shape footprint along the line (owner ask): FlipFarm narrow = more baskets fit; OyGro long-ways */
.cage.cage-flip{ flex-basis:15px; min-width:12px; max-width:18px; }
.cage.cage-oygro{ flex-basis:34px; min-width:28px; max-width:40px; }
.cage .cellfill{ position:relative; width:100%; height:28px; border-radius:3px;
  display:flex; align-items:center; justify-content:center;
  transition:filter .1s ease, box-shadow .15s ease; }
.cage .cellfill svg{ width:100%; height:100%; display:block; }
/* WP4 D8: an empty slot is drawn as structure, not gray static — a dimmed
   --c-empty fill plus a 0.8px --hair-strong hairline so an all-empty rack reads
   as an organized grid of waiting slots. */
.cage .cellfill.empty{ background:var(--c-empty); opacity:.7;
  box-shadow:inset 0 0 0 .8px var(--hair-strong); }
/* market-ready: inset teal TOP edge · needs-work: inset red BOTTOM edge.
   WP4: thickened 3→4px now the cell is large enough to show it. */
.cage .cellfill.rdy{ box-shadow:inset 0 4px 0 var(--c-ready); }
.cage .cellfill.work{ box-shadow:inset 0 -4px 0 var(--c-work); }
.cage .cellfill.rdy.work{ box-shadow:inset 0 4px 0 var(--c-ready), inset 0 -4px 0 var(--c-work); }
/* WP1: ambient .clabel removed — no per-cell digit band under the rope */
/* WP2: tens-tick — one faint mark + number every 10 cages (10,20,30…) under the
   rope. The ONLY ambient numbering. Anchored to its cage cell so it tracks the
   flex layout exactly; a 1px hairline drops from the rope to a small --ink-3 number. */
.cage .tensTick{ position:absolute; left:50%; top:calc(50% + 16px); transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:1px; pointer-events:none; z-index:1; }
.cage .tensTick i{ width:1px; height:5px; background:var(--hair-strong); display:block; }
.cage .tensTick b{ font:700 9px/1 var(--font-num); color:var(--ink-3); }
/* tiny wrench in the corner when needs-work */
.cage .workmark{ position:absolute; top:1px; right:1px; width:9px; height:9px; color:var(--c-work);
  pointer-events:none; }
.cage .workmark svg{ width:9px; height:9px; display:block; }
/* transparent ::after pads the tap target to 48px tall */
.cage::after{ content:''; position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:var(--tap); z-index:-1; }
/* selection highlight — white inner outline + slight brighten */
.cage.sel .cellfill{ outline:2.5px solid #fff; outline-offset:-2.5px;
  filter:brightness(1.06) saturate(1.05); box-shadow:0 0 0 2px var(--teal); }
.cage.sel .cellfill.rdy{ box-shadow:0 0 0 2px var(--teal), inset 0 4px 0 var(--c-ready); }
.cage.sel .cellfill.work{ box-shadow:0 0 0 2px var(--teal), inset 0 -4px 0 var(--c-work); }
.cage.sel .cellfill.rdy.work{ box-shadow:0 0 0 2px var(--teal), inset 0 4px 0 var(--c-ready), inset 0 -4px 0 var(--c-work); }

/* drag band tracking the swept range */
.dragBand{ position:absolute; top:2px; bottom:2px; background:rgba(52,179,196,.20);
  border:1.5px solid var(--teal); border-radius:6px; pointer-events:none; z-index:3; }

/* + Add line — full-width, IN FLOW (no FAB) */
.addLine{ width:100%; min-height:var(--tap); margin-top:8px; border-radius:var(--radius-sm);
  border:1.5px dashed var(--hair-strong); background:var(--surface); color:var(--teal);
  font:750 15px/1 var(--font-ui); display:flex; align-items:center; justify-content:center; gap:8px; }
.addLine:active{ background:var(--teal-tint); }

/* ══════════════════════════════════════════════════════════════════
   THE BARGE (its own warm world)
   ══════════════════════════════════════════════════════════════════ */
/* WP6: caption docks ABOVE the hull (flex column, caption first) so it never collides with
   content below; the hull carries a soft radial "wake" so the barge floats IN the water. */
.barge{ position:fixed; right:10px; z-index:60; pointer-events:auto;
  bottom:calc(12px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; gap:5px;
  transition:width .3s var(--ease); }
/* the hull wrapper holds the SVG + the wake shadow beneath it */
.barge .barge-hull{ position:relative; width:100%;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.55)); }
/* soft radial wake: a blurred ellipse of water-shadow under the waterline so the barge reads
   as floating, not pasted on glass. Sits behind the SVG, scaled to the hull width. */
.barge .barge-hull::after{ content:''; position:absolute; z-index:0; pointer-events:none;
  left:50%; bottom:6%; width:96%; height:26%; transform:translateX(-50%);
  background:radial-gradient(50% 50% at 50% 50%, var(--barge-wake) 0%, rgba(8,26,33,.30) 46%, transparent 72%);
  filter:blur(3px); }
.barge .barge-hull svg{ position:relative; z-index:1; width:100%; height:auto; display:block;
  animation:bob 3.4s ease-in-out infinite; }
@keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.barge.empty{ width:84px; opacity:.85; }
.barge.loaded{ width:118px; opacity:1; }
#oysterPile{ transition:transform .4s var(--ease); }
.barge .barge-pill{ background:var(--surface); border:1.5px solid var(--barge-amber); color:var(--barge-amber-ink);
  border-radius:var(--radius-pill); padding:3px 11px; font:800 13px/1 var(--font-num); white-space:nowrap;
  box-shadow:0 1px 3px rgba(0,0,0,.5); }
.barge .barge-origin{ font:500 11px/1.25 var(--font-ui); color:var(--ink-2); text-align:center; max-width:112px; }
.barge .barge-empty-cap{ font:600 11px/1.2 var(--font-ui); color:var(--ink-3); text-align:center;
  background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius-pill);
  padding:2px 10px; }
@media(min-width:768px){ .barge{ right:18px; bottom:auto; top:50%; transform:translateY(-50%); }
  .barge.empty{ width:104px; } .barge.loaded{ width:132px; } }
@media (prefers-reduced-motion:reduce){ .barge .barge-hull svg{ animation:none; } }

/* ══════════════════════════════════════════════════════════════════
   CARD / KV / ACTION TILES
   ══════════════════════════════════════════════════════════════════ */
.card{ background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
  box-shadow:var(--shadow-card); padding:16px; }
.card + .card{ margin-top:14px; }
.card .eyebrow{ margin-bottom:10px; }
.card .hero{ font:700 34px/1 var(--font-num); letter-spacing:-.02em; color:var(--ink); }
.kv{ display:flex; justify-content:space-between; gap:12px; padding:9px 0; font-size:16px;
  border-top:1px solid var(--hair); }
.kv:first-of-type{ border-top:0; }
.kv .k{ color:var(--ink-2); }
.kv .v{ font:600 16px/1.3 var(--font-num); font-variant-numeric:tabular-nums; text-align:right;
  color:var(--ink); overflow-wrap:anywhere; }
.actGrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.actTile{ min-height:60px; border-radius:var(--radius-sm); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px; font:750 15px/1 var(--font-ui);
  border:1px solid var(--hair); background:var(--surface-sink); color:var(--ink); }
.actTile .ic{ width:22px; height:22px; }
.actTile:active{ background:var(--teal-tint); }

/* ══════════════════════════════════════════════════════════════════
   BOTTOM SHEET / OVERLAY
   ══════════════════════════════════════════════════════════════════ */
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,.55); opacity:0; pointer-events:none;
  transition:opacity .2s ease; z-index:500; }
.overlay.open{ opacity:1; pointer-events:auto; }
.sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--surface);
  border-radius:22px 22px 0 0; max-height:90dvh; overflow-y:auto;
  padding:8px 16px calc(20px + env(safe-area-inset-bottom));
  box-shadow:var(--shadow-sheet); -webkit-overflow-scrolling:touch;
  transform:translateY(100%); transition:transform .26s var(--ease); }
.overlay.open .sheet{ transform:translateY(0); }
.sheet .grab{ width:42px; height:5px; border-radius:3px; background:var(--hair-strong);
  margin:6px auto 10px; }
.sheet h2{ font:800 22px/1.15 var(--font-ui); }
.sheetHead{ display:flex; align-items:flex-start; gap:10px; margin-bottom:6px; }
.sheetHead h2{ flex:1; min-width:0; }
.sheetHead .closeX{ flex:0 0 auto; width:var(--tap); height:var(--tap); margin:-6px -8px 0 0;
  border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; color:var(--ink-2); }
.sheetHead .closeX:active{ background:var(--surface-sink); }
.sheetSub{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); margin:-2px 0 8px; }
.sheet section{ margin-top:14px; }
@media(min-width:768px){
  .sheet{ left:50%; right:auto; bottom:auto; top:50%; width:520px; max-height:86vh;
    border-radius:22px; transform:translate(-50%,-46%); opacity:0;
    transition:transform .24s var(--ease), opacity .18s ease; }
  .overlay.open .sheet{ transform:translate(-50%,-50%); opacity:1; }
  .sheet .grab{ display:none; }
}

/* menu list rows */
.menuList{ display:flex; flex-direction:column; gap:2px; margin-top:6px; }
.menuItem{ display:flex; align-items:center; gap:14px; min-height:56px; padding:0 6px;
  border-radius:var(--radius-sm); text-align:left; width:100%; color:var(--ink);
  border-bottom:1px solid var(--hair); font:600 16px/1.2 var(--font-ui); }
.menuItem:last-child{ border-bottom:0; }
.menuItem:active{ background:var(--surface-sink); }
.menuItem .mi-ic{ flex:0 0 auto; width:24px; height:24px; color:var(--ink-2); }
.menuItem .mi-t{ flex:1; min-width:0; }
.menuItem .mi-sub{ font:500 13px/1.3 var(--font-ui); color:var(--ink-3); margin-top:1px; }
.menuItem .mi-chev{ flex:0 0 auto; color:var(--ink-3); }

/* ══════════════════════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════════════════════ */
.btn{ min-height:var(--tap); padding:0 18px; border-radius:var(--radius-sm);
  font:750 16.5px/1 var(--font-ui); display:inline-flex; align-items:center; justify-content:center;
  gap:8px; border:1px solid transparent; }
.btn-primary{ background:var(--teal); color:#fff; }
.btn-primary:active{ background:var(--teal-press); }
.btn-barge{ background:var(--barge-amber); color:#1F1405; }
.btn-quiet{ background:var(--surface); color:var(--ink); border-color:var(--hair-strong); }
.btn-danger{ background:var(--surface); color:var(--danger); border:1.5px solid var(--danger); }
.btn-block{ width:100%; }
.btn[disabled]{ opacity:.45; pointer-events:none; }
.btnRow{ display:flex; gap:10px; margin-top:16px; }
.btnRow .btn{ flex:1; }

/* ══════════════════════════════════════════════════════════════════
   INPUTS / FORMS
   ══════════════════════════════════════════════════════════════════ */
input,select,textarea{ font:450 16px/1.3 var(--font-ui); min-height:var(--tap); width:100%;
  padding:12px 14px; border:1px solid var(--hair-strong); border-radius:var(--radius-sm);
  background:var(--surface); color:var(--ink); }
textarea{ min-height:72px; resize:vertical; }
input[inputmode="numeric"], input[inputmode="decimal"], .num-in{
  font-family:var(--font-num); font-variant-numeric:tabular-nums; }
input:focus,select:focus,textarea:focus{ outline:2px solid var(--teal); outline-offset:1px;
  border-color:var(--teal); }
label{ display:block; font:700 12px/1 var(--font-ui); letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-2); margin:14px 0 6px; }
.fieldHint{ font:500 12px/1.35 var(--font-ui); color:var(--ink-3); margin-top:5px; }

/* chips (ploidy / grades / work-again) */
.chips{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ min-height:var(--tap-min); padding:0 16px; border-radius:var(--radius-pill);
  border:1.5px solid var(--hair-strong); background:var(--surface); color:var(--ink);
  font:650 14px/1 var(--font-ui); display:inline-flex; align-items:center; gap:6px; }
.chip:active{ background:var(--surface-sink); }
.chip.on{ background:var(--teal-tint); border-color:var(--teal); color:var(--teal-press); font-weight:750; }
.chip .x{ font-size:16px; line-height:1; opacity:.6; margin-left:2px; }
.chip.add{ border-style:dashed; color:var(--teal); }

/* cage-type editor rows */
.typeRow{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:10px 0; border-top:1px solid var(--hair); }
.typeRow:first-of-type{ border-top:0; }
.typeRow .tname{ flex:1 1 100%; min-width:0; }   /* name on its OWN full-width row; shape·mesh·remove wrap below (readable cage names) */
.typeRow .tmesh{ flex:0 0 86px; }
.typeRow .shapeToggle{ flex:0 0 auto; display:flex; gap:4px; }
.shapeToggle .sbtn{ width:44px; height:40px; border-radius:9px; border:1.5px solid var(--hair-strong);
  background:var(--surface); display:flex; align-items:center; justify-content:center; color:var(--ink-2); }
.shapeToggle .sbtn svg{ width:30px; height:18px; }
.shapeToggle .sbtn.on{ border-color:var(--teal); background:var(--teal-tint); }
.typeRow .trm{ flex:0 0 auto; width:38px; height:38px; border-radius:9px; color:var(--danger);
  display:flex; align-items:center; justify-content:center; font-size:22px; line-height:1; }
.typeRow .trm:active{ background:var(--c-work-soft); }

/* ══════════════════════════════════════════════════════════════════
   TOAST + INLINE UNDO
   ══════════════════════════════════════════════════════════════════ */
#toast{ position:fixed; left:50%; bottom:calc(20px + env(safe-area-inset-bottom));
  transform:translate(-50%,10px); z-index:700; background:var(--toast-bg); color:#fff;
  padding:13px 18px; border-radius:var(--radius-pill); font:600 15px/1.2 var(--font-ui);
  box-shadow:var(--shadow-pop); display:flex; align-items:center; gap:6px; max-width:90vw;
  opacity:0; pointer-events:none; transition:opacity .22s ease, transform .28s var(--ease); }
#toast.show{ opacity:1; transform:translate(-50%,0); pointer-events:auto; }
#toast .undo{ margin-left:6px; min-height:44px; padding:0 12px; border-radius:var(--radius-pill);
  color:#7FE0EC; font-weight:800; background:transparent; }

/* ══════════════════════════════════════════════════════════════════
   CONTEXTUAL POPUP (above the selection)
   ══════════════════════════════════════════════════════════════════ */
.popup{ position:fixed; z-index:600; transform:translateX(-50%); min-width:172px;
  background:var(--surface); border:1px solid var(--hair-strong); border-radius:14px;
  box-shadow:var(--shadow-pop); padding:10px 12px 12px;
  display:flex; flex-direction:column; align-items:center; gap:9px;
  /* Bug B3: the card itself is touch-transparent so taps/drag-selects in the gaps between the
     action buttons pass THROUGH to the cage cells beneath (the popup can flip onto a neighbor
     line). Only the interactive children below re-enable pointer-events, so just the small button
     rectangles block — eliminating the silent dead-zone over the popup's empty areas. */
  pointer-events:none; }
.popup .pbtn, .popup .openRow{ pointer-events:auto; }
.popup .lbl{ font:600 13px/1.25 var(--font-ui); color:var(--ink-2); text-align:center; }
/* single-filled-cage facts: oysters / cage type / size / date put in (owner ask) */
.popup .popFacts{ pointer-events:none; width:100%; display:flex; flex-direction:column; gap:4px; padding:1px 2px 2px; }
.popup .pf{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; font:600 13px/1.3 var(--font-ui); }
.popup .pf-k{ color:var(--ink-3); white-space:nowrap; }
.popup .pf-v{ color:var(--ink); font-weight:750; text-align:right; font-family:var(--font-num); }
.popup .pf-v.muted{ color:var(--ink-3); font-weight:600; }
/* cage-detail action bar (v3): act on the cage from where its data is shown */
.cageActBar{ display:flex; gap:8px; margin:2px 0 4px; }
.caBtn{ flex:1 1 0; min-height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:5px; border-radius:12px; background:var(--surface-sink); border:1px solid var(--hair-strong);
  color:var(--ink); font:700 13px/1 var(--font-ui); }
.caBtn:active{ filter:brightness(1.08); }
.caBtn .caIc{ display:flex; color:var(--ink-2); }
.caBtn.ca-pull{ background:var(--barge-amber); color:#1F1405; border-color:transparent; }
.caBtn.ca-pull .caIc{ color:#1F1405; }
.caBtn.ca-fill{ background:var(--teal); color:#fff; border-color:transparent; }
.caBtn.ca-fill .caIc{ color:#fff; }
.caBtn.ca-rm{ color:var(--danger); }
.caBtn.ca-rm .caIc{ color:var(--danger); }
.popup .openRow{ min-height:40px; padding:0 10px; border-radius:9px; background:var(--surface-sink);
  font:700 14px/1 var(--font-ui); color:var(--ink); display:flex; align-items:center; gap:6px; }
.popup .openRow:active{ background:var(--teal-tint); }
.popup .row{ display:flex; gap:8px; }
.popup .pbtn{ min-height:46px; padding:0 18px; border-radius:11px; font:750 16px/1 var(--font-ui);
  color:#fff; display:inline-flex; align-items:center; justify-content:center; gap:6px; }
.popup .pbtn.fill{ background:var(--teal); }
.popup .pbtn.pull{ background:var(--barge-amber); color:#1F1405; }
.popup .pbtn.work{ background:var(--surface); color:var(--ink); border:1.5px solid var(--hair-strong); }
.popup .pbtn.remove{ background:var(--surface); color:var(--danger); border:1.5px solid var(--danger); }
.popup::after{ content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%);
  border:9px solid transparent; border-top-color:var(--surface); border-bottom:none;
  filter:drop-shadow(0 1px 0 var(--hair-strong)); }
/* flipped caret: when the popup sits BELOW its cages (top-row selections) it points up */
.popup.below::after{ top:-9px; bottom:auto;
  border:9px solid transparent; border-bottom-color:var(--surface); border-top:none;
  filter:drop-shadow(0 -1px 0 var(--hair-strong)); }

/* ══════════════════════════════════════════════════════════════════
   OYSTER PEEK (Component 1) — read-only hover/tap glance card.
   Fixed host, pointer-events:none so it never blocks a cage click or the
   action popup. z-index 500 keeps it UNDER .popup (600), clear of .overlay.
   ══════════════════════════════════════════════════════════════════ */
#oysterPeek{ position:fixed; left:0; top:0; z-index:500; display:none;
  pointer-events:none; max-width:220px; }
#oysterPeek.show{ display:block; }
/* Bug B2: on a DESKTOP transient hover the card becomes a hover-bridge — the .opeek-card itself takes
   pointer events so the cursor can travel from the small cell across the gap onto the card (and its
   "Open ›" CTA) without onHover seeing the cells UNDER the card and retargeting/repositioning it. The
   host stays pointer-events:none (its empty margin never blocks a cage). Scoped to .hoverbridge, which
   is set ONLY for transient mouse hovers — a TOUCH/KEYBOARD pin leaves the card pointer-events:none so
   it can never block a cage tap underneath it. */
#oysterPeek.hoverbridge .opeek-card{ pointer-events:auto; }
.opeek-card{ background:var(--surface); color:var(--ink);
  border:1px solid var(--hair-strong); border-radius:14px;
  box-shadow:var(--shadow-pop); padding:10px 12px; max-width:220px;
  font:500 13px/1.4 var(--font-ui); font-variant-numeric:tabular-nums; }
.opeek-card .op-head{ display:flex; align-items:center; gap:6px;
  font:800 14px/1.2 var(--font-ui); color:var(--deep); margin-bottom:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.opeek-card .op-dot{ width:9px; height:9px; border-radius:50%; flex:none;
  box-shadow:0 0 0 1.5px var(--surface), 0 0 0 2.5px var(--hair); }
.opeek-card .op-row{ display:flex; align-items:center; gap:6px; margin-top:4px; }
.opeek-card .op-muted{ color:var(--ink-3); }
.opeek-card .op-num{ color:var(--ink); font-weight:700; }
.opeek-card .op-chip{ font:700 11px/1 var(--font-ui); padding:3px 7px;
  border-radius:var(--radius-pill); white-space:nowrap; }
.opeek-card .op-chip.op-ready{ background:var(--teal-tint); color:var(--teal-press); }
.opeek-card .op-chip.op-work{ background:var(--c-work-soft); color:var(--old-ink); }
/* B3: the "Open ›" hint is genuinely tappable. The host (#oysterPeek) stays pointer-events:none so it
   never blocks a cage tap; ONLY this hint re-enables pointer events, and the card side-slides away from
   the anchor so the small hint won't sit over a cage. cursor:pointer + a touch-target pad for the finger. */
.opeek-card .op-hint{ margin-top:7px; padding:6px 2px 0; border-top:1px solid var(--hair);
  font:700 11px/1 var(--font-ui); color:var(--ink-3); letter-spacing:.02em;
  pointer-events:auto; cursor:pointer; -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none; touch-action:manipulation; }
.opeek-card .op-hint:hover{ color:var(--teal); }
.opeek-card .op-hint:active{ color:var(--teal-press); }

/* ══════════════════════════════════════════════════════════════════
   NEEDS-WORK / READY indicators (cards)
   ══════════════════════════════════════════════════════════════════ */
@keyframes sonar{ 0%{box-shadow:0 0 0 0 rgba(230,90,64,.7)} 70%{box-shadow:0 0 0 10px rgba(230,90,64,0)}
  100%{box-shadow:0 0 0 0 rgba(230,90,64,0)} }
.work-dot{ animation:sonar 2.2s ease-out infinite; }
.work-banner{ display:flex; align-items:center; gap:8px; background:var(--c-work-soft);
  color:var(--old-ink); border-radius:var(--radius-sm); padding:10px 12px; font:700 14px/1.2 var(--font-ui); }
.ready-badge{ display:inline-flex; align-items:center; gap:5px; color:var(--teal);
  font:800 13px/1 var(--font-ui); }
@media(prefers-reduced-motion:reduce){ .work-dot{ animation:none; box-shadow:0 0 0 3px rgba(230,90,64,.5);} }

/* ══════════════════════════════════════════════════════════════════
   PHOTOS (widget + strip + viewer)
   ══════════════════════════════════════════════════════════════════ */
.photoAdd{ width:64px; height:64px; border-radius:12px; border:1.5px dashed var(--hair-strong);
  display:flex; align-items:center; justify-content:center; color:var(--ink-2); background:var(--surface-sink); }
.photoAdd:active{ background:var(--teal-tint); }
.photoRow{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.photoThumbWrap{ position:relative; width:64px; height:64px; }
.photoThumbWrap img{ width:64px; height:64px; border-radius:12px; object-fit:cover;
  border:1px solid var(--hair); display:block; background:var(--surface-sink); }
.photoThumbWrap .rmph{ position:absolute; top:-6px; right:-6px; width:24px; height:24px;
  border-radius:50%; background:var(--toast-bg); color:#fff; font-size:14px; line-height:1;
  display:flex; align-items:center; justify-content:center; }
/* invisible hit-halo so the small ✕ is a ~42px touch target on a phone (audit: tap-target) */
.photoThumbWrap .rmph::before{ content:''; position:absolute; inset:-9px; border-radius:50%; }
.photoStrip{ display:flex; gap:8px; overflow-x:auto; padding:4px 0; -webkit-overflow-scrolling:touch; }
.thumb{ width:64px; height:64px; border-radius:12px; object-fit:cover; flex:0 0 auto;
  border:1px solid var(--hair); background:var(--surface-sink); }
.viewer{ position:fixed; inset:0; z-index:800; background:rgba(8,22,26,.97);
  display:flex; flex-direction:column; }
.viewer img{ flex:1; width:100%; object-fit:contain; min-height:0; }
.viewer .cap{ color:#CFE0E2; font:500 13px/1.4 var(--font-ui); text-align:center;
  padding:12px calc(12px + env(safe-area-inset-bottom)); }
.viewer .x{ position:absolute; top:calc(8px + env(safe-area-inset-top)); right:12px; width:var(--tap);
  height:var(--tap); border-radius:var(--radius-pill); background:rgba(255,255,255,.14); color:#fff;
  display:flex; align-items:center; justify-content:center; }
.viewer .nav{ position:absolute; top:50%; transform:translateY(-50%); width:var(--tap); height:var(--tap);
  border-radius:var(--radius-pill); background:rgba(255,255,255,.10); color:#fff;
  display:flex; align-items:center; justify-content:center; }
.viewer .nav.prev{ left:8px; } .viewer .nav.next{ right:8px; }

/* ══════════════════════════════════════════════════════════════════
   HISTORY TIMELINE
   ══════════════════════════════════════════════════════════════════ */
.timeline{ position:relative; padding-left:18px; margin-top:6px; }
.timeline::before{ content:''; position:absolute; left:5px; top:6px; bottom:6px; width:2px;
  background:var(--hair); border-radius:1px; }
.tlRow{ position:relative; padding:8px 0; }
.tlRow .dot{ position:absolute; left:-16px; top:12px; width:10px; height:10px; border-radius:50%;
  background:var(--ink-3); border:2px solid var(--surface); }
.tlRow .tlTop{ display:flex; justify-content:space-between; gap:10px; align-items:baseline; }
.tlRow .tlLabel{ font:650 15px/1.25 var(--font-ui); color:var(--ink); }
.tlRow .tlDate{ font:600 13px/1 var(--font-num); color:var(--ink-2); flex:0 0 auto; }
.tlRow .tlDetail{ font:500 13px/1.35 var(--font-ui); color:var(--ink-2); margin-top:2px; }
.tlRow .photoStrip{ margin-top:6px; }

/* ══════════════════════════════════════════════════════════════════
   GROWTH CHART FRAME
   ══════════════════════════════════════════════════════════════════ */
.chartFrame{ background:var(--surface-sink); border:1px solid var(--hair); border-radius:12px;
  padding:12px; margin-top:10px; }
.chartFrame svg{ width:100%; height:auto; display:block; }
.projLine{ font:700 15px/1.3 var(--font-ui); color:var(--ink); margin-top:6px; }
.projHint{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); margin-top:4px; }

/* harvest-log + simple list rows */
.logRow{ padding:11px 0; border-top:1px solid var(--hair); }
.logRow:first-of-type{ border-top:0; }
.logRow .logTop{ display:flex; justify-content:space-between; gap:10px; align-items:baseline; }
.logRow .logCount{ font:700 17px/1 var(--font-num); color:var(--ink); }
.logRow .logDate{ font:600 13px/1 var(--font-num); color:var(--ink-2); }
.logRow .logMeta{ font:500 13px/1.35 var(--font-ui); color:var(--ink-2); margin-top:3px; }
.emptyNote{ text-align:center; color:var(--ink-3); font:500 14px/1.5 var(--font-ui); padding:24px 8px; }

/* onboarding centered scroll page (no farms yet) */
.onboardWrap{ flex:1; overflow-y:auto; background:var(--paper);
  padding:max(20px, env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom)) 16px; }
.onboardWrap .obTitle{ font:800 26px/1.15 var(--font-ui); margin-bottom:4px; }
.onboardWrap .obSub{ font:500 14px/1.45 var(--font-ui); color:var(--ink-2); margin-bottom:18px; }
.linkBtn{ background:none; color:var(--teal); font:650 15px/1.3 var(--font-ui); text-decoration:underline;
  min-height:var(--tap); padding:4px 8px; }
.fieldGroup{ margin-top:18px; }
.row2{ display:flex; gap:12px; }
.row2 > div{ flex:1; }
/* −/value/+ stepper (Edit-area Lines control) */
.stepper{ display:flex; align-items:stretch; gap:8px; }
.stepper .stp-btn{ flex:0 0 var(--tap); width:var(--tap); min-height:var(--tap); border-radius:var(--radius-sm);
  border:1.5px solid var(--hair-strong); background:var(--surface); color:var(--teal-press);
  font:700 24px/1 var(--font-ui); display:flex; align-items:center; justify-content:center; }
.stepper .stp-btn:active{ background:var(--teal-tint); border-color:var(--teal); }
.stepper .stp-val{ flex:1 1 auto; text-align:center; }
  /* harvest-menu hero banner (NOLA pop-up oyster scene) */
  .harvestHero{ margin:2px 0 14px; border-radius:12px; overflow:hidden;
    background:#241B10; border:1px solid rgba(216,155,67,0.30); }
  .harvestHero svg, .harvestHeroSvg{ display:block; width:100%; height:auto; }

/* ── BATCH-SPLIT: sorted-batch chips + the "split the remainder" editor (tub palette = --barge-amber) ── */
.batchChip{ border-color:var(--barge-amber); color:var(--ink); flex-direction:column; align-items:flex-start;
  gap:2px; padding:7px 15px; min-height:var(--tap-min); justify-content:center; }
.batchChip .bc-name{ font:700 14px/1.1 var(--font-ui); color:var(--barge-amber-ink); }
.batchChip .bc-sub{ font:600 11px/1.1 var(--font-num); font-variant-numeric:tabular-nums; color:var(--ink-2); }
.batchChip.on{ background:rgba(216,155,67,0.16); border-color:var(--barge-amber); }
.batchChip.on .bc-name{ color:var(--barge-amber-ink); }
.chip.add.batchAdd{ color:var(--barge-amber-ink); border-color:var(--barge-amber); }

.splitEditor{ margin-top:10px; border:1px solid var(--hair-strong); border-radius:var(--radius-sm);
  background:var(--surface-sink); padding:12px 12px 14px; }
.splitRow{ display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px; padding:10px 0; border-top:1px solid var(--hair); }
.splitRow:first-child{ border-top:0; padding-top:2px; }
.splitRow .sr-cell{ display:flex; flex-direction:column; flex:1 1 88px; min-width:0; }
.splitRow .sr-cap{ font:700 10px/1 var(--font-ui); letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-3); margin:0 0 4px 2px; }
/* the cells (above) own the horizontal share of the row; inputs just fill their cell at natural height.
   (flex sizing on the inputs themselves was being read as HEIGHT inside the column cell — giant boxes.) */
.splitRow .sr-count, .splitRow .sr-size, .splitRow .sr-grade{ flex:0 0 auto; width:100%; min-width:0; box-sizing:border-box; }
.splitRow .sr-label{ flex:1 1 100%; box-sizing:border-box; }
.splitRow .sr-x{ flex:0 0 var(--tap-min); width:var(--tap-min); min-height:var(--tap-min); border-radius:var(--radius-sm);
  border:1.5px solid var(--hair-strong); background:var(--surface); color:var(--danger);
  font:700 20px/1 var(--font-ui); display:flex; align-items:center; justify-content:center; align-self:flex-end; }
.splitRow .sr-x:active{ background:var(--surface); border-color:var(--danger); }
.splitRemain{ margin-top:12px; font:700 14px/1.2 var(--font-num); font-variant-numeric:tabular-nums;
  color:var(--barge-amber-ink); }
.splitRemain.over{ color:var(--danger); }


/* ╔══ DARK DASHBOARD CSS (BIT B/C/D, spliced) ══╗ */
/* ───────────────────────────────────────────────────────────────────
   DASHBOARD (BIT B) — dark DOM home page. All color via tokens.
   ─────────────────────────────────────────────────────────────────── */
.dashboard{
  display:flex; flex-direction:column; gap:18px;
  width:100%; max-width:760px; margin:0 auto;
  padding:0 14px calc(40px + env(safe-area-inset-bottom));
  /* full-bleed safe areas on the sides for notch/landscape */
  padding-left:max(14px, env(safe-area-inset-left));
  padding-right:max(14px, env(safe-area-inset-right));
  color:var(--ink);
}

/* 1. Slim top bar ─────────────────────────────────────────────────── */
.db-top{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  margin:0 -14px 2px; padding:8px 14px;
  padding-top:max(8px, env(safe-area-inset-top));
  background:var(--deep);
  border-bottom:1px solid var(--hair);
}
.db-farm{
  flex:1 1 auto; min-width:0;
  font:800 18px/1.15 var(--font-ui);
  letter-spacing:-0.01em; color:var(--ink);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.db-top-actions{ display:flex; align-items:center; gap:6px; flex:0 0 auto; }
.db-menu-btn{
  display:inline-flex; align-items:center; justify-content:center;
  width:44px; height:44px; flex:0 0 auto;
  background:transparent; border:0; border-radius:12px;
  color:var(--ink-2); cursor:pointer;
}
.db-menu-btn:hover{ color:var(--ink); background:var(--surface); }
.db-menu-btn svg{ display:block; }

/* the [Overview | Work] segmented toggle, dark */
.db-seg{
  display:inline-flex; flex:0 0 auto;
  background:var(--paper-2); border:1px solid var(--hair);
  border-radius:var(--radius-pill); padding:2px;
}
.db-seg-btn{
  min-height:36px; padding:0 12px;
  background:transparent; border:0; border-radius:var(--radius-pill);
  font:700 12.5px/1 var(--font-ui); letter-spacing:.01em;
  color:var(--ink-2); cursor:pointer;
}
.db-seg-btn.active{ background:var(--teal); color:var(--deep); }

/* 2. Stat cards ───────────────────────────────────────────────────── */
.db-stats{
  display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
}
.db-stat{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; min-height:74px; padding:16px 14px;
  background:var(--surface); border:1px solid var(--hair); border-radius:14px;
  text-align:center; color:inherit;
}
button.db-stat{ cursor:pointer; font-family:inherit; }
.db-stat-num{
  font:800 30px/1 var(--font-ui);
  letter-spacing:-0.02em; font-variant-numeric:tabular-nums;
  color:var(--ink); display:inline-flex; align-items:baseline; gap:3px;
}
.db-stat-num .db-stat-chev{
  display:inline-flex; align-items:center; color:var(--c-ready);
  position:relative; top:1px;
}
.db-stat-num .db-stat-chev svg{ display:block; }
.db-stat-label{
  font:700 10px/1.2 var(--font-ui); text-transform:uppercase;
  letter-spacing:.08em; color:var(--ink-2); white-space:nowrap;
}
.db-stat.is-ready .db-stat-num{ color:var(--c-ready); }

/* 3. Conditions host (BIT C fills it; BIT B only styles the empty shell) */
.condbar{
  width:100%; min-height:52px;
  display:flex; align-items:center;
  padding:12px 16px;
  background:var(--surface); border:1px solid var(--hair); border-radius:14px;
  color:var(--ink-2); font:500 13px/1.3 var(--font-ui);
}

/* 4. Plot section heads ───────────────────────────────────────────── */
.db-section{ display:flex; flex-direction:column; gap:14px; }
.db-section-head{ display:flex; align-items:center; gap:12px; }
.db-section-title{
  flex:0 0 auto;
  font:800 13px/1 var(--font-ui); text-transform:uppercase;
  letter-spacing:.06em; color:var(--ink);
}
.db-rule{ flex:1 1 auto; height:1px; background:var(--hair); }

/* 4b. Quarters grid ───────────────────────────────────────────────── */
.db-quarters{
  display:grid; grid-template-columns:1fr; gap:16px;
}

/* 5. Quarter (area) card ──────────────────────────────────────────── */
.db-quarter{
  display:flex; flex-direction:column; gap:10px;
  padding:14px 16px;
  background:var(--surface); border:1px solid var(--hair); border-radius:14px;
}
.db-quarter.is-empty{ background:var(--surface-sink); }
.db-q-head{ display:flex; align-items:flex-start; gap:10px; }
.db-q-titles{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:2px; }
.db-q-title{
  font:700 14px/1.15 var(--font-ui); text-transform:uppercase;
  letter-spacing:.03em; color:var(--ink);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.db-q-sub{
  font:500 11.5px/1.2 var(--font-ui); color:var(--ink-2);
  font-variant-numeric:tabular-nums;
}
.db-q-open{
  flex:0 0 auto;
  display:inline-flex; align-items:center; justify-content:center;
  width:44px; height:44px; margin:-6px -8px -6px 0;
  background:transparent; border:0; border-radius:12px;
  color:var(--ink-2); cursor:pointer;
}
.db-q-open:hover{ color:var(--ink); background:var(--paper-2); }
.db-q-open svg{ display:block; }
.db-q-empty{
  padding:6px 2px 2px;
  font:500 12px/1.3 var(--font-ui); color:var(--ink-3); font-style:italic;
}

/* 5b. Line rows + rope ────────────────────────────────────────────── */
.db-lines{ display:flex; flex-direction:column; gap:8px; }
.db-line{ display:flex; align-items:center; gap:10px; }
.db-line-label{
  flex:0 0 52px; width:52px;
  font:600 10.5px/1 var(--font-ui); letter-spacing:.01em;
  color:var(--ink-3);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.db-rope{
  position:relative; flex:1 1 auto; min-width:0;
  display:flex; align-items:center; gap:3px;
  height:18px; padding:0 1px;
}
/* the rope baseline behind the beads — thin braided thread */
.db-rope::before{
  content:""; position:absolute; left:0; right:0; top:50%;
  height:2px; transform:translateY(-50%);
  background:
    repeating-linear-gradient(90deg,
      var(--rope) 0 4px, var(--rope-hi) 4px 7px, var(--rope) 7px 9px);
  opacity:.55; border-radius:2px; pointer-events:none;
}
.db-rope-empty{
  flex:1 1 auto;
  font:500 11px/1 var(--font-ui); color:var(--ink-3); font-style:italic;
}

/* 6. Cage bead ────────────────────────────────────────────────────── */
.db-bead{
  position:relative; z-index:1;
  flex:1 1 0; min-width:6px; height:11px;
  border-radius:3px;
  background:var(--c-empty);
  box-shadow:0 0 0 1px var(--cage-stroke) inset;
  cursor:pointer;
  transition:box-shadow .12s var(--ease), transform .12s var(--ease);
}
/* shared 1px inset border base for beads + legend chips (declared BEFORE the edge
   modifiers so .is-ready/.is-work box-shadows override at equal specificity). */
.db-legend-chip{ box-shadow:0 0 0 1px var(--cage-stroke) inset; }

/* status fills — shared by real beads AND legend chips (single source of truth) */
.db-bead[data-status="fresh"], .db-legend-chip[data-status="fresh"]{ background:var(--c-fresh); }
.db-bead[data-status="mid"],   .db-legend-chip[data-status="mid"]{   background:var(--c-mid); }
.db-bead[data-status="old"],   .db-legend-chip[data-status="old"]{   background:var(--c-old); }
.db-bead[data-status="empty"], .db-legend-chip[data-status="empty"]{ background:var(--c-empty); }

/* market-ready: 2px inset top edge in teal */
.db-bead.is-ready, .db-legend-chip.is-ready{ box-shadow:inset 0 2px 0 0 var(--c-ready), 0 0 0 1px var(--cage-stroke) inset; }
/* needs-work: 2px inset bottom edge in vermilion */
.db-bead.is-work, .db-legend-chip.is-work{  box-shadow:inset 0 -2px 0 0 var(--c-work), 0 0 0 1px var(--cage-stroke) inset; }
/* both edges at once */
.db-bead.is-ready.is-work{
  box-shadow:inset 0 2px 0 0 var(--c-ready), inset 0 -2px 0 0 var(--c-work), 0 0 0 1px var(--cage-stroke) inset;
}
/* SIGNATURE: a whisper of glow on FRESH stocked beads — lit longline on dark water.
   Scoped to real beads only (.db-bead) so legend chips stay flat/legible. */
.db-bead[data-status="fresh"]{ box-shadow:0 0 5px rgba(81,185,123,.30), 0 0 0 1px var(--cage-stroke) inset; }
.db-bead[data-status="fresh"].is-ready{ box-shadow:0 0 5px rgba(81,185,123,.30), inset 0 2px 0 0 var(--c-ready), 0 0 0 1px var(--cage-stroke) inset; }
.db-bead[data-status="fresh"].is-work{ box-shadow:0 0 5px rgba(81,185,123,.30), inset 0 -2px 0 0 var(--c-work), 0 0 0 1px var(--cage-stroke) inset; }
.db-bead[data-status="fresh"].is-ready.is-work{ box-shadow:0 0 5px rgba(81,185,123,.30), inset 0 2px 0 0 var(--c-ready), inset 0 -2px 0 0 var(--c-work), 0 0 0 1px var(--cage-stroke) inset; }

/* 7. Legend ───────────────────────────────────────────────────────── */
.db-legend{
  background:var(--surface); border:1px solid var(--hair); border-radius:14px;
  overflow:hidden;
}
.db-legend > summary{
  display:flex; align-items:center; gap:8px;
  min-height:44px; padding:0 16px;
  font:700 12px/1 var(--font-ui); text-transform:uppercase; letter-spacing:.06em;
  color:var(--ink-2); cursor:pointer; list-style:none;
}
.db-legend > summary::-webkit-details-marker{ display:none; }
.db-legend > summary::after{
  content:"›"; margin-left:auto; font-size:18px; color:var(--ink-3);
  transition:transform .18s var(--ease);
}
.db-legend[open] > summary::after{ transform:rotate(90deg); }
.db-legend-body{
  display:grid; grid-template-columns:1fr 1fr; gap:8px 16px;
  padding:4px 16px 14px;
}
.db-legend-item{
  display:flex; align-items:center; gap:8px;
  font:500 12px/1.2 var(--font-ui); color:var(--ink-2);
}
.db-legend-chip{
  flex:0 0 auto; width:22px; height:11px; border-radius:3px;
  /* base 1px inset border lives in the shared .db-bead/.db-legend-chip rule above so the
     .is-ready/.is-work edge modifiers (later, equal specificity) can override cleanly. */
}

/* empty states ────────────────────────────────────────────────────── */
.db-empty{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:40px 20px; text-align:center;
  background:var(--surface-sink); border:1px solid var(--hair); border-radius:14px;
}
.db-empty-title{ font:700 15px/1.2 var(--font-ui); color:var(--ink); }
.db-empty-sub{ font:500 13px/1.4 var(--font-ui); color:var(--ink-2); max-width:34ch; }

/* focus rings (keyboard) ──────────────────────────────────────────── */
.dashboard :focus-visible,
.db-bead:focus-visible{
  outline:2px solid var(--teal); outline-offset:2px; border-radius:3px;
}

/* ≥640px — multi-column ────────────────────────────────────────────── */
@media (min-width:640px){
  .db-quarters{ grid-template-columns:1fr 1fr; }
  .db-stat-num{ font-size:30px; }
}

/* ≤640px — stat cards become a horizontal scroller (mockup fidelity) ── */
@media (max-width:639px){
  .db-stats{
    display:flex; gap:10px;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    scroll-snap-type:x proximity;
    margin:0 -14px; padding:0 14px 4px;
    scrollbar-width:none;
  }
  .db-stats::-webkit-scrollbar{ display:none; }
  .db-stat{
    flex:0 0 auto; width:108px; scroll-snap-align:start;
  }
  .db-stat-num{ font-size:24px; }
  .db-legend-body{ grid-template-columns:1fr; }
}

/* reduced motion ──────────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce){
  .db-bead, .db-legend > summary::after{ transition:none; }
}

/* ══════════════════════════════════════════════════════════════════
   BIT C — NOAA CONDITIONS BAR (fills #conditionsBar / .condbar)
   Dark, token-only. Left = water/tide, right = weather + station.
   ══════════════════════════════════════════════════════════════════ */
.condbar{ display:flex; align-items:stretch; gap:12px; width:100%;
  font:450 13px/1.35 var(--font-ui); color:var(--ink-2); }
/* the two halves */
.cond-side{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:3px; }
.cond-side.cond-right{ align-items:flex-end; text-align:right; }
.cond-div{ flex:0 0 1px; align-self:stretch; background:var(--hair); margin:2px 0; }

/* primary readout line (tide / weather) */
.cond-primary{ font:600 14.5px/1.25 var(--font-ui); color:var(--ink);
  font-variant-numeric:tabular-nums; letter-spacing:-.01em;
  display:flex; flex-wrap:wrap; align-items:baseline; gap:4px 8px; }
.cond-right .cond-primary{ justify-content:flex-end; }
.cond-tide{ font-family:var(--font-num); }
.cond-tide .cond-up{ color:var(--c-fresh); }       /* rising → green */
.cond-tide .cond-dn{ color:var(--barge-amber); }   /* falling → amber */
.cond-wtemp{ color:var(--teal); font-family:var(--font-num); }
/* salinity chip — a tappable button styled to sit inline on the sub line (water temp · salinity · age).
   Manual reading reads in --ink-2; the "+ salinity" prompt is dashed/muted to invite a tap. */
.cond-sal{ appearance:none; -webkit-appearance:none; background:none; border:0; padding:0 1px; margin:0;
  color:var(--ink-2); font:inherit; font-family:var(--font-num); font-variant-numeric:tabular-nums;
  cursor:pointer; line-height:inherit; border-bottom:1px dotted var(--hair-strong); }
.cond-sal:active{ color:var(--teal); }
.cond-sal.add{ font-family:var(--font-ui); color:var(--ink-3); border-bottom:1px dashed var(--hair-strong); }
.cond-airtemp{ font-family:var(--font-num); }

/* secondary line (water temp age / station name / offline) */
.cond-sub{ font:500 11.5px/1.3 var(--font-ui); color:var(--ink-3);
  display:flex; flex-wrap:wrap; align-items:center; gap:3px 7px; min-width:0; }
.cond-right .cond-sub{ justify-content:flex-end; }
.cond-sub .cond-age{ color:var(--ink-3); font-variant-numeric:tabular-nums; }
.cond-sub .cond-off{ color:var(--barge-amber); opacity:.85; }   /* faint "offline" */
.cond-sub .cond-dot{ color:var(--hair-strong); }

/* the tappable station chip (right) — opens gauge search */
.cond-station{ display:inline-flex; align-items:center; gap:4px; max-width:100%;
  min-height:24px; color:var(--ink-2); background:transparent; border:0; cursor:pointer;
  font:600 11.5px/1.2 var(--font-ui); letter-spacing:.01em; text-align:right; }
.cond-station .cond-stname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
.cond-station .cond-chev{ flex:0 0 auto; display:inline-flex; color:var(--ink-3); }
.cond-station:active{ color:var(--ink); }
.cond-station:focus-visible{ outline:2px solid var(--teal); outline-offset:2px; border-radius:6px; }

/* EMPTY STATE — "no water reading yet" in amber, whole bar tappable */
.cond-empty{ flex:1 1 0; display:flex; align-items:center; gap:8px; min-height:44px;
  background:transparent; border:0; cursor:pointer; text-align:left; color:var(--barge-amber);
  font:600 14px/1.25 var(--font-ui); -webkit-tap-highlight-color:transparent; }
.cond-empty .cond-emptic{ flex:0 0 auto; display:inline-flex; color:var(--barge-amber); opacity:.9; }
.cond-empty .cond-empadd{ margin-left:auto; flex:0 0 auto; display:inline-flex;
  align-items:center; gap:3px; color:var(--ink-3); font:600 11.5px/1.2 var(--font-ui);
  text-transform:uppercase; letter-spacing:.07em; }
.cond-empty:active{ color:var(--barge-amber-ink); }
.cond-empty:focus-visible{ outline:2px solid var(--barge-amber); outline-offset:3px; border-radius:10px; }

/* a faint per-field placeholder when a sensor has no data */
.cond-na{ color:var(--ink-3); opacity:.75; }

/* ── GAUGE SEARCH SHEET ──────────────────────────────────────────── */
.cond-search-in{ width:100%; }
.cond-results{ margin-top:12px; display:flex; flex-direction:column; gap:2px;
  max-height:46vh; overflow:auto; -webkit-overflow-scrolling:touch; }
.cond-result{ display:flex; align-items:center; gap:12px; min-height:56px; width:100%;
  padding:8px 6px; text-align:left; border:0; background:transparent; cursor:pointer;
  border-bottom:1px solid var(--hair); color:var(--ink); border-radius:var(--radius-sm);
  font:600 15px/1.2 var(--font-ui); }
.cond-result:last-child{ border-bottom:0; }
.cond-result:active{ background:var(--surface-sink); }
.cond-result:focus-visible{ outline:2px solid var(--teal); outline-offset:-2px; }
.cond-result .cond-r-ic{ flex:0 0 auto; width:22px; height:22px; color:var(--teal); display:inline-flex; }
.cond-result .cond-r-main{ flex:1; min-width:0; }
.cond-result .cond-r-name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cond-result .cond-r-sub{ font:500 12px/1.3 var(--font-ui); color:var(--ink-3); margin-top:1px; }
.cond-result.is-active{ color:var(--teal); }
.cond-result .cond-r-chk{ flex:0 0 auto; color:var(--teal); display:inline-flex; }
.cond-suggest-lbl{ font:700 11px/1 var(--font-ui); letter-spacing:.07em; text-transform:uppercase;
  color:var(--ink-3); margin:14px 2px 4px; }
.cond-search-note{ font:500 12.5px/1.45 var(--font-ui); color:var(--ink-3); margin-top:12px; }
.cond-search-empty{ font:500 14px/1.4 var(--font-ui); color:var(--ink-3); padding:18px 4px; text-align:center; }

@media(prefers-reduced-motion:reduce){
  .condbar *{ transition:none !important; }
}

/* ------------------------------------------------------------------
   BIT D — dashboard bead peek + "same oysters" highlight.
   Paste into the inline <style> block (near the .db-bead rules from BIT B).
   Uses tokens only (var(--ink)/var(--surface)/...). No hard-coded colors.
   ------------------------------------------------------------------ */

/* When a bead is active (hover / focus / tap), .dashboard gets .db-hl and the
   matching siblings get .db-bead-match. Everything else dims back. */
.db-hl .db-bead:not(.db-bead-match){
  opacity:.35;
  transition:opacity .12s ease;
}
.db-hl .db-bead.db-bead-match{
  transition:opacity .12s ease;
}

/* Emphasis on the matched cohort — a subtle ring drawn in --ink, plus a faint
   lift so the lit longline reads against the dimmed water. Inset ring avoids
   reflowing the flex row (no layout shift). */
.db-bead.db-bead-match{
  box-shadow:
    0 0 0 1.5px var(--ink),
    0 0 6px rgba(232,241,242,.18);   /* ~ --ink @ low alpha; whisper of glow */
  position:relative;
  z-index:1;
}

/* The bead the pointer/focus is actually ON gets a touch more presence. */
.db-bead.db-bead-active{
  box-shadow:
    0 0 0 2px var(--ink),
    0 0 8px rgba(232,241,242,.28);
  z-index:2;
}

/* Keyboard focus: the browser focus ring stays (BIT B owns :focus-visible
   outline). We only ensure the active bead is not dimmed by .db-hl. */
.db-hl .db-bead.db-bead-active{ opacity:1; }

@media (prefers-reduced-motion: reduce){
  .db-hl .db-bead:not(.db-bead-match),
  .db-hl .db-bead.db-bead-match{ transition:none; }
}
