 <ellipse cx="60" cy="46.8" rx="41.5" ry="10" fill="none" stroke="#FFFFFF" stroke-width="0.9" opacity="0.7"/>
 <ellipse cx="60" cy="49" rx="36" ry="9" fill="url(#tubl_bas)"/>
