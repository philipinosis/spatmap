<?xml version="1.0" encoding="UTF-8"?>
<!--
  SpatMap — Barge Illustration (EMPTY / PLACED STATE)
  viewBox: 0 0 120 110
  Same barge and fishermen as loaded state, but:
  - Oyster pile is gone — just an empty deck outline + a couple scattered shells
  - Fishermen are relaxed: one sitting on the gunwale, one with hands in pockets
  - Basket is empty (outline only, tipped on side)
  - Rope coil and boat hook remain for continuity
  Palette: same as loaded state
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="120" height="110">

  <!-- ═══════════════════════════════════════
       WATER & WAKE
       ═══════════════════════════════════════ -->

  <!-- Deep water background -->
  <ellipse cx="60" cy="90" rx="58" ry="14" fill="#0a2830" opacity="0.9"/>

  <!-- Water surface — main body -->
  <path d="M 4 84 Q 30 80 60 82 Q 90 84 116 80 L 116 96 Q 90 100 60 98 Q 30 96 4 100 Z"
        fill="#0d3a4a"/>

  <!-- Water highlight ripple layer -->
  <path d="M 8 86 Q 35 83 60 85 Q 85 87 112 83"
        fill="none" stroke="#1a5068" stroke-width="1.2" opacity="0.7"/>
  <path d="M 12 89 Q 40 86 60 88 Q 80 90 108 87"
        fill="none" stroke="#1e6878" stroke-width="0.8" opacity="0.5"/>

  <!-- Wake lines — calmer boat (not working as hard) -->
  <path d="M 10 87 Q 5 90 2 95" fill="none" stroke="#1e6878" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
  <path d="M 110 87 Q 115 90 118 95" fill="none" stroke="#1e6878" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>

  <!-- ═══════════════════════════════════════
       HULL (same as loaded state)
       ═══════════════════════════════════════ -->

  <!-- Hull underside / shadow -->
  <path d="M 10 84 L 14 88 L 106 88 L 110 84 Z"
        fill="#1a3a28"/>

  <!-- Hull body -->
  <path d="M 8 72 L 12 84 L 108 84 L 112 72 Z"
        fill="#2d5a42"/>

  <!-- Hull planks -->
  <line x1="10" y1="75" x2="110" y2="75" stroke="#254a38" stroke-width="0.6" opacity="0.6"/>
  <line x1="11" y1="78" x2="109" y2="78" stroke="#254a38" stroke-width="0.6" opacity="0.6"/>
  <line x1="12" y1="81" x2="108" y2="81" stroke="#254a38" stroke-width="0.6" opacity="0.6"/>

  <!-- Hull outer outline -->
  <path d="M 8 72 L 12 84 L 108 84 L 112 72 Z"
        fill="none" stroke="#7ac8a8" stroke-width="1.0" opacity="0.5"/>

  <!-- Bow cap (port) -->
  <path d="M 8 72 L 6 76 L 10 80 L 12 84 L 10 84 L 6 78 L 4 74 Z"
        fill="#3a6e52"/>

  <!-- Stern cap (starboard) -->
  <path d="M 112 72 L 114 76 L 110 80 L 108 84 L 110 84 L 114 78 L 116 74 Z"
        fill="#3a6e52"/>

  <!-- ═══════════════════════════════════════
       DECK
       ═══════════════════════════════════════ -->

  <!-- Deck surface -->
  <rect x="10" y="65" width="100" height="8" rx="1" fill="#3a6040"/>

  <!-- Deck planks -->
  <line x1="10" y1="67.5" x2="110" y2="67.5" stroke="#2a4a30" stroke-width="0.5" opacity="0.7"/>
  <line x1="10" y1="70.0" x2="110" y2="70.0" stroke="#2a4a30" stroke-width="0.5" opacity="0.7"/>

  <!-- Deck rail (gunwale) -->
  <rect x="9" y="64" width="102" height="2" rx="1" fill="#4a7a56"/>
  <line x1="9" y1="65" x2="111" y2="65" stroke="#8ad4a8" stroke-width="0.6" opacity="0.4"/>

  <!-- Deck cleats -->
  <rect x="16" y="63.5" width="5" height="1.5" rx="0.7" fill="#c88530"/>
  <rect x="99" y="63.5" width="5" height="1.5" rx="0.7" fill="#c88530"/>

  <!-- Rope coil — still present -->
  <path d="M 17 63 Q 19 61 21 63 Q 19 61.5 17 63"
        fill="none" stroke="#c88530" stroke-width="0.8" opacity="0.8"/>

  <!-- ═══════════════════════════════════════
       EMPTY DECK AREA
       (oyster pile is gone — just an outline ghost
        and a couple stray shells left behind)
       ═══════════════════════════════════════ -->

  <!-- Ghost outline of where pile was (dashed ellipse, very faint) -->
  <ellipse cx="60" cy="61" rx="16" ry="7" fill="none"
           stroke="#4a7060" stroke-width="0.8" stroke-dasharray="2.5,2" opacity="0.5"/>

  <!-- Just a few stray oyster shells scattered on empty deck -->
  <!-- Shell 1 — left side, half-opened -->
  <ellipse cx="48" cy="67" rx="3.5" ry="1.6" fill="#8aaa7a" transform="rotate(-25 48 67)" opacity="0.8"/>
  <path d="M 46 65.8 Q 48 64.8 50 65.8" fill="none" stroke="#b4d0a0" stroke-width="0.5" opacity="0.6"/>

  <!-- Shell 2 — center -->
  <ellipse cx="60" cy="68" rx="3" ry="1.4" fill="#9ab88a" transform="rotate(10 60 68)" opacity="0.7"/>

  <!-- Shell 3 — right side, faded -->
  <ellipse cx="73" cy="66.5" rx="2.8" ry="1.3" fill="#7a9870" transform="rotate(-15 73 66.5)" opacity="0.7"/>

  <!-- Shell 4 — tiny stray near basket area -->
  <ellipse cx="42" cy="69" rx="2" ry="1" fill="#8aaa7a" transform="rotate(20 42 69)" opacity="0.5"/>

  <!-- Wet circle/stain on deck where pile sat (darker patch) -->
  <ellipse cx="60" cy="67.5" rx="14" ry="3.5" fill="#2a5038" opacity="0.35"/>

  <!-- ═══════════════════════════════════════
       EMPTY BASKET — tipped on side
       (used basket, now empty, resting)
       ═══════════════════════════════════════ -->

  <!-- Basket tipped on its side -->
  <path d="M 33 65 Q 33 62 36 61 L 47 60 Q 50 60 50 63 Q 50 66 47 67 L 36 68 Q 33 67 33 65 Z"
        fill="#2a3a2a" opacity="0.8"/>
  <!-- Basket weave on tipped basket -->
  <line x1="36" y1="61" x2="35" y2="67" stroke="#1e2e1e" stroke-width="0.5" opacity="0.6"/>
  <line x1="40" y1="60.5" x2="39" y2="67.5" stroke="#1e2e1e" stroke-width="0.5" opacity="0.6"/>
  <line x1="44" y1="60.5" x2="43.5" y2="67" stroke="#1e2e1e" stroke-width="0.5" opacity="0.6"/>
  <line x1="34" y1="63" x2="49" y2="63.5" stroke="#1e2e1e" stroke-width="0.4" opacity="0.5"/>
  <line x1="34" y1="65.5" x2="49" y2="65.5" stroke="#1e2e1e" stroke-width="0.4" opacity="0.5"/>
  <!-- Basket rim outline -->
  <path d="M 33 65 Q 33 62 36 61 L 47 60 Q 50 60 50 63 Q 50 66 47 67 L 36 68 Q 33 67 33 65 Z"
        fill="none" stroke="#5a8060" stroke-width="0.8" opacity="0.7"/>
  <!-- Open end of basket (empty) -->
  <ellipse cx="33.5" cy="64.5" rx="1.5" ry="3" fill="#1a2a1a" stroke="#4a6a48" stroke-width="0.6"/>

  <!-- ═══════════════════════════════════════
       FISHERMAN #1 — LEFT SIDE
       Now SITTING on the gunwale, relaxed
       Legs dangling, leaning back, one hand resting
       ═══════════════════════════════════════ -->

  <!-- Body / slicker torso (sitting, so more horizontal) -->
  <!-- Sitting on gunwale — torso tilted back slightly -->
  <path d="M 16 52 Q 14 56 14 62 Q 15 65 21 66 Q 26 66 28 63 Q 30 59 28 53 Q 25 49 20 49 Z"
        fill="#3a5a7a"/>

  <!-- Slicker highlight -->
  <path d="M 18 52 Q 17 57 18 62" fill="none" stroke="#4a7a9a" stroke-width="1.0" opacity="0.5"/>

  <!-- Legs dangling over gunwale/side (sitting) -->
  <!-- Left leg hanging down (front leg) -->
  <path d="M 17 64 Q 15 70 14 76 L 17 76 Q 18 70 19 65 Z" fill="#2a3a4a"/>
  <!-- Right leg -->
  <path d="M 24 64 Q 25 70 26 76 L 23 76 Q 22 70 22 65 Z" fill="#2a3a4a"/>

  <!-- Boots dangling -->
  <ellipse cx="15" cy="76.5" rx="3" ry="1.5" fill="#1a2530"/>
  <ellipse cx="24.5" cy="76.5" rx="3" ry="1.5" fill="#1a2530"/>

  <!-- Left arm — resting on knee / gunwale -->
  <path d="M 22 55 Q 26 60 28 64 Q 27 65 26 65 Q 24 62 21 57 Z"
        fill="#3a5a7a"/>
  <!-- Hand resting -->
  <circle cx="27.5" cy="65" r="2" fill="#c4956a"/>

  <!-- Right arm — braced behind, leaning back -->
  <path d="M 17 56 Q 11 58 9 63 Q 10 64 11 64 Q 13 60 17 58 Z"
        fill="#3a5a7a"/>
  <circle cx="9.5" cy="64" r="2" fill="#c4956a"/>

  <!-- Neck -->
  <rect x="18" y="44" width="5" height="5" rx="2" fill="#c4956a"/>

  <!-- Head — tilted back slightly (relaxed) -->
  <circle cx="20.5" cy="41" r="5.5" fill="#c4956a"/>

  <!-- Face — looking up/away, relaxed -->
  <circle cx="21" cy="40" r="0.8" fill="#2a1a0a"/>
  <circle cx="21.4" cy="39.7" r="0.3" fill="#fff" opacity="0.6"/>
  <!-- Relaxed brow (smooth, not furrowed) -->
  <path d="M 19.5 38.5 Q 21 38 22.5 38.5" fill="none" stroke="#5a3a20" stroke-width="0.6"/>
  <!-- Nose -->
  <path d="M 21.5 40.5 L 22 41.5" fill="none" stroke="#b07848" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Mouth — slight upward curve, at ease -->
  <path d="M 19.5 42.5 Q 21 43.5 22.5 42.5" fill="none" stroke="#8a5830" stroke-width="0.7"/>

  <!-- Baseball cap (same) -->
  <path d="M 15 40 Q 15 35 20.5 35 Q 26 35 26 40" fill="#c88530"/>
  <path d="M 15 40 Q 20.5 38 26 40" fill="none" stroke="#a06820" stroke-width="0.6"/>
  <!-- Cap brim -->
  <path d="M 14 40 Q 20.5 41.5 26 40 L 27 39.5 Q 20.5 41 14 39.5 Z"
        fill="#b07820"/>
  <!-- Cap button -->
  <circle cx="20.5" cy="35.5" r="0.8" fill="#a06820"/>

  <!-- ═══════════════════════════════════════
       FISHERMAN #2 — RIGHT SIDE
       Standing, hands in pockets / arms crossed
       Looking out over the water, off-duty posture
       ═══════════════════════════════════════ -->

  <!-- Body / slicker torso -->
  <path d="M 86 50 Q 84 54 85 62 Q 86 66 92 66 Q 97 66 99 63 Q 101 58 99 52 Q 96 48 92 48 Z"
        fill="#4a6a5a"/>

  <!-- Slicker highlight -->
  <path d="M 89 51 Q 88 56 89 62" fill="none" stroke="#5a8a70" stroke-width="1.0" opacity="0.5"/>

  <!-- Legs -->
  <path d="M 87 64 Q 86 69 85 73 L 88 73 Q 89 69 90 65 Z" fill="#2a3a3a"/>
  <path d="M 94 64 Q 95 69 96 73 L 93 73 Q 92 69 92 65 Z" fill="#2a3a3a"/>

  <!-- Boots -->
  <ellipse cx="86" cy="73" rx="3" ry="1.5" fill="#1a2530"/>
  <ellipse cx="95" cy="73" rx="3" ry="1.5" fill="#1a2530"/>

  <!-- Arms crossed across chest (relaxed, idle) -->
  <!-- Left arm crossing over right -->
  <path d="M 88 55 Q 85 57 84 60 Q 86 61 87 61 Q 88 58 90 56 Z"
        fill="#4a6a5a"/>
  <!-- Right arm crossing under left -->
  <path d="M 94 56 Q 98 57 99 60 Q 97 61 96 61 Q 95 58 93 56 Z"
        fill="#4a6a5a"/>
  <!-- Crossed forearms (visible middle section) -->
  <path d="M 84 60 Q 91 58 99 60" fill="none" stroke="#3a5a4a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 84 60 Q 91 58 99 60" fill="none" stroke="#4a6a5a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hands tucked in -->
  <circle cx="84" cy="60.5" r="2" fill="#c4956a"/>
  <circle cx="99" cy="60.5" r="2" fill="#c4956a"/>

  <!-- Neck -->
  <rect x="89" y="45" width="5" height="5" rx="2" fill="#c4956a"/>

  <!-- Head — turned to look out to water (slightly left, gazing) -->
  <circle cx="91.5" cy="42" r="5.5" fill="#c4956a"/>

  <!-- Face — gazing out, relaxed expression -->
  <circle cx="89.5" cy="41.5" r="0.8" fill="#2a1a0a"/>
  <circle cx="89.1" cy="41.2" r="0.3" fill="#fff" opacity="0.6"/>
  <!-- Relaxed brow -->
  <path d="M 88 40 Q 89.5 39.3 91 40" fill="none" stroke="#5a3a20" stroke-width="0.6"/>
  <!-- Nose -->
  <path d="M 90 42 L 89.5 43" fill="none" stroke="#b07848" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Mouth — easy, content expression -->
  <path d="M 89 44 Q 90.5 44.5 92 44" fill="none" stroke="#8a5830" stroke-width="0.6"/>

  <!-- Wide-brim sou'wester (same hat) -->
  <!-- Crown -->
  <path d="M 86 41 Q 86 35.5 91.5 35.5 Q 97 35.5 97 41" fill="#8a9a3a"/>
  <!-- Wide brim -->
  <ellipse cx="91.5" cy="41" rx="8" ry="2.5" fill="#9aaa4a"/>
  <!-- Brim underside (shadow) -->
  <path d="M 84 42 Q 91.5 44 99 42 L 99 41 Q 91.5 43 84 41 Z" fill="#6a7a2a" opacity="0.7"/>
  <!-- Hat sheen -->
  <path d="M 87 37 Q 91.5 36 96 37.5" fill="none" stroke="#c4cc7a" stroke-width="0.8" opacity="0.5"/>

  <!-- ═══════════════════════════════════════
       BARGE DETAILS (same accessories)
       ═══════════════════════════════════════ -->

  <!-- Boat hook / push pole leaning on stern (same) -->
  <line x1="104" y1="35" x2="108" y2="65" stroke="#8b6a3a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 103.5 35.5 Q 101 33 102 31 Q 104 33 103.5 35.5" fill="none" stroke="#c88530" stroke-width="1.0"/>

  <!-- Rope coil at stern -->
  <path d="M 100 65 Q 105 63 108 64 Q 110 65 109 67 Q 107 68 105 67 Q 103 66 100 65"
        fill="none" stroke="#c88530" stroke-width="1.0" opacity="0.8"/>
  <path d="M 103 66 Q 106 65 108 66 Q 106 67 103 66"
        fill="none" stroke="#a06820" stroke-width="0.7" opacity="0.6"/>

  <!-- Tally board / bow marker -->
  <rect x="12" y="56" width="6" height="4" rx="0.5" fill="#4a3020"/>
  <line x1="13" y1="57.5" x2="17" y2="57.5" stroke="#c8a860" stroke-width="0.5"/>
  <line x1="13" y1="59" x2="17" y2="59" stroke="#c8a860" stroke-width="0.5"/>

  <!-- ═══════════════════════════════════════
       WATERLINE FOAM / HULL REFLECTION
       ═══════════════════════════════════════ -->

  <!-- Water reflection (hull sitting lighter — less weight without oyster load) -->
  <path d="M 14 84 Q 40 86 60 85 Q 80 84 106 86"
        fill="none" stroke="#1e6878" stroke-width="0.5" opacity="0.3"/>
  <path d="M 16 87 Q 40 89 60 88 Q 80 87 104 89"
        fill="none" stroke="#1e6878" stroke-width="0.4" opacity="0.2"/>

  <!-- Foam at waterline (port side) -->
  <path d="M 8 82 Q 10 80 12 82 Q 10 83 8 82" fill="#3a8898" opacity="0.5"/>
  <path d="M 5 85 Q 8 83 10 85" fill="none" stroke="#4a9aaa" stroke-width="0.6" opacity="0.4"/>

  <!-- Foam at waterline (starboard side) -->
  <path d="M 112 82 Q 110 80 108 82 Q 110 83 112 82" fill="#3a8898" opacity="0.5"/>
  <path d="M 115 85 Q 112 83 110 85" fill="none" stroke="#4a9aaa" stroke-width="0.6" opacity="0.4"/>

</svg>
